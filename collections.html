<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Organise and save your favourite recipes into personal collections.">
  <link rel="canonical" href="https://theculinaryjournal.site/collections.html">
  <meta name="robots" content="noindex, nofollow">
  <title>My Collections — The Culinary Journal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
<script src="supabase-config.js"></script>
  <style>
    .page-bg{min-height:100vh;background:var(--bg);}
    .cl-wrap{max-width:1000px;margin:0 auto;padding:32px 20px 80px;}
    .cl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
    .cl-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--text-high);}
    .cl-btn{padding:10px 20px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;}
    .cl-btn-primary{background:var(--accent);color:#fff;}
    .cl-btn-ghost{background:none;border:1px solid var(--border);color:var(--text-mid);}
    .cl-btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
    .cl-btn-sm{padding:6px 12px;font-size:11px;}
    .cl-btn-danger{background: var(--danger-bg);border:1px solid rgb(from var(--danger) r g b / 0.3);color: var(--danger);}
    /* List view */
    .cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
    .cl-card{background:var(--text-ghost);border:1px solid var(--border);border-radius:13px;padding:20px;cursor:pointer;transition:all 0.15s;}
    .cl-card:hover{border-color:var(--accent-border);transform:translateY(-2px);}
    .cl-card-emoji{font-size:32px;margin-bottom:10px;}
    .cl-card-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--text-high);margin-bottom:4px;}
    .cl-card-desc{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-mid);margin-bottom:10px;}
    .cl-card-meta{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-mid);display:flex;gap:10px;align-items:center;}
    .cl-pub-badge{font-size:10px;padding:2px 7px;border-radius:4px;background: var(--success-bg);color:#4caf76;}
    .cl-card-actions{display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
    /* Detail view */
    .cl-back{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-mid);cursor:pointer;margin-bottom:20px;}
    .cl-back:hover{border-color:var(--accent);color:var(--accent);}
    .cl-detail-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
    .cl-detail-emoji{font-size:48px;}
    .cl-detail-name{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--text-high);}
    .cl-detail-desc{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-mid);}
    .cl-recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
    .cl-recipe-card{background:var(--text-ghost);border:1px solid var(--border);border-radius:11px;overflow:hidden;position:relative;}
    .cl-recipe-card:hover{border-color:var(--accent-border);}
    .cl-recipe-img{height:110px;display:flex;align-items:center;justify-content:center;font-size:28px;border-bottom:1px solid var(--border);overflow:hidden;}
    .cl-recipe-img img{width:100%;height:100%;object-fit:cover;}
    .cl-recipe-body{padding:10px 12px;}
    .cl-recipe-name{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-weight:600;color:var(--text-high);margin-bottom:2px;}
    .cl-recipe-cat{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--text-mid);}
    .cl-recipe-remove{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);border:none;color:#fff;border-radius:5px;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;}
    .cl-recipe-card:hover .cl-recipe-remove{opacity:1;}
    .cl-recipe-link{text-decoration:none;display:block;}
    /* Empty/modal */
    .cl-empty{text-align:center;padding:60px 20px;}
    .cl-empty-icon{font-size:40px;margin-bottom:10px;}
    .cl-empty-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--text-high);margin-bottom:6px;}
    .cl-empty-sub{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-mid);}
    .cl-modal{display:none;position:fixed;inset:0;background: var(--scrim);z-index:9999;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
    .cl-modal.open{display:flex;}
    .cl-modal-box{background:var(--bg);border:1px solid var(--border);border-radius:16px;width:100%;max-width:420px;padding:24px;}
    .cl-modal-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--text-high);margin-bottom:20px;}
    .cl-field{margin-bottom:14px;}
    .cl-label{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-mid);margin-bottom:5px;display:block;}
    .cl-input{width:100%;box-sizing:border-box;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background: var(--input-bg);color:var(--text-high);outline:none;}
    .cl-input:focus{border-color:var(--accent);}
    .cl-emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
    .cl-emoji-opt{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .cl-emoji-opt.selected{border-color:var(--accent);background:rgb(from var(--accent) r g b / 0.1);}
    .cl-modal-foot{display:flex;gap:8px;margin-top:18px;}
  </style>
  <script src="page-guard.js"></script>
</head>
<body class="page-bg cj-body">
<nav class="nav">
  <a class="nav-logo" href="index.html">
    <span>🍽</span>
    <span class="nav-logo-text">The Culinary Journal</span>
    <span class="nav-logo-badge">Est. 2025</span>
  </a>
  <div class="nav-btns" id="nav-btns"></div>
</nav>
<div class="tab-nav"></div>
<div class="cl-wrap">
  <!-- List view -->
  <div id="cl-list">
    <div class="cl-header">
      <div>
        <h1 class="cl-title">📁 My Collections</h1>
      </div>
      <button class="cl-btn cl-btn-primary" onclick="openCollectionModal()">+ New Collection</button>
    </div>
    <div id="cl-grid-wrap"></div>
  </div>
  <!-- Detail view -->
  <div id="cl-detail" style="display:none">
    <button class="cl-back" onclick="backToList()">← All Collections</button>
    <div class="cl-detail-header">
      <div class="cl-detail-emoji" id="cd-emoji"></div>
      <div>
        <div class="cl-detail-name" id="cd-name"></div>
        <div class="cl-detail-desc" id="cd-desc"></div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="cl-btn cl-btn-primary cl-btn-sm" onclick="printCollection()">🖨 Print collection</button>
          <button class="cl-btn cl-btn-ghost cl-btn-sm" onclick="openCollectionModal(currentCollection)">Edit</button>
          <button class="cl-btn cl-btn-sm cl-btn-danger" onclick="deleteCurrentCollection()">Delete Collection</button>
        </div>
      </div>
    </div>
    <div class="cl-recipe-grid" id="cd-recipes"></div>
  </div>
</div>
<!-- Collection modal -->
<div class="cl-modal" id="cl-modal">
  <div class="cl-modal-box">
    <div class="cl-modal-title" id="cl-modal-title">New Collection</div>
    <input type="hidden" id="cm-id">
    <div class="cl-field"><label class="cl-label">Name *</label><input class="cl-input" id="cm-name" placeholder="e.g. Sunday Dinners"></div>
    <div class="cl-field"><label class="cl-label">Description</label><input class="cl-input" id="cm-desc" placeholder="Optional description"></div>
    <div class="cl-field">
      <label class="cl-label">Icon</label>
      <div class="cl-emoji-grid" id="cm-emoji-grid"></div>
      <input type="hidden" id="cm-emoji" value="📁">
    </div>
    <div class="cl-field"><label class="cl-label" style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="cm-public" style="accent-color:var(--accent)"> Make this collection public</label></div>
    <div class="cl-modal-foot">
      <button class="cl-btn cl-btn-primary" style="flex:1" onclick="saveCollection()">Save</button>
      <button class="cl-btn cl-btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<script src="lib/tcj-errors.js"></script>
<script src="nav-init.js"></script>
<script>
const CAT_EMOJI={'Rise & Shine':'🌅','The Evening Table':'☕','Garden & Earth':'🥬','Meat & Fire':'🍖','Ocean & River':'🌊','Slow & Soulful':'🥘','Grains & Comfort':'🍚','Breads & Bakes':'🫓','Sweet Serenades':'🍮','Sips & Stories':'🥂','Preserved & Cherished':'🫙','Feast Days':'🎉','Little Ones':'👶','Nourish & Heal':'💪'};
const EMOJIS=['📁','⭐','❤️','🍳','🌍','🎉','🥗','🍰','🌶','🥘','📚','🎂','🏡','💛','🌿','🍽','👨‍👩‍👧‍👦','🫙'];
let collections=[], currentCollection=null;

async function rpc(fn,params){
  const s=JSON.parse(localStorage.getItem('tcj_session')||'null');
  const h={'apikey':SUPA_KEY,'Content-Type':'application/json'};
  if(s)h['Authorization']='Bearer '+s.access_token;
  const r=await fetch(SUPA_URL+'/rest/v1/rpc/'+fn,{method:'POST',headers:h,body:JSON.stringify(params||{})});
  if(!r.ok)throw new Error(await r.text());
  return r.json().catch(()=>null);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

async function load(){
  const session=JSON.parse(localStorage.getItem('tcj_session')||'null');
  if(!session){document.getElementById('cl-grid-wrap').innerHTML='<div class="cl-empty"><div class="cl-empty-icon">🔐</div><div class="cl-empty-title">Sign in to view collections</div><div class="cl-empty-sub"><a href="login.html" style="color:var(--accent)">Sign in →</a></div></div>';return;}
  try{collections=await rpc('get_my_collections',{})||[];renderList();}
  catch (e) { TcjErr.warn('get_my_collections', e); }
}

function renderList(){
  const el=document.getElementById('cl-grid-wrap');
  // Event delegation for all collection interactions — no inline onclicks with user data
  document.addEventListener('click', function(e) {
    var target = e.target;
    
    // Open collection card
    var card = target.closest('.cl-card[data-cid]');
    if (card && !target.closest('[data-action]')) {
      openCollection(card.dataset.cid); return;
    }
    
    // Edit collection
    var editBtn = target.closest('[data-action="edit-coll"]');
    if (editBtn) {
      e.stopPropagation();
      var c = collections.find(function(x){ return x.id === editBtn.dataset.cid; });
      if (c) openCollectionModal(c);
      return;
    }
    
    // Delete collection
    var delBtn = target.closest('[data-action="delete-coll"]');
    if (delBtn) {
      e.stopPropagation();
      deleteCollection(delBtn.dataset.cid, delBtn.dataset.name);
      return;
    }
    
    // Remove recipe from collection
    var remBtn = target.closest('[data-action="remove-recipe"]');
    if (remBtn) {
      removeFromColl(remBtn.dataset.cid, remBtn.dataset.rid);
      return;
    }
    
    // Pick emoji
    var emojiBtn = target.closest('[data-action="pick-emoji"]');
    if (emojiBtn) {
      pickEmoji(emojiBtn.dataset.emoji);
      return;
    }
  });
  if(!collections.length){el.innerHTML='<div class="cl-empty"><div class="cl-empty-icon">📁</div><div class="cl-empty-title">No collections yet</div><div class="cl-empty-sub">Create a collection to organise your saved and submitted recipes into groups — Sunday Dinners, Kerala Recipes, Party Food and more.</div></div>';return;}
  el.innerHTML='<div class="cl-grid">'+collections.map(c=>`
    <div class="cl-card" data-cid="${esc(String(c.id))}">
      <div class="cl-card-emoji">${esc(c.emoji||'📁')}</div>
      <div class="cl-card-name">${esc(c.name)}</div>
      <div class="cl-card-desc">${esc(c.description||'')}</div>
      <div class="cl-card-meta">
        <span>${c.recipe_count||0} recipe${c.recipe_count==1?'':'s'}</span>
        ${c.is_public?'<span class="cl-pub-badge">Public</span>':''}
      </div>
      <div class="cl-card-actions" onclick="event.stopPropagation()">
        <button class="cl-btn cl-btn-ghost cl-btn-sm" data-action="edit-coll" data-cid="${esc(String(c.id))}">Edit</button>
        <button class="cl-btn cl-btn-sm cl-btn-danger" data-action="delete-coll" data-cid="${esc(String(c.id))}" data-name="${esc(c.name)}">Delete</button>
      </div>
    </div>`).join('')+'</div>';
}

async function openCollection(id){
  const c=collections.find(x=>x.id===id);
  if(!c)return;
  currentCollection=c;
  document.getElementById('cd-emoji').textContent=c.emoji||'📁';
  document.getElementById('cd-name').textContent=c.name;
  document.getElementById('cd-desc').textContent=c.description||'';
  document.getElementById('cl-list').style.display='none';
  document.getElementById('cl-detail').style.display='block';
  document.getElementById('cd-recipes').innerHTML='<div style="font-family:DM Sans,sans-serif;font-size:13px;color:var(--text-mid)">Loading...</div>';
  try{
    const recipes=await rpc('get_collection_recipes',{p_collection_id:id})||[];
    renderCollectionRecipes(recipes,id);
  }catch (e) { TcjErr.warn('get_collection_recipes', e); }
}

function renderCollectionRecipes(recipes,collectionId){
  const el=document.getElementById('cd-recipes');
  if(!recipes.length){el.innerHTML='<div class="cl-empty"><div class="cl-empty-icon">🍳</div><div class="cl-empty-title">Empty collection</div><div class="cl-empty-sub">Open any recipe and click "Save to Collection" to add it here.</div></div>';return;}
  el.innerHTML=recipes.map(r=>{
    const emoji=CAT_EMOJI[r.category]||'🍳';
    return `<div class="cl-recipe-card">
      <button class="cl-recipe-remove" data-action="remove-recipe" data-cid="${esc(String(collectionId))}" data-rid="${esc(String(r.id))}" title="Remove">×</button>
      <a href="recipe-page.html?id=${r.id}" class="cl-recipe-link">
        <div class="cl-recipe-img">${r.image_url?'<img src="'+r.image_url+'" loading="lazy">':emoji}</div>
        <div class="cl-recipe-body">
          <div class="cl-recipe-name">${esc(r.recipe_name||'')}</div>
          <div class="cl-recipe-cat">${esc(r.category||'')} ${r.origin_country?'· '+esc(r.origin_country):''}</div>
        </div>
      </a>
    </div>`;
  }).join('');
}

async function removeFromColl(collectionId,recipeId){
  try{await rpc('remove_from_collection',{p_collection_id:collectionId,p_recipe_id:recipeId});openCollection(collectionId);}
  catch(e){alert('Error: '+e.message);}
}

function printCollection(){
  if(!currentCollection)return;
  var cards=document.querySelectorAll('#cd-recipes .cl-recipe-card a[href*="recipe-page"]');
  var ids=[];
  cards.forEach(function(a){
    var m=(a.getAttribute('href')||'').match(/id=([^&]+)/);
    if(m)ids.push(m[1]);
  });
  if(!ids.length){alert('No recipes in this collection to print.');return;}
  var q='ids='+ids.join(',')+'&collection='+encodeURIComponent(currentCollection.name||'My Collection');
  location.href='print-studio.html?'+q;
}
function backToList(){document.getElementById('cl-detail').style.display='none';document.getElementById('cl-list').style.display='block';currentCollection=null;load();}

async function deleteCollection(id,name){
  if(!confirm('Delete "'+name+'"? All saved recipes will be removed from this collection.'))return;
  try{await rpc('delete_collection',{p_id:id});await load();}
  catch(e){alert('Error: '+e.message);}
}

async function deleteCurrentCollection(){
  if(!currentCollection)return;
  if(!confirm('Delete "'+currentCollection.name+'"?'))return;
  try{await rpc('delete_collection',{p_id:currentCollection.id});backToList();}
  catch(e){alert('Error: '+e.message);}
}

// Modal
let selectedEmoji='📁';
function openCollectionModal(c){
  document.getElementById('cl-modal-title').textContent=c?'Edit Collection':'New Collection';
  document.getElementById('cm-id').value=c?c.id:'';
  document.getElementById('cm-name').value=c?c.name:'';
  document.getElementById('cm-desc').value=c?c.description:'';
  document.getElementById('cm-public').checked=c?c.is_public:false;
  selectedEmoji=c?c.emoji:'📁';
  document.getElementById('cm-emoji').value=selectedEmoji;
  buildEmojiGrid();
  document.getElementById('cl-modal').classList.add('open');
  setTimeout(()=>document.getElementById('cm-name').focus(),50);
}
function buildEmojiGrid(){
  document.getElementById('cm-emoji-grid').innerHTML=EMOJIS.map(e=>`<button type="button" class="cl-emoji-opt${e===selectedEmoji?' selected':''}" data-action="pick-emoji" data-emoji="${e}">${e}</button>`).join('');
}
function pickEmoji(e){selectedEmoji=e;document.getElementById('cm-emoji').value=e;buildEmojiGrid();}
function closeModal(){document.getElementById('cl-modal').classList.remove('open');}
async function saveCollection(){
  const name=document.getElementById('cm-name').value.trim();
  if(!name){alert('Please enter a collection name.');return;}
  try{
    await rpc('upsert_collection',{p_id:document.getElementById('cm-id').value||null,p_name:name,p_description:document.getElementById('cm-desc').value.trim(),p_emoji:selectedEmoji,p_is_public:document.getElementById('cm-public').checked});
    closeModal();await load();
  }catch(e){alert('Error: '+e.message);}
}

document.addEventListener('DOMContentLoaded',()=>{load();document.getElementById('cl-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});});
</script>
</body>
</html>
