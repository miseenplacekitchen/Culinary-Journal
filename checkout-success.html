<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Subscription Active — The Culinary Journal</title>
  <script src="theme-init.js"></script>
  <script src="lib/tcj-errors.js"></script>
<script src="supabase-config.js"></script>
  <script src="page-guard.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { text-align:center; max-width:480px; padding:48px 36px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:20px; }
    h1 { font-family:'Cormorant Garamond',serif; font-size:2rem; color:var(--text-high); margin-bottom:12px; }
    p { font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-mid); line-height:1.6; }
    .btn { display:inline-block; margin-top:24px; padding:12px 28px; background:var(--accent); color:#0C0702; text-decoration:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:14px; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:2.5rem;margin-bottom:16px">✓</div>
    <h1>Thank you!</h1>
    <p id="msg">Your subscription is being activated. This may take a few seconds.</p>
    <a href="index.html" class="btn" id="continue-btn" style="display:none">Continue to The Culinary Journal</a>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var next = params.get('next') || 'index.html';
      var btn = document.getElementById('continue-btn');
      btn.href = next;
      setTimeout(function() {
        document.getElementById('msg').textContent = 'Your plan is active. Enjoy full access to The Culinary Journal.';
        btn.style.display = 'inline-block';
        try {
          var prof = JSON.parse(localStorage.getItem('tcj_profile') || 'null');
          if (prof) { prof.subscription_tier = prof.subscription_tier || 'monthly'; localStorage.setItem('tcj_profile', JSON.stringify(prof)); }
        } catch (_) { TcjErr.warn('degrade', _); }
      }, 2500);
    })();
  </script>
</body>
</html>
