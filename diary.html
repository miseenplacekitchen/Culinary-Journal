<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Private culinary diary for cooking notes, memories, and reflections.">
  <link rel="canonical" href="https://theculinaryjournal.site/diary.html">
  <meta name="robots" content="noindex, nofollow">
  <title>My Diary — The Culinary Journal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
  <script src="supabase-config.js"></script>
  <style>
    .dj-wrap { max-width:1100px; margin:0 auto; padding:28px 20px 60px; }

    /* ── Top bar ── */
    .dj-topbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:28px; }
    .dj-heading { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:700; color:var(--text-high); }
    .dj-heading span { color:var(--accent); font-style:italic; }
    .dj-new-btn { padding:10px 22px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:filter .15s; }
    .dj-new-btn:hover { filter:brightness(.9); }

    /* ── Stats row ── */
    .dj-stats { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
    .dj-stat { flex:1; min-width:100px; background:var(--text-ghost); border:1px solid var(--border); border-radius:10px; padding:14px 16px; text-align:center; }
    .dj-stat-num { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:700; color:var(--accent); }
    .dj-stat-lbl { font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-mid); margin-top:2px; }

    /* ── Layout ── */
    .dj-layout { display:grid; grid-template-columns:300px 1fr; gap:20px; }
    @media(max-width:768px){ .dj-layout { grid-template-columns:1fr; } }

    /* ── Calendar sidebar ── */
    .dj-cal-card { background:var(--text-ghost); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .dj-cal-nav { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); }
    .dj-cal-month { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:700; color:var(--text-high); }
    .dj-cal-arrow { background:none; border:1px solid var(--border); border-radius:7px; color:var(--text-mid); font-size:14px; width:30px; height:30px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .dj-cal-arrow:hover { border-color:var(--accent); color:var(--accent); }
    .dj-cal-grid { padding:12px; }
    .dj-cal-days { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:6px; }
    .dj-cal-dow  { font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; text-align:center; color:var(--text-mid); padding:4px 0; letter-spacing:.05em; }
    .dj-cal-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-family:'DM Sans',sans-serif; font-size:11px; border-radius:7px; cursor:pointer; position:relative; transition:all .15s; color:var(--text-high); }
    .dj-cal-cell:hover { background:rgb(from var(--accent) r g b / .15); }
    .dj-cal-cell.other-month { color:var(--text-ghost); cursor:default; }
    .dj-cal-cell.other-month:hover { background:none; }
    .dj-cal-cell.has-entry::after { content:''; position:absolute; bottom:3px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--accent); }
    .dj-cal-cell.has-meals::before { content:''; position:absolute; top:3px; right:3px; width:5px; height:5px; border-radius:50%; background:#5b8fd4; }
    .dj-cal-cell.has-entry.has-meals::after { bottom:2px; }
    .dj-cal-cell.selected { background:var(--accent); color:#fff; font-weight:600; }
    .dj-cal-cell.selected::after { background:#fff; }
    .dj-cal-cell.today:not(.selected) { border:1.5px solid var(--accent); }
    .dj-cal-today-btn { width:100%; padding:10px; background:none; border:none; border-top:1px solid var(--border); font-family:'DM Sans',sans-serif; font-size:12px; color:var(--accent); cursor:pointer; }
    .dj-cal-today-btn:hover { background:var(--text-ghost); }

    /* ── Search ── */
    .dj-search-wrap { padding:12px; border-top:1px solid var(--border); }
    .dj-search { width:100%; box-sizing:border-box; padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-high); outline:none; }
    .dj-search:focus { border-color:var(--accent); }

    /* ── Entry types filter ── */
    .dj-type-filter { padding:12px; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:5px; }
    .dj-type-pill { padding:4px 10px; border-radius:20px; border:1px solid var(--border); font-family:'DM Sans',sans-serif; font-size:10px; font-weight:500; color:var(--text-mid); cursor:pointer; transition:all .15s; background:none; }
    .dj-type-pill.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* ── Main panel ── */
    .dj-main { display:flex; flex-direction:column; gap:16px; }

    /* ── Entry cards ── */
    .dj-entries { display:flex; flex-direction:column; gap:12px; }
    .dj-entry { background:var(--text-ghost); border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; transition:border-color .15s; }
    .dj-entry:hover { border-color:var(--accent-border, rgb(from var(--accent) r g b / .4)); }
    .dj-entry-head { display:flex; align-items:flex-start; justify-content:space-between; padding:14px 16px 8px; gap:12px; }
    .dj-entry-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .dj-entry-date { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; color:var(--accent); }
    .dj-type-badge { padding:2px 8px; border-radius:20px; font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; letter-spacing:.05em; }
    .dj-entry-mood { font-size:16px; line-height:1; }
    .dj-entry-title { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:700; color:var(--text-high); padding:0 16px; margin-bottom:6px; }
    .dj-entry-preview { font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); padding:0 16px 12px; line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .dj-entry-tags { display:flex; flex-wrap:wrap; gap:4px; padding:0 16px 12px; }
    .dj-entry-tag { padding:2px 8px; background:rgb(from var(--accent) r g b / .1); border-radius:20px; font-family:'DM Sans',sans-serif; font-size:10px; color:var(--accent); }

    /* ── Empty state ── */
    .dj-empty { text-align:center; padding:60px 20px; }
    .dj-empty-icon { font-size:48px; margin-bottom:12px; }
    .dj-empty-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:700; color:var(--text-high); margin-bottom:6px; }
    .dj-empty-sub { font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-mid); }

    /* ── Modal ── */
    .dj-modal { display:none; position:fixed; inset:0; background: var(--scrim); z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
    .dj-modal.open { display:flex; }
    .dj-modal-box { background:var(--bg,#0f1011); border:1px solid var(--border); border-radius:18px; width:100%; max-width:680px; max-height:90vh; overflow-y:auto; box-shadow:0 24px 80px rgba(0,0,0,.55); }
    .dj-modal-head { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 16px; border-bottom:1px solid var(--border); }
    .dj-modal-title { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:700; color:var(--text-high); }
    .dj-modal-close { background:none; border:1px solid var(--border); border-radius:8px; color:var(--text-mid); font-size:16px; width:32px; height:32px; cursor:pointer; }
    .dj-modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
    .dj-field { display:flex; flex-direction:column; gap:5px; }
    .dj-label { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text-mid); }
    .dj-input, .dj-textarea, .dj-select { background: var(--input-bg); border:1px solid var(--border); border-radius:9px; padding:10px 13px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-high); outline:none; }
    .dj-input:focus, .dj-textarea:focus, .dj-select:focus { border-color:var(--accent); }
    .dj-textarea { min-height:180px; resize:vertical; line-height:1.7; }
    .dj-select { cursor:pointer; }
    .dj-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:500px){ .dj-row { grid-template-columns:1fr; } }

    /* Mood picker */
    .dj-mood-row { display:flex; flex-wrap:wrap; gap:6px; }
    .dj-mood-btn { font-size:22px; padding:6px; border-radius:8px; border:1.5px solid transparent; cursor:pointer; background:none; transition:all .15s; line-height:1; }
    .dj-mood-btn:hover { border-color:var(--border); background:var(--text-ghost); }
    .dj-mood-btn.selected { border-color:var(--accent); background:rgb(from var(--accent) r g b / .1); }

    .dj-modal-foot { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
    .dj-btn { padding:10px 22px; border-radius:9px; border:none; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
    .dj-btn-primary { background:var(--accent); color:#fff; }
    .dj-btn-secondary { background:var(--text-ghost); color:var(--text-mid); border:1px solid var(--border); }
    .dj-btn-danger { background: var(--danger-bg); color: var(--danger); border:1px solid rgb(from var(--danger) r g b / .3); }
    .dj-btn:hover { filter:brightness(.92); }

    /* View mode for reading */
    .dj-view-content { font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.8; color:var(--text-high); white-space:pre-wrap; }
    .dj-view-title { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:700; color:var(--text-high); margin-bottom:4px; }
    .dj-view-date { font-family:'DM Sans',sans-serif; font-size:12px; color:var(--accent); margin-bottom:16px; }
    .dj-view-divider { height:1px; background:var(--border); margin:16px 0; }

    /* ── View toggle ── */
    .dj-view-toggle { display:flex; gap:4px; background:var(--text-ghost); border:1px solid var(--border); border-radius:10px; padding:4px; }
    .dj-view-btn { padding:8px 16px; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:var(--text-mid); background:none; cursor:pointer; transition:all .15s; }
    .dj-view-btn.active { background:var(--accent); color:#fff; font-weight:600; }

    /* ── Month planner spread (planner-style) ── */
    .dj-month-view { display:none; }
    .dj-month-view.active { display:block; }
    .dj-list-view.hidden { display:none; }

    .dj-mp-header { display:flex; align-items:flex-start; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:20px; padding:20px 22px; background:var(--text-ghost); border:1px solid var(--border); border-radius:14px; }
    .dj-mp-head-left { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .dj-mp-anchor-day { font-family:'Cormorant Garamond',serif; font-size:3.2rem; font-weight:700; color:var(--text-high); line-height:1; }
    .dj-mp-anchor-meta { display:flex; flex-direction:column; gap:6px; }
    .dj-mp-month-name { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:600; color:var(--accent); font-style:italic; line-height:1.1; }
    .dj-mp-year-select { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; padding:8px 12px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-high); cursor:pointer; outline:none; }
    .dj-mp-year-select:focus { border-color:var(--accent); }
    .dj-mp-minis { display:flex; gap:18px; flex:1; justify-content:center; flex-wrap:wrap; }
    .dj-mp-mini { text-align:center; min-width:148px; }
    .dj-mp-mini-label { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text-mid); margin-bottom:8px; }
    .dj-mp-mini-label.current { color:var(--accent); }
    .dj-mp-mini-dow { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; font-family:'DM Sans',sans-serif; font-size:9px; color:var(--text-mid); margin-bottom:4px; }
    .dj-mp-mini-dow span { text-align:center; }
    .dj-mp-mini-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); }
    .dj-mp-mini-cell { padding:4px 0; text-align:center; border-radius:4px; min-height:22px; line-height:22px; }
    .dj-mp-mini-cell.in-month { color:var(--text-high); font-weight:500; cursor:pointer; transition:background .15s,color .15s; }
    .dj-mp-mini-cell.in-month:hover { background:rgb(from var(--accent) r g b / .18); color:var(--accent); }
    .dj-mp-mini-cell.today { background:var(--accent); color:#fff; font-weight:700; }
    .dj-mp-mini-cell.today:hover { filter:brightness(.92); color:#fff; }
    .dj-mp-mini-cell.has-entry { font-weight:700; color:var(--accent); }
    .dj-mp-nav { display:flex; gap:8px; align-items:center; }
    .dj-mp-nav button { padding:8px 14px; border:1px solid var(--border); border-radius:8px; background:none; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); cursor:pointer; }
    .dj-mp-nav button:hover { border-color:var(--accent); color:var(--accent); }

    .dj-mp-month-tabs { display:flex; justify-content:space-between; gap:4px; margin-bottom:16px; width:100%; }
    .dj-mp-tab { flex:1; min-width:0; padding:8px 4px; border-radius:8px; border:1px solid var(--border); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--text-mid); background:none; cursor:pointer; transition:all .15s; text-align:center; }
    .dj-mp-tab:hover { border-color:var(--accent); color:var(--accent); }
    .dj-mp-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    .dj-mp-grid-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:14px; background:var(--text-ghost); }
    .dj-mp-grid { display:grid; grid-template-columns:repeat(7,1fr); min-width:720px; }
    .dj-mp-dow-hd { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-mid); text-align:center; padding:12px 8px; border-bottom:1px solid var(--border); border-right:1px solid var(--border); background:var(--bg); }
    .dj-mp-dow-hd.weekend { background:rgba(0,0,0,0.18); color:var(--text-high); }
    .dj-mp-dow-hd:last-child { border-right:none; }
    .dj-mp-cell { min-height:100px; padding:8px 10px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; position:relative; }
    .dj-mp-cell:nth-child(7n) { border-right:none; }
    .dj-mp-cell:hover { background:rgb(from var(--accent) r g b / .06); }
    .dj-mp-cell.weekend { background:rgba(0,0,0,0.12); }
    .dj-mp-cell.weekend:hover { background:rgb(from var(--accent) r g b / .08); }
    .dj-mp-cell.pad { background:var(--bg); cursor:default; opacity:.45; }
    .dj-mp-cell.pad:hover { background:var(--bg); }
    .dj-mp-cell.other-month { opacity:.4; cursor:default; }
    .dj-mp-cell.other-month:hover { background:transparent; }
    .dj-mp-cell.selected { background:rgb(from var(--accent) r g b / .12); box-shadow:inset 0 0 0 1.5px var(--accent); }
    .dj-mp-cell.today .dj-mp-date { color:var(--accent); font-weight:700; }
    .dj-mp-date { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; color:var(--text-mid); margin-bottom:6px; }
    .dj-mp-entry-row { display:flex; align-items:center; gap:5px; padding:3px 5px; margin:2px 0; border-radius:6px; cursor:pointer; transition:background .15s; }
    .dj-mp-entry-row:hover { background:rgb(from var(--accent) r g b / .12); }
    .dj-mp-entry-emoji { font-size:12px; line-height:1; flex-shrink:0; }
    .dj-mp-entry-title { font-family:'Cormorant Garamond',serif; font-size:11px; font-weight:600; color:var(--text-high); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dj-mp-more { font-family:'DM Sans',sans-serif; font-size:9px; color:var(--accent); margin-top:4px; font-weight:600; }
    .dj-feelings-matrix { margin-bottom:4px; }
    .dj-feelings-heading { font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-mid); margin-bottom:10px; }
    .dj-feelings-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .dj-feeling-chip { display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:20px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; border:1px solid var(--border); }
    .dj-feeling-emoji { font-size:18px; line-height:1; }
    .dj-feeling-chip.tone-happy { background:rgba(255,193,7,.12); border-color:rgba(255,193,7,.35); color:#e8c547; }
    .dj-feeling-chip.tone-calm { background:rgba(100,181,246,.12); border-color:rgba(100,181,246,.35); color:#7eb8e8; }
    .dj-feeling-chip.tone-thoughtful { background:rgba(149,117,205,.12); border-color:rgba(149,117,205,.35); color:#b39ddb; }
    .dj-feeling-chip.tone-sad { background:rgba(144,164,174,.15); border-color:rgba(144,164,174,.4); color:#90a4ae; }
    .dj-feeling-chip.tone-strong { background:rgba(255,112,67,.12); border-color:rgba(255,112,67,.35); color:#ff8a65; }
    .dj-feeling-chip.tone-grateful { background:rgba(129,199,132,.12); border-color:rgba(129,199,132,.35); color:#81c784; }
    .dj-feeling-chip.tone-low { background:rgba(120,144,156,.12); border-color:rgba(120,144,156,.35); color:#78909c; }
    .dj-feelings-empty { font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); font-style:italic; }
    .dj-day-entry-list { display:flex; flex-direction:column; gap:10px; }
    .dj-day-entry-item { display:flex; align-items:flex-start; gap:12px; padding:14px 16px; border:1px solid var(--border); border-radius:12px; cursor:pointer; transition:border-color .15s,background .15s; background:var(--text-ghost); }
    .dj-day-entry-item:hover { border-color:var(--accent); background:rgb(from var(--accent) r g b / .06); }
    .dj-day-entry-emoji { font-size:22px; line-height:1; flex-shrink:0; margin-top:2px; }
    .dj-day-entry-body { flex:1; min-width:0; }
    .dj-day-entry-name { font-family:'Cormorant Garamond',serif; font-size:1.15rem; font-weight:700; color:var(--text-high); margin-bottom:4px; }
    .dj-day-entry-meta { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .dj-day-entry-type { padding:2px 8px; border-radius:20px; font-weight:600; }
    .dj-day-entry-mood { font-size:16px; line-height:1; }
    .dj-day-entry-edit { font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); flex-shrink:0; align-self:center; }
    .dj-mp-add { position:absolute; bottom:6px; right:8px; width:22px; height:22px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text-mid); font-size:14px; line-height:1; cursor:pointer; opacity:0; transition:opacity .15s; }
    .dj-mp-cell:hover .dj-mp-add { opacity:1; }
    .dj-mp-add:hover { border-color:var(--accent); color:var(--accent); }

    @media(max-width:900px){
      .dj-mp-anchor-day { font-size:2.4rem; }
      .dj-mp-minis { justify-content:flex-start; }
      .dj-mp-month-tabs { flex-wrap:wrap; justify-content:flex-start; }
      .dj-mp-tab { flex:0 0 calc(16.66% - 4px); }
    }
  </style>
  <script src="page-guard.js"></script>
</head>

<div class="dj-wrap">

  <div class="dj-topbar">
    <div>
      <h1 class="dj-heading">My <span>Diary</span></h1>
      <div style="font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-mid);margin-top:2px">A private space to think, reflect and remember</div>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

const MOODS = ['😊','😄','🥰','😌','🤔','😐','😴','😢','😤','🤩','😎','🫶','✨','💪','🙏'];
const TYPE_LABELS  = {general:'General',recipe:'Recipe Notes',event:'Event',reflection:'Reflection',goals:'Goals',gratitude:'Gratitude'};
const TYPE_EMOJIS  = {general:'📝',recipe:'🍳',event:'🎉',reflection:'💭',goals:'🎯',gratitude:'🙏'};
const TYPE_COLOURS = {general:'rgba(126,145,163,.2)',recipe:'rgba(196,151,59,.15)',event:'rgba(76,175,118,.15)',reflection:'rgba(124,99,172,.15)',goals:'rgba(244,144,54,.15)',gratitude:'rgba(232,99,142,.15)'};
const MOOD_META = {
  '😊': { label: 'Happy', tone: 'happy' }, '😄': { label: 'Joyful', tone: 'happy' }, '🥰': { label: 'Loved', tone: 'happy' },
  '🤩': { label: 'Excited', tone: 'happy' }, '😎': { label: 'Confident', tone: 'happy' }, '✨': { label: 'Sparkling', tone: 'happy' },
  '😌': { label: 'Calm', tone: 'calm' }, '🫶': { label: 'Warm', tone: 'calm' },
  '🤔': { label: 'Thoughtful', tone: 'thoughtful' }, '😐': { label: 'Neutral', tone: 'thoughtful' },
  '😴': { label: 'Tired', tone: 'low' }, '😢': { label: 'Sad', tone: 'sad' }, '😤': { label: 'Frustrated', tone: 'sad' },
  '💪': { label: 'Determined', tone: 'strong' }, '🙏': { label: 'Grateful', tone: 'grateful' }
};
const YEAR_MIN = 1990;

let currentYear, currentMonth, allEntries = [], filteredEntries = [], activeType = '', selectedDate = null, viewingEntry = null, dayModalDate = null;
let diaryView = 'list';
const MP_DOW_HEADERS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MP_MINI_DOW = ['M','T','W','T','F','S','S'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Helpers ─────────────────────────────────────────────────────
function getSession(){ try{return JSON.parse(localStorage.getItem('tcj_session')||'null');}catch(_){return null;} }
async function rpc(fn,params){
  const s = getSession();
  const h = {'apikey':SUPA_KEY,'Content-Type':'application/json'};
  if(s && s.access_token) h['Authorization']='Bearer '+s.access_token;
  const r = await fetch(SUPA_URL+'/rest/v1/rpc/'+fn,{method:'POST',headers:h,body:JSON.stringify(params||{})});
  if(!r.ok){
    const txt = await r.text().catch(()=> '');
    let msg = String(r.status);
    try { const e = JSON.parse(txt); msg = e.message || e.error || msg; } catch(_){ if(txt) msg = txt; }
    throw new Error(msg);
  }
  const t = await r.text();
  return t ? JSON.parse(t) : null;
}
async function apiDeleteRow(table, id){
  const s = getSession();
  if(!s || !s.access_token) throw new Error('Please sign in again.');
  const r = await fetch(SUPA_URL+'/rest/v1/'+table+'?id=eq.'+encodeURIComponent(id),{
    method:'DELETE',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+s.access_token,'Prefer':'return=minimal'}
  });
  if(!r.ok){
    const txt = await r.text().catch(()=> '');
    throw new Error(txt || ('Delete failed ('+r.status+')'));
  }
}
async function removeDiaryEntry(id){
  if(!id) throw new Error('Missing entry id.');
  try {
    await rpc('delete_diary_entry',{p_id:id});
  } catch(rpcErr) {
    await apiDeleteRow('diary_entries', id);
  }
}
function fmtDate(d){ const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function fmtDateShort(d){
  const dt = new Date(d + 'T00:00:00');
  const day = String(dt.getDate()).padStart(2, '0');
  const month = dt.toLocaleDateString('en-GB', { month: 'short' });
  return day + ' ' + month + ' ' + dt.getFullYear();
}
function entryEmoji(type){ return TYPE_EMOJIS[type] || '📝'; }
function entryTypeLabel(type){ return TYPE_LABELS[type] || 'General'; }
function entryTypeColour(type){ return TYPE_COLOURS[type] || TYPE_COLOURS.general; }
function todayStr(){ return new Date().toISOString().slice(0,10); }

function buildFeelingsMatrixHtml(entries){
  const moods = [];
  entries.forEach(function(e){
    if (e.mood && moods.indexOf(e.mood) === -1) moods.push(e.mood);
  });
  if (!moods.length) {
    return '<div class="dj-feelings-matrix"><div class="dj-feelings-heading">Feelings</div><div class="dj-feelings-empty">No feelings recorded for this day</div></div>';
  }
  const chips = moods.map(function(m){
    const meta = MOOD_META[m] || { label: 'Felt', tone: 'thoughtful' };
    return '<span class="dj-feeling-chip tone-' + meta.tone + '"><span class="dj-feeling-emoji">' + m + '</span><span>' + esc(meta.label) + '</span></span>';
  }).join('');
  const heading = moods.length > 1 ? 'Feelings today' : 'Feeling';
  return '<div class="dj-feelings-matrix"><div class="dj-feelings-heading">' + heading + '</div><div class="dj-feelings-grid">' + chips + '</div></div>';
}

function buildDayEntryListHtml(entries){
  return entries.map(function(e){
    const emoji = entryEmoji(e.entry_type);
    const label = esc(entryTypeLabel(e.entry_type));
    const colour = entryTypeColour(e.entry_type);
    const mood = e.mood ? '<span class="dj-day-entry-mood" title="Feeling">' + esc(e.mood) + '</span>' : '';
    return '<div class="dj-day-entry-item" role="button" tabindex="0" data-entry-id="' + esc(e.id) + '" onclick="editEntryById(\'' + esc(e.id) + '\')">' +
      '<span class="dj-day-entry-emoji">' + emoji + '</span>' +
      '<div class="dj-day-entry-body">' +
        '<div class="dj-day-entry-name">' + esc(e.title || 'Untitled') + '</div>' +
        '<div class="dj-day-entry-meta">' +
          '<span class="dj-day-entry-type" style="background:' + colour + '">' + emoji + ' ' + label + '</span>' +
          mood +
        '</div>' +
      '</div>' +
      '<span class="dj-day-entry-edit">Edit</span>' +
    '</div>';
  }).join('');
}

// ── Mood picker ──────────────────────────────────────────────────
function buildMoodPicker(){
  const row = document.getElementById('mood-row');
  row.innerHTML = MOODS.map(m=>`<button class="dj-mood-btn" data-mood="${m}" onclick="selectMood('${m}')">${m}</button>`).join('');
}
function selectMood(m){
  document.querySelectorAll('.dj-mood-btn').forEach(b=>b.classList.toggle('selected', b.dataset.mood===m));
}
function getSelectedMood(){ const b=document.querySelector('.dj-mood-btn.selected'); return b?b.dataset.mood:''; }
function setMood(m){ document.querySelectorAll('.dj-mood-btn').forEach(b=>b.classList.toggle('selected',b.dataset.mood===m)); }

// ── Stats ────────────────────────────────────────────────────────
async function loadStats(){
  try{
    const stats = await rpc('get_diary_stats',{});
    document.getElementById('stat-total').textContent  = stats.total  || 0;
    document.getElementById('stat-month').textContent  = stats.this_month || 0;
    document.getElementById('stat-streak').textContent = (stats.streak||0) + (stats.streak===1?' day':' days');
  }catch(_){ document.getElementById('stat-streak').textContent = '—'; }
}

// ── Calendar ─────────────────────────────────────────────────────
function buildCalendar(){
  const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const dowEl = document.getElementById('cal-dow');
  if(!dowEl.children.length){
    dowEl.innerHTML = DAYS.map(d=>`<div class="dj-cal-dow">${d}</div>`).join('');
  }
  const label = document.getElementById('cal-month-label');
  label.textContent = new Date(currentYear, currentMonth, 1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});

  const cells = document.getElementById('cal-cells');
  cells.innerHTML = '';
  const first = new Date(currentYear, currentMonth, 1).getDay();
  const days  = new Date(currentYear, currentMonth+1, 0).getDate();
  const today = todayStr();

  // Pad start
  for(let i=0;i<first;i++){
    const d = new Date(currentYear, currentMonth, 1-first+i);
    cells.insertAdjacentHTML('beforeend',`<div class="dj-cal-cell other-month">${d.getDate()}</div>`);
  }
  // This month
  for(let d=1;d<=days;d++){
    const ds = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasEntry = allEntries.some(e=>e.entry_date===ds);
    const hasMeals = typeof CalendarUtils !== 'undefined' && CalendarUtils.mealsOnDate(ds).length > 0;
    const isToday  = ds===today;
    const isSel    = ds===selectedDate;
    const mealTip = hasMeals ? ' title="Meals planned — see Meal Planner"' : '';
    cells.insertAdjacentHTML('beforeend',
      `<div class="dj-cal-cell${hasEntry?' has-entry':''}${hasMeals?' has-meals':''}${isToday?' today':''}${isSel?' selected':''}"${mealTip} onclick="selectDay('${ds}')">${d}</div>`
    );
  }
  // Pad end
  const remaining = 7 - ((first + days) % 7 || 7);
  for(let i=1;i<=remaining&&remaining<7;i++){
    cells.insertAdjacentHTML('beforeend',`<div class="dj-cal-cell other-month">${i}</div>`);
  }
}

function selectDay(ds){
  selectedDate = ds;
  buildCalendar();
  buildMonthPlanner();
  applyFilters();
}
function changeMonth(dir){
  currentMonth += dir;
  if(currentMonth < 0){ currentMonth=11; currentYear--; }
  if(currentMonth > 11){ currentMonth=0;  currentYear++; }
  selectedDate = null;
  loadEntries();
  if (diaryView === 'month') buildMonthPlanner();
}
function goToday(){
  const n = new Date();
  currentYear  = n.getFullYear();
  currentMonth = n.getMonth();
  selectedDate = todayStr();
  loadEntries();
}

// ── Monthly diary grid (Mon-start) ───────────────────────────────
function mondayPadDays(year, month) {
  var day = new Date(year, month, 1).getDay();
  return day === 0 ? 6 : day - 1;
}

function firstSundayDate(year, month) {
  var d = new Date(year, month, 1);
  while (d.getMonth() === month && d.getDay() !== 0) d.setDate(d.getDate() + 1);
  return d.getMonth() === month ? d.getDate() : 1;
}

function dateStr(y, m, d) {
  return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
}

function buildMonthCells(year, month) {
  var pad = mondayPadDays(year, month);
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var cells = [];
  var i;
  for (i = 0; i < pad; i++) cells.push({ pad: true });
  for (i = 1; i <= daysInMonth; i++) cells.push({ y: year, m: month, d: i, inMonth: true });
  while (cells.length % 7 !== 0) cells.push({ pad: true });
  return cells;
}

function jumpToYear(year) {
  currentYear = parseInt(year, 10);
  selectedDate = null;
  if (diaryView === 'month') buildMonthPlanner();
  loadEntries();
}

function syncYearSelect() {
  var sel = document.getElementById('dj-mp-year-select');
  if (!sel) return;
  var base = new Date().getFullYear();
  if (!sel.options.length) {
    for (var y = YEAR_MIN; y <= base + 5; y++) {
      var opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      sel.appendChild(opt);
    }
  }
  sel.value = String(currentYear);
}

function entriesForDate(ds) {
  return allEntries.filter(function (e) { return e.entry_date === ds; });
}

function entriesByDateMap() {
  var map = {};
  allEntries.forEach(function (e) {
    if (!map[e.entry_date]) map[e.entry_date] = [];
    map[e.entry_date].push(e);
  });
  return map;
}

function setDiaryView(mode) {
  diaryView = mode === 'month' ? 'month' : 'list';
  try { localStorage.setItem('tcj_diary_view', diaryView); } catch (_) {}
  document.getElementById('dj-list-view').classList.toggle('hidden', diaryView === 'month');
  document.getElementById('dj-month-view').classList.toggle('active', diaryView === 'month');
  document.getElementById('dj-btn-list').classList.toggle('active', diaryView === 'list');
  document.getElementById('dj-btn-month').classList.toggle('active', diaryView === 'month');
  document.getElementById('dj-btn-list').setAttribute('aria-selected', diaryView === 'list');
  document.getElementById('dj-btn-month').setAttribute('aria-selected', diaryView === 'month');
  if (diaryView === 'month') buildMonthPlanner();
}

function buildMiniCalendar(year, month, label, isCurrent) {
  var days = new Date(year, month + 1, 0).getDate();
  var pad = mondayPadDays(year, month);
  var today = todayStr();
  var map = entriesByDateMap();
  var dow = '<div class="dj-mp-mini-dow">' + MP_MINI_DOW.map(function (d) { return '<span>' + d + '</span>'; }).join('') + '</div>';
  var cells = '';
  var i;
  for (i = 0; i < pad; i++) cells += '<div class="dj-mp-mini-cell"></div>';
  for (i = 1; i <= days; i++) {
    var ds = dateStr(year, month, i);
    var cls = 'dj-mp-mini-cell in-month';
    if (ds === today) cls += ' today';
    if (map[ds] && map[ds].length) cls += ' has-entry';
    cells += '<div class="' + cls + '" role="button" tabindex="0" onclick="jumpToMiniDate(' + year + ',' + month + ',' + i + ')">' + i + '</div>';
  }
  var miniCount = pad + days;
  while (miniCount % 7 !== 0) {
    cells += '<div class="dj-mp-mini-cell"></div>';
    miniCount++;
  }
  return '<div class="dj-mp-mini"><div class="dj-mp-mini-label' + (isCurrent ? ' current' : '') + '">' + esc(label) + '</div>' + dow + '<div class="dj-mp-mini-grid">' + cells + '</div></div>';
}

function buildMonthTabs() {
  var wrap = document.getElementById('dj-mp-month-tabs');
  if (!wrap) return;
  wrap.innerHTML = MONTH_SHORT.map(function (name, idx) {
    var cls = idx === currentMonth ? 'dj-mp-tab active' : 'dj-mp-tab';
    return '<button type="button" class="' + cls + '" onclick="jumpToMonth(' + currentYear + ',' + idx + ')">' + name + '</button>';
  }).join('');
}

function jumpToMonth(year, month) {
  currentYear = year;
  currentMonth = month;
  selectedDate = null;
  if (diaryView === 'month') buildMonthPlanner();
  loadEntries();
}

function jumpToMiniDate(year, month, day) {
  currentYear = year;
  currentMonth = month;
  selectedDate = dateStr(year, month, day);
  if (diaryView === 'month') buildMonthPlanner();
  loadEntries().then(function () {
    openDayEntries(selectedDate);
  });
}

function buildMonthPlanner() {
  if (diaryView !== 'month') return;
  var map = entriesByDateMap();
  var today = todayStr();
  var dt = new Date(currentYear, currentMonth, 1);

  document.getElementById('dj-mp-anchor-day').textContent = String(firstSundayDate(currentYear, currentMonth));
  document.getElementById('dj-mp-month-name').textContent = dt.toLocaleDateString('en-GB', { month: 'long' });
  syncYearSelect();

  var prevM = currentMonth === 0 ? 11 : currentMonth - 1;
  var prevY = currentMonth === 0 ? currentYear - 1 : currentYear;
  var nextM = currentMonth === 11 ? 0 : currentMonth + 1;
  var nextY = currentMonth === 11 ? currentYear + 1 : currentYear;
  document.getElementById('dj-mp-minis').innerHTML =
    buildMiniCalendar(prevY, prevM, MONTH_SHORT[prevM], false) +
    buildMiniCalendar(currentYear, currentMonth, dt.toLocaleDateString('en-GB', { month: 'long' }), true) +
    buildMiniCalendar(nextY, nextM, MONTH_SHORT[nextM], false);

  buildMonthTabs();

  var cells = buildMonthCells(currentYear, currentMonth);
  var grid = document.getElementById('dj-mp-grid');
  var html = '';

  MP_DOW_HEADERS.forEach(function (label, col) {
    html += '<div class="dj-mp-dow-hd' + (col >= 5 ? ' weekend' : '') + '">' + label + '</div>';
  });

  cells.forEach(function (cell, idx) {
    var col = idx % 7;
    var weekend = col >= 5;
    if (cell.pad) {
      html += '<div class="dj-mp-cell pad' + (weekend ? ' weekend' : '') + '"></div>';
      return;
    }
    var ds = dateStr(cell.y, cell.m, cell.d);
    var inMonth = cell.inMonth;
    var entries = map[ds] || [];
    var cls = 'dj-mp-cell';
    if (weekend) cls += ' weekend';
    if (!inMonth) cls += ' other-month';
    if (ds === today) cls += ' today';
    if (ds === selectedDate) cls += ' selected';

    var inner = '<div class="dj-mp-date">' + cell.d + '</div>';
    entries.slice(0, 3).forEach(function (e) {
      var emoji = entryEmoji(e.entry_type);
      inner += '<div class="dj-mp-entry-row" role="button" tabindex="0" onclick="event.stopPropagation();editEntryById(\'' + esc(e.id) + '\')">' +
        '<span class="dj-mp-entry-emoji">' + emoji + '</span>' +
        '<span class="dj-mp-entry-title">' + esc(e.title || 'Untitled') + '</span></div>';
    });
    if (entries.length > 3) inner += '<div class="dj-mp-more">+' + (entries.length - 3) + ' more</div>';
    if (inMonth) {
      inner += '<button type="button" class="dj-mp-add" title="New entry" onclick="event.stopPropagation();openNewEntryForDate(\'' + ds + '\')">+</button>';
    }

    html += '<div class="' + cls + '" data-date="' + ds + '" data-in-month="' + (inMonth ? '1' : '0') + '" onclick="plannerCellClick(\'' + ds + '\',' + (inMonth ? 'true' : 'false') + ')">' + inner + '</div>';
  });

  grid.innerHTML = html;
}

function openNewEntryForDate(ds) {
  selectedDate = ds;
  openNewEntry();
}

function plannerCellClick(ds, inMonth) {
  if (!inMonth) return;
  selectedDate = ds;
  buildCalendar();
  buildMonthPlanner();
  openDayEntries(ds);
}

function openDayEntries(ds) {
  dayModalDate = ds;
  var entries = entriesForDate(ds);
  if (!entries.length) {
    openNewEntryForDate(ds);
    return;
  }
  document.getElementById('day-modal-title').textContent = 'Entry for ' + fmtDateShort(ds);
  document.getElementById('day-feelings-matrix').innerHTML = buildFeelingsMatrixHtml(entries);
  document.getElementById('day-entry-list').innerHTML = buildDayEntryListHtml(entries);
  document.getElementById('dj-day-modal').classList.add('open');
}

function closeDayModal() {
  document.getElementById('dj-day-modal').classList.remove('open');
  dayModalDate = null;
}

function openNewEntryForDay() {
  if (!dayModalDate) return;
  closeDayModal();
  openNewEntryForDate(dayModalDate);
}

// ── Load entries ─────────────────────────────────────────────────
async function loadEntries(){
  try{
    allEntries = await rpc('get_my_diary_entries',{p_year:currentYear,p_month:currentMonth+1}) || [];
    buildCalendar();
    buildMonthPlanner();
    applyFilters();
    loadStats();
    // AP-03: deep-link from the Culinary Life timeline — ?edit=<entry id>
    const editId = new URLSearchParams(location.search).get('edit');
    if (editId && !window._djEditHandled) {
      window._djEditHandled = true;
      const target = allEntries.find(function(e){ return String(e.id) === editId; });
      if (target) { viewingEntry = target; editFromView(); }
    }
  }catch(e){
    renderEntries([]);
    if (diaryView === 'month') buildMonthPlanner();
  }
}

// ── Filter & render ──────────────────────────────────────────────
function filterType(type, btn){
  activeType = type;
  document.querySelectorAll('.dj-type-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function handleSearch(q){
  if(!q.trim()){ loadEntries(); return; }
  rpc('search_my_diary',{p_query:q.trim()}).then(res=>{
    allEntries = res||[];
    buildCalendar();
    buildMonthPlanner();
    applyFilters();
  }).catch(()=>{});
}
function applyFilters(){
  filteredEntries = allEntries.filter(e=>{
    if(activeType && e.entry_type !== activeType) return false;
    if(selectedDate && e.entry_date !== selectedDate) return false;
    return true;
  });
  renderEntries(filteredEntries);
}
function renderEntries(entries){
  const el = document.getElementById('dj-entries');
  if(!entries.length){
    el.innerHTML = `<div class="dj-empty">
      <div class="dj-empty-icon">${selectedDate ? '📅' : '📓'}</div>
      <div class="dj-empty-title">${selectedDate ? 'No entries for this day' : 'No entries yet'}</div>
      <div class="dj-empty-sub">${selectedDate ? 'Click "+ New Entry" to write something.' : 'Start writing — your first entry is one click away.'}</div>
    </div>`;
    return;
  }
  el.innerHTML = entries.map(e=>{
    const colour = TYPE_COLOURS[e.entry_type]||TYPE_COLOURS.general;
    const emoji  = TYPE_EMOJIS[e.entry_type]||'📝';
    const label  = esc(TYPE_LABELS[e.entry_type]||'General');
    const tags   = (e.tags||[]).map(t=>`<span class="dj-entry-tag">${esc(t)}</span>`).join('');
    const preview = (e.content||'').slice(0,120).replace(/\n/g,' ');
    const contentLen = (e.content || '').length;
    return `<div class="dj-entry" data-entry-id="${esc(e.id)}" role="button" tabindex="0">
      <div class="dj-entry-head">
        <div class="dj-entry-meta">
          <span class="dj-entry-date">${fmtDate(e.entry_date)}</span>
          <span class="dj-type-badge" style="background:${colour}">${emoji} ${label}</span>
        </div>
        ${e.mood?`<span class="dj-entry-mood">${e.mood}</span>`:''}
      </div>
      ${e.title?`<div class="dj-entry-title">${esc(e.title)}</div>`:''}
      ${preview?`<div class="dj-entry-preview">${esc(preview)}${contentLen>120?'…':''}</div>`:''}
      ${tags?`<div class="dj-entry-tags">${tags}</div>`:''}
    </div>`;
  }).join('');
}

// ── New entry ────────────────────────────────────────────────────
function openNewEntry(){
  document.getElementById('entry-id').value    = '';
  document.getElementById('entry-date').value  = selectedDate || todayStr();
  document.getElementById('entry-type').value  = 'general';
  document.getElementById('entry-title').value = '';
  document.getElementById('entry-content').value = '';
  document.getElementById('entry-tags').value  = '';
  document.querySelectorAll('.dj-mood-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('modal-title').textContent  = 'New Entry';
  document.getElementById('dj-modal').classList.add('open');
}
function closeModal(){ document.getElementById('dj-modal').classList.remove('open'); }

// ── Save entry ───────────────────────────────────────────────────
async function saveEntry(){
  const id      = document.getElementById('entry-id').value || null;
  const date    = document.getElementById('entry-date').value;
  const title   = document.getElementById('entry-title').value.trim();
  const content = document.getElementById('entry-content').value.trim();
  const type    = document.getElementById('entry-type').value;
  const mood    = getSelectedMood();
  const tagsRaw = document.getElementById('entry-tags').value;
  const tags    = tagsRaw.split(',').map(t=>t.trim()).filter(Boolean);
  if(!date){ alert('Please select a date.'); return; }
  try{
    await rpc('upsert_diary_entry',{p_id:id||null,p_date:date,p_title:title,p_content:content,p_type:type,p_mood:mood,p_tags:tags,p_is_private:true});
    closeModal();
    loadEntries();
  }catch(e){ alert('Could not save: '+e.message); }
}

// ── View / edit entry ─────────────────────────────────────────────
function findEntry(id){
  return allEntries.find(x=>String(x.id)===String(id))
      || filteredEntries.find(x=>String(x.id)===String(id));
}

function populateEditForm(e){
  document.getElementById('entry-id').value      = e.id;
  document.getElementById('entry-date').value    = e.entry_date;
  document.getElementById('entry-type').value    = e.entry_type||'general';
  document.getElementById('entry-title').value   = e.title||'';
  document.getElementById('entry-content').value = e.content||'';
  document.getElementById('entry-tags').value    = (e.tags||[]).join(', ');
  setMood(e.mood||'');
  document.getElementById('delete-btn').style.display = 'inline-block';
  document.getElementById('modal-title').textContent  = 'Edit Entry';
}

function editEntryById(id){
  const e = findEntry(id);
  if(!e) return;
  viewingEntry = e;
  closeDayModal();
  closeView();
  populateEditForm(e);
  document.getElementById('dj-modal').classList.add('open');
}

function viewEntry(id){
  const e = findEntry(id);
  if(!e) return;
  viewingEntry = e;
  const emoji = entryEmoji(e.entry_type);
  document.getElementById('view-modal-title').textContent = 'Entry for ' + fmtDateShort(e.entry_date);
  document.getElementById('view-title').innerHTML = emoji + ' ' + esc(e.title||'Untitled');
  document.getElementById('view-feelings-matrix').innerHTML = buildFeelingsMatrixHtml([e]);
  document.getElementById('view-date').textContent = entryTypeLabel(e.entry_type) + (e.mood ? ' · ' + e.mood : '');
  document.getElementById('view-content').textContent = e.content||'';
  const tagsEl = document.getElementById('view-tags');
  tagsEl.innerHTML = (e.tags||[]).map(t=>`<span class="dj-entry-tag">${esc(t)}</span>`).join('');
  document.getElementById('dj-view').classList.add('open');
}
function closeView(){ document.getElementById('dj-view').classList.remove('open'); viewingEntry=null; }
function editFromView(){
  if(!viewingEntry) return;
  closeView();
  populateEditForm(viewingEntry);
  document.getElementById('dj-modal').classList.add('open');
}

// ── Delete entry ─────────────────────────────────────────────────
async function deleteEntry(){
  const id = document.getElementById('entry-id').value;
  if(!id) return;
  if(!confirm('Delete this entry? This cannot be undone.')) return;
  try{
    await removeDiaryEntry(id);
    closeModal();
    loadEntries();
  }catch(e){ alert('Could not delete: '+e.message); }
}
async function deleteViewingEntry(){
  if(!viewingEntry || !viewingEntry.id) return;
  if(!confirm('Delete this entry? This cannot be undone.')) return;
  try{
    await removeDiaryEntry(viewingEntry.id);
    closeView();
    loadEntries();
  }catch(e){ alert('Could not delete: '+e.message); }
}

// ── Init ─────────────────────────────────────────────────────────
(function init(){
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();
  selectedDate = todayStr();
  try {
    var saved = localStorage.getItem('tcj_diary_view');
    if (saved === 'month' || saved === 'list') diaryView = saved;
  } catch (_) {}
  buildMoodPicker();
  setDiaryView(diaryView);
  loadEntries();
  // Close modals on backdrop click
  document.getElementById('dj-modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
  document.getElementById('dj-day-modal').addEventListener('click', function(e){ if(e.target===this) closeDayModal(); });
  document.getElementById('dj-view').addEventListener('click',  function(e){ if(e.target===this) closeView();  });
  document.getElementById('day-entry-list').addEventListener('keydown', function(e){
    if(e.key !== 'Enter' && e.key !== ' ') return;
    const row = e.target.closest('.dj-day-entry-item');
    if(!row) return;
    e.preventDefault();
    const id = row.getAttribute('data-entry-id');
    if(id) editEntryById(id);
  });
  document.getElementById('dj-entries').addEventListener('click', function(e){
    const card = e.target.closest('.dj-entry');
    if(!card) return;
    const id = card.getAttribute('data-entry-id');
    if(id) viewEntry(id);
  });
  document.getElementById('dj-entries').addEventListener('keydown', function(e){
    if(e.key !== 'Enter' && e.key !== ' ') return;
    const card = e.target.closest('.dj-entry');
    if(!card) return;
    e.preventDefault();
    const id = card.getAttribute('data-entry-id');
    if(id) viewEntry(id);
  });
  // Keyboard shortcut: N = new entry
  document.addEventListener('keydown', e=>{ if(e.key==='n'&&!e.target.matches('input,textarea,select')) openNewEntry(); });
})();
</script>
