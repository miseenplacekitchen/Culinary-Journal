<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search recipes, ingredients, and cuisines across The Culinary Journal collection.">
  <link rel="canonical" href="https://theculinaryjournal.site/search.html">
  <title>Search — The Culinary Journal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
  <script src="supabase-config.js"></script>
  <style>
    .page-bg { min-height:100vh; background:var(--bg); }
    .sr-wrap  { max-width:860px; margin:0 auto; padding:32px 20px 80px; }

    /* Search bar */
    .sr-bar-wrap { position:relative; margin-bottom:12px; }
    .sr-bar { width:100%; box-sizing:border-box; font-family:'DM Sans',sans-serif; font-size:16px; padding:16px 56px 16px 20px; border:2px solid var(--border); border-radius:14px; background:var(--text-ghost); color:var(--text-high); outline:none; transition:border-color 0.15s; }
    .sr-bar:focus { border-color:var(--accent); }
    .sr-bar::placeholder { color:var(--text-mid); }
    .sr-icon { position:absolute; right:18px; top:50%; transform:translateY(-50%); font-size:20px; color:var(--text-mid); pointer-events:none; }
    .sr-clear { position:absolute; right:18px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:18px; color:var(--text-mid); cursor:pointer; display:none; }
    .sr-clear:hover { color:var(--text-high); }

    /* Filters */
    .sr-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; align-items:center; }
    .sr-filter { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:none; font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); cursor:pointer; white-space:nowrap; }
    .sr-filter:hover { border-color:var(--accent); color:var(--accent); }
    .sr-filter.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500; }

    /* Section labels */
    .sr-section-label { font-family:'DM Sans',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-mid); margin:28px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border); }

    /* Recipe results */
    .sr-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
    .sr-card { background:var(--text-ghost); border:1px solid var(--border); border-radius:12px; overflow:hidden; text-decoration:none; display:block; transition:transform 0.15s,border-color 0.15s; }
    .sr-card:hover { transform:translateY(-2px); border-color:var(--accent-border); }
    .sr-card-img { height:120px; display:flex; align-items:center; justify-content:center; font-size:36px; border-bottom:1px solid var(--border); overflow:hidden; background:var(--text-ghost); }
    .sr-card-img img { width:100%; height:100%; object-fit:cover; }
    .sr-card-body { padding:12px 14px; }
    .sr-card-name { font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:600; color:var(--text-high); margin-bottom:4px; }
    .sr-card-meta { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); display:flex; gap:6px; flex-wrap:wrap; }
    .sr-card-tag  { padding:2px 7px; background:rgb(from var(--accent) r g b / 0.1); border-radius:4px; color:var(--accent); font-size:10px; }

    /* Ingredient results */
    .sr-ing-list { display:flex; flex-direction:column; gap:8px; }
    .sr-ing-item { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--text-ghost); border:1px solid var(--border); border-radius:10px; text-decoration:none; }
    .sr-ing-item:hover { border-color:var(--accent-border); }
    .sr-ing-name { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--text-high); flex:1; }
    .sr-ing-cat  { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); }
    .sr-ing-pill { font-family:'DM Sans',sans-serif; font-size:10px; padding:2px 8px; border-radius:4px; }
    .sr-ing-pill.vegan { background: var(--success-bg); color:#4caf76; }

    /* Empty/initial states */
    .sr-empty  { text-align:center; padding:60px 20px; }
    .sr-start  { text-align:center; padding:40px 20px; }
    .sr-empty-icon { font-size:40px; margin-bottom:10px; }
    .sr-empty-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--text-high); margin-bottom:6px; }
    .sr-empty-sub   { font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-mid); }
    .sr-count { font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); }
    .sr-load-more { display:block; margin:20px auto 0; padding:10px 22px; border-radius:20px; border:1px solid var(--border); background:none; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); cursor:pointer; }
    .sr-load-more:hover { border-color:var(--accent); color:var(--accent); }
  </style>
  <script src="page-guard.js"></script>
</head>
<body class="page-bg cj-body">
<nav class="nav">
  <a class="nav-logo" href="index.html">
    <span>🍽</span>
    <span class="nav-logo-text">The Culinary Journal</span>
    <span class="nav-logo-badge">Est. 2025</span>
  </a>
  <div class="nav-btns" id="nav-btns"></div>
</nav>
<div class="tab-nav"></div>

<div class="sr-wrap">
  <div style="margin-bottom:24px">
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--text-high);margin-bottom:16px">Search The Culinary Journal</h1>
    <div class="sr-bar-wrap">
      <input class="sr-bar" type="text" id="sr-input" placeholder="Search recipes, ingredients, cuisines..." autocomplete="off" oninput="handleSearch(this.value)">
      <span class="sr-icon" id="sr-icon">🔍</span>
      <button class="sr-clear" id="sr-clear" onclick="clearSearch()">✕</button>
    </div>
    <div class="sr-filters" id="sr-filters" style="display:none">
      <span class="sr-count" id="sr-count"></span>
      <button class="sr-filter active" onclick="setTab('all',this)">All</button>
      <button class="sr-filter" onclick="setTab('recipes',this)">Recipes</button>
      <button class="sr-filter" onclick="setTab('ingredients',this)">Ingredients</button>
      <button class="sr-filter" onclick="setTab('vegan',this)">🌿 Vegan</button>
      <button class="sr-filter" onclick="setTab('gluten-free',this)">🌾 Gluten Free</button>
    </div>
  </div>

  <div id="sr-start" class="sr-start">
    <div class="sr-empty-icon">🔍</div>
    <div class="sr-empty-title">What are you looking for?</div>
    <div class="sr-empty-sub">Search recipes by name, category, country, dietary needs,<br>or find any ingredient in the database.</div>
  </div>

  <div id="sr-results" style="display:none"></div>
</div>

<script src="nav-init.js"></script>
<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

const CAT_EMOJI = {'Garden & Earth':'🥬','Feather & Flock':'🐓','Pasture & Hoof':'🍖','Ocean & River':'🌊','The Grain Field':'🌾','Wrapped & Stuffed':'🥟','Curds, Creams & Eggs':'🥛','Breads & Bakery':'🫓','Sweet Serenades':'🍮','Sips & Stories':'🥂','Preserved & Pantry':'🏺','Rise & Shine':'🌅','The Evening Table':'☕','Meat & Fire':'🍖','Slow & Soulful':'🥘','Grains & Comfort':'🌾','Breads & Bakes':'🫓','Preserved & Cherished':'🏺','Little Ones':'👶','Feast Days':'🎉','Nourish & Heal':'💚'};

const SR_RECIPE_PAGE = 24;
const SR_ING_PAGE = 20;
let searchTimer = null;
let lastQuery = '';
let allResults = {recipes:[], ingredients:[]};
let activeTab = 'all';
let recipeOffset = 0;
let recipeHasMore = false;
let ingOffset = 0;
let ingHasMore = false;
let searchLoading = false;

function handleSearch(val) {
  const q = val.trim();
  document.getElementById('sr-clear').style.display = q ? 'block' : 'none';
  document.getElementById('sr-icon').style.display  = q ? 'none'  : 'block';
  if (!q) { clearSearch(); return; }
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { doSearch(q); }, 280);
}

function clearSearch() {
  document.getElementById('sr-input').value = '';
  document.getElementById('sr-clear').style.display = 'none';
  document.getElementById('sr-icon').style.display  = 'block';
  document.getElementById('sr-start').style.display = 'block';
  document.getElementById('sr-results').style.display = 'none';
  document.getElementById('sr-filters').style.display = 'none';
  allResults = {recipes:[], ingredients:[]};
  recipeOffset = 0;
  recipeHasMore = false;
  ingOffset = 0;
  ingHasMore = false;
}

function setTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.sr-filter').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  if (lastQuery) doSearch(lastQuery, true);
  else renderResults();
}

function searchDietaryParam() {
  if (activeTab === 'vegan') return 'Vegan';
  if (activeTab === 'gluten-free') return 'Gluten Free';
  return null;
}

async function doSearch(q, reset) {
  if (!q) return;
  if (!reset && q === lastQuery && allResults.recipes.length) return;
  if (reset !== false) {
    lastQuery = q;
    recipeOffset = 0;
    ingOffset = 0;
    allResults = {recipes: [], ingredients: []};
    recipeHasMore = false;
    ingHasMore = false;
  }
  document.getElementById('sr-start').style.display = 'none';
  document.getElementById('sr-results').style.display = 'block';
  document.getElementById('sr-filters').style.display = 'flex';
  if (reset !== false) {
    document.getElementById('sr-results').innerHTML = '<div style="font-family:DM Sans,sans-serif;font-size:13px;color:var(--text-mid);padding:20px 0">Searching...</div>';
  }
  searchLoading = true;
  const wantRecipes = activeTab !== 'ingredients';
  const wantIngredients = activeTab !== 'recipes' && activeTab !== 'vegan' && activeTab !== 'gluten-free';
  const tasks = [];
  if (wantRecipes) tasks.push(fetchRecipePage(q, reset !== false));
  if (wantIngredients) tasks.push(fetchIngredientPage(q, reset !== false));
  await Promise.all(tasks);
  searchLoading = false;
  const total = allResults.recipes.length + allResults.ingredients.length;
  const moreHint = (recipeHasMore || ingHasMore) ? '+' : '';
  document.getElementById('sr-count').textContent = total + moreHint + ' result' + (total === 1 && !moreHint ? '' : 's') + ' for "' + q + '"';
  renderResults();
}

async function fetchRecipePage(q, reset) {
  if (!reset && !recipeHasMore) return;
  const offset = reset ? 0 : recipeOffset;
  try {
    const body = { p_search: q, p_limit: SR_RECIPE_PAGE, p_offset: offset };
    const diet = searchDietaryParam();
    if (diet) body.p_dietary = diet;
    const res = await fetch(SUPA_URL + '/rest/v1/rpc/get_approved_recipes', {
      method:'POST', headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const rows = res.ok ? await res.json() : [];
    const list = Array.isArray(rows) ? rows : [];
    if (reset) allResults.recipes = list;
    else allResults.recipes = allResults.recipes.concat(list);
    recipeHasMore = list.length >= SR_RECIPE_PAGE;
    recipeOffset = offset + list.length;
  } catch(_) {
    if (reset) allResults.recipes = [];
  }
}

async function fetchIngredientPage(q, reset) {
  if (!reset && !ingHasMore) return;
  const offset = reset ? 0 : ingOffset;
  try {
    const data = await rpc('search_ingredients', { p_query: q, p_limit: SR_ING_PAGE, p_offset: offset });
    const list = Array.isArray(data) ? data : [];
    if (reset) allResults.ingredients = list;
    else allResults.ingredients = allResults.ingredients.concat(list);
    ingHasMore = list.length >= SR_ING_PAGE;
    ingOffset = offset + list.length;
  } catch(_) {
    if (reset) allResults.ingredients = [];
  }
}

async function loadMoreRecipes() {
  if (!lastQuery || !recipeHasMore || searchLoading) return;
  searchLoading = true;
  await fetchRecipePage(lastQuery, false);
  searchLoading = false;
  renderResults();
}

async function loadMoreIngredients() {
  if (!lastQuery || !ingHasMore || searchLoading) return;
  searchLoading = true;
  await fetchIngredientPage(lastQuery, false);
  searchLoading = false;
  renderResults();
}

function renderResults() {
  const el = document.getElementById('sr-results');
  let recipes = allResults.recipes;
  let ingredients = allResults.ingredients;
  if (activeTab === 'recipes') ingredients = [];
  if (activeTab === 'ingredients') recipes = [];

  if (!recipes.length && !ingredients.length) {
    el.innerHTML = '<div class="sr-empty"><div class="sr-empty-icon">🤷</div><div class="sr-empty-title">No results found</div><div class="sr-empty-sub">Try different keywords, or <a href="submit-recipe.html" style="color:var(--accent)">submit this recipe</a> to start the collection.</div></div>';
    return;
  }

  let html = '';

  if (recipes.length) {
    html += '<div class="sr-section-label">Recipes (' + recipes.length + (recipeHasMore ? '+' : '') + ')</div><div class="sr-grid">';
    recipes.forEach(function(r) {
      const emoji = CAT_EMOJI[r.category] || '🍳';
      const tags  = (r.dietary_tags||[]).slice(0,2).map(function(t){return '<span class="sr-card-tag">'+t+'</span>';}).join('');
      html += '<a class="sr-card" href="recipe-page.html?id=' + r.id + '">' +
        '<div class="sr-card-img">' + (r.image_url?'<img src="'+r.image_url+'" loading="lazy">':emoji) + '</div>' +
        '<div class="sr-card-body"><div class="sr-card-name">' + (r.recipe_name||'') + '</div>' +
        '<div class="sr-card-meta">' + (r.category?'<span>'+r.category+'</span>':'') + (r.origin_country?'<span>'+r.origin_country+'</span>':'') + tags + '</div></div></a>';
    });
    html += '</div>';
    if (recipeHasMore && activeTab !== 'ingredients') {
      html += '<button type="button" class="sr-load-more" onclick="loadMoreRecipes()">Load more recipes</button>';
    }
  }

  if (ingredients.length) {
    html += '<div class="sr-section-label">Ingredients (' + ingredients.length + (ingHasMore ? '+' : '') + ')</div><div class="sr-ing-list">';
    ingredients.forEach(function(i) {
      const isVegan = (i.vegan||'').toLowerCase() === 'yes';
      html += '<div class="sr-ing-item">' +
        '<div style="flex:1"><div class="sr-ing-name">' + esc(i.ingredient_name||'') + '</div>' +
        (i.also_known_as?'<div class="sr-ing-cat">Also known as: '+esc(i.also_known_as)+'</div>':'') +
        '<div class="sr-ing-cat">' + esc(i.category||'') + (i.allergen?' · Contains: '+esc(i.allergen):'') + '</div></div>' +
        (isVegan?'<span class="sr-ing-pill vegan">Vegan</span>':'') + '</div>';
    });
    html += '</div>';
    if (ingHasMore && activeTab !== 'recipes' && activeTab !== 'vegan' && activeTab !== 'gluten-free') {
      html += '<button type="button" class="sr-load-more" onclick="loadMoreIngredients()">Load more ingredients</button>';
    }
  }

  el.innerHTML = html;
}

// Check for URL params (e.g. search.html?q=chicken)
document.addEventListener('DOMContentLoaded', function() {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('sr-input').value = q;
    handleSearch(q);
  }
});
</script>
</body>
</html>
