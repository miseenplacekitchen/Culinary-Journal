<div class="wprm-recipe-container">
<h2 class="wprm-recipe-name">Test WPRM Recipe</h2>
<ul class="wprm-recipe-ingredients">
<li>2 cups all-purpose flour</li>
<li>1 tsp fine salt</li>
<li>1 cup warm water</li>
</ul>
<ol class="wprm-recipe-instructions">
<li>Combine flour and salt in a bowl.</li>
<li>Add water gradually and knead five minutes.</li>
<li>Rest dough, roll, and bake at 200°C for 12 minutes.</li>
</ol>
</div>
