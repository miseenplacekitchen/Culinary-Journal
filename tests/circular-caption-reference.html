<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Circular caption — reference implementation</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #1c1f26; color: #e8e6df; }
  .wrap { max-width: 460px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 500; }
  p.note { font-size: 13px; line-height: 1.6; color: #b8b4a8; }
  .stage { position: relative; width: 400px; height: 400px; margin: 16px auto; }
  /* This div stands in for the uploaded image. In production it's the user's photo. */
  #photo {
    position: absolute; inset: 8px; border-radius: 50%;
    background: #f4f5f3;            /* light image by default */
    border: 9px solid #9b87cc;      /* the lavender frame ring */
    box-sizing: border-box;
  }
  #photo.dark { background: #242b27; }
  svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .controls { display: flex; flex-direction: column; gap: 12px; font-size: 14px; }
  .controls label { display: flex; align-items: center; gap: 10px; }
  input[type=text] { flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid #555; background: #2a2e37; color: #e8e6df; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Circular caption — reference implementation</h1>
  <p class="note">
    Type a username to watch it grow along the arc from a fixed start point.
    Toggle the background to see the text colour adapt for legibility.
  </p>

  <div class="stage">
    <div id="photo"></div>
    <svg viewBox="0 0 400 400" aria-hidden="true">
      <defs>
        <!-- KEY POINT: each caption gets its OWN arc path, built in the direction
             the text reads. Do NOT put both captions on one shared circle path —
             that is what flips the bottom one upside-down. -->
        <path id="brandArc" fill="none"></path>
        <path id="userArc"  fill="none"></path>
      </defs>

      <!-- Fixed brand label: centre-anchored on the upper-left arc, never moves. -->
      <text id="brandText" class="caption">
        <textPath href="#brandArc" startOffset="50%" text-anchor="middle">The Culinary Journal</textPath>
      </text>

      <!-- Variable username: START-anchored at the lower-right point, @ first,
           grows along the arc as it gets longer. -->
      <text id="userText" class="caption">
        <textPath id="userPath" href="#userArc" startOffset="0%" text-anchor="start"></textPath>
      </text>
    </svg>
  </div>

  <div class="controls">
    <label>Username <input id="nameInput" type="text" value="@your_username"></label>
    <label><input id="bgToggle" type="checkbox"> Dark image (flips text colour)</label>
  </div>
</div>

<script>
  // ---- One source of truth for the geometry ----
  const CX = 200, CY = 200;        // centre of the circle (same as the frame)
  const TEXT_R = 165;              // baseline radius: frame radius minus a fixed padding
                                   // (both captions ride THIS one radius -> they read as one ring)

  // Clock angle helper: 0 = 12 o'clock (top), 90 = 3 o'clock, 180 = 6 o'clock, 270 = 9 o'clock.
  function polar(clockDeg) {
    const a = (clockDeg * Math.PI) / 180;
    return { x: CX + TEXT_R * Math.sin(a), y: CY - TEXT_R * Math.cos(a) };
  }

  // Build an SVG arc "d" string between two clock angles.
  function arc(startClock, endClock, sweep) {
    const p1 = polar(startClock), p2 = polar(endClock);
    const large = Math.abs(endClock - startClock) > 180 ? 1 : 0;
    return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} ` +
           `A ${TEXT_R} ${TEXT_R} 0 ${large} ${sweep} ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
  }

  // Brand label: upper-left arc, centred on 10 o'clock (300 deg). Reads bottom -> top.
  // sweep = 1 makes the glyphs sit upright here.
  document.getElementById('brandArc').setAttribute('d', arc(268, 332, 1));

  // Username: lower-right arc. Path STARTS at ~5 o'clock (152 deg) and runs UP toward
  // 2 o'clock (60 deg), giving a long runway. The text is start-anchored at 152, so the
  // @ sits at the lower-right start point and longer names extend further up the arc.
  // sweep = 0 keeps these glyphs upright too. This is a SEPARATE path from the brand arc,
  // which is why neither caption ever renders upside-down.
  document.getElementById('userArc').setAttribute('d', arc(152, 60, 0));

  // ---- Legibility: pick a contrasting colour, add a halo as a safety net ----
  // In production, sample the image's luminance under each caption's band instead of
  // this manual toggle, then choose dark text on light areas and light text on dark areas.
  function applyColour(isDarkImage) {
    const fill   = isDarkImage ? '#f4f2ec' : '#2a2e27';   // contrast colour (would come from theme + luminance)
    const stroke = isDarkImage ? '#11150f' : '#f7f6f1';   // halo in the opposite tone
    document.querySelectorAll('.caption').forEach(t => {
      t.setAttribute('fill', fill);
      t.setAttribute('stroke', stroke);
      t.setAttribute('stroke-width', '2.5');
      t.setAttribute('stroke-opacity', '0.55');
      t.setAttribute('paint-order', 'stroke');   // stroke behind the fill = clean halo
      t.style.font = '500 15px system-ui, sans-serif';
      t.style.letterSpacing = '0.5px';
    });
  }

  const nameInput = document.getElementById('nameInput');
  const userPath  = document.getElementById('userPath');
  const bgToggle  = document.getElementById('bgToggle');
  const photo     = document.getElementById('photo');

  function render() {
    userPath.textContent = nameInput.value || '@your_username';
    applyColour(bgToggle.checked);
  }
  nameInput.addEventListener('input', render);
  bgToggle.addEventListener('change', () => { photo.classList.toggle('dark', bgToggle.checked); render(); });
  render();
</script>
</body>
</html>
