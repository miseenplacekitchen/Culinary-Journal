<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe — The Culinary Journal</title>
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── RECIPE PAGE ─────────────────────────── */
    .rp-wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── HERO ────────────────────────────────── */
    .rp-hero { position: relative; width: 100%; height: 420px; border-radius: 16px; overflow: hidden; margin-bottom: 32px; background: var(--surface); }
    .rp-hero-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rp-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%); }
    .rp-hero-watermark-tl { position: absolute; top: 16px; left: 20px; font-family: "Monotype Corsiva", "Apple Chancery", cursive; font-size: 15px; color: var(--accent); text-shadow: 0 1px 4px rgba(0,0,0,0.8); opacity: 0.9; font-style: italic; }
    .rp-hero-watermark-br { position: absolute; bottom: 16px; right: 20px; font-family: "Monotype Corsiva", "Apple Chancery", cursive; font-size: 13px; color: var(--accent); text-shadow: 0 1px 4px rgba(0,0,0,0.8); opacity: 0.8; font-style: italic; }
    .rp-hero-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%); }
    .rp-hero-placeholder-text { font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--text-muted); }

    /* ── RECIPE HEADER ───────────────────────── */
    .rp-header { margin-bottom: 32px; }
    .rp-title { font-family: "Cormorant Garamond", serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 500; color: var(--text); margin: 0 0 4px; line-height: 1.1; }
    .rp-also-known { font-family: "Cormorant Garamond", serif; font-size: 1.2rem; font-style: italic; color: var(--accent); margin: 0 0 16px; }
    .rp-meta-row { display: flex; flex-wrap: wrap; align-items: center; gap: 20px; margin-bottom: 16px; }
    .rp-meta-item { display: flex; align-items: center; gap: 7px; font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--text-muted); }
    .rp-meta-item svg { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
    .rp-meta-divider { width: 1px; height: 16px; background: var(--border); }

    /* ── SPICE DISPLAY ───────────────────────── */
    .rp-spice-wrap { display: flex; align-items: center; gap: 6px; }
    .rp-spice-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 14px; opacity: 0.3; transition: opacity 0.2s; }
    .rp-spice-btn.active { opacity: 1; }
    .rp-spice-controls { display: flex; align-items: center; gap: 4px; margin-left: 6px; }
    .rp-spice-adj { background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 4px; width: 20px; height: 20px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; }
    .rp-spice-adj:hover { border-color: var(--accent); color: var(--accent); }
    .rp-spice-tooltip { font-family: "DM Sans", sans-serif; font-size: 11px; color: var(--text-muted); margin-left: 4px; }

    /* ── SERVES ──────────────────────────────── */
    .rp-serves-wrap { display: flex; align-items: center; gap: 8px; }
    .rp-serves-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; width: 26px; height: 26px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; font-family: "DM Sans", sans-serif; }
    .rp-serves-btn:hover { border-color: var(--accent); color: var(--accent); }
    .rp-serves-num { font-family: "DM Sans", sans-serif; font-size: 15px; font-weight: 500; color: var(--text); min-width: 24px; text-align: center; cursor: text; border-bottom: 1px solid var(--border); padding: 0 2px; }
    .rp-serves-num:focus { outline: none; border-bottom-color: var(--accent); }
    .rp-serves-label { font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--text-muted); }

    /* ── CREDIT ROW ──────────────────────────── */
    .rp-credit { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .rp-credit-item { font-family: "DM Sans", sans-serif; font-size: 12px; color: var(--text-muted); }
    .rp-credit-item strong { color: var(--text); }
    .rp-credit-item a { color: var(--accent); text-decoration: none; }
    .rp-credit-item a:hover { text-decoration: underline; }
    .rp-credit-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .rp-credit-badge.original { background: rgba(196,151,59,0.15); color: var(--accent); border: 1px solid rgba(196,151,59,0.3); }
    .rp-credit-badge.external { background: rgba(85,150,220,0.1); color: #5596dc; border: 1px solid rgba(85,150,220,0.3); }
    .rp-preserved { font-family: "DM Sans", sans-serif; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

    /* ── VIEW TOGGLE ─────────────────────────── */
    .rp-view-toggle { display: flex; align-items: center; gap: 0; margin-bottom: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; width: fit-content; margin-left: auto; }
    .rp-view-btn { background: none; border: none; padding: 8px 16px; font-family: "DM Sans", sans-serif; font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .rp-view-btn.active { background: var(--accent); color: #1a1a1a; font-weight: 500; }

    /* ── TABS ────────────────────────────────── */
    .rp-tabs-header { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 0; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; position: relative; }
    .rp-tabs-header::-webkit-scrollbar { display: none; }
    .rp-tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 14px 24px; font-family: "DM Sans", sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; margin-bottom: -1px; letter-spacing: 0.03em; }
    .rp-tab-btn:hover { color: var(--text); }
    .rp-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .rp-tab-content { display: none; padding: 28px 0; }
    .rp-tab-content.active { display: block; }

    /* ── CONTROLS ROW ────────────────────────── */
    .rp-controls-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 0 0 8px; }

    /* ── INGREDIENTS TAB ─────────────────────── */
    .rp-ing-section { margin-bottom: 28px; }
    .rp-ing-section-title { font-family: "DM Sans", sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin: 0 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .rp-ing-section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    .rp-ing-row { display: grid; grid-template-columns: 28px 100px 1fr 28px 28px; gap: 0; align-items: center; padding: 9px 8px; border-radius: 6px; transition: background 0.15s; cursor: default; }
    .rp-ing-row:hover { background: rgba(255,255,255,0.03); }
    .rp-ing-cb { width: 16px; height: 16px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; appearance: none; background: transparent; transition: all 0.15s; flex-shrink: 0; }
    .rp-ing-cb:checked { background: var(--accent); border-color: var(--accent); background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='%231a1a1a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-size: 10px 8px; background-repeat: no-repeat; background-position: center; }
    .rp-ing-qty { font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--text-muted); }
    .rp-ing-name { font-family: "DM Sans", sans-serif; font-size: 14px; color: var(--text); }
    .rp-ing-name.crossed { text-decoration: line-through; opacity: 0.4; }
    .rp-ing-info-btn { background: none; border: none; cursor: pointer; padding: 0; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.15s; position: relative; }
    .rp-ing-info-btn:hover { background: rgba(196,151,59,0.15); }
    .rp-ing-info-icon { width: 16px; height: 16px; border: 1px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: "Cormorant Garamond", serif; font-size: 10px; color: var(--accent); font-style: italic; }
    .rp-ing-cart-btn { background: none; border: none; cursor: pointer; padding: 0; opacity: 0.35; transition: opacity 0.2s; color: var(--text-muted); }
    .rp-ing-cart-btn:hover { opacity: 1; color: var(--accent); }
    .rp-ing-cart-btn.added { opacity: 1; color: var(--accent); }

    /* ── INFO POPUP ──────────────────────────── */
    .rp-info-popup { position: absolute; right: 0; top: 28px; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; padding: 14px 16px; width: 240px; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: none; }
    .rp-info-popup.visible { display: block; }
    .rp-info-popup-title { font-family: "Cormorant Garamond", serif; font-size: 15px; font-weight: 600; color: var(--text); margin: 0 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .rp-info-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; font-family: "DM Sans", sans-serif; font-size: 12px; color: var(--text-muted); line-height: 1.5; }
    .rp-info-row:last-child { margin-bottom: 0; }

    /* ── ADD ALL ROW ─────────────────────────── */
    .rp-add-all { display: flex; align-items: center; gap: 8px; padding: 12px 8px; border-top: 1px solid var(--border); margin-top: 8px; cursor: pointer; font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--text-muted); transition: color 0.2s; background: none; border-left: none; border-right: none; border-bottom: none; width: 100%; text-align: left; }
    .rp-add-all:hover { color: var(--accent); }
    .rp-add-all svg { width: 16px; height: 16px; }

    /* ── PROCEDURE TAB ───────────────────────── */
    .rp-proc-block { margin-bottom: 32px; }
    .rp-proc-block-title { font-family: "DM Sans", sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin: 0 0 20px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .rp-proc-section { margin-bottom: 20px; }
    .rp-proc-section-title { font-family: "Cormorant Garamond", serif; font-size: 1.05rem; font-style: italic; font-weight: 500; color: var(--text); margin: 0 0 8px; }
    .rp-proc-single { font-family: "DM Sans", sans-serif; font-size: 14px; color: var(--text-muted); line-height: 1.75; display: inline; }
    .rp-proc-steps { list-style: none; padding: 0; margin: 6px 0 0; }
    .rp-proc-step { display: flex; gap: 14px; margin-bottom: 10px; align-items: flex-start; }
    .rp-proc-step-num { font-family: "Cormorant Garamond", serif; font-size: 1.1rem; color: var(--accent); min-width: 20px; padding-top: 1px; }
    .rp-proc-step-text { font-family: "DM Sans", sans-serif; font-size: 14px; color: var(--text-muted); line-height: 1.75; }

    /* ── COMBINED VIEW ───────────────────────── */
    .rp-combined { display: none; }
    .rp-combined.active { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding-top: 28px; }
    .rp-combined-col-title { font-family: "DM Sans", sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin: 0 0 20px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

    /* ── NUTRITION TAB ───────────────────────── */
    .rp-nutrition-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .rp-nutrition-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .rp-nutrition-value { font-family: "Cormorant Garamond", serif; font-size: 2rem; font-weight: 500; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .rp-nutrition-unit { font-family: "DM Sans", sans-serif; font-size: 11px; color: var(--text-muted); }
    .rp-nutrition-label { font-family: "DM Sans", sans-serif; font-size: 12px; color: var(--text); margin-top: 4px; }
    .rp-nutrition-detail { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .rp-nutrition-detail-title { font-family: "DM Sans", sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin: 0 0 16px; }
    .rp-nutrition-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-family: "DM Sans", sans-serif; font-size: 13px; }
    .rp-nutrition-row:last-child { border-bottom: none; }
    .rp-nutrition-row-label { color: var(--text-muted); }
    .rp-nutrition-row-value { color: var(--text); font-weight: 500; }
    .rp-nutrition-note { font-family: "DM Sans", sans-serif; font-size: 11px; color: var(--text-muted); margin-top: 16px; font-style: italic; }

    /* ── NOTES TAB ───────────────────────────── */
    .rp-notes-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .rp-notes-block-title { font-family: "DM Sans", sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
    .rp-notes-block-title span { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(196,151,59,0.1); border: 1px solid rgba(196,151,59,0.2); font-weight: 400; letter-spacing: 0; text-transform: none; }
    .rp-notes-list { list-style: none; padding: 0; margin: 0; }
    .rp-notes-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-family: "DM Sans", sans-serif; font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    .rp-notes-item:last-child { border-bottom: none; }
    .rp-notes-item::before { content: "·"; color: var(--accent); font-size: 1.2rem; line-height: 1.4; flex-shrink: 0; }
    .rp-personal-notes { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
    .rp-personal-notes textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: "DM Sans", sans-serif; font-size: 14px; color: var(--text); resize: vertical; min-height: 100px; box-sizing: border-box; outline: none; line-height: 1.6; margin-top: 12px; }
    .rp-personal-notes textarea:focus { border-color: var(--accent); }
    .rp-personal-notes-actions { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .rp-btn-save-note { padding: 8px 20px; background: var(--accent); color: #1a1a1a; border: none; border-radius: 6px; font-family: "DM Sans", sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    .rp-btn-save-note:hover { opacity: 0.85; }
    .rp-btn-publish-note { padding: 8px 20px; background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; font-family: "DM Sans", sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .rp-btn-publish-note:hover { border-color: var(--accent); color: var(--accent); }
    .rp-note-privacy { font-family: "DM Sans", sans-serif; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

    /* ── TOAST ───────────────────────────────── */
    .rp-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; padding: 12px 20px; font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.3s ease; z-index: 1000; white-space: nowrap; }
    .rp-toast.show { transform: translateX(-50%) translateY(0); }

    /* ── PRINT BUTTON ────────────────────────── */
    .rp-print-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: none; border: 1px solid var(--border); border-radius: 8px; font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .rp-print-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── TAGS ROW ────────────────────────────── */
    .rp-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .rp-tag { font-family: "DM Sans", sans-serif; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-muted); }
    .rp-tag.dietary { border-color: rgba(85,204,119,0.3); color: #55cc77; background: rgba(85,204,119,0.05); }
    .rp-tag.occasion { border-color: rgba(196,151,59,0.3); color: var(--accent); background: rgba(196,151,59,0.05); }
    .rp-tag.style { border-color: rgba(150,150,220,0.3); color: #9696dc; background: rgba(150,150,220,0.05); }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 700px) {
      .rp-hero { height: 260px; border-radius: 10px; }
      .rp-nutrition-grid { grid-template-columns: repeat(2, 1fr); }
      .rp-combined.active { grid-template-columns: 1fr; }
      .rp-ing-row { grid-template-columns: 28px 90px 1fr 28px 28px; }
      .rp-tab-btn { padding: 12px 16px; font-size: 12px; }
      .rp-meta-row { gap: 12px; }
    }
  </style>
</head>
<body class="cj-body">

<!-- NAV -->
<nav class="cj-nav">
  <div class="cj-nav-inner">
    <a href="index.html" class="cj-logo">🍽 The Culinary Journal</a>
    <div class="cj-nav-links">
      <a href="recipes.html">Recipes</a>
      <a href="submit-recipe.html">Submit</a>
      <a href="profile.html" id="nav-profile" style="display:none"></a>
      <a href="login.html" id="nav-login">Sign In</a>
    </div>
  </div>
</nav>

<div class="rp-wrap">

  <!-- HERO IMAGE -->
  <div class="rp-hero" id="rp-hero">
    <div class="rp-hero-placeholder" id="hero-placeholder">
      <span class="rp-hero-placeholder-text">Loading recipe image...</span>
    </div>
    <img id="hero-img" class="rp-hero-img" style="display:none" alt="Recipe photo">
    <div class="rp-hero-overlay" id="hero-overlay" style="display:none"></div>
    <div class="rp-hero-watermark-tl" id="hero-wm-tl">The Culinary Journal</div>
    <div class="rp-hero-watermark-br" id="hero-wm-br" style="display:none"></div>
  </div>

  <!-- RECIPE HEADER -->
  <div class="rp-header">
    <h1 class="rp-title" id="rp-title">Loading...</h1>
    <p class="rp-also-known" id="rp-also-known" style="display:none"></p>
    <p class="rp-intro" id="rp-intro" style="display:none;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.65;color:var(--text-mid,var(--text-muted));max-width:680px;margin:0 0 18px"></p>

    <!-- META ROW -->
    <div class="rp-meta-row" id="rp-meta-row">

      <!-- Origin -->
      <div class="rp-meta-item" id="meta-origin" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span id="meta-origin-text"></span>
      </div>

      <div class="rp-meta-divider" id="div-1" style="display:none"></div>

      <!-- Spice -->
      <div class="rp-meta-item">
        <div class="rp-spice-wrap">
          <button class="rp-spice-btn" id="sp1" onclick="setSpice(1)" title="">🌶</button>
          <button class="rp-spice-btn" id="sp2" onclick="setSpice(2)" title="">🌶</button>
          <button class="rp-spice-btn" id="sp3" onclick="setSpice(3)" title="">🌶</button>
          <button class="rp-spice-btn" id="sp4" onclick="setSpice(4)" title="">🌶</button>
          <button class="rp-spice-btn" id="sp5" onclick="setSpice(5)" title="">🌶</button>
          <div class="rp-spice-controls">
            <button class="rp-spice-adj" onclick="adjustSpice(-1)">−</button>
            <button class="rp-spice-adj" onclick="adjustSpice(1)">+</button>
          </div>
          <span class="rp-spice-tooltip" id="spice-label"></span>
        </div>
      </div>

      <div class="rp-meta-divider"></div>

      <!-- Serves -->
      <div class="rp-meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <div class="rp-serves-wrap">
          <span class="rp-serves-label">Serves</span>
          <button class="rp-serves-btn" onclick="adjustServes(-1)">−</button>
          <span class="rp-serves-num" id="serves-num" contenteditable="true" onblur="validateServes(this)">4</span>
          <button class="rp-serves-btn" onclick="adjustServes(1)">+</button>
        </div>
      </div>

// ── NORMALIZE ─────────────────────────────────────────
// Coerces a row coming straight from submitted_recipes into the exact
// shape the renderers expect. Idempotent: data already in the right
// shape (e.g. the demo) passes through unchanged. This is what lets a
// REAL submitted recipe render correctly, not just the demo.
function normalizeRecipe(r) {
  if (!r || r.__normalized) return r;

  // Spice: accept number OR text label
  if (typeof r.spice_level === 'string') {
    const key = r.spice_level.trim().toLowerCase();
    r.spice_level = (key in SPICE_TEXT_TO_NUM) ? SPICE_TEXT_TO_NUM[key]
                  : (parseInt(r.spice_level, 10) || 0);

    r.spice_level = 0;

  // Cooking notes: accept array OR a single text blob (split on newlines)
  if (typeof r.cooking_notes === 'string') {
    r.cooking_notes = r.cooking_notes
      .split(/\r?\n/).map(s => s.replace(/^[•\-\*\d\.\)\s]+/, '').trim()).filter(Boolean);

  if (!Array.isArray(r.method)) r.method = [];

  // Ingredients: guarantee array shape

  // Tags: guarantee arrays
  ['dietary_tags','health_tags','occasion_tags','style_tags'].forEach(k => {
    if (!Array.isArray(r[k])) r[k] = [];
  });

  r.__normalized = true;
  return r;
}

async function loadRecipe(id) {
  try {

    const res = await fetch(`${SUPABASE_URL}/rest/v1/submitted_recipes?id=eq.${id}&select=*`, { headers });
    if (res.ok) {
      const data = await res.json();
      if (data.length > 0) {
        recipe = data[0];
        renderRecipe(recipe);
        enrichIngredientInfo(recipe);   // best-effort chef-rec lookup
        return;
      }
    }
  } catch(e) {}
  loadDemoRecipe();
}

// ── INGREDIENT ⓘ ENRICHMENT (best-effort) ─────────────
// Submitted recipes don't store chef recommendations on each ingredient;
// per spec those live in the ingredients table ("CJ Recommended Brand").
// This pulls them in after render. It is fully fail-safe: any error,
// missing table, or column-name mismatch simply leaves the page as-is.
let _ingredientCache = null;
async function enrichIngredientInfo(r) {
  try {
    if (!r || !Array.isArray(r.ingredients) || !r.ingredients.length) return;

    if (!_ingredientCache) {
      const headers = { 'apikey': SUPABASE_KEY };
      if (session) headers['Authorization'] = 'Bearer ' + session.access_token;
      const res = await fetch(`${SUPABASE_URL}/rest/v1/ingredients?select=*`, { headers });
      if (!res.ok) return;
      _ingredientCache = await res.json();
    }
    if (!Array.isArray(_ingredientCache) || !_ingredientCache.length) return;

    // Build a lower-cased name → recommended brand map (tolerant of column naming)
    const brandMap = {};
    _ingredientCache.forEach(row => {
      const name  = row['Ingredient Name'] || row.ingredient_name || row.name;
      const brand = row['CJ Recommended Brand'] || row.cj_recommended_brand || row.recommended_brand;
      if (name && brand && String(brand).trim()) brandMap[String(name).toLowerCase()] = String(brand).trim();
    });
    if (!Object.keys(brandMap).length) return;

    let changed = false;
    r.ingredients.forEach(sec => (sec.items || []).forEach(it => {
      const b = brandMap[(it.ingredient || '').toLowerCase()];
      if (b && !it.chef_rec) { it.chef_rec = b; changed = true; }
    }));

    if (changed) {
      renderIngredients(r.ingredients);
      if (currentView === 'combined') renderIngredients(r.ingredients, 'ingredients-combined');
      if (currentServes !== baseServes) scaleIngredients(currentServes);
    }
  } catch (_) { /* best-effort — never break the page */ }
}

      introEl.style.display = 'block';
    } else {

// ── SPICE ─────────────────────────────────────────────

function adjustSpice(delta) {
  const newLevel = Math.max(0, Math.min(5, currentSpice + delta));
  currentSpice = newLevel;
  renderSpice(newLevel);
}

// ── SERVES ────────────────────────────────────────────
function adjustServes(delta) {
  const newVal = Math.max(1, currentServes + delta);
  currentServes = newVal;
  document.getElementById('serves-num').textContent = newVal;
  scaleIngredients(newVal);
}

function validateServes(el) {
  const val = parseInt(el.textContent) || baseServes;
  const cleaned = Math.max(1, Math.min(999, val));
  el.textContent = cleaned;
  currentServes = cleaned;
  scaleIngredients(cleaned);
}

function scaleIngredients(newServes) {
  const ratio = newServes / baseServes;
  document.querySelectorAll('.rp-ing-qty[data-base]').forEach(el => {
    const base = parseFloat(el.dataset.base);
    if (!isNaN(base)) {
      const scaled = base * ratio;
      el.textContent = formatQty(scaled) + (el.dataset.unit ? ' ' + el.dataset.unit : '');
    }
  });
}

function formatQty(n) {
  if (Number.isInteger(n)) return n.toString();
  const fractions = [[0.25,'¼'],[0.33,'⅓'],[0.5,'½'],[0.67,'⅔'],[0.75,'¾']];
  const whole = Math.floor(n);
  const frac = n - whole;
  for (const [val, sym] of fractions) {
    if (Math.abs(frac - val) < 0.05) return (whole > 0 ? whole + ' ' : '') + sym;
  }
  return n.toFixed(1).replace(/\.0$/, '');
}

// ── RENDER INGREDIENTS ────────────────────────────────
function renderIngredients(sections, containerId = 'ingredients-content') {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = sections.map(sec => `
    <div class="rp-ing-section">
      <div class="rp-ing-section-title">${sec.section}</div>
      ${sec.items.map((item, idx) => renderIngRow(item, sec.section, idx)).join('')}
    </div>
  `).join('');
}

function renderIngRow(item, section, idx) {
  const hasInfo = item.chef_rec || item.substitute;
  const inGrocery = groceryList.some(g => g.ingredient === item.ingredient);
  const baseNum = parseFloat(item.qty);
  const qtyHtml = !isNaN(baseNum)
    ? `<span class="rp-ing-qty" data-base="${baseNum}" data-unit="${item.unit || ''}">${item.qty}</span>`
    : `<span class="rp-ing-qty">${item.qty}</span>`;

  return `
    <div class="rp-ing-row">
      <input type="checkbox" class="rp-ing-cb" onchange="toggleIngredient(this)">
      ${qtyHtml}
      <span class="rp-ing-name">${item.ingredient}${item.note ? ' <span style="font-size:11px;color:var(--text-muted);font-style:italic">— ' + item.note + '</span>' : ''}</span>
      ${hasInfo ? `
        <button class="rp-ing-info-btn" onclick="toggleInfo(this)" title="Chef recommendation & substitutes">
          <div class="rp-ing-info-icon">i</div>
          <div class="rp-info-popup">
            <div class="rp-info-popup-title">${item.ingredient}</div>
            ${item.chef_rec ? `<div class="rp-info-row"><span>👨‍🍳</span><span>Chef recommends <strong>${item.chef_rec}</strong></span></div>` : ''}
            ${item.substitute ? `<div class="rp-info-row"><span>🔄</span><span>Substitute: ${item.substitute}</span></div>` : ''}
          </div>
        </button>` : '<span></span>'}
      <button class="rp-ing-cart-btn ${inGrocery ? 'added' : ''}" onclick="toggleGrocery(this, '${item.ingredient}', '${item.qty}', '${item.unit || ''}')" title="${inGrocery ? 'In grocery list' : 'Add to grocery list'}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      </button>
    </div>`;
}

function toggleIngredient(cb) {
  const nameEl = cb.closest('.rp-ing-row').querySelector('.rp-ing-name');
  nameEl.classList.toggle('crossed', cb.checked);
}

function toggleInfo(btn) {
  const popup = btn.querySelector('.rp-info-popup');
  document.querySelectorAll('.rp-info-popup.visible').forEach(p => { if (p !== popup) p.classList.remove('visible'); });
  popup.classList.toggle('visible');
  const close = (e) => { if (!btn.contains(e.target)) { popup.classList.remove('visible'); document.removeEventListener('click', close); } };
  setTimeout(() => document.addEventListener('click', close), 0);
}

function toggleGrocery(btn, ingredient, qty, unit) {
  const idx = groceryList.findIndex(g => g.ingredient === ingredient);
  if (idx > -1) {
    groceryList.splice(idx, 1);
    btn.classList.remove('added');
    showToast('Removed from grocery list');
  } else {
    groceryList.push({ ingredient, qty, unit, recipe: recipe?.recipe_name || '' });
    btn.classList.add('added');
    showToast('Added to grocery list ✓');
  }
  lsSet('tcj_grocery', JSON.stringify(groceryList));
}

function addAllToGrocery() {
  let added = 0;
  (recipe?.ingredients || []).forEach(sec => {
    sec.items.forEach(item => {
      if (!groceryList.some(g => g.ingredient === item.ingredient)) {
        groceryList.push({ ingredient: item.ingredient, qty: item.qty, unit: item.unit || '', recipe: recipe.recipe_name });
        added++;
      }
    });
  });
  lsSet('tcj_grocery', JSON.stringify(groceryList));
  document.querySelectorAll('.rp-ing-cart-btn').forEach(btn => btn.classList.add('added'));
  showToast(added > 0 ? `${added} ingredients added to Grocery List ✓` : 'All ingredients already in Grocery List');
}

// ── RENDER PROCEDURE ──────────────────────────────────
function renderProcedure(method, containerId = 'procedure-content') {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = (method || []).map(block => {
    const steps = block.steps || [];
    // Two supported shapes per step:
    //  (a) plain string  — what the submit form saves
    //  (b) object {title, text, multiple, items} — the richer demo shape
    const allStrings = steps.length > 0 && steps.every(s => typeof s === 'string');

    let inner;
    if (allStrings) {
      // A flat section of step strings → one numbered list
      inner = `<ol class="rp-proc-steps">${steps.map(s =>
        `<li class="rp-proc-step"><span class="rp-proc-step-num">→</span><span class="rp-proc-step-text">${fmtStep(s)}</span></li>`
      ).join('')}</ol>`;
    } else {
      inner = steps.map(step => {
        if (typeof step === 'string') {
          return `<div class="rp-proc-section"><span class="rp-proc-single">${fmtStep(step)}</span></div>`;
        }
        const titleHtml = step.title ? `<div class="rp-proc-section-title">${escapeHtml(step.title)}:</div>` : '';
        const body = (step.multiple && Array.isArray(step.items))
          ? `<ol class="rp-proc-steps">${step.items.map(s => `<li class="rp-proc-step"><span class="rp-proc-step-num">→</span><span class="rp-proc-step-text">${escapeHtml(s)}</span></li>`).join('')}</ol>`
          : `<span class="rp-proc-single">${escapeHtml(step.text || '')}</span>`;
        return `<div class="rp-proc-section">${titleHtml}${body}</div>`;
      }).join('');
    }

    return `
    <div class="rp-proc-block">
      <div class="rp-proc-block-title">${escapeHtml(block.section || '')}</div>
      ${inner}
    </div>`;
  }).join('');
}

// Renders a procedure step, italicising a short leading "Label:" prefix
// e.g. "Pack Mangoes: Place the pieces..." → <em>Pack Mangoes</em>: Place...
function fmtStep(s) {
  s = String(s == null ? '' : s);
  const m = s.match(/^([^:.\n]{1,40}):\s+([\s\S]+)$/);
  if (m) return '<em>' + escapeHtml(m[1]) + '</em>: ' + escapeHtml(m[2]);
  return escapeHtml(s);
}

// Small HTML-escape helper (procedure/notes come from user submissions)
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── RENDER NUTRITION ──────────────────────────────────
function renderNutrition(n) {
  const container = document.getElementById('nutrition-content');
  if (!n) { container.innerHTML = '<p style="font-family:DM Sans,sans-serif;font-size:14px;color:var(--text-muted);padding:20px 0">Nutritional information not yet available for this recipe.</p>'; return; }
  container.innerHTML = `
    <div class="rp-nutrition-grid">
      ${[['Calories','kcal',n.calories],['Protein','g',n.protein],['Carbs','g',n.carbs],['Fat','g',n.fat],['Fibre','g',n.fibre],['Sugar','g',n.sugar]].map(([label,unit,val]) => `
        <div class="rp-nutrition-card">
          <div class="rp-nutrition-value">${val}</div>
          <div class="rp-nutrition-unit">${unit}</div>
          <div class="rp-nutrition-label">${label}</div>
        </div>`).join('')}
    </div>
    <div class="rp-nutrition-detail">
      <div class="rp-nutrition-detail-title">Full Breakdown — Per Serving</div>
      <div class="rp-nutrition-row"><span class="rp-nutrition-row-label">Sodium</span><span class="rp-nutrition-row-value">${n.sodium}mg</span></div>
      ${(n.details || []).map(d => `<div class="rp-nutrition-row"><span class="rp-nutrition-row-label">${d.label}</span><span class="rp-nutrition-row-value">${d.value}</span></div>`).join('')}
    </div>
    <p class="rp-nutrition-note">Values are approximate and calculated per serving based on ${currentServes} servings. Adjust the serving size to update.</p>
  `;
}

// ── RENDER NOTES ──────────────────────────────────────
function renderNotes(r) {
  const container = document.getElementById('notes-content');
  const savedNote = lsGet('tcj_note_' + (r.id || 'demo')) || '';
  container.innerHTML = `
    ${(r.cooking_notes || []).length > 0 ? `
    <div class="rp-notes-block">
      <div class="rp-notes-block-title">Cooking Notes <span>Chef Tips</span></div>
      <ul class="rp-notes-list">
        ${r.cooking_notes.map(n => `<li class="rp-notes-item">${escapeHtml(n)}</li>`).join('')}
      </ul>
    </div>` : ''}
    <div class="rp-personal-notes">
      <div class="rp-notes-block-title">Personal Notes <span>Private</span></div>
      <textarea placeholder="Your private notes — memories, variations, what you would change next time...">${escapeHtml(savedNote)}</textarea>
      <div class="rp-personal-notes-actions">
        <button class="rp-btn-save-note" onclick="savePersonalNote()">Save Note</button>
        <button class="rp-btn-publish-note" onclick="submitPublicNote()">Submit as Cooking Tip</button>
        <span class="rp-note-privacy">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Only visible to you
        </span>
      </div>
    </div>
  `;
}

function savePersonalNote() {
  const note = document.querySelector('.rp-personal-notes textarea').value;
  lsSet('tcj_note_' + (recipe?.id || 'demo'), note);
  showToast('Personal note saved ✓');
}

function submitPublicNote() {
  showToast('Submitted for review — Betty will approve it shortly 🔔');
}

// ── TABS ──────────────────────────────────────────────
function switchTab(tabName) {
  document.querySelectorAll('.rp-tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  document.querySelectorAll('.rp-tab-content').forEach(el => el.classList.toggle('active', el.id === 'tab-' + tabName));
}

// ── VIEW TOGGLE ───────────────────────────────────────
function setView(view) {
  currentView = view;
  document.getElementById('btn-tabs').classList.toggle('active', view === 'tabs');
  document.getElementById('btn-combined').classList.toggle('active', view === 'combined');
  document.getElementById('tabs-view').style.display = view === 'tabs' ? 'block' : 'none';
  document.getElementById('rp-tabs-header').style.display = view === 'tabs' ? 'flex' : 'none';

  const combined = document.getElementById('combined-view');
  if (view === 'combined') {
    combined.classList.add('active');
    renderIngredients(recipe?.ingredients || [], 'ingredients-combined');
    renderProcedure(recipe?.method || [], 'procedure-combined');
  } else {
    combined.classList.remove('active');
  }
}

// ── SWIPE (MOBILE TABS) ───────────────────────────────
function setupSwipe() {
  const tabOrder = ['ingredients','procedure','nutrition','notes'];
  let startX = 0;
  const tabsView = document.getElementById('tabs-view');
  tabsView.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  tabsView.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) < 50) return;
    const activeTab = document.querySelector('.rp-tab-btn.active')?.dataset?.tab;
    const idx = tabOrder.indexOf(activeTab);
    if (diff > 0 && idx < tabOrder.length - 1) switchTab(tabOrder[idx + 1]);
    else if (diff < 0 && idx > 0) switchTab(tabOrder[idx - 1]);
  }, { passive: true });
}

// ── PRINT ─────────────────────────────────────────────
function showPrintOptions() {
  showToast('Print Studio coming soon 🖨');
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg) {
  const toast = document.getElementById('rp-toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}
</script>
