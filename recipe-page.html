  <style>
    /* ── RECIPE PAGE ─────────────────────────── */
    .rp-wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── HERO (Issue 4.1) — match owner mockup: dark panel, maroon ring, curved gold text ── */
    .rp-hero-frame {
      display: flex; justify-content: center; align-items: center;
      margin: 0 0 36px; padding: 52px 20px;
      background: #1a100f;
      border-radius: 14px;
    }
    .rp-hero-ring-wrap { position: relative; width: min(440px, 82vw); height: min(440px, 82vw); }
    .rp-hero-ring { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; z-index: 2; }
    .rp-hero-ring-stroke { fill: none; stroke: #6d2832; stroke-width: 3; }
    .rp-ring-text {
      font-family: "Monotype Corsiva", "Apple Chancery", "Segoe Script", cursive;
      font-size: 18px; font-style: italic; letter-spacing: 0.06em;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.65));
    }
    .rp-hero-circle {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 80%; height: 80%; border-radius: 50%; overflow: hidden; z-index: 1;
      background: #241816;
      border: 3px solid #6d2832;
      box-shadow: 0 0 0 1px rgba(109,40,50,0.55), 0 12px 36px rgba(0,0,0,0.45);
    }
    .rp-hero-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rp-hero-vignette { display: none; }
    .rp-hero-placeholder {
      width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(145deg, var(--surface) 0%, var(--bg) 100%);
    }
    .rp-hero-placeholder-emoji { font-size: clamp(2.8rem, 10vw, 3.6rem); line-height: 1; opacity: 0.85; }
    .rp-hero-placeholder-text { font-family: "DM Sans", sans-serif; font-size: 12px; color: var(--text-muted); text-align: center; padding: 0 16px; }

    /* ── RECIPE HEADER ───────────────────────── */
    .rp-header { margin-bottom: 32px; }
    .rp-header-masthead { text-align: center; max-width: 720px; margin-left: auto; margin-right: auto; }
    .rp-category-eyebrow {
      font-family: "DM Sans", sans-serif; font-size: 11px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent);
      margin: 0 0 10px;
    }
    .rp-title { font-family: "Cormorant Garamond", serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 500; color: var(--text); margin: 0 0 4px; line-height: 1.1; }
    .rp-header-masthead .rp-title { margin-bottom: 6px; }
    .rp-also-known { font-family: "Cormorant Garamond", serif; font-size: 1.2rem; font-style: italic; color: var(--accent); margin: 0 0 16px; }
    .rp-header-masthead .rp-intro { margin-left: auto; margin-right: auto; }
    .rp-header-masthead .rp-meta-row { justify-content: center; }
    .rp-header-masthead .rp-tags { justify-content: center; flex-wrap: wrap; overflow-x: visible; }
    .rp-header-masthead .rp-credit { justify-content: center; }
    .rp-meta-row { display: flex; flex-wrap: wrap; align-items: center; gap: 20px; margin-bottom: 16px; }
    .rp-meta-item { display: flex; align-items: center; gap: 7px; font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--text-muted); }
    .rp-meta-item svg { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
    .rp-meta-divider { width: 1px; height: 16px; background: var(--border); }
    .rp-font-ctrl { display:flex; align-items:center; gap:4px; margin-left:12px; }
    .rp-font-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-family:"DM Sans",sans-serif; font-size:11px; color:var(--text-mid); cursor:pointer; }
    .rp-font-btn.active { border-color:var(--accent); color:var(--accent); background:rgb(from var(--accent) r g b / 0.08); }
    #rp-wrap.rp-font-sm  { --rp-scale: 0.92; }
    #rp-wrap.rp-font-md  { --rp-scale: 1; }
    #rp-wrap.rp-font-lg  { --rp-scale: 1.12; }
    #rp-wrap.rp-font-xl  { --rp-scale: 1.28; }
    #rp-wrap .rp-ing-name, #rp-wrap .rp-proc-step-text, #rp-wrap .rp-proc-single { font-size: calc(14px * var(--rp-scale, 1)); }
    #rp-wrap .rp-ing-qty { font-size: calc(13px * var(--rp-scale, 1)); }
    #rp-wrap.rp-cook-high { background:#0a0a0a !important; }
    #rp-wrap.rp-cook-high .rp-title, #rp-wrap.rp-cook-high .rp-ing-name, #rp-wrap.rp-cook-high .rp-proc-step-text,
    #rp-wrap.rp-cook-high .rp-proc-single, #rp-wrap.rp-cook-high .rp-section-title, #rp-wrap.rp-cook-high .rp-meta-item { color:#fff !important; }
    #rp-wrap.rp-cook-high .rp-ing-qty, #rp-wrap.rp-cook-high .rp-proc-step-num { color:#f0d080 !important; }
    #rp-wrap.rp-cook-high .rp-tab-content, #rp-wrap.rp-cook-high #combined-view { border-color:#444 !important; }
    .rp-cook-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-family:"DM Sans",sans-serif; font-size:11px; color:var(--text-mid); cursor:pointer; }
    .rp-cook-btn.active { border-color:var(--accent); color:var(--accent); background:rgb(from var(--accent) r g b / 0.12); }

    .rp-spice-wrap { display: flex; align-items: center; gap: 6px; }
    .rp-spice-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 14px; opacity: 0.3; transition: opacity 0.2s; }
    .rp-spice-btn.active { opacity: 1; }
    .rp-spice-controls { display: flex; align-items: center; gap: 4px; margin-left: 6px; }
    .rp-spice-adj { background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 4px; width: 20px; height: 20px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; }
    .rp-spice-adj:hover { border-color: var(--accent); color: var(--accent); }
    .rp-spice-tooltip { font-family: "DM Sans", sans-serif; font-size: 11px; color: var(--text-muted); margin-left: 4px; }

    /* ── SERVES ──────────────────────────────── */
    .rp-serves-wrap { display: flex; align-items: center; gap: 8px; }
    .rp-serves-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; width: 26px; height: 26px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; font-family: "DM Sans", sans-serif; }
    .rp-serves-btn:hover { border-color: var(--accent); color: var(--accent); }
    .rp-serves-num { font-family: "DM Sans", sans-serif; font-size: 15px; font-weight: 500; color: var(--text); min-width: 24px; text-align: center; cursor: text; border-bottom: 1px solid var(--border); padding: 0 2px; }
    .rp-serves-num:focus { outline: none; border-bottom-color: var(--accent); }
    .rp-serves-label { font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--text-muted); }

    /* ── CREDIT ROW ──────────────────────────── */
    .rp-credit { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .rp-credit-item { font-family: "DM Sans", sans-serif; font-size: 12px; color: var(--text-muted); }
    .rp-credit-item strong { color: var(--text); }
    .rp-credit-item a { color: var(--accent); text-decoration: none; }
    .rp-credit-item a:hover { text-decoration: underline; }
    .rp-credit-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .rp-credit-badge.original { background: rgb(from var(--accent) r g b / 0.15); color: var(--accent); border: 1px solid rgb(from var(--accent) r g b / 0.3); }
    .rp-credit-badge.external { background: rgba(85,150,220,0.1); color: #5596dc; border: 1px solid rgba(85,150,220,0.3); }
    .rp-preserved { font-family: "DM Sans", sans-serif; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

    /* ── VIEW TOGGLE ─────────────────────────── */
    .rp-view-toggle { display: flex; align-items: center; gap: 0; margin-bottom: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; width: fit-content; margin-left: auto; }
    .rp-view-btn { background: none; border: none; padding: 8px 16px; font-family: "DM Sans", sans-serif; font-size: 12px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .rp-view-btn.active { background: var(--accent); color: #1a1a1a; font-weight: 500; }

    /* ── TABS ────────────────────────────────── */
    .rp-tabs-header { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 0; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; position: relative; }
    .rp-tabs-header::-webkit-scrollbar { display: none; }
    .rp-tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 14px 24px; font-family: "DM Sans", sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; margin-bottom: -1px; letter-spacing: 0.03em; }
    .rp-tab-btn:hover { color: var(--text); }
    .rp-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .rp-tab-content { display: none; padding: 28px 0; }
    .rp-tab-content.active { display: block; }

    /* ── CONTROLS ROW ────────────────────────── */
    .rp-controls-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 0 0 8px; }

    /* ── INGREDIENTS TAB ─────────────────────── */
    .rp-ing-section { margin-bottom: 28px; }
    .rp-ing-section-title { font-family: "DM Sans", sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin: 0 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .rp-ing-section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    .rp-ing-row { display: grid; grid-template-columns: 28px 100px 1fr 28px 28px; gap: 0; align-items: center; padding: 9px 8px; border-radius: 6px; transition: background 0.15s; cursor: default; }
    .rp-ing-row:hover { background: rgba(255,255,255,0.03); }
    .rp-ing-cb { width: 16px; height: 16px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; appearance: none; background: transparent; transition: all 0.15s; flex-shrink: 0; }
    .rp-ing-cb:checked { background: var(--accent); border-color: var(--accent); background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='%231a1a1a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-size: 10px 8px; background-repeat: no-repeat; background-position: center; }
    .rp-ing-qty { font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--text-muted); }

// ── QR CODE ──────────────────────────────────────────────────────
function showQrCode() {

  modal.classList.add('open');
}
function closeQr() { document.getElementById('rp-qr-modal').classList.remove('open'); }
function printQr() { window.print(); }

  var qrModal = document.getElementById('rp-qr-modal');

// ── DEAD LINK DETECTION ──────────────────────────────────────────
async function checkSourceUrl(url) {
  if (!url || !url.startsWith('http')) return;
  var cached = sessionStorage.getItem('dlcheck_' + url);
  if (cached) { if (cached === 'dead') showDeadLink(url); return; }
  try {
    var res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), {signal: AbortSignal.timeout(6000)});
    var data = await res.json();
    var code = data.status && data.status.http_code;
    if (!data.contents || (code && code >= 400)) {
      sessionStorage.setItem('dlcheck_' + url, 'dead');
      showDeadLink(url);
    } else {
      sessionStorage.setItem('dlcheck_' + url, 'ok');
    }
  } catch(_) {} // Network error — don't flag as dead
}
function showDeadLink(url) {
  var existing = document.querySelector('.rp-deadlink');
  if (existing) { existing.style.display = 'block'; return; }
  var banner = document.createElement('div');
  banner.className = 'rp-deadlink';
  banner.style.display = 'block';
  banner.innerHTML = '🔗 This original source no longer exists. Recipe preserved with full credit to the original author.';
  var sourceLink = document.querySelector('.rp-source-link') || document.querySelector('[data-source-url]');
  if (sourceLink && sourceLink.parentNode) {
    sourceLink.parentNode.insertBefore(banner, sourceLink.nextSibling);
  }
}

// ── COLLECTIONS ──────────────────────────────────────────────────
var userCollections = null;

async function openCollectionPicker() {
  var session = JSON.parse(localStorage.getItem('tcj_session')||'null');
  if (!session) { window.location.href = 'login.html'; return; }
  if (!recipe) return;
  var modal = document.getElementById('rp-coll-modal');
  var list  = document.getElementById('rp-coll-list');
  list.innerHTML = '<div style="padding:16px;font-family:DM Sans,sans-serif;font-size:13px;color:var(--text-mid)">Loading...</div>';
  modal.classList.add('open');
  try {
    var headers = {'apikey':SUPABASE_KEY,'Content-Type':'application/json','Authorization':'Bearer '+session.access_token};
    var [collRes, recipeCollRes] = await Promise.all([
      fetch(SUPABASE_URL+'/rest/v1/rpc/get_my_collections',{method:'POST',headers,body:'{}'}),
      fetch(SUPABASE_URL+'/rest/v1/rpc/get_recipe_collections',{method:'POST',headers,body:JSON.stringify({p_recipe_id:recipe.id})})
    ]);
    userCollections = collRes.ok ? await collRes.json() : [];
    var recipeColl = recipeCollRes.ok ? await recipeCollRes.json() : [];
    var inCollMap = {};
    (recipeColl||[]).forEach(function(c){inCollMap[c.id]=c.has_recipe;});
    list.innerHTML = '';
    if (!userCollections.length) {
      list.innerHTML = '<div style="padding:16px;font-family:DM Sans,sans-serif;font-size:13px;color:var(--text-mid)">No collections yet. Create one first.</div>';
      return;
    }
    userCollections.forEach(function(c) {
      var has = inCollMap[c.id] || false;
      var row = document.createElement('div');
      row.className = 'rp-coll-row';
      row.innerHTML = '<div class="rp-coll-row-emoji">'+c.emoji+'</div><div class="rp-coll-row-name">'+c.name+'</div>'+(has?'<div class="rp-coll-check">✓</div>':'');
      row.addEventListener('click', function() { toggleCollection(c.id, c.name, has, row); });
      list.appendChild(row);
    });
  } catch(e) { list.innerHTML = '<div style="padding:16px;font-family:DM Sans,sans-serif;font-size:12px;color:var(--danger)">Error: '+e.message+'</div>'; }
}

async function toggleCollection(collectionId, collName, currentlyIn, rowEl) {
  var session = JSON.parse(localStorage.getItem('tcj_session')||'null');
  if (!session || !recipe) return;
  var headers = {'apikey':SUPABASE_KEY,'Content-Type':'application/json','Authorization':'Bearer '+session.access_token};
  try {
    var fn = currentlyIn ? 'remove_from_collection' : 'add_to_collection';
    await fetch(SUPABASE_URL+'/rest/v1/rpc/'+fn,{method:'POST',headers,body:JSON.stringify({p_collection_id:collectionId,p_recipe_id:recipe.id})});
    var checkEl = rowEl.querySelector('.rp-coll-check');
    if (currentlyIn) { if(checkEl) checkEl.remove(); }
    else { var c=document.createElement('div'); c.className='rp-coll-check'; c.textContent='✓'; rowEl.appendChild(c); }
    rowEl.removeEventListener('click', rowEl._handler);
    rowEl._handler = function(){ toggleCollection(collectionId,collName,!currentlyIn,rowEl); };
    rowEl.addEventListener('click', rowEl._handler);
    showToastRp((currentlyIn?'Removed from':'Added to')+' '+collName, false);
  } catch(e) { showToastRp('Error: '+e.message, true); }
}

function closeCollPicker() { document.getElementById('rp-coll-modal').classList.remove('open'); }
function goCreateCollection() { closeCollPicker(); window.location.href='collections.html'; }

function showToastRp(msg, isError) {
  var t = document.getElementById('rp-toast');
  if (!t) { t=document.createElement('div'); t.id='rp-toast-dynamic'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 18px;font-family:DM Sans,sans-serif;font-size:13px;color:var(--text-high);z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:400px;text-align:center'; document.body.appendChild(t); }
  t.textContent=msg; t.style.display='block'; t.style.borderColor=isError?'rgb(from var(--danger) r g b / 0.4)':'var(--accent)';
  clearTimeout(t._t); t._t=setTimeout(function(){t.style.display='none';},2500);
}

// ── ALLERGEN DETECTION ────────────────────────────────────────
const SERIOUS_ALLERGENS = new Set(['Peanuts','Tree Nuts','Shellfish','Fish','Eggs','Dairy','Gluten','Soy','Sesame','Sulphites','Mustard']);
let ingredientAllergenMap = null;

async function loadAllergenMap() {
  if (ingredientAllergenMap) return ingredientAllergenMap;
  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/ingredients?select=' + encodeURIComponent('"Ingredient Name","Also Known As",Allergen') + '&Allergen=neq.&limit=300',
      {headers: {'apikey': SUPABASE_KEY}}
    );
    if (!res.ok) return null;
    const rows = await res.json();
    ingredientAllergenMap = new Map();
    rows.forEach(function(r) {
      const allergen = (r['Allergen']||'').trim();
      if (!allergen) return;
      const name = (r['Ingredient Name']||'').toLowerCase().trim();
      const aka  = (r['Also Known As']||'').toLowerCase().trim();
      if (name) ingredientAllergenMap.set(name, allergen);
      if (aka)  ingredientAllergenMap.set(aka, allergen);
    });
  } catch(_) {}
  return ingredientAllergenMap;
}

async function detectAllergens(recipe) {
  const map = await loadAllergenMap();
  if (!map) return;
  const found = new Set();
  const allIngredients = [];
  (recipe.ingredients||[]).forEach(function(sec) {
    (sec.items||[]).forEach(function(item) { allIngredients.push(item.ingredient||''); });
  });
  allIngredients.forEach(function(name) {
    const lower = name.toLowerCase().trim();
    // Exact match
    if (map.has(lower)) {
      map.get(lower).split(',').forEach(function(a) { found.add(a.trim()); });
      return;
    }
    // Partial match — check if any known allergen ingredient is contained in name
    map.forEach(function(allergen, key) {
      if (lower.includes(key) || key.includes(lower.split(' ')[0])) {
        allergen.split(',').forEach(function(a) { found.add(a.trim()); });
      }
    });
  });
  if (!found.size) return;
  const banner = document.getElementById('allergen-banner');
  const pills  = document.getElementById('allergen-pills');
  if (!banner || !pills) return;
  pills.innerHTML = '';
  Array.from(found).sort().forEach(function(allergen) {
    const pill = document.createElement('span');
    pill.className = 'rp-allergen-pill' + (SERIOUS_ALLERGENS.has(allergen) ? ' serious' : '');
    pill.textContent = allergen;
    pills.appendChild(pill);
  });
  banner.style.display = 'flex';
}

const COOKING_METHODS = {
  'Air Fryer':       {icon:'🌀', note:'Reduce temp by 20°C, check at 75% of time'},
  'Oven':            {icon:'🔥', note:'Preheat fully before use'},
  'Microwave':       {icon:'📡', note:'Use 70% power to avoid uneven heating'},

};

const CATEGORY_METHODS = {
  'Meat & Fire':      ['Oven','Air Fryer','Slow Cooker'],
  'Slow & Soulful':   ['Pressure Cooker','Slow Cooker','Stovetop'],
  'Garden & Earth':   ['Air Fryer','Stovetop','Oven'],
  'Grains & Comfort': ['Stovetop','Pressure Cooker'],
  'Breads & Bakes':   ['Oven','Air Fryer'],
  'Rise & Shine':     ['Stovetop','Microwave','Air Fryer'],
  'Ocean & River':    ['Oven','Air Fryer','Stovetop'],
};

function renderEquipment(recipe) {
  const equipment = recipe.equipment || [];
  const section   = document.getElementById('rp-equipment');
  const list      = document.getElementById('rp-equip-list');
  const methodGrid = document.getElementById('rp-method-grid');
  if (!section || !list || !methodGrid) return;

  const EQUIP_ICONS = {'stand mixer':'🥣','hand mixer':'🥄','food processor':'⚙','blender':'🫙','pressure cooker':'⚡','slow cooker':'🍲','cast iron':'🍳','wok':'🍳','baking tin':'🫙','cake tin':'🎂','muffin tin':'🧁','roasting tray':'🍗','springform pan':'⭕','piping bag':'🎂','thermometer':'🌡','whisk':'🥄','rolling pin':'🪄','mortar and pestle':'🫙','steamer':'♨','bbq':'🔥'};

  if (equipment.length) {
    list.innerHTML = equipment.map(function(e) {
      const name = typeof e === 'string' ? e : (e.name || String(e));
      const icon = Object.entries(EQUIP_ICONS).find(function(kv){return name.toLowerCase().includes(kv[0]);});
      return '<div class="rp-equip-item">' + (icon?icon[1]+' ':'🔧 ') + name + '</div>';
    }).join('');
  } else {
    document.getElementById('rp-equip-list').closest('.rp-equip').querySelector('.rp-equip-title').style.display = 'none';
    list.style.display = 'none';
  }

  const cat = recipe.category || '';
  const methods = CATEGORY_METHODS[cat] || ['Stovetop','Oven'];
  methodGrid.innerHTML = methods.map(function(m) {
    const info = COOKING_METHODS[m] || {icon:'🍳',note:''};
    return '<div class="rp-method-card"><div class="rp-method-icon">'+info.icon+'</div><div class="rp-method-name">'+m+'</div><div class="rp-method-note">'+info.note+'</div></div>';
  }).join('');

  if (equipment.length || methods.length) section.style.display = 'block';

let substitutionsMap = {}; // { 'butter': [{substitute, ratio, notes, dietary_benefit}] }

async function loadSubstitutions() {
  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/substitutions?select=original,substitute,ratio,notes,dietary_benefit',
      { headers: { 'apikey': SUPABASE_KEY } }
    );
    if (!res.ok) return;
    const rows = await res.json();
    rows.forEach(row => {
      const key = row.original.toLowerCase().trim();
      if (!substitutionsMap[key]) substitutionsMap[key] = [];
      substitutionsMap[key].push(row);
    });
  } catch(_) {}
}

function getSubstitutes(ingredientName) {
  const name = ingredientName.toLowerCase().trim();
  // Exact match first
  if (substitutionsMap[name]) return substitutionsMap[name];
  // Partial match — ingredient name contains a known original
  for (const key of Object.keys(substitutionsMap)) {
    if (name.includes(key) || key.includes(name.split(' ')[0])) {
      return substitutionsMap[key];
    }
  }
  return [];
}

// ── NORMALIZE ─────────────────────────────────────────
// Coerces a row coming straight from submitted_recipes into the exact
// shape the renderers expect. Idempotent: data already in the right
// shape (e.g. the demo) passes through unchanged. This is what lets a
// REAL submitted recipe render correctly, not just the demo.
function parseJsonArray(val, fallback) {
  if (Array.isArray(val)) return val;
  if (typeof val === 'string' && val.trim()) {
    try {
      const parsed = JSON.parse(val);
      return Array.isArray(parsed) ? parsed : fallback;
    } catch(_) {}
  }
  return fallback;
}

function normalizeRecipe(r) {
  if (!r || r.__normalized) return r;

  // Native title from submit form → also_known_as for display
  if (!r.also_known_as && r.native_title) r.also_known_as = r.native_title;

  // Spice: accept number OR text label
  if (typeof r.spice_level === 'string') {
    const key = r.spice_level.trim().toLowerCase();
    r.spice_level = (key in SPICE_TEXT_TO_NUM) ? SPICE_TEXT_TO_NUM[key]
                  : (parseInt(r.spice_level, 10) || 0);
  } else if (typeof r.spice_level !== 'number') {
    r.spice_level = 0;
  }

  // Cooking notes: accept array OR a single text blob (split on newlines)
  if (typeof r.cooking_notes === 'string') {
    r.cooking_notes = r.cooking_notes
      .split(/\r?\n/).map(s => s.replace(/^[•\-\*\d\.\)\s]+/, '').trim()).filter(Boolean);
  } else if (!Array.isArray(r.cooking_notes)) {
    r.cooking_notes = [];
  }

  // Ingredients: parse JSONB/string and normalise section + items shape
  r.ingredients = parseJsonArray(r.ingredients, []).map(sec => {
    if (!sec || typeof sec !== 'object') return { section: '', items: [] };
    const section = sec.section || sec.section_name || '';
    let items = sec.items;
    if (!Array.isArray(items)) items = [];
    return { section, items };
  });

  // Method: parse JSONB/string; guarantee section + steps arrays
  r.method = parseJsonArray(r.method, []).map(block => {
    if (!block || typeof block !== 'object') return { section: '', steps: [] };
    const section = block.section || block.section_name || '';
    let steps = block.steps;
    if (!Array.isArray(steps)) steps = [];
    return { section, steps };
  });

  // Tags: guarantee arrays
  ['dietary_tags','health_tags','occasion_tags','style_tags','meal_type_tags','flavor_profile_tags'].forEach(k => {
    if (!Array.isArray(r[k])) r[k] = [];
  });

  r.__normalized = true;
  return r;
}

async function loadRecipe(id) {
  try {
    const headers = { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' };
    if (session?.access_token) headers['Authorization'] = 'Bearer ' + session.access_token;
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_recipe`, {
      method: 'POST',
      headers,
      body: JSON.stringify({ p_id: id })
    });
    if (res.ok) {
      recipe = await res.json();
      if (recipe && recipe.id) {
        const isOwner = session && recipe.user_id &&
          (session.user_id === recipe.user_id || session.user?.id === recipe.user_id);
        const isApprovedPublic = recipe.status === 'approved' && recipe.visibility === 'Public';
        if (isOwner && !isApprovedPublic) {
          var bannerColour = recipe.status === 'pending' ? 'var(--warn)' : 'var(--danger)';
          var bannerMsg = recipe.status === 'pending'
            ? '⏳ This recipe is under review. Only you can see this preview.'
            : '✗ This recipe needs updates. <a href="submit-recipe.html?id=' + recipe.id + '" style="color:' + bannerColour + ';font-weight:600">Edit &amp; Resubmit →</a>';
          setTimeout(function() {
            var b = document.createElement('div');
            b.style.cssText = 'background:rgba(0,0,0,.6);border-bottom:2px solid ' + bannerColour + ';padding:10px 20px;font-family:DM Sans,sans-serif;font-size:13px;color:' + bannerColour + ';text-align:center;position:sticky;top:0;z-index:100';
            b.innerHTML = bannerMsg;
            document.body.insertBefore(b, document.body.firstChild);
          }, 500);
        }
        renderRecipe(recipe);
        enrichIngredientInfo(recipe);
        return;
      }
      showRecipeUnavailable('This recipe may be private, under review, or no longer available.');
      return;
    }
  } catch(e) { console.error('Recipe load error:', e); }
  showRecipeNotFound();
}

// ── INGREDIENT ⓘ ENRICHMENT (best-effort) ─────────────
// Submitted recipes don't store chef recommendations on each ingredient;
// per spec those live in the ingredients table ("CJ Recommended Brand").
// This pulls them in after render. It is fully fail-safe: any error,
// missing table, or column-name mismatch simply leaves the page as-is.
let _ingredientCache = null;
async function enrichIngredientInfo(r) {
  try {
    if (!r || !Array.isArray(r.ingredients) || !r.ingredients.length) return;

    if (!_ingredientCache) {
      const headers = { 'apikey': SUPABASE_KEY };
      if (session) headers['Authorization'] = 'Bearer ' + session.access_token;
      const res = await fetch(`${SUPABASE_URL}/rest/v1/ingredients?select=${encodeURIComponent('"Ingredient Name","CJ Recommended Brand"')}`, { headers });
      if (!res.ok) return;
      _ingredientCache = await res.json();
    }
    if (!Array.isArray(_ingredientCache) || !_ingredientCache.length) return;

    // Build a lower-cased name → recommended brand map (tolerant of column naming)
    const brandMap = {};
    _ingredientCache.forEach(row => {
      const name  = row['Ingredient Name'] || row.ingredient_name || row.name;
      const brand = row['CJ Recommended Brand'] || row.cj_recommended_brand || row.recommended_brand;
      if (name && brand && String(brand).trim()) brandMap[String(name).toLowerCase()] = String(brand).trim();
    });
    if (!Object.keys(brandMap).length) return;

    let changed = false;
    r.ingredients.forEach(sec => (sec.items || []).forEach(it => {
      const b = brandMap[(it.ingredient || '').toLowerCase()];
      if (b && !it.chef_rec) { it.chef_rec = b; changed = true; }
    }));

    if (changed) {
      renderIngredients(r.ingredients);
      if (currentView === 'combined') renderIngredients(r.ingredients, 'ingredients-combined');
      if (currentServes !== baseServes) scaleIngredients(currentServes);
    }
  } catch (_) { /* best-effort — never break the page */ }
}

// ── RENDER RECIPE ─────────────────────────────────────
function renderRecipe(r) {
  normalizeRecipe(r);
  syncGroceryListForRecipe(r);
  document.title = r.recipe_name + ' — The Culinary Journal';
  updateRecipeMeta(r);

  // Title + category eyebrow
  document.getElementById('rp-title').textContent = r.recipe_name;
  var catEl = document.getElementById('rp-category');
  if (catEl) {
    if (r.category) {
      var catEmoji = CAT_EMOJI_RP[r.category] || '';
      catEl.textContent = (catEmoji ? catEmoji + ' ' : '') + r.category;
      catEl.style.display = 'block';
    } else {
      catEl.style.display = 'none';
    }
  }
  const aka = r.also_known_as || r.native_title;
  if (aka) {
    const ak = document.getElementById('rp-also-known');
    ak.textContent = aka;
    ak.style.display = 'block';
  }

  // Introduction (story behind the dish) — shown under the title
  const introEl = document.getElementById('rp-intro');
  if (introEl) {
    if (r.introduction && r.introduction.trim()) {
      introEl.textContent = r.introduction.trim();
      introEl.style.display = 'block';
    } else {
      introEl.style.display = 'none';
    }
  }

  renderHeroImage(r);

  // Origin — "From [Locality], [State], [Country]" when locality present (4.3)
  if (r.origin_country) {
    const parts = [r.origin_locality, r.origin_state, r.origin_country].filter(Boolean);
    const origin = r.origin_locality
      ? 'From ' + parts.join(', ')
      : [r.origin_state, r.origin_country].filter(Boolean).join(', ');
    document.getElementById('meta-origin-text').textContent = origin;
    document.getElementById('meta-origin').style.display = 'flex';
    document.getElementById('div-1').style.display = 'block';
  }

  // Spice & Sweet — display-only approved levels (4.6)
  currentSpice = r.spice_level || 0;
  renderSpice(currentSpice);
  renderSweet(r.sweet_level);

  // Serves — label and unit follow the cooking style (4.7)
  currentServes = r.servings || 4;
  baseServes = currentServes;
  document.getElementById('serves-num').textContent = currentServes;
  const styleCfg = CJ_STYLE_CFG[r.cooking_style || ''] || CJ_STYLE_CFG[''];
  const servesLabelEl = document.getElementById('serves-label');
  if (servesLabelEl) {
    const unit = (r.servings_unit && r.servings_unit !== 'people') ? ' ' + r.servings_unit : '';
    servesLabelEl.textContent = styleCfg.servesLabel + (unit ? ' —' + unit : '');
  }

  // Prep / Cook / Additional time — labels and units follow the cooking style (4.7)
  if (r.prep_time_minutes) {
    document.getElementById('meta-prep-text').textContent = formatTime(r.prep_time_minutes) + ' prep';
    document.getElementById('meta-prep').style.display = 'flex';
    document.getElementById('div-2').style.display = 'block';
  }
  if (r.cook_time_minutes) {
    document.getElementById('meta-cook-text').textContent =
      formatDur(r.cook_time_minutes, styleCfg.cookUnit) + ' ' + styleCfg.cookLabel.toLowerCase();
    document.getElementById('meta-cook').style.display = 'flex';
  }
  if (r.additional_time_minutes && styleCfg.extraLabel) {
    document.getElementById('meta-extra-text').textContent =
      formatDur(r.additional_time_minutes, styleCfg.extraUnit) + ' ' + styleCfg.extraLabel.toLowerCase();
    document.getElementById('meta-extra').style.display = 'flex';
    var d3 = document.getElementById('div-3'); if (d3) d3.style.display = 'block';
  }

  // Shelf life / storage / after opening (4.7)
  renderKeeping(r);

  // Contextual safety notes (baby / preservation / health / alcohol)
  try { renderDisclaimers(r); } catch(_) {}

  // Tags
  renderTags(r);

  // Credit
  renderCredit(r);

  // Hero watermark
  applyWatermark(r);

  // Ingredients
  renderIngredients(r.ingredients || []);

  // Procedure
  renderProcedure(r.method || []);

  // Nutrition
  renderNutrition(r.nutrition);

  // Notes
  renderNotes(r);

  // Related recipes, equipment, allergen detection, source-link check — best-effort, never break the page
  try { if (r.id && r.category) loadRelatedRecipes(r.id, r.category); } catch(_) {}
  try { renderEquipment(r); } catch(_) {}
  try { detectAllergens(r); } catch(_) {}
  try { if (r.credit_url) checkSourceUrl(r.credit_url); } catch(_) {}
  try { initTriedIt(); } catch(_) {}
  try { showCookHistoryBridge(); } catch(_) {}
  try {
    var savedView = lsGet('tcj_recipe_view');
    if (savedView === 'combined') setView('combined', true);
  } catch(_) {}
}

function formatTime(mins) {
  if (mins < 60) return mins + ' min';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? h + 'h ' + m + 'min' : h + 'h';
}

function formatDur(value, unit) {
  const n = parseFloat(value);
  if (isNaN(n)) return value;
  if (unit === 'min') return formatTime(n);
  if (unit === 'hr')  return n + (n === 1 ? ' hour' : ' hours');
  if (unit === 'day') return n + (n === 1 ? ' day' : ' days');
  if (unit === 'week') return n + (n === 1 ? ' week' : ' weeks');
  return n + ' ' + unit;
}

const PRESERVATION_STYLES = ['pickling-q','pickling-t','fermentation','canning','dehydrating','curing','jam','brining'];
const ALCOHOL_WORDS = ['wine','beer','rum','brandy','whisky','whiskey','bourbon','vodka','gin','liqueur','sherry','port','sake','cider (alcoholic)','marsala','vermouth','tequila','cognac','kirsch'];

function renderDisclaimers(r) {
  const el = document.getElementById('rp-disclaimers');
  if (!el) return;
  const notes = [];
  const cat = (r.category || '').toLowerCase();

  if (cat.indexOf('little ones') !== -1 || (r.meal_type_tags||[]).some(t => /baby|toddler/i.test(t))) {
    notes.push('👶 <strong>Baby & toddler safety:</strong> always check ingredients against your child\u2019s age stage and allergen history, supervise eating, and consult your child health nurse or GP about introducing new foods.');
  }
  if (PRESERVATION_STYLES.indexOf(r.cooking_style || '') !== -1) {
    notes.push('🫙 <strong>Preservation safety:</strong> follow sterilisation steps and stated quantities exactly — incorrect processing, salt or acid levels can allow harmful bacteria, including botulism, to develop. When in doubt, throw it out.');
  }
  if (cat.indexOf('nourish') !== -1 || (r.health_tags||[]).length) {
    notes.push('🩺 <strong>General information only:</strong> health-related notes on this recipe are not medical advice. Speak with your doctor or an accredited dietitian about your individual needs.');
  }
  const ingNames = [];
  (r.ingredients||[]).forEach(s => (s.items||[]).forEach(i => ingNames.push((i.ingredient||'').toLowerCase())));
  if (ingNames.some(n => ALCOHOL_WORDS.some(w => n.indexOf(w) !== -1))) {
    notes.push('🍷 <strong>Contains alcohol:</strong> this recipe uses an alcoholic ingredient. Cooking reduces but does not always eliminate alcohol content.');
  }

  if (!notes.length) { el.style.display = 'none'; return; }
  el.innerHTML = notes.map(n =>
    '<div style="font-family:\'DM Sans\',sans-serif;font-size:11.5px;color:var(--text-mid);line-height:1.55;padding:7px 10px;border-left:2px solid var(--accent);background:var(--text-ghost);border-radius:0 8px 8px 0;margin-bottom:6px">' + n + '</div>'

}

// ── SERVES ────────────────────────────────────────────
function adjustServes(delta) {
  const newVal = Math.max(1, currentServes + delta);
  currentServes = newVal;
  document.getElementById('serves-num').textContent = newVal;
  scaleIngredients(newVal);
}

function validateServes(el) {
  const val = parseInt(el.textContent) || baseServes;
  const cleaned = Math.max(1, Math.min(999, val));
  el.textContent = cleaned;
  currentServes = cleaned;
  scaleIngredients(cleaned);
}

function scaleIngredients(newServes) {
  const ratio = newServes / baseServes;
  document.querySelectorAll('.rp-ing-qty[data-base]').forEach(el => {
    const base = parseFloat(el.dataset.base);
    if (!isNaN(base)) {
      const scaled = base * ratio;
      el.textContent = formatQty(scaled) + (el.dataset.unit ? ' ' + el.dataset.unit : '');
    }
  });
}

function formatQty(n) {
  if (Number.isInteger(n)) return n.toString();
  const fractions = [[0.25,'¼'],[0.33,'⅓'],[0.5,'½'],[0.67,'⅔'],[0.75,'¾']];
  const whole = Math.floor(n);
  const frac = n - whole;
  for (const [val, sym] of fractions) {
    if (Math.abs(frac - val) < 0.05) return (whole > 0 ? whole + ' ' : '') + sym;
  }
  return n.toFixed(1).replace(/\.0$/, '');
}

  const container = document.getElementById(containerId);

    container.innerHTML = '<p style="font-family:DM Sans,sans-serif;font-size:14px;color:var(--text-muted);padding:12px 0">No ingredients listed for this recipe yet.</p>';
    return;
  }
  container.innerHTML = list.map(sec => {
    const title = escapeHtml(sec.section || sec.section_name || 'Ingredients');
    const items = Array.isArray(sec.items) ? sec.items : [];
    return `
    <div class="rp-ing-section">
      <div class="rp-ing-section-title">${title}</div>
      ${items.map((item, idx) => renderIngRow(item, title, idx)).join('')}
    </div>`;
  }).join('');
}

function renderIngRow(item, section, idx) {
  const hasInfo = item.chef_rec || item.substitute;
  const inGrocery = Array.isArray(groceryList) && groceryList.some(g => (g.name || g.ingredient) === item.ingredient);
  const pantryInfo = getPantryInfo(item.ingredient);
  const pantryNote = pantryInfo
    ? (pantryInfo.isStaple ? ' <span style="font-size:10px;color:var(--accent)">⭐ staple</span>'
      : pantryInfo.inPantry ? ' <span style="font-size:10px;color:#4caf76">🫙 in pantry</span>' : '')
    : '';
  const baseNum = parseFloat(item.qty);
  const qtyHtml = !isNaN(baseNum)
    ? `<span class="rp-ing-qty" data-base="${baseNum}" data-unit="${item.unit || ''}">${item.qty}</span>`
    : `<span class="rp-ing-qty">${item.qty}</span>`;

  const dbSubs = getSubstitutes(item.ingredient);
  const allSubs = dbSubs.length ? dbSubs : (item.substitute ? [{substitute:item.substitute,ratio:'',notes:'',dietary_benefit:''}] : []);
  const hasAnyInfo = hasInfo || allSubs.length > 0;

  const subsHtml = allSubs.map(s => `
    <div class="rp-info-row" style="flex-direction:column;align-items:flex-start;gap:2px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:14px">🔄</span>

        ${s.ratio ? `<span style="font-size:10px;color:var(--accent);background:rgba(196,151,59,0.12);padding:1px 6px;border-radius:4px">${s.ratio}</span>` : ''}
      </div>
      ${s.notes ? `<div style="font-size:11px;color:var(--text-muted);padding-left:20px;line-height:1.4">${s.notes}</div>` : ''}
      ${s.dietary_benefit ? `<div style="font-size:10px;color:#4caf76;padding-left:20px">${s.dietary_benefit}</div>` : ''}
    </div>`).join('');

  return `
    <div class="rp-ing-row">
      <input type="checkbox" class="rp-ing-cb" onchange="toggleIngredient(this)">
      ${qtyHtml}
      <span class="rp-ing-name">${item.ingredient}${pantryNote}${item.note ? ' <span style="font-size:11px;color:var(--text-muted);font-style:italic">— ' + item.note + '</span>' : ''}</span>
      ${hasAnyInfo ? `
        <button class="rp-ing-info-btn" onclick="toggleInfo(this)" title="Substitutes & chef tips">
          <div class="rp-ing-info-icon">i</div>
          <div class="rp-info-popup">
            <div class="rp-info-popup-title">${item.ingredient}</div>
            ${item.chef_rec ? `<div class="rp-info-row"><span>👨‍🍳</span><span>Chef recommends <strong>${item.chef_rec}</strong></span></div>` : ''}
            ${allSubs.length ? `<div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-top:6px;margin-bottom:2px">Substitutes</div>${subsHtml}` : ''}
          </div>
        </button>` : '<span></span>'}
      <button class="rp-ing-cart-btn ${inGrocery ? 'added' : ''}" onclick="toggleGrocery(this, '${item.ingredient}', '${item.qty}', '${item.unit || ''}')" title="${inGrocery ? 'In grocery list' : 'Add to grocery list'}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>

}

function toggleIngredient(cb) {
  const nameEl = cb.closest('.rp-ing-row').querySelector('.rp-ing-name');
  nameEl.classList.toggle('crossed', cb.checked);
}

function toggleInfo(btn) {
  const popup = btn.querySelector('.rp-info-popup');
  document.querySelectorAll('.rp-info-popup.visible').forEach(p => { if (p !== popup) p.classList.remove('visible'); });
  popup.classList.toggle('visible');
  const close = (e) => { if (!btn.contains(e.target)) { popup.classList.remove('visible'); document.removeEventListener('click', close); } };
  setTimeout(() => document.addEventListener('click', close), 0);
}

function toggleGrocery(btn, ingredient, qty, unit) {
  const data = getGroceryData();
  const recipeName = recipe?.recipe_name || 'Unknown Recipe';
  const recipeId   = recipe?.id || 'demo';
  let   recipeEntry = data.recipes.find(r => r.id === recipeId);
  if (!recipeEntry) {
    recipeEntry = {id: recipeId, name: recipeName, servings: currentServes || 1, ingredients: []};
    data.recipes.push(recipeEntry);
  }
  const idx = recipeEntry.ingredients.findIndex(i => i.name === ingredient);
  if (idx > -1) {
    recipeEntry.ingredients.splice(idx, 1);
    if (!recipeEntry.ingredients.length) data.recipes = data.recipes.filter(r => r.id !== recipeId);
    btn.classList.remove('added');
    showToast('Removed from grocery list');
  } else {
    if (isInPantry(ingredient)) {
      const info = getPantryInfo(ingredient);
      showToast(info && info.isStaple ? 'This is an always-have staple — no need to shop for it' : 'Already in your pantry 🫙');
      return;
    }
    recipeEntry.ingredients.push(GroceryUtils.enrichIngredient({
      name: ingredient, qty, unit, section: '',
      source: 'recipe', source_label: recipeName
    }, { source: 'recipe', source_ref: recipeId, source_label: recipeName }));
    btn.classList.add('added');
    showToast('Added to grocery list ✓');
  }
  saveGroceryData(data);
  groceryList = recipeEntry.ingredients || [];
}

function getPantryItems() {
  try { return JSON.parse(localStorage.getItem('tcj_pantry')||'[]'); } catch(_) { return []; }
}

function getPantryInfo(ingredientName) {
  const name = (ingredientName || '').toLowerCase().trim();
  const pantry = getPantryItems();
  const item = pantry.find(function(p) { return p.name && p.name.toLowerCase().trim() === name; });
  if (!item) return null;
  return {
    inPantry: (item.qty || 0) > 0,
    isStaple: !!item.is_staple,
    location: item.location || 'pantry'
  };
}

function isInPantry(ingredientName) {
  const info = getPantryInfo(ingredientName);
  if (!info) return false;
  if (info.isStaple) return true;
  return info.inPantry;
}

function addAllToGrocery() {
  const data = getGroceryData();
  const recipeName = recipe?.recipe_name || 'Unknown Recipe';
  const recipeId   = recipe?.id || 'demo';
  let   recipeEntry = data.recipes.find(r => r.id === recipeId);
  if (!recipeEntry) {
    recipeEntry = {id: recipeId, name: recipeName, servings: currentServes || 1, ingredients: []};
    data.recipes.push(recipeEntry);
  }
  let added = 0, skipped = 0;
  (recipe?.ingredients || []).forEach(sec => {
    sec.items.forEach(item => {
      var existing = recipeEntry.ingredients.find(function(i) { return i.name === item.ingredient; });
      if (existing) {
        var addQ = GroceryUtils.parseFraction(item.qty);
        var curQ = GroceryUtils.parseFraction(existing.qty);
        existing.qty = String(Math.round((curQ + addQ) * 100) / 100);
        added++;
        return;
      }
      if (isInPantry(item.ingredient)) { skipped++; return; }
      recipeEntry.ingredients.push(GroceryUtils.enrichIngredient({
        name: item.ingredient, qty: item.qty, unit: item.unit || '',
        section: sec.section || sec.section_name || '',
        category: item.category || 'Other',
        source: 'recipe', source_label: recipeName
      }, { source: 'recipe', source_ref: recipeId, source_label: recipeName }));
      added++;
    });
  });
  saveGroceryData(data);
  groceryList = recipeEntry.ingredients;
  document.querySelectorAll('.rp-ing-cart-btn').forEach(btn => btn.classList.add('added'));
  let msg = added > 0 ? added + ' ingredient' + (added===1?'':'s') + ' added to Grocery List ✓' : 'All ingredients already in list';
  if (skipped > 0) msg += ' · ' + skipped + ' skipped (already in pantry 🫙)';
  showToast(msg);
  if (added > 0) {
    setTimeout(() => showToast('<a href="grocery.html" style="color:var(--accent)">View Grocery List →</a>', true), 1800);
  }
}

function renderProcedure(method, containerId = 'procedure-content') {
  const container = document.getElementById(containerId);
  if (!container) return;
  const blocks = (typeof RecipeProcedure !== 'undefined')
    ? RecipeProcedure.parseBlocks(method)
    : (method || []);
  if (!blocks.length) {
    container.innerHTML = '<p style="font-family:DM Sans,sans-serif;font-size:14px;color:var(--text-mid);padding:12px 0">No procedure listed for this recipe yet.</p>';
    return;
  }
  container.innerHTML = blocks.map(function (block) {
    const lines = (typeof RecipeProcedure !== 'undefined')
      ? RecipeProcedure.stepLines(block.steps)
      : (block.steps || []).map(function (s) { return typeof s === 'string' ? s : ''; });
    const inner = lines.length
      ? `<ol class="rp-proc-steps">${lines.map(function (line) {
          return `<li class="rp-proc-step"><span class="rp-proc-step-num">→</span><span class="rp-proc-step-text">${fmtStep(line)}</span></li>`;
        }).join('')}</ol>`
      : '<p style="font-family:DM Sans,sans-serif;font-size:13px;color:var(--text-mid)">No steps in this section.</p>';
    return `
    <div class="rp-proc-block">
      <div class="rp-proc-block-title">${escapeHtml(block.section || '')}</div>
      ${inner}
    </div>`;
  }).join('');
}

// Renders a procedure step, italicising a short leading "Label:" prefix
// e.g. "Pack Mangoes: Place the pieces..." → <em>Pack Mangoes</em>: Place...
function fmtStep(s) {
  s = String(s == null ? '' : s);
  const m = s.match(/^([^:.\n]{1,40}):\s+([\s\S]+)$/);
  if (m) return '<em>' + escapeHtml(m[1]) + '</em>: ' + escapeHtml(m[2]);
  return escapeHtml(s);
}

// Small HTML-escape helper (procedure/notes come from user submissions)
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── NUTRITION (Open Food Facts) ───────────────────────────────────
const UNIT_TO_G = {
  'g':1,'gram':1,'grams':1,
  'kg':1000,'kilogram':1000,
  'ml':1,'millilitre':1,'milliliter':1,
  'l':1000,'litre':1000,'liter':1000,
  'cup':240,'cups':240,
  'tbsp':15,'tablespoon':15,'tablespoons':15,
  'tsp':5,'teaspoon':5,'teaspoons':5,
  'oz':28,'ounce':28,'ounces':28,
  'lb':454,'pound':454,'pounds':454,
  'piece':100,'pieces':100,'slice':30,'slices':30,
  'handful':30,'pinch':1,'dash':1
};

// CJ-013: cache persists across visits — repeat opens of the Nutrition tab are instant
const OFP_CACHE = (function(){
  try { return JSON.parse(lsGet('tcj_off_cache') || '{}') || {}; } catch(_) { return {}; }
})();
function persistOFPCache() {
  try {
    const keys = Object.keys(OFP_CACHE);
    if (keys.length > 400) keys.slice(0, keys.length - 400).forEach(k => delete OFP_CACHE[k]);
    lsSet('tcj_off_cache', JSON.stringify(OFP_CACHE));
  } catch(_) {}
}

async function fetchNutrition(ingredientName) {
  const key = ingredientName.toLowerCase().trim();
  if (OFP_CACHE[key]) return OFP_CACHE[key];
  try {
    const q = encodeURIComponent(key.replace(/[()]/g,'').trim());
    const res = await fetch(
      'https://world.openfoodfacts.org/cgi/search.pl?search_terms=' + q +
      '&json=1&page_size=1&fields=product_name,nutriments&search_simple=1&action=process',
      {signal: AbortSignal.timeout(3000)}
    );
    const data = await res.json();
    if (data.products && data.products.length && data.products[0].nutriments) {
      const n = data.products[0].nutriments;
      const result = {
        calories: n['energy-kcal_100g'] || n['energy_100g']/4.184 || 0,
        protein:  n['proteins_100g'] || 0,
        carbs:    n['carbohydrates_100g'] || 0,
        fat:      n['fat_100g'] || 0,
        fibre:    n['fiber_100g'] || n['fibre_100g'] || 0,
        sugar:    n['sugars_100g'] || 0,
        sodium:   (n['sodium_100g'] || 0) * 1000 // mg
      };
      OFP_CACHE[key] = result;
      return result;
    }
  } catch(_) {}
  return null;
}

function toGrams(qty, unit) {
  const q = parseFloat(qty) || 0;
  if (!q) return 0;
  const u = (unit||'').toLowerCase().trim();
  const factor = UNIT_TO_G[u] || (u ? 0 : 100); // if no unit, assume 100g
  return q * factor;
}

async function loadNutritionFromOFF(recipe, servings) {
  const container = document.getElementById('nutrition-content');
  container.innerHTML = '<div style="font-family:DM Sans,sans-serif;font-size:13px;color:var(--text-muted);padding:20px 0">Calculating nutrition <span id="nut-prog"></span></div>';

  const allIngredients = [];
  (recipe.ingredients || []).forEach(function(sec) {
    (sec.items || []).forEach(function(item) {
      allIngredients.push(item);
    });
  });

  if (!allIngredients.length) {
    container.innerHTML = '<p style="font-family:DM Sans,sans-serif;font-size:14px;color:var(--text-muted);padding:20px 0">No ingredients found for nutrition calculation.</p>';
    return;
  }

  const totals = {calories:0,protein:0,carbs:0,fat:0,fibre:0,sugar:0,sodium:0};
  let found = 0, done = 0;
  const prog = document.getElementById('nut-prog');

  // CJ-013: bounded-parallel lookups (5 at a time) instead of one-by-one —
  // a 15-ingredient recipe drops from ~15 serial requests to ~3 parallel waves.
  const CONCURRENCY = 5;
  let next = 0;
  async function worker() {
    while (next < allIngredients.length) {
      const item = allIngredients[next++];
      const n = await fetchNutrition(item.ingredient);
      done++;
      if (prog) prog.textContent = '(' + done + '/' + allIngredients.length + ')';
      if (!n) continue;
      const grams = toGrams(item.qty, item.unit);
      if (!grams) continue;
      const scale = grams / 100;
      Object.keys(totals).forEach(function(k) { totals[k] += (n[k]||0) * scale; });
      found++;
    }
  }
  await Promise.all(Array.from({length: Math.min(CONCURRENCY, allIngredients.length)}, worker));
  persistOFPCache();

  if (!found) {
    container.innerHTML = '<p style="font-family:DM Sans,sans-serif;font-size:14px;color:var(--text-muted);padding:20px 0">Nutritional data not available for these ingredients.</p>';
    return;
  }

  const perServing = servings || 1;
  const ps = {};
  Object.keys(totals).forEach(function(k) { ps[k] = Math.round(totals[k] / perServing); });

  renderNutrition({
    calories: ps.calories,
    protein:  ps.protein,
    carbs:    ps.carbs,
    fat:      ps.fat,
    fibre:    ps.fibre,
    sugar:    ps.sugar,
    sodium:   ps.sodium,
    details: [
      {label:'Total Recipe (all servings)', value: Math.round(totals.calories) + ' kcal'},
      {label:'Based on', value: found + ' of ' + allIngredients.length + ' ingredients'},
      {label:'Source', value: 'Open Food Facts (approximate)'}
    ]
  });
}

function setupSwipe() {
  const tabOrder = ['ingredients','procedure','nutrition','notes'];
  let startX = 0;
  const tabsView = document.getElementById('tabs-view');
  tabsView.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  tabsView.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) < 50) return;
    const activeTab = document.querySelector('.rp-tab-btn.active')?.dataset?.tab;
    const idx = tabOrder.indexOf(activeTab);
    if (diff > 0 && idx < tabOrder.length - 1) switchTab(tabOrder[idx + 1]);
    else if (diff < 0 && idx > 0) switchTab(tabOrder[idx - 1]);
  }, { passive: true });
}

// ── Step Timer ────────────────────────────────────────────────────────
let _timerInterval = null, _timerRemaining = 0, _timerLabel = '';

function parseTimerFromStep(text) {
  // Match patterns: "20 minutes", "1 hour 30 minutes", "45 mins", "1½ hours"
  const t = text.toLowerCase();
  let total = 0;
  const hr  = t.match(/(\d+(?:\.\d+)?)\s*(?:hour|hr)s?/);
  const min = t.match(/(\d+(?:\.\d+)?)\s*(?:minute|min)s?/);
  const sec = t.match(/(\d+(?:\.\d+)?)\s*(?:second|sec)s?/);
  if (hr)  total += parseFloat(hr[1])  * 3600;
  if (min) total += parseFloat(min[1]) * 60;
  if (sec) total += parseFloat(sec[1]);
  return Math.round(total);
}

function fmtTimerDisplay(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h) return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function startTimer(seconds, label) {
  clearInterval(_timerInterval);
  _timerRemaining = seconds;
  _timerLabel = label;
  let el = document.getElementById('rp-timer-widget');
  if (!el) {
    el = document.createElement('div');
    el.id = 'rp-timer-widget';
    el.className = 'rp-timer-active';
    el.innerHTML = '<div class="rp-timer-label" id="rp-timer-lbl"></div>' +
      '<div class="rp-timer-display" id="rp-timer-disp"></div>' +
      '<div class="rp-timer-controls">' +
        '<button onclick="pauseResumeTimer()">⏸ Pause</button>' +
        '<button onclick="cancelTimer()">✕ Cancel</button>' +
      '</div>';
    document.body.appendChild(el);
  }
  document.getElementById('rp-timer-lbl').textContent = label;
  document.getElementById('rp-timer-disp').classList.remove('rp-timer-done');
  _timerInterval = setInterval(function(){
    _timerRemaining--;
    const disp = document.getElementById('rp-timer-disp');
    if (disp) disp.textContent = fmtTimerDisplay(_timerRemaining);
    if (_timerRemaining <= 0) {
      clearInterval(_timerInterval);
      if (disp) { disp.textContent = 'Done! ✓'; disp.classList.add('rp-timer-done'); }
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('Timer done — ' + label);
      }
    }
  }, 1000);
  if (document.getElementById('rp-timer-disp'))
    document.getElementById('rp-timer-disp').textContent = fmtTimerDisplay(_timerRemaining);
}

let _timerPaused = false;
function pauseResumeTimer() {
  const btn = document.querySelector('#rp-timer-widget .rp-timer-controls button');
  if (_timerPaused) {
    _timerPaused = false;
    if (btn) btn.textContent = '⏸ Pause';
    startTimer(_timerRemaining, _timerLabel);
  } else {
    _timerPaused = true;
    clearInterval(_timerInterval);
    if (btn) btn.textContent = '▶ Resume';
  }
}

function cancelTimer() {
  clearInterval(_timerInterval);
  const el = document.getElementById('rp-timer-widget');
  if (el) el.remove();
}

function injectTimerButtons() {
  document.querySelectorAll('.rp-proc-step-text, .rp-proc-single').forEach(function(el) {
    if (el.querySelector('.rp-timer-btn')) return;
    const t = parseTimerFromStep(el.textContent || '');
    if (t >= 30) {
      const btn = document.createElement('button');
      btn.className = 'rp-timer-btn';
      btn.textContent = '⏱ ' + (t >= 3600
        ? Math.floor(t/3600) + 'h ' + Math.floor((t%3600)/60) + 'm'
        : Math.floor(t/60) + ' min');
      btn.onclick = function(e) {
        e.preventDefault();
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
        startTimer(t, el.textContent.substring(0, 60).trim());
      };
      el.appendChild(btn);
    }
  });
}

</script>
