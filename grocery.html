<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Build and manage your grocery list from recipes and pantry needs on The Culinary Journal.">
  <link rel="canonical" href="https://theculinaryjournal.site/grocery.html">
  <title>Grocery List — The Culinary Journal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
<script src="supabase-config.js"></script>
  <style>
    .page-bg { min-height:100vh; background:var(--bg); }
    .gl-wrap { max-width:900px; margin:0 auto; padding:24px 20px 80px; }
    .gl-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
    .gl-title { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:600; color:var(--text-high); }
    .gl-household-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:18px; padding:12px 16px; background:rgba(91,143,212,0.08); border:1px solid rgba(91,143,212,0.25); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); }
    .gl-household-bar strong { color:var(--text-high); }
    .gl-household-bar a { color:var(--accent); text-decoration:none; font-weight:600; }
    .gl-actions { display:flex; gap:8px; }
    .gl-btn { padding:8px 16px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; border:none; }
    .gl-btn-primary { background:var(--accent); color:#fff; }
    .gl-btn-ghost { background:none; border:1px solid var(--border); color:var(--text-mid); }
    .gl-btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

    /* Tabs */
    .gl-tabs { display:flex; gap:4px; background:var(--text-ghost); border-radius:10px; padding:4px; margin-bottom:24px; width:fit-content; }
    .gl-tab { font-family:'DM Sans',sans-serif; font-size:13px; padding:8px 20px; border-radius:7px; border:none; background:none; color:var(--text-mid); cursor:pointer; transition:all 0.15s; }
    .gl-tab.active { background:var(--bg); color:var(--text-high); font-weight:500; box-shadow:0 1px 4px rgba(0,0,0,0.15); }

    /* Recipe sections (Tab 1) */
    .gl-recipe-section { margin-bottom:24px; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .gl-recipe-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:var(--text-ghost); border-bottom:1px solid var(--border); }
    .gl-recipe-name { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; color:var(--text-high); }
    .gl-recipe-count { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); }
    .gl-remove-recipe { padding:4px 10px; background:none; border:1px solid rgb(from var(--danger) r g b / 0.3); border-radius:5px; color: var(--danger); font-size:11px; cursor:pointer; font-family:'DM Sans',sans-serif; }

    /* Ingredient rows */
    .gl-item { display:flex; align-items:center; gap:12px; padding:11px 18px; border-bottom:1px solid rgba(from var(--border) r g b / 0.4); transition:background 0.1s; }
    .gl-item:last-child { border-bottom:none; }
    .gl-item:hover { background:var(--text-ghost); }
    .gl-item.checked { opacity:0.45; }
    .gl-item.checked .gl-item-name { text-decoration:line-through; }
    .gl-check { width:18px; height:18px; accent-color:var(--accent); cursor:pointer; flex-shrink:0; }
    .gl-item-name { flex:1; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-high); }
    .gl-item-qty { font-family:'DM Sans',sans-serif; font-size:12px; color:var(--accent); font-weight:500; white-space:nowrap; }
    .gl-item-note { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); display:flex; align-items:center; gap:4px; }
    .gl-pantry-badge { font-family:'DM Sans',sans-serif; font-size:10px; color:#4caf76; margin-left:6px; }
    .gl-staple-badge { font-family:'DM Sans',sans-serif; font-size:10px; color:var(--accent); margin-left:6px; }
    .gl-item.in-pantry { opacity:0.55; }
    .gl-item.is-staple { opacity:0.45; }
    .gl-filter-bar { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); }
    .gl-filter-bar label { display:flex; align-items:center; gap:6px; cursor:pointer; }
    .gl-source-badge { font-family:'DM Sans',sans-serif; font-size:10px; color:var(--text-mid); margin-left:6px; }
    .gl-item-qty { cursor:pointer; }
    .gl-item-qty:hover { text-decoration:underline; }
    .gl-store-tag { font-family:'DM Sans',sans-serif; font-size:10px; color:var(--text-mid); margin-left:4px; }
    .gl-modal { display:none; position:fixed; inset:0; background:var(--scrim); z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
    .gl-modal.open { display:flex; }
    .gl-modal-box { background:var(--bg); border:1px solid var(--border); border-radius:14px; width:100%; max-width:400px; padding:22px; }
    .gl-modal-title { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:600; color:var(--text-high); margin-bottom:16px; }
    .gl-field { margin-bottom:12px; }
    .gl-field label { display:block; font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); margin-bottom:4px; }
    .gl-field input, .gl-field select { width:100%; box-sizing:border-box; font-family:'DM Sans',sans-serif; font-size:13px; padding:8px 12px; border:1px solid var(--border); border-radius:8px; background:var(--input-bg); color:var(--text-high); }
    .gl-modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }
    .gl-add-hint { font-family:'DM Sans',sans-serif; font-size:11px; margin-top:4px; }
    .gl-unit-tip { font-family:'DM Sans',sans-serif; font-size:10px; color:var(--warn); margin-top:2px; }

    /* Combined tab category headers */
    .gl-category-header { padding:10px 18px 6px; font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); background:var(--text-ghost); border-bottom:1px solid var(--border); }

    /* Empty state */
    .gl-empty { text-align:center; padding:60px 20px; }
    .gl-empty-icon { font-size:48px; margin-bottom:12px; }
    .gl-empty-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--text-high); margin-bottom:6px; }
    .gl-empty-sub { font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-mid); margin-bottom:20px; }

    /* Shop mode (GL-06) */
    .gl-shop-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:16px; padding:14px 16px; background:var(--text-ghost); border:1px solid var(--border); border-radius:12px; }
    .gl-shop-progress { font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-high); font-weight:600; }
    .gl-shop-progress span { color:var(--accent); }
    .gl-shop-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .gl-shop-btn { padding:10px 16px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; border:none; }
    .gl-shop-btn-undo { background:none; border:1px solid var(--border); color:var(--text-mid); }
    .gl-shop-btn-complete { background:#4caf76; color:#fff; }
    .gl-shop-item { display:flex; align-items:center; gap:14px; padding:16px 18px; border-bottom:1px solid rgba(from var(--border) r g b / 0.4); cursor:pointer; min-height:52px; }
    .gl-shop-item:active { background:var(--text-ghost); }
    .gl-shop-check { width:32px; height:32px; border-radius:50%; border:2px solid var(--accent); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; color:var(--accent); }
    .gl-shop-item.in-trolley .gl-shop-check { background:var(--accent); color:#fff; border-color:var(--accent); }
    .gl-trolley-toggle { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); cursor:pointer; padding:8px 18px; background:var(--text-ghost); border:none; width:100%; text-align:left; }
    .gl-trolley-body { display:none; }
    .gl-trolley-body.open { display:block; }
    .gl-store-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
    .gl-store-chip { padding:6px 12px; border-radius:20px; border:1px solid var(--border); background:none; font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); cursor:pointer; }
    .gl-store-chip.active { background:rgb(from var(--accent) r g b / 0.15); border-color:var(--accent); color:var(--accent); font-weight:600; }
    .gl-store-chip-manage { border-style:dashed; }

    /* Print */
    @media print {
      body::before { content:'The Culinary Journal — Grocery List'; display:block; text-align:center; font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:700; color:#8b6914; padding:12px 0 4px; }
      body::after { content:'Printed from theculinaryjournal.site'; display:block; text-align:center; font-family:'DM Sans',sans-serif; font-size:9px; color:#999; margin-top:24px; padding-top:8px; border-top:1px solid #e8e0d0; }
      nav, .tab-nav, .gl-actions, .gl-tabs, .gl-filter-bar, .gl-shop-bar, .gl-store-bar, .gl-remove-recipe, .gl-check, .gl-trolley-toggle { display:none!important; }
      .page-bg { background:white!important; }
      .gl-wrap { max-width:100%; padding:0 12px; }
      .gl-title { font-size:1.2rem; color:#333!important; margin-bottom:12px; }
      .gl-item-name, .gl-item-qty, .gl-recipe-name { color:#000!important; }
      .gl-item.checked { display:none; }
      .gl-section-title { color:#8b6914!important; border-color:#e8e0d0!important; }
    }
  </style>
</head>

<script>

let _syncTimer = null;
let glIngIndex = {};

function getSession(){
  try{ return JSON.parse(localStorage.getItem('tcj_session')||'null'); }catch(_){return null;}
}

async function callRPC(fn, params){
  const sess = getSession();
  if(!sess||!sess.access_token) return null;
  const res = await fetch(SUPA_URL+'/rest/v1/rpc/'+fn, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+sess.access_token},
    body: JSON.stringify(params)
  });
  if(!res.ok) return null;
  return res.json();
}

var _glHouseholdShared = false;

function updateHouseholdBar(data){
  var bar = document.getElementById('gl-household-bar');
  if(!bar) return;
  if(data && data.shared){
    bar.style.display = 'flex';
    bar.innerHTML = '<span>🏠 <strong>'+esc(data.household_name||'Household')+'</strong> — shared grocery list (syncs with your partner)</span>'+
      '<a href="household.html">Manage household →</a>';
    _glHouseholdShared = true;
  } else {
    bar.style.display = getSession() ? 'flex' : 'none';
    if(getSession()){
      bar.innerHTML = '<span>Personal grocery list</span><a href="household.html">Link partner →</a>';
    }
    _glHouseholdShared = false;
  }
}

async function syncFromSupabase(force){
  try{
    const data = await callRPC('get_my_grocery_list',{});
    if(!data) return;
    updateHouseholdBar(data);
    const remote = data.list_data||{recipes:[]};
    const remoteChecked = data.checked||[];
    const remoteTime = data.updated_at ? new Date(data.updated_at).getTime() : 0;
    const localRaw = localStorage.getItem('tcj_grocery_ts');
    const localTime = localRaw ? parseInt(localRaw) : 0;
    if(force || remoteTime > localTime || (data.shared && remoteTime >= localTime)){
      localStorage.setItem('tcj_grocery', JSON.stringify(GroceryUtils.normalizeGroceryList(remote)));
      localStorage.setItem('tcj_grocery_checked', JSON.stringify(remoteChecked));
      localStorage.setItem('tcj_grocery_ts', String(remoteTime));
      if(data.updated_at && window.SharedSyncUtils) SharedSyncUtils.storeServerTs('tcj_grocery_server_ts', data.updated_at);
      render();
    }
    refreshRegionalBanner();
  } catch(_) {}
}

function refreshRegionalBanner(){
  if(!window.RegionalHints) return;
  var list = GroceryUtils.loadGrocery();
  var items = (list.recipes||[]).concat(list.items||[]);
  RegionalHints.refreshBanner('gl-regional-bar', items);
}
window.onGroceryConflictResolved = function(){ render(); refreshRegionalBanner(); };

function scheduleSyncToSupabase(){
  GroceryUtils.scheduleGroceryCloudSync();
}

// GL-01: { version:2, recipes:[...], items:[...] } — each ingredient has id, source, category, store

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

const UNICODE_FRACTIONS = {'½':0.5,'⅓':1/3,'⅔':2/3,'¼':0.25,'¾':0.75,'⅛':0.125,'⅜':0.375,'⅝':0.625,'⅞':0.875};
function parseFraction(v){
  if(v==null||v==='') return 0;
  v = String(v).trim();
  // Unicode fraction
  if(UNICODE_FRACTIONS[v] !== undefined) return UNICODE_FRACTIONS[v];
  // Mixed number with unicode e.g. "1½"
  for(const [uf,val] of Object.entries(UNICODE_FRACTIONS)){
    if(v.endsWith(uf)) return parseFloat(v.slice(0,-uf.length)||0) + val;
  }
  // Slash fraction e.g. "1/2" or "3 1/4"
  const slash = v.match(/^(\d+)\s+(\d+)\/(\d+)$|^(\d+)\/(\d+)$/);
  if(slash){
    if(slash[1]) return parseInt(slash[1]) + parseInt(slash[2])/parseInt(slash[3]);
    return parseInt(slash[4])/parseInt(slash[5]);
  }
  return parseFloat(v)||0;
}

const FRACTIONS = {'1/8':'⅛','1/4':'¼','3/8':'⅜','1/2':'½','5/8':'⅝','3/4':'¾','1/3':'⅓','2/3':'⅔'};
function fmtQty(v){ if(!v)return ''; let s=String(v); Object.keys(FRACTIONS).forEach(f=>{s=s.replace(new RegExp(f.replace('/','[/]'),'g'),FRACTIONS[f]);}); return s; }

function getPantryIndex(){
  try {
    const items = JSON.parse(localStorage.getItem('tcj_pantry')||'[]');
    const idx = {};
    items.forEach(function(p){
      if (p.name) idx[p.name.toLowerCase().trim()] = p;
    });
    return idx;
  } catch(_) { return {}; }
}

function pantryInfoFor(name){
  const p = getPantryIndex()[(name||'').toLowerCase().trim()];
  if (!p) return null;
  return {
    inPantry: (p.qty||0) > 0,
    isStaple: !!p.is_staple,
    location: p.location || 'pantry',
    qty: p.qty
  };
}

function shouldHideGroceryItem(name){
  const info = pantryInfoFor(name);
  if (!info) return false;
  if (document.getElementById('gl-hide-staples')?.checked && info.isStaple) return true;
  if (document.getElementById('gl-hide-pantry')?.checked && info.inPantry) return true;
  return false;
}

function pantryBadgeHtml(name){
  const info = pantryInfoFor(name);
  if (!info) return '';
  if (info.isStaple) return '<span class="gl-staple-badge">⭐ always have</span>';
  if (info.inPantry) return '<span class="gl-pantry-badge">🫙 in ' + esc(info.location) + '</span>';
  return '';
}

function getList(){ return GroceryUtils.loadGrocery(); }
function saveList(list){ GroceryUtils.saveGrocery(list); scheduleSyncToSupabase(); }
function getChecked(){ try{return JSON.parse(localStorage.getItem('tcj_grocery_checked')||'[]');}catch(_){return[];} }
function setChecked(arr){ localStorage.setItem('tcj_grocery_checked',JSON.stringify(arr)); scheduleSyncToSupabase(); }

let glUndoStack = [];
let glStoreFilter = 'all';
let glTrolleyOpen = false;

function getLastStore(){ try{return localStorage.getItem('tcj_grocery_last_store')||'';}catch(_){return'';} }
function setLastStore(s){ try{if(s)localStorage.setItem('tcj_grocery_last_store',s);}catch(_){} }

function getStoreProfiles(){
  try {
    var p = JSON.parse(localStorage.getItem('tcj_store_profiles')||'[]');
    return Array.isArray(p) ? p : [];
  } catch(_) { return []; }
}
function saveStoreProfiles(profiles){ localStorage.setItem('tcj_store_profiles', JSON.stringify(profiles)); }

function getAisleOrder(storeName){
  var profiles = getStoreProfiles();
  var prof = profiles.find(function(p){ return p.name === storeName; });
  if (prof && prof.aisles && prof.aisles.length) return prof.aisles;
  return CATEGORY_ORDER.slice();
}

function listStores(){
  var stores = new Set();
  getList().items.forEach(function(i){ if(i.store) stores.add(i.store); });
  getList().recipes.forEach(function(r){
    (r.ingredients||[]).forEach(function(i){ if(i.store) stores.add(i.store); });
  });
  getStoreProfiles().forEach(function(p){ if(p.name) stores.add(p.name); });
  return Array.from(stores).sort();
}

function pushUndo(key){
  glUndoStack.push(key);
  if (glUndoStack.length > 8) glUndoStack.shift();
}

function undoLastCheck(){
  if (!glUndoStack.length) { alert('Nothing to undo.'); return; }
  var key = glUndoStack.pop();
  var checked = getChecked();
  var idx = checked.indexOf(key);
  if (idx > -1) { checked.splice(idx, 1); setChecked(checked); }
  render();
}

function completeTrip(){
  var checked = getChecked();
  if (!checked.length) { alert('Check off items as you shop, then complete your trip.'); return; }
  if (!confirm('Complete trip? ' + checked.length + ' checked item(s) will be archived.')) return;
  archiveChecked();
  glUndoStack = [];
  glTrolleyOpen = false;
}

async function submitUnknownGroceryIngredient() {
  var name = (document.getElementById('gl-add-name').value || '').trim();
  if (!name) { alert('Enter an ingredient name first.'); return; }
  var sess = getSession();
  if (!sess || !sess.access_token) {
    alert('Please sign in to submit for review.');
    window.location.href = 'login.html';
    return;
  }
  var notes = prompt('Optional note for the admin (e.g. brand, variety):', '') || '';
  try {
    var res = await callRPC('submit_pending_ingredient', {
      p_name: name,
      p_type: 'ingredient',
      p_category: document.getElementById('gl-add-category').value || null,
      p_unit: (document.getElementById('gl-add-unit').value || '').trim() || null,
      p_notes: notes || null
    });
    if (res === null) throw new Error('Submission failed');
    alert('Submitted for review. Check Notifications when an admin approves it.');
    document.getElementById('gl-submit-unknown').style.display = 'none';
  } catch (e) {

async function loadGlIngredients() {
  try {
    var res = await fetch(
      SUPA_URL + '/rest/v1/ingredients?select=' + encodeURIComponent('"ID","Ingredient Name",Category,Unit') +
      '&order=' + encodeURIComponent('"Ingredient Name"') + '&limit=500',
      { headers: { apikey: SUPA_KEY } }
    );
    var rows = await res.json();
    var dl = document.getElementById('gl-ingredients-list');
    glIngIndex = {};
    if (dl && rows.length) {
      dl.innerHTML = rows.map(function(r) {
        var n = r['Ingredient Name'] || '';

        return '<option value="' + n.replace(/"/g, '&quot;') + '">';
      }).join('');
    }

function submitAddItem(){
  var name = document.getElementById('gl-add-name').value.trim();
  if (!name) return;
  var qty = document.getElementById('gl-add-qty').value.trim();
  var unit = document.getElementById('gl-add-unit').value.trim();
  var category = document.getElementById('gl-add-category').value;
  var store = document.getElementById('gl-add-store').value.trim();
  var ingId = document.getElementById('gl-ingredient-id').value;
  var list = getList();
  var existing = list.items.find(function(i) {
    return i.name && i.name.toLowerCase().trim() === name.toLowerCase() &&
      (i.unit || '').toLowerCase() === unit.toLowerCase();
  });
  if (existing && qty) {
    var add = GroceryUtils.parseFraction(qty);
    var cur = GroceryUtils.parseFraction(existing.qty);
    existing.qty = String(Math.round((cur + add) * 100) / 100);
    if (store) existing.store = store;
  } else {
    list.items.push(GroceryUtils.enrichIngredient({
      name: name, qty: qty, unit: unit, category: category, store: store,
      ingredient_id: ingId ? parseInt(ingId, 10) : null,
      source: 'manual', source_label: 'Manual'
    }, { source: 'manual', source_label: 'Manual' }));
  }
  if (store) setLastStore(store);
  saveList(list);
  closeAddItemModal();
  render();
}

function archiveChecked(){
  var checked = getChecked();
  if (!checked.length) { alert('No checked items to archive.'); return; }
  var stockPantry = confirm('Remove ' + checked.length + ' checked item(s) from your list?\n\nOK = also add them to your pantry (bump qty if already there).\nCancel = keep on list.');
  if (!stockPantry) return;
  var combinedNames = {};
  checked.forEach(function(k){
    if (k.indexOf('combined:') === 0) combinedNames[k.slice(9).toLowerCase().trim()] = true;
  });
  var list = getList();
  var toStock = [];
  function capture(ing) {
    if (!ing || !ing.name) return;
    toStock.push({
      name: ing.name,
      unit: ing.unit || '',
      category: ing.category || '',
      ingredient_id: ing.ingredient_id || null
    });
  }
  list.recipes.forEach(function(recipe){
    (recipe.ingredients || []).forEach(function(ing){
      if (checked.includes(GroceryUtils.itemCheckKey(ing, recipe.id))) capture(ing);
      else if (combinedNames[(ing.name || '').toLowerCase().trim()]) capture(ing);
    });
    recipe.ingredients = (recipe.ingredients || []).filter(function(ing){
      if (checked.includes(GroceryUtils.itemCheckKey(ing, recipe.id))) return false;
      if (combinedNames[(ing.name || '').toLowerCase().trim()]) return false;
      return true;
    });
  });
  list.recipes = list.recipes.filter(function(r){ return (r.ingredients || []).length > 0; });
  list.items.forEach(function(ing){
    if (checked.includes(GroceryUtils.itemCheckKey(ing))) capture(ing);
    else if (combinedNames[(ing.name || '').toLowerCase().trim()]) capture(ing);
  });
  list.items = list.items.filter(function(ing){
    if (checked.includes(GroceryUtils.itemCheckKey(ing))) return false;
    if (combinedNames[(ing.name || '').toLowerCase().trim()]) return false;
    return true;
  });
  var stocked = 0;
  if (typeof PantryUtils !== 'undefined') stocked = PantryUtils.stockFromGroceryArchive(toStock);
  setChecked([]);
  saveList(list);
  render();
  if (stocked) alert('Archived. ' + stocked + ' new pantry item' + (stocked === 1 ? '' : 's') + ' added (existing items had qty bumped).');
}

function renderAisleEditor(order){
  var el = document.getElementById('gl-aisle-list');
  el.innerHTML = order.map(function(cat, i){
    return '<div class="gl-aisle-row" draggable="true" data-idx="'+i+'" style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--text-ghost);border:1px solid var(--border);border-radius:8px;cursor:grab;font-family:DM Sans,sans-serif;font-size:12px">' +
      '<span style="color:var(--text-mid)">☰</span><span style="flex:1">'+esc(cat)+'</span></div>';
  }).join('');
  var dragIdx = null;
  el.querySelectorAll('.gl-aisle-row').forEach(function(row){
    row.addEventListener('dragstart', function(){ dragIdx = parseInt(row.dataset.idx,10); });
    row.addEventListener('dragover', function(e){ e.preventDefault(); });
    row.addEventListener('drop', function(e){
      e.preventDefault();
      var toIdx = parseInt(row.dataset.idx,10);
      if (dragIdx === null || dragIdx === toIdx) return;
      var order = getAisleOrder(document.getElementById('gl-store-name').value.trim());
      var moved = order.splice(dragIdx, 1)[0];
      order.splice(toIdx, 0, moved);
      renderAisleEditor(order);
    });
  });
}

function exportPlainText() {
  var list = getList();
  var rawEntries = [];
  list.recipes.forEach(function(recipe) {
    (recipe.ingredients || []).forEach(function(ing) {
      if (shouldHideGroceryItem(ing.name)) return;
      rawEntries.push({ name: ing.name, qty: ing.qty, unit: ing.unit || '', category: ing.category || 'Other', recipe: recipe.name });
    });
  });
  (list.items || []).forEach(function(ing) {
    if (shouldHideGroceryItem(ing.name)) return;
    rawEntries.push({ name: ing.name, qty: ing.qty, unit: ing.unit || '', category: ing.category || 'Other', recipe: 'Manual' });
  });
  if (!rawEntries.length) { alert('Nothing to export.'); return; }
  var combined = GroceryUtils.buildCombinedLines(rawEntries);
  var byCat = {};
  combined.forEach(function(item) {
    var cat = item.category || 'Other';
    if (!byCat[cat]) byCat[cat] = [];
    var groups = Object.values(item.unitGroups);
    var qtyText = groups.map(function(g) {
      var t = g.total % 1 === 0 ? g.total : parseFloat(g.total.toFixed(2));
      return fmtQty(String(t)) + (g.unit ? ' ' + g.unit : '');
    }).join(' + ');
    byCat[cat].push(item.name + (qtyText ? ' — ' + qtyText : ''));
  });
  var lines = ['Grocery List — The Culinary Journal', ''];
  CATEGORY_ORDER.concat(Object.keys(byCat)).filter(function(c, i, a) { return byCat[c] && a.indexOf(c) === i; }).forEach(function(cat) {
    lines.push(cat.toUpperCase());
    byCat[cat].forEach(function(line) { lines.push('  • ' + line); });
    lines.push('');
  });
  var text = lines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { alert('Shopping list copied to clipboard.'); })
      .catch(function() { prompt('Copy this list:', text); });
  } else {
    prompt('Copy this list:', text);
  }
}

function collectShopEntries(list){
  var entries = [];
  list.recipes.forEach(function(recipe){
    (recipe.ingredients||[]).forEach(function(ing){
      if (shouldHideGroceryItem(ing.name)) return;
      entries.push({
        key: GroceryUtils.itemCheckKey(ing, recipe.id),
        name: ing.name, qty: ing.qty, unit: ing.unit || '', category: ing.category || 'Other',
        store: ing.store || '', recipe: recipe.name
      });
    });
  });
  (list.items||[]).forEach(function(ing){
    if (shouldHideGroceryItem(ing.name)) return;
    entries.push({
      key: GroceryUtils.itemCheckKey(ing),
      name: ing.name, qty: ing.qty, unit: ing.unit || '', category: ing.category || 'Other',
      store: ing.store || '', recipe: 'Manual'
    });
  });
  if (glStoreFilter !== 'all') {
    entries = entries.filter(function(e){
      return !e.store || e.store.toLowerCase() === glStoreFilter.toLowerCase();
    });
  }
  return entries;
}

function render(){
  const list = getList();
  const tab  = currentTab();
  if(tab==='recipe') renderByRecipe(list);
  else if(tab==='combined') renderCombined(list);
  else renderShop(list);
}

function renderShop(list){
  var el = document.getElementById('view-shop');
  var entries = collectShopEntries(list);
  if (!entries.length) {
    el.innerHTML = '<div class="gl-empty"><div class="gl-empty-icon">🛍</div><div class="gl-empty-title">Nothing to shop for</div><div class="gl-empty-sub">Add items or switch store filter to All.</div></div>';
    return;
  }
  var checked = getChecked();
  var unchecked = entries.filter(function(e){ return !checked.includes(e.key); });
  var inTrolley = entries.filter(function(e){ return checked.includes(e.key); });
  var done = inTrolley.length;
  var total = entries.length;
  var storeName = glStoreFilter !== 'all' ? glStoreFilter : (getLastStore() || 'Default');
  var aisleOrder = getAisleOrder(glStoreFilter !== 'all' ? glStoreFilter : storeName);
  function sortByAisle(arr){
    return arr.slice().sort(function(a,b){
      var ai = aisleOrder.indexOf(a.category); if (ai < 0) ai = 999;
      var bi = aisleOrder.indexOf(b.category); if (bi < 0) bi = 999;
      if (ai !== bi) return ai - bi;
      return a.name.localeCompare(b.name);
    });
  }
  unchecked = sortByAisle(unchecked);
  var stores = listStores();
  var storeBar = '<div class="gl-store-bar"><button class="gl-store-chip'+(glStoreFilter==='all'?' active':'')+'" data-store="all">All stores</button>';
  stores.forEach(function(s){
    storeBar += '<button class="gl-store-chip'+(glStoreFilter===s?' active':'')+'" data-store="'+esc(s)+'">'+esc(s)+'</button>';
  });
  storeBar += '<button class="gl-store-chip gl-store-chip-manage" type="button" id="gl-aisle-manage">⚙ Aisle order</button></div>';
  var bar = '<div class="gl-shop-bar"><div class="gl-shop-progress"><span>'+done+'</span> / '+total+' in trolley</div>' +
    '<div class="gl-shop-actions">' +
    '<button class="gl-shop-btn gl-shop-btn-undo" onclick="undoLastCheck()">↩ Undo</button>' +
    '<button class="gl-shop-btn gl-shop-btn-complete" onclick="completeTrip()">✓ Complete trip</button></div></div>';
  var html = storeBar + bar;
  var lastCat = '';
  unchecked.forEach(function(e){
    if (e.category !== lastCat) {
      html += '<div class="gl-category-header">'+esc(e.category)+'</div>';
      lastCat = e.category;
    }
    html += '<div class="gl-shop-item" data-shop-key="'+esc(e.key)+'">' +
      '<div class="gl-shop-check"></div>' +
      '<div style="flex:1"><div class="gl-item-name">'+esc(e.name)+'</div>' +
      '<div style="font-family:DM Sans,sans-serif;font-size:11px;color:var(--text-mid)">'+esc(fmtQty(e.qty))+' '+esc(e.unit)+(e.store?' · @ '+esc(e.store):'')+'</div></div></div>';
  });
  if (inTrolley.length) {
    html += '<button class="gl-trolley-toggle" onclick="glTrolleyOpen=!glTrolleyOpen;render()">🛒 In trolley ('+inTrolley.length+') '+(glTrolleyOpen?'▲':'▼')+'</button>';
    html += '<div class="gl-trolley-body'+(glTrolleyOpen?' open':'')+'">';
    inTrolley.forEach(function(e){
      html += '<div class="gl-shop-item in-trolley" data-shop-key="'+esc(e.key)+'">' +
        '<div class="gl-shop-check">✓</div>' +
        '<div style="flex:1;text-decoration:line-through;opacity:0.7"><div class="gl-item-name">'+esc(e.name)+'</div>' +
        '<div style="font-family:DM Sans,sans-serif;font-size:11px;color:var(--text-mid)">'+esc(fmtQty(e.qty))+' '+esc(e.unit)+'</div></div></div>';
    });
    html += '</div>';
  }
  el.innerHTML = html;
}

function renderItemRow(ing, recipeId, checked, manualRemove){
  if (shouldHideGroceryItem(ing.name)) return '';
  var key = GroceryUtils.itemCheckKey(ing, recipeId);
  var legacyKey = recipeId ? recipeId + ':' + ing.name : '';
  var isChecked = checked.includes(key) || (legacyKey && checked.includes(legacyKey));
  var pinfo = pantryInfoFor(ing.name);
  var extraCls = (pinfo && pinfo.isStaple ? ' is-staple' : '') + (pinfo && pinfo.inPantry ? ' in-pantry' : '');
  var storeTag = ing.store ? '<span class="gl-store-tag" data-store-id="' + esc(ing.id) + '" data-store-recipe="' + esc(recipeId || '') + '" title="Click to change store">@ ' + esc(ing.store) + '</span>' : '<span class="gl-store-tag" data-store-id="' + esc(ing.id) + '" data-store-recipe="' + esc(recipeId || '') + '" title="Assign store" style="opacity:0.5">+ store</span>';
  var removeBtn = manualRemove ? '<button class="gl-remove-recipe" data-remove-manual="' + esc(ing.id) + '">×</button>' : '';
  return '<div class="gl-item' + (isChecked ? ' checked' : '') + extraCls + '">' +
    '<input type="checkbox" class="gl-check" ' + (isChecked ? 'checked' : '') + ' data-key="' + esc(key) + '">' +
    '<span class="gl-item-name">' + esc(ing.name) + sourceBadgeHtml(ing.source, ing.source_label) + pantryBadgeHtml(ing.name) + storeTag + '</span>' +
    '<span class="gl-item-qty" data-edit-id="' + esc(ing.id) + '" data-recipe-id="' + esc(recipeId || '') + '" title="Click to edit">' +
      esc(fmtQty(ing.qty)) + ' ' + esc(ing.unit || '') + '</span>' + removeBtn + '</div>';
}

function renderByRecipe(list){
  const el = document.getElementById('view-recipe');
  const hasItems = list.recipes.length || (list.items && list.items.length);
  if(!hasItems){
    el.innerHTML = `<div class="gl-empty"><div class="gl-empty-icon">🛒</div><div class="gl-empty-title">Your list is empty</div><div class="gl-empty-sub">Add ingredients from a recipe page, meal planner, or use + Add Item.</div></div>`;
    return;
  }
  const checked = getChecked();
  el.innerHTML = '';
  list.recipes.forEach(recipe=>{
    const div = document.createElement('div');
    div.className = 'gl-recipe-section';
    let itemsHtml = '';
    const groupedBySection = {};
    (recipe.ingredients||[]).forEach(ing=>{
      const sec = ing.section||'Ingredients';
      if(!groupedBySection[sec]) groupedBySection[sec]=[];
      groupedBySection[sec].push(ing);
    });
    Object.keys(groupedBySection).forEach(section=>{
      if(Object.keys(groupedBySection).length>1) itemsHtml+=`<div class="gl-category-header">${esc(section)}</div>`;
      groupedBySection[section].forEach(ing=>{
        itemsHtml += renderItemRow(ing, recipe.id, checked);
      });
    });
    div.innerHTML = `
      <div class="gl-recipe-header">
        <div>
          <div class="gl-recipe-name">${esc(recipe.name)}</div>
          <div class="gl-recipe-count">${recipe.ingredients?.length||0} ingredients${recipe.servings?' · '+esc(String(recipe.servings))+' servings':''}</div>
        </div>
        <button class="gl-remove-recipe" data-remove-id="${esc(String(recipe.id))}">Remove</button>
      </div>
      ${itemsHtml}`;
    el.appendChild(div);
  });
  if (list.items && list.items.length) {
    const manual = document.createElement('div');
    manual.className = 'gl-recipe-section';
    let rows = '<div class="gl-category-header">Manual items</div>';
    list.items.forEach(function(ing){
      rows += renderItemRow(ing, '', checked, true);
    });
    manual.innerHTML = '<div class="gl-recipe-header"><div><div class="gl-recipe-name">Added manually</div></div></div>' + rows;
    el.appendChild(manual);
  }
}

const CATEGORY_ORDER = ['Produce','Meat & Seafood','Dairy & Eggs','Bakery','Pantry','Spices & Herbs','Oils & Sauces','Canned & Preserved','Frozen','Other'];

function renderCombined(list){
  const el = document.getElementById('view-combined');
  const hasItems = list.recipes.length || (list.items && list.items.length);
  if(!hasItems){
    el.innerHTML = `<div class="gl-empty"><div class="gl-empty-icon">🛒</div><div class="gl-empty-title">Your list is empty</div><div class="gl-empty-sub">Add ingredients from a recipe page or meal planner.</div></div>`;
    return;
  }
  const checked = getChecked();
  var rawEntries = [];
  list.recipes.forEach(function(recipe) {
    (recipe.ingredients || []).forEach(function(ing) {
      if (shouldHideGroceryItem(ing.name)) return;
      rawEntries.push({
        name: ing.name, qty: ing.qty, unit: ing.unit || '', category: ing.category || 'Other',
        recipe: recipe.name, source: ing.source, source_label: ing.source_label || recipe.name
      });
    });
  });
  (list.items || []).forEach(function(ing) {
    if (shouldHideGroceryItem(ing.name)) return;
    rawEntries.push({
      name: ing.name, qty: ing.qty, unit: ing.unit || '', category: ing.category || 'Other',
      recipe: 'Manual', source: 'manual', source_label: 'Manual'
    });
  });
  var combined = GroceryUtils.buildCombinedLines(rawEntries);
  const byCategory = {};
  combined.forEach(function(item) {
    var cat = item.category || 'Other';
    if (!byCategory[cat]) byCategory[cat] = [];
    var groups = Object.values(item.unitGroups);
    var qtyParts = groups.map(function(g) {
      var t = g.total % 1 === 0 ? g.total : parseFloat(g.total.toFixed(2));
      return fmtQty(String(t)) + (g.unit ? ' ' + g.unit : '');
    });
    var allSources = [];
    groups.forEach(function(g) { g.sources.forEach(function(s) { if (allSources.indexOf(s) < 0) allSources.push(s); }); });
    byCategory[cat].push({
      name: item.name,
      qtyText: qtyParts.join(' + '),
      multiUnit: groups.length > 1,
      sources: allSources
    });
  });

  el.innerHTML = '';
  const cats = [...new Set([...CATEGORY_ORDER, ...Object.keys(byCategory)])].filter(c=>byCategory[c]);
  cats.forEach(cat=>{
    if(!byCategory[cat]) return;
    const div = document.createElement('div');
    div.className = 'gl-recipe-section';
    div.innerHTML = `<div class="gl-category-header">${esc(cat)}</div>`;
    byCategory[cat].forEach(item=>{
      const checkKey = 'combined:'+item.name.toLowerCase().trim();
      const isChecked = checked.includes(checkKey);
      const pinfo = pantryInfoFor(item.name);
      const extraCls = (pinfo?.isStaple ? ' is-staple' : '') + (pinfo?.inPantry ? ' in-pantry' : '');
      const row = document.createElement('div');
      row.className = 'gl-item'+(isChecked?' checked':'')+extraCls;
      row.innerHTML = `
        <input type="checkbox" class="gl-check" ${isChecked?'checked':''} data-key="${esc(checkKey)}">
        <span class="gl-item-name">${esc(item.name)}${pantryBadgeHtml(item.name)}</span>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
          <span class="gl-item-qty">${esc(item.qtyText)}</span>
          ${item.multiUnit ? '<span class="gl-unit-tip">Different units — not merged</span>' : ''}
          <span class="gl-item-note">from ${esc(item.sources.join(', '))}</span>
        </div>`;
      div.appendChild(row);
    });
    el.appendChild(div);
  });
}

document.addEventListener('DOMContentLoaded', function(){
  render();
  refreshRegionalBanner();
  loadGlIngredients();
  syncFromSupabase(true);
  setInterval(function(){ if(_glHouseholdShared) syncFromSupabase(false); }, 20000);
  document.addEventListener('visibilitychange', function(){
    if(!document.hidden && _glHouseholdShared) syncFromSupabase(false);
  });
  document.getElementById('view-recipe').addEventListener('click', function(e){
    const cb = e.target.closest('.gl-check[data-key]');
    if(cb) { toggleItem(cb.dataset.key); return; }
    const st = e.target.closest('[data-store-id]');
    if(st && st.dataset.storeId) { editItemStore(st.dataset.storeId, st.dataset.storeRecipe || null); return; }
    const qty = e.target.closest('[data-edit-id]');
    if(qty && qty.dataset.editId) { editItemQty(qty.dataset.editId, qty.dataset.recipeId || null); return; }
    const rb = e.target.closest('[data-remove-id]');
    if(rb){ e.stopPropagation(); removeRecipe(rb.dataset.removeId); return; }
    const rm = e.target.closest('[data-remove-manual]');
    if(rm){ removeManualItem(rm.dataset.removeManual); }
  });
  document.getElementById('view-combined').addEventListener('click', function(e){
    const cb = e.target.closest('[data-key]');
    if(cb) toggleItem(cb.dataset.key);
  });
  document.getElementById('view-shop').addEventListener('click', function(e){
    var chip = e.target.closest('.gl-store-chip[data-store]');
    if (chip) { setStoreFilter(chip.dataset.store, chip); return; }
    if (e.target.closest('#gl-aisle-manage')) { openStoreModal(); return; }
    var row = e.target.closest('[data-shop-key]');
    if (row) toggleItem(row.dataset.shopKey, true);
  });
  document.getElementById('gl-store-modal').addEventListener('click', function(e){
    if (e.target === e.currentTarget) closeStoreModal();
  });
  document.getElementById('gl-add-modal').addEventListener('click', function(e){
    if (e.target === e.currentTarget) closeAddItemModal();
  });
});

// Listen for storage changes (when recipe page adds items)
window.addEventListener('storage', e=>{ if(e.key==='tcj_grocery' || e.key==='tcj_pantry') render(); });
</script>
