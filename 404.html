<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found — The Culinary Journal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
  <style>
    .nf-wrap { min-height:80vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; text-align:center; }
    .nf-inner { max-width:480px; }
    .nf-icon { font-size:56px; margin-bottom:16px; opacity:0.7; }
    .nf-title { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:700; color:var(--text-high); margin-bottom:10px; }
    .nf-sub { font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-mid); line-height:1.6; margin-bottom:28px; }
    .nf-btn { display:inline-block; padding:12px 24px; background:var(--accent); color:#fff; text-decoration:none; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; margin:4px; }
    .nf-ghost { background:none; border:1px solid var(--border); color:var(--text-mid); }
  </style>
</head>
<body class="cj-body">
<div class="nf-wrap">
  <div class="nf-inner">
    <div class="nf-icon">🍽</div>
    <h1 class="nf-title">This page isn't on the menu</h1>
    <p class="nf-sub">The link may be outdated, or the page may have moved. Try browsing recipes or return home.</p>
    <a href="index.html" class="nf-btn">Home</a>
    <a href="recipes.html" class="nf-btn nf-ghost">Browse Recipes</a>
  </div>
</div>
</body>
</html>
