<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore The Library — ingredients, spices, tools, cuts, and preservation reference guides.">
  <link rel="canonical" href="https://theculinaryjournal.site/library-directory.html">
<title>Library Directory — The Culinary Journal</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="theme-init.js"></script>
<script src="supabase-config.js"></script>
<script src="seo-schema.js"></script>
<script src="library-chrome.js"></script>
<script src="nav-init.js"></script>
</head>
<body class="lib-page cj-body">
<nav class="nav">
  <a class="nav-logo" href="index.html">
    <span>🍽</span>
    <span class="nav-logo-text">The Culinary Journal</span>
    <span class="nav-logo-badge">Est. 2025</span>
  </a>
  <div class="nav-btns" id="nav-btns"></div>
</nav>
<div class="tab-nav"></div>
<div id="lib-chrome"></div>
<div class="lib-grid" id="lib-grid">
  <div class="lib-loading"><div class="lib-spinner"></div></div>
</div>

<script>
const params  = new URLSearchParams(window.location.search);
let currentType = params.get('type') || 'ingredient';
let searchTimer = null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function mountChrome() {
  var extra = currentType === 'preservation'
    ? '<a class="lib-extra-link" href="preservation.html">📖 Read the full technique encyclopedia →</a>'
    : '';
  LibraryChrome.render({
    root: 'lib-chrome',
    active: currentType,
    showSearch: true,
    searchId: 'lib-search-input',
    extraHtml: extra
  });
  var input = document.getElementById('lib-search-input');
  if (input) input.addEventListener('input', function () { debounceSearch(input.value); });
  var t = LibraryChrome.TYPES[currentType];
  if (t) document.title = t.label + ' — The Culinary Journal';
}

function switchType(type) {
  currentType = type;
  const url = new URL(window.location);
  url.searchParams.set('type', type);
  window.history.replaceState({}, '', url);
  mountChrome();
  loadProfiles();
}

function debounceSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadProfiles(val), 350);
}

async function loadProfiles(search) {
  const grid = document.getElementById('lib-grid');
  grid.innerHTML = '<div class="lib-loading"><div class="lib-spinner"></div></div>';
  try {
    const sess = JSON.parse(localStorage.getItem('tcj_session')||'null');
    const headers = { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' };
    if (sess?.access_token) headers['Authorization'] = 'Bearer ' + sess.access_token;
    const res = await fetch(SUPA_URL + '/rest/v1/rpc/get_library_directory', {
      method: 'POST', headers,
      body: JSON.stringify({ p_type: currentType, p_search: search || null, p_limit: 48, p_offset: 0 })
    });
    const items = await res.json();
    var list = Array.isArray(items) ? items : [];
    renderGrid(list);
    if (typeof SeoSchema !== 'undefined') {
      var t = LibraryChrome.TYPES[currentType];
      SeoSchema.webPage(t.label + ' — The Library', t.desc, 'https://www.theculinaryjournal.site/library-directory.html?type=' + currentType);
      SeoSchema.itemList(t.label, list.map(function(item) {
        return {
          name: item.name,
          url: 'https://www.theculinaryjournal.site/library-profile.html?type=' + currentType + '&slug=' + (item.slug || '')
        };
      }));
    }
  } catch(e) {
    grid.innerHTML = '<div class="lib-empty">Could not load profiles — please try again.</div>';
  }
}

function renderGrid(items) {
  const grid = document.getElementById('lib-grid');
  if (!items.length) {
    grid.innerHTML = '<div class="lib-empty">No profiles published yet — check back soon.</div>';
    return;
  }
  const t = LibraryChrome.TYPES[currentType];
  grid.innerHTML = items.map(item => {
    const tag = item.type_extra ? esc(item.type_extra) : '';
    const img = item.image_url
      ? `<img src="${esc(item.image_url)}" alt="${esc(item.name)}" loading="lazy">`
      : `<div class="lib-card-placeholder">${t.emoji}</div>`;
    return `<a href="library-profile.html?type=${currentType}&slug=${esc(item.slug)}" class="lib-card">
      <div class="lib-card-img">${img}</div>
      <div class="lib-card-body">
        ${tag ? `<div class="lib-card-tag">${tag}</div>` : ''}
        <div class="lib-card-name">${esc(item.name)}</div>
        ${item.also_known_as ? `<div class="lib-card-aka">${esc(item.also_known_as)}</div>` : ''}
      </div>
    </a>`;
  }).join('');
}

mountChrome();
loadProfiles();
</script>
</body>
</html>
