<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Your personal garden — plants you're growing and what to do now.">
<link rel="canonical" href="https://theculinaryjournal.site/my-garden.html">
<title>My Garden — The Culinary Journal</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="lib/garden-public.css">
<script src="theme-init.js"></script>
<script>if (new URLSearchParams(location.search).get('embed') === '1') document.documentElement.classList.add('gd-embed');</script>
<style>html.gd-embed .nav, html.gd-embed .tab-nav { display:none !important; }</style>
<script src="supabase-config.js"></script>
<script src="page-guard.js"></script>
<script src="library-mise.js"></script>
<script src="lib/garden-chrome.js"></script>
<script src="lib/garden-api.js?v=20260716"></script>
<script src="lib/garden-ui.js?v=20260716"></script>
<script src="nav-init.js"></script>
</head>
<body class="lib-page cj-body">
<nav class="nav">
  <a class="nav-logo" href="index.html"><span class="nav-logo-text">The Culinary Journal</span></a>
  <div class="nav-btns" id="nav-btns"></div>
</nav>
<div class="tab-nav"></div>
<div id="garden-chrome"></div>
<div id="mg-root"><div class="lib-loading"><div class="lib-spinner"></div></div></div>

<script>
GardenChrome.render({ root: 'garden-chrome', active: 'my-garden', showSearch: false });

async function loadWhatNow(nowEl, climateLabel) {
  nowEl.innerHTML = '<div class="gj-empty" style="padding:20px 0">Loading tasks…</div>';
  try {
    var now = await GardenApi.whatNow();
    var nowList = Array.isArray(now) ? now : [];
    if (nowList.length) {
      nowEl.innerHTML = (climateLabel ? '<p style="font-family:DM Sans,sans-serif;font-size:12px;color:var(--text-muted);margin:0 0 12px">Tasks for <strong style="color:var(--accent)">' + GardenApi.esc(climateLabel) + '</strong> this month</p>' : '') +
        nowList.map(function (n) { return GardenUI.renderTaskCard(n); }).join('');
      return;
    }
    var next = await GardenApi.whatNext();
    var nextList = Array.isArray(next) ? next : [];
    if (nextList.length) {
      nowEl.innerHTML = '<p style="font-family:DM Sans,sans-serif;font-size:13px;color:var(--text-muted);margin:0 0 12px">Nothing due this month' +
        (climateLabel ? ' in <strong style="color:var(--accent)">' + GardenApi.esc(climateLabel) + '</strong>' : '') + '.</p>' +
        '<p style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin:0 0 10px">Coming up</p>' +
        nextList.map(function (n) { return GardenUI.renderTaskCard(n); }).join('');
      return;
    }
    nowEl.innerHTML = '<div class="gj-empty" style="padding:20px 0;text-align:left">' +
      'Add plants from the <a href="garden-directory.html">directory</a> and set your growing climate below for seasonal tasks.</div>';
  } catch (e) {
    console.warn('what now failed', e);
    nowEl.innerHTML = '<div class="gj-empty" style="padding:20px 0;text-align:left">Could not load seasonal tasks.</div>';
  }
}

async function renderSignedIn() {
  var regions = [], saved = null;
  try { regions = await GardenApi.listRegions(); } catch (e) { console.warn('regions failed', e); }
  try { saved = await GardenApi.getMyRegion(); } catch (e) { console.warn('saved region failed', e); }

  document.getElementById('mg-root').innerHTML =
    '<div class="gj-wrap">' +
    '<div class="gj-climate-bar">' +
    '<label><span style="font-weight:500;color:var(--text-high)">Your growing climate</span>' +
    '<select id="mg-region" aria-label="Growing climate">' +
    '<option value="">— Select climate / region —</option>' +
    regions.map(function (r) {
      var sel = saved && saved.region_id === r.id ? ' selected' : '';
      var label = r.name + (r.climate_name ? ' · ' + r.climate_name : '');
      return '<option value="' + r.id + '"' + sel + '>' + GardenApi.esc(label) + '</option>';
    }).join('') +
    '</select></label>' +
    (saved && saved.climate_zone ? '<p style="margin:10px 0 0;font-size:12px;color:var(--text-muted)">Calendar and care filtered for <strong style="color:var(--accent)">' + GardenApi.esc(saved.climate_zone) + '</strong></p>' : '') +
    '</div>' +
    '<div class="gj-section"><h2>What to do now</h2><div id="mg-now"></div></div>' +
    '<div class="gj-section"><h2>My plants</h2><div id="mg-plants"></div></div>' +
    '<div class="gj-section"><h2>Kitchen bridge</h2>' +
    '<p class="gj-section-lead">Each species links to governed ingredients today; each <strong>variety</strong> will get its own match when cultivar profiles launch.</p>' +
    '<p style="font-family:DM Sans,sans-serif;font-size:14px;margin:0"><a href="garden-directory.html" style="color:var(--accent)">Browse the directory →</a> to open profiles and kitchen links.</p></div>' +
    '</div>';

  var nowEl = document.getElementById('mg-now');
  var plantsEl = document.getElementById('mg-plants');
  var climateLabel = saved && saved.climate_zone ? saved.climate_zone : null;

  document.getElementById('mg-region').addEventListener('change', async function (e) {
    if (!e.target.value) return;
    try {
      await GardenApi.setRegion(e.target.value);
      var opt = e.target.options[e.target.selectedIndex];
      climateLabel = opt ? opt.text.split(' · ').pop() : null;
      await loadWhatNow(nowEl, climateLabel);
    } catch (err) { console.warn('set region failed', err); }
  });

  await loadWhatNow(nowEl, climateLabel);

  try {
    var mine = await GardenApi.getMyGarden();
    var list = Array.isArray(mine) ? mine : [];
    plantsEl.innerHTML = list.length ? list.map(function (p) { return GardenUI.renderMyPlantCard(p); }).join('') :
      '<div class="gj-empty" style="padding:16px 0;text-align:left">No plants yet — <a href="garden-directory.html">browse the directory</a> and tap <strong>Add to My Garden</strong> on any profile.</div>';
  } catch (e) {
    console.warn('my garden failed', e);
    plantsEl.innerHTML = '<div class="gj-empty" style="padding:16px 0;text-align:left">Could not load your plants.</div>';
  }
}

function renderGuest() {
  document.getElementById('mg-root').innerHTML =
    '<div class="gj-wrap" style="text-align:center;padding-top:40px">' +
    '<h1 class="lib-hero-title">My Garden</h1>' +
    '<p class="lib-hero-desc" style="max-width:480px;margin:12px auto 24px">Track what you grow, set your climate, and see what to sow or harvest this month — linked to your kitchen.</p>' +
    '<p><a href="login.html?redirect=' + encodeURIComponent(location.href) + '" class="gj-btn gj-btn-filled" style="display:inline-block;width:auto;padding:12px 28px">Sign in →</a></p>' +
    '<p style="margin-top:20px;font-size:13px"><a href="garden-directory.html" style="color:var(--accent)">Browse plant directory</a></p></div>';
}

if (!getSession()) renderGuest();
else renderSignedIn();
</script>
</body>
</html>
