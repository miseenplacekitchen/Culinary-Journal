<style>
*, *::before, *::after { box-sizing:border-box; }
body { background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text-high); margin:0; }
.ls-page { max-width:900px; margin:0 auto; padding:32px 24px 80px; }
.ls-header { text-align:center; margin-bottom:36px; }
.ls-back { display:inline-block; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); text-decoration:none; margin-bottom:20px; }
.ls-back:hover { color:var(--accent); }
.ls-header h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,5vw,2.75rem); font-weight:500; color:var(--text-high); margin:0 0 10px; letter-spacing:0.02em; line-height:1.15; }
.ls-header-desc { font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text-mid); margin:0 auto; max-width:520px; line-height:1.6; }
.ls-header-desc em { font-style:italic; color:var(--text-high); }
.ls-type-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin:0 0 24px; }
.ls-type-strip-label { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin:0 0 10px; text-align:center; }
.ls-type-card { text-align:left; padding:14px 16px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,0.02); cursor:pointer; transition:border-color .15s,background .15s; font-family:'DM Sans',sans-serif; }
.ls-type-card:hover { border-color:var(--accent); background:rgba(255,255,255,0.04); }
.ls-type-card.active { border-color:var(--accent); background:rgb(from var(--accent) r g b / 0.12); box-shadow:0 0 0 1px rgb(from var(--accent) r g b / 0.35); }
.ls-type-card-emoji { font-size:22px; display:block; margin-bottom:6px; }
.ls-type-card-label { font-size:13px; font-weight:600; color:var(--text-high); display:block; }
.ls-type-card-hint { font-size:10px; color:var(--text-muted); margin-top:4px; line-height:1.4; display:block; }
.ls-panel-toolbar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.ls-panel-toolbar-btn { font-family:'DM Sans',sans-serif; font-size:11px; padding:6px 12px; border-radius:7px; border:1px solid var(--border); background:none; color:var(--text-mid); cursor:pointer; }
.ls-panel-toolbar-btn:hover { border-color:var(--accent); color:var(--accent); }
.ls-panel { border:1px solid var(--border); border-radius:12px; margin-bottom:12px; overflow:hidden; background:rgba(255,255,255,0.02); }
.ls-panel-head { width:100%; display:flex; align-items:center; gap:10px; padding:14px 18px; background:rgba(255,255,255,0.04); border:none; cursor:pointer; text-align:left; font-family:inherit; color:inherit; }
.ls-panel-head:hover { background:rgba(255,255,255,0.06); }
.ls-panel-chevron { font-size:12px; color:var(--accent); transition:transform .15s; flex-shrink:0; }
.ls-panel.collapsed .ls-panel-chevron { transform:rotate(-90deg); }
.ls-panel-titles { min-width:0; flex:1; }
.ls-panel-title { display:block; font-family:'Cormorant Garamond',serif; font-size:1.15rem; font-weight:600; color:var(--text-high); }
.ls-panel-desc { display:block; font-size:11px; color:var(--text-muted); margin-top:2px; line-height:1.4; }
.ls-panel-body { padding:16px 18px 18px; }
.ls-panel.collapsed .ls-panel-body { display:none; }
.ls-row { margin-bottom:16px; }
.ls-row:last-child { margin-bottom:0; }
.ls-label { display:block; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
.ls-label span { color:var(--accent); }
.ls-input, .ls-textarea, .ls-select { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:9px; padding:10px 13px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-high); outline:none; transition:border-color .15s; }
.ls-input:focus, .ls-textarea:focus, .ls-select:focus { border-color:var(--accent); }
.ls-textarea { resize:vertical; min-height:88px; line-height:1.6; }
.ls-2col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.ls-img-box { border:1px dashed var(--border); border-radius:10px; padding:24px; text-align:center; cursor:pointer; transition:border-color .15s; }
.ls-img-box:hover { border-color:var(--accent); }
.ls-img-box img { max-height:160px; max-width:100%; border-radius:6px; margin-bottom:8px; }
.ls-img-text { font-size:12px; color:var(--text-muted); }
.ls-img-hint { font-size:11px; color:var(--text-muted); margin-top:6px; line-height:1.45; }
.ls-hidden { display:none; }
.ls-footer { display:flex; gap:12px; margin-top:28px; padding-top:20px; border-top:1px solid var(--border); position:sticky; bottom:0; background:var(--bg); z-index:5; }
.ls-btn { padding:12px 28px; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .15s; border:none; }
.ls-btn-primary { background:var(--accent); color:#0C0702; }
.ls-btn-secondary { background:none; border:1px solid var(--border); color:var(--text-mid); }
.ls-btn:disabled { opacity:.5; cursor:default; }
.ls-msg { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:20px; display:none; }
.ls-msg.success { background:rgba(100,200,100,.1); border:1px solid rgba(100,200,100,.3); color:#6dc86d; display:block; }
.ls-msg.error { background:var(--danger-bg); border:1px solid rgb(from var(--danger) r g b / .3); color:var(--danger); display:block; }
@media(max-width:640px){ .ls-2col { grid-template-columns:1fr; } .ls-type-strip { grid-template-columns:1fr 1fr; } }
</style>
</head>
<body class="page-bg cj-body">
<div data-nav-host></div>
<div class="ls-page">
  <header class="ls-header">
    <a class="ls-back" id="ls-back" href="library-directory.html?type=ingredient">← Library directory</a>
    <h1 id="ls-page-title">Submit a Profile</h1>
    <p class="ls-header-desc" id="ls-page-desc">Contribute to The Library — choose a profile type below, then complete every required section.</p>
  </header>

  <div id="ls-msg" class="ls-msg"></div>

  <p class="ls-type-strip-label">Profile type</p>
  <div class="ls-type-strip" id="ls-types" role="tablist" aria-label="Profile type"></div>

  <div class="ls-panel-toolbar">
    <button type="button" class="ls-panel-toolbar-btn" onclick="lsExpandPanels(true)">Expand all</button>
    <button type="button" class="ls-panel-toolbar-btn" onclick="lsExpandPanels(false)">Collapse all</button>
  </div>

  <div id="ls-panels-root"></div>

  <div class="ls-footer">
    <button class="ls-btn ls-btn-primary" id="ls-submit-btn" onclick="submitProfile()">Save Profile</button>
    <button class="ls-btn ls-btn-secondary" onclick="window.location.href='library-directory.html'">Cancel</button>
  </div>
</div>

<script>
let currentType = 'ingredient';
const params = new URLSearchParams(window.location.search);
const sess = JSON.parse(localStorage.getItem('tcj_session')||'null');
if (!sess || !sess.access_token) {
  window.location.href = 'login.html'; throw new Error('not logged in');
}
window._lsIsAdmin = false;
(async function verifyAccess() {
  try {
    const res = await fetch(window.SUPA_URL + '/rest/v1/rpc/is_admin', {
      method: 'POST',
      headers: { 'apikey': window.SUPA_KEY, 'Authorization': 'Bearer ' + sess.access_token, 'Content-Type': 'application/json' },
      body: '{}'
    });
    window._lsIsAdmin = !!(await res.json());
    if (!window._lsIsAdmin) {
      var subEl = document.getElementById('ls-page-desc');
      if (subEl) subEl.innerHTML =
        '<em>Members:</em> submit a draft for admin review. Published profiles appear in the Library after approval.';
      applyMemberUi();
    } else {
      applyTypeMeta();
    }
  } catch (e) { TcjErr.warn('library-submit.html:127', e); }
})();

var _lsFormValues = {};

function lsCaptureFormValues() {
  document.querySelectorAll('#ls-panels-root input, #ls-panels-root textarea, #ls-panels-root select').forEach(function(el) {
    if (!el.id) return;
    _lsFormValues[el.id] = el.type === 'checkbox' ? el.checked : el.value;
  });
}

function lsRestoreFormValues() {
  Object.keys(_lsFormValues).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    if (el.type === 'checkbox') el.checked = !!_lsFormValues[id];
    else el.value = _lsFormValues[id];
  });
}

function makeLsPanel(id, title, desc, nodes, open) {
  var panel = document.createElement('div');
  panel.className = 'ls-panel' + (open ? '' : ' collapsed');
  if (id) panel.id = id;
  var head = document.createElement('button');
  head.type = 'button';
  head.className = 'ls-panel-head';
  head.setAttribute('aria-expanded', open ? 'true' : 'false');
  var chev = document.createElement('span');
  chev.className = 'ls-panel-chevron';
  chev.textContent = '\u25BE';
  var titles = document.createElement('span');
  titles.className = 'ls-panel-titles';
  var tTitle = document.createElement('span');
  tTitle.className = 'ls-panel-title';
  tTitle.textContent = title;
  var tDesc = document.createElement('span');
  tDesc.className = 'ls-panel-desc';
  tDesc.textContent = desc || '';
  titles.appendChild(tTitle);
  titles.appendChild(tDesc);
  head.appendChild(chev);
  head.appendChild(titles);
  head.addEventListener('click', function() {
    var collapsed = panel.classList.toggle('collapsed');
    head.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
  });
  var body = document.createElement('div');
  body.className = 'ls-panel-body';
  (nodes || []).forEach(function(n) { if (n) body.appendChild(n); });
  panel.appendChild(head);
  panel.appendChild(body);
  return panel;
}

function lsMakeFieldRow(f) {
  var row = document.createElement('div');
  row.className = 'ls-row';
  var hint = tcjLibFieldHint(currentType, f.id);
  if (f.type === 'checkbox') {
    row.style.cssText = 'display:flex;align-items:center;gap:10px';
    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.id = f.id;
    cb.style.cssText = 'width:16px;height:16px;accent-color:var(--accent)';
    var lbl = document.createElement('label');
    lbl.className = 'ls-label'; lbl.htmlFor = f.id;
    lbl.style.margin = '0'; lbl.textContent = f.label;
    row.appendChild(cb); row.appendChild(lbl);
    return row;
  }
  var lbl = document.createElement('label');
  lbl.className = 'ls-label'; lbl.htmlFor = f.id;
  lbl.innerHTML = f.label;
  row.appendChild(lbl);
  if (f.type === 'select') {
    var sel = document.createElement('select');
    sel.className = 'ls-select'; sel.id = f.id;
    (f.opts || []).forEach(function(o) {
      var opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      sel.appendChild(opt);
    });
    row.appendChild(sel);
  } else if (f.type === 'textarea') {
    var ta = document.createElement('textarea');
    ta.className = 'ls-textarea'; ta.id = f.id;
    if (hint) ta.placeholder = hint;
    row.appendChild(ta);
  } else {
    var inp = document.createElement('input');
    inp.className = 'ls-input'; inp.id = f.id; inp.type = 'text';
    inp.placeholder = f.ph || hint || '';
    row.appendChild(inp);
  }
  return row;
}

function buildIdentityPanel() {
  var meta = TCJ_LIB_TYPE_META[currentType] || {};
  var ex = meta.ex || {};
  var nodes = [];
  var grid = document.createElement('div');
  grid.className = 'ls-2col';
  var r1 = document.createElement('div');
  r1.className = 'ls-row';
  r1.innerHTML = '<label class="ls-label" for="f-name">Name <span>*</span></label><input class="ls-input" id="f-name" type="text">';
  grid.appendChild(r1);
  var r2 = document.createElement('div');
  r2.className = 'ls-row';
  r2.innerHTML = '<label class="ls-label" for="f-aka">Also known as</label><input class="ls-input" id="f-aka" type="text">';
  grid.appendChild(r2);
  nodes.push(grid);
  var r3 = document.createElement('div');
  r3.className = 'ls-row';
  r3.innerHTML = '<label class="ls-label" for="f-local">Local / regional names <span style="font-weight:400;text-transform:none;letter-spacing:0">(comma separated)</span></label><input class="ls-input" id="f-local" type="text">';
  nodes.push(r3);
  var r4 = document.createElement('div');
  r4.className = 'ls-row';
  r4.innerHTML = '<label class="ls-label">Hero image <span>*</span></label>' +
    '<div class="ls-img-box" onclick="document.getElementById(\'f-img-file\').click()"><div id="f-img-preview"></div><div class="ls-img-text">Click to upload hero image</div></div>' +
    '<input type="file" id="f-img-file" accept="image/*" class="ls-hidden" onchange="previewImage(this)">' +
    '<input class="ls-input" id="f-img-url" type="text" style="margin-top:8px" placeholder="Or paste image URL">' +
    '<div class="ls-img-hint" id="ls-hero-hint"></div>';
  nodes.push(r4);
  return makeLsPanel('ls-panel-identity', 'Identity & naming', 'Official name, aliases, and regional names', nodes, true);
}

function buildPhotoPanel() {
  var wrap = document.createElement('div');
  wrap.innerHTML =
    '<div class="ls-row"><label class="ls-label">Mise circle photo</label>' +
    '<div id="ls-mise-empty" class="ls-img-box" onclick="document.getElementById(\'f-mise-file\').click()" style="max-width:340px;margin:0 auto"><div class="ls-img-text">Click to upload mise photo</div></div>' +
    '<div id="ls-mise-editor" style="display:none"><div class="lib-mise-editor-wrap"><div class="sr-img-hero-ring-wrap" id="ls-mise-ring-wrap"></div></div>' +
    '<div class="lib-mise-zoom"><button type="button" onclick="libMiseZoom(-1)">−</button><span id="ls-mise-zoom-val">100%</span><button type="button" onclick="libMiseZoom(1)">+</button></div>' +
    '<p style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px">Drag to reposition within the ring</p>' +
    '<div style="text-align:center;margin-top:10px"><button type="button" class="ls-btn ls-btn-secondary" style="font-size:12px;padding:8px 16px" onclick="clearMiseImage()">Remove mise photo</button></div></div>' +
    '<input type="file" id="f-mise-file" accept="image/*" class="ls-hidden" onchange="handleMiseFile(this)">' +
    '<input type="hidden" id="f-mise-url">' +
    '<div class="ls-img-hint" id="ls-mise-hint"></div>' +
    '<select class="ls-select" id="f-image-status" style="margin-top:12px;max-width:320px">' +
    '<option value="missing">No mise image</option><option value="draft">Draft — not shown publicly</option><option value="approved">Approved — visible in Library &amp; print</option></select></div>';
  return makeLsPanel('ls-panel-photo', 'Photos', 'Hero image (required) and optional circular mise photo for print', [wrap], false);
}

function buildVoicePanel() {
  var meta = TCJ_LIB_TYPE_META[currentType] || {};
  var nodes = [];
  var r1 = document.createElement('div'); r1.className = 'ls-row';
  r1.innerHTML = '<label class="ls-label" for="f-chefs">Chef\'s notes</label><textarea class="ls-textarea" id="f-chefs"></textarea>';
  nodes.push(r1);
  var r2 = document.createElement('div'); r2.className = 'ls-row';
  r2.innerHTML = '<label class="ls-label" for="f-brand">Recommended brand</label><input class="ls-input" id="f-brand" type="text">';
  nodes.push(r2);
  var r3 = document.createElement('div'); r3.className = 'ls-row';
  r3.innerHTML = '<label class="ls-label" for="f-dyk">Did you know?</label><textarea class="ls-textarea" id="f-dyk" style="min-height:72px"></textarea>';
  nodes.push(r3);
  return makeLsPanel('ls-panel-voice', 'From the Journal', 'Kitchen notes, brand pick, and one surprising fact', nodes, false);
}

function buildPublishPanel() {
  var grid = document.createElement('div');
  grid.className = 'ls-2col';
  grid.innerHTML =
    '<div class="ls-row" id="ls-row-status"><label class="ls-label" for="f-status">Status</label><select class="ls-select" id="f-status"><option value="draft">Draft — not visible</option><option value="published">Published — visible</option></select></div>' +
    '<div class="ls-row" id="ls-row-visibility"><label class="ls-label" for="f-visibility">Visibility</label><select class="ls-select" id="f-visibility"><option value="public">Public — everyone</option><option value="members">Members only</option><option value="paid">Paid members only</option></select></div>';
  return makeLsPanel('ls-panel-publish', 'Publishing', 'Draft vs published and who can see this profile', [grid], false);
}

function buildTypePanels() {
  var specs = TCJ_LIB_FIELD_PANELS[currentType] || [];
  return specs.map(function(spec, i) {
    var nodes = (spec.fields || []).map(function(fid) {
      var f = tcjLibGetField(currentType, fid);
      return f ? lsMakeFieldRow(f) : null;
    }).filter(Boolean);
    return makeLsPanel('ls-panel-type-' + i, spec.title, spec.desc, nodes, !!spec.open);
  });
}

function applyTypeMeta() {
  var meta = TCJ_LIB_TYPE_META[currentType] || {};
  var ex = meta.ex || {};
  var isEdit = !!params.get('id');
  var titleEl = document.getElementById('ls-page-title');
  if (titleEl) titleEl.textContent = isEdit ? ('Edit ' + (meta.short || 'Profile')) : 'Submit a Profile';
  var descEl = document.getElementById('ls-page-desc');
  if (descEl && window._lsIsAdmin) {
    descEl.innerHTML = meta.tagline
      ? ('<em>' + meta.short + '.</em> ' + meta.tagline)
      : 'Contribute to The Library — complete every required section before publishing.';
  }
  var name = document.getElementById('f-name');
  var aka = document.getElementById('f-aka');
  var local = document.getElementById('f-local');
  var chefs = document.getElementById('f-chefs');
  var brand = document.getElementById('f-brand');
  var dyk = document.getElementById('f-dyk');
  var imgUrl = document.getElementById('f-img-url');
  if (name) name.placeholder = 'e.g. ' + (ex.name || '');
  if (aka) aka.placeholder = 'e.g. ' + (ex.aka || '');
  if (local) local.placeholder = 'e.g. ' + (ex.local || '');
  if (chefs && !chefs.value) chefs.placeholder = meta.chefs || '';
  if (brand) brand.placeholder = meta.brand || '';
  if (dyk && !dyk.value) dyk.placeholder = meta.dyk || '';
  if (imgUrl) imgUrl.placeholder = 'Paste URL — ' + (ex.img || 'clear photo on neutral background');
  var heroHint = document.getElementById('ls-hero-hint');
  if (heroHint) heroHint.textContent = ex.img || '';
  var miseHint = document.getElementById('ls-mise-hint');
  if (miseHint) miseHint.textContent = 'Optional circular prep-board photo — same ring editor as recipes.';
  document.title = (params.get('id') ? 'Edit ' : 'Submit ') + (meta.short || 'Profile') + ' — The Culinary Journal';
  var back = document.getElementById('ls-back');
  if (back) back.href = 'library-directory.html?type=' + currentType;
}

function buildTypeStrip() {
  var strip = document.getElementById('ls-types');
  if (!strip) return;
  strip.replaceChildren();
  ['ingredient', 'spice', 'tool', 'cut', 'preservation'].forEach(function(type) {
    var meta = TCJ_LIB_TYPE_META[type] || {};
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ls-type-card' + (type === currentType ? ' active' : '');
    btn.dataset.type = type;
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-selected', type === currentType ? 'true' : 'false');
    btn.innerHTML = '<span class="ls-type-card-emoji">' + (meta.emoji || '') + '</span>' +
      '<span class="ls-type-card-label">' + (meta.short || type) + '</span>' +
      '<span class="ls-type-card-hint">' + (meta.directory || '') + '</span>';
    btn.addEventListener('click', function() { setType(type, btn); });
    strip.appendChild(btn);
  });
}

function setType(type, btn) {
  lsCaptureFormValues();
  currentType = type;
  document.querySelectorAll('.ls-type-card').forEach(function(b) {
    b.classList.toggle('active', b.dataset.type === type);
    b.setAttribute('aria-selected', b.dataset.type === type ? 'true' : 'false');
  });
  try {
    var u = new URL(window.location.href);
    u.searchParams.set('type', type);
    window.history.replaceState({}, '', u.pathname + u.search);
  } catch (_) { TcjErr.warn('degrade', _); }
  renderAllPanels();
  lsRestoreFormValues();
  applyTypeMeta();
}

function renderAllPanels() {
  var root = document.getElementById('ls-panels-root');
  if (!root) return;
  root.replaceChildren();
  root.appendChild(buildIdentityPanel());
  root.appendChild(buildPhotoPanel());
  buildTypePanels().forEach(function(p) { root.appendChild(p); });
  root.appendChild(buildVoicePanel());
  root.appendChild(buildPublishPanel());
  applyTypeMeta();
  applyMemberUi();
}

function applyMemberUi() {
  if (window._lsIsAdmin) return;
  var st = document.getElementById('f-status');
  if (st) { st.value = 'draft'; var r1 = st.closest('.ls-row'); if (r1) r1.style.display = 'none'; }
  var vis = document.getElementById('f-visibility');
  if (vis) { var r2 = vis.closest('.ls-row'); if (r2) r2.style.display = 'none'; }
  var imgSt = document.getElementById('f-image-status');
  if (imgSt) { var r3 = imgSt.closest('.ls-row'); if (r3) r3.style.display = 'none'; }
  var btn = document.getElementById('ls-submit-btn');
  if (btn && !btn.disabled) btn.textContent = 'Submit for Review';
}

function lsExpandPanels(open) {
  document.querySelectorAll('#ls-panels-root .ls-panel').forEach(function(p) {
    p.classList.toggle('collapsed', !open);
    var head = p.querySelector('.ls-panel-head');
    if (head) head.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
}

async function uploadLibraryImage(file, pathPrefix, previewId, urlFieldId) {
  var preview = document.getElementById(previewId);
  var urlField = document.getElementById(urlFieldId);
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.createElement('img');
    img.src = e.target.result;
    img.style.cssText = 'max-height:140px;border-radius:50%;width:120px;height:120px;object-fit:cover';
    preview.replaceChildren(img);
  };
  reader.readAsDataURL(file);
  try {
    var ext = file.name.split('.').pop().toLowerCase() || 'jpg';
    var path = pathPrefix + '/' + currentType + '/' + Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
    var res = await fetch(window.SUPA_URL + '/storage/v1/object/library-images/' + path, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + sess.access_token,
        'Content-Type': file.type || 'image/jpeg',
        'x-upsert': 'true'
      },
      body: file
    });
    if (res.ok) {
      var publicUrl = window.SUPA_URL + '/storage/v1/object/public/library-images/' + path;
      if (urlField) urlField.value = publicUrl;
      var img2 = document.createElement('img');
      img2.src = publicUrl;
      img2.style.cssText = 'max-height:140px;border-radius:50%;width:120px;height:120px;object-fit:cover';
      preview.replaceChildren(img2);
      var st = document.getElementById('f-image-status');
      if (st && st.value === 'missing') st.value = 'draft';
    } else {
      var err2 = document.createElement('div');
      err2.style.cssText = 'font-size:11px;color:var(--danger);margin-top:4px';
      err2.textContent = 'Upload failed — paste a URL below instead';
      preview.after(err2);
    }
  } catch (e) { TcjErr.warn('library-submit.html:450', e); }
}

var _libMiseEditor = null;

function initMiseEditor() {
  var wrap = document.getElementById('ls-mise-ring-wrap');
  if (!wrap || wrap._miseInited) return;
  wrap._miseInited = true;
  wrap.innerHTML =
    (window.LibraryMise && LibraryMise.ringSvg ? LibraryMise.ringSvg : '') +
    '<div class="sr-img-hero-circle lib-mise-circle" id="ls-mise-circle">' +
    '<img id="ls-mise-img" class="sr-img-hero-img" alt="Mise preview" draggable="false" decoding="async">' +
    '<div id="ls-mise-drag" class="ls-mise-drag" title="Drag to reposition"></div></div>';
  _libMiseEditor = CircularHeroEditor.create({
    imgEl: document.getElementById('ls-mise-img'),
    circleEl: document.getElementById('ls-mise-circle'),
    overlayEl: document.getElementById('ls-mise-drag'),
    zoomValEl: document.getElementById('ls-mise-zoom-val'),
    ringWrapEl: wrap
  });
  window._libMiseEditor = _libMiseEditor;
}

function showMiseEditor(show) {
  var empty = document.getElementById('ls-mise-empty');
  var editor = document.getElementById('ls-mise-editor');
  if (empty) empty.style.display = show ? 'none' : 'block';
  if (editor) editor.style.display = show ? 'block' : 'none';
}

function handleMiseFile(input) {
  if (!input.files || !input.files[0]) return;
  initMiseEditor();
  showMiseEditor(true);
  _libMiseEditor.loadFromFile(input.files[0]);
  var st = document.getElementById('f-image-status');
  if (st && st.value === 'missing') st.value = 'draft';
  input.value = '';
}

function libMiseZoom(dir) {
  if (_libMiseEditor) _libMiseEditor.adjustZoom(dir);
}

function clearMiseImage() {
  var urlField = document.getElementById('f-mise-url');
  if (urlField) urlField.value = '';
  showMiseEditor(false);
  var st = document.getElementById('f-image-status');
  if (st) st.value = 'missing';
  if (_libMiseEditor) _libMiseEditor.state.hasImage = false;
}

async function uploadMiseImage(dataUrl) {
  if (!dataUrl) return '';
  if (!dataUrl.startsWith('data:')) return dataUrl;
  try {
    var blob = await fetch(dataUrl).then(function (r) { return r.blob(); });
    var ext = (blob.type && blob.type.indexOf('png') >= 0) ? 'png' : 'jpg';
    var path = 'library/mise/' + currentType + '/' + Date.now() + '-mise.' + ext;
    var res = await fetch(window.SUPA_URL + '/storage/v1/object/library-images/' + path, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + sess.access_token,
        'Content-Type': blob.type || 'image/jpeg',
        'x-upsert': 'true'
      },
      body: blob
    });
    if (!res.ok) return '';
    return window.SUPA_URL + '/storage/v1/object/public/library-images/' + path;
  } catch (_) { TcjErr.warn('library-submit.html:527', _); }
}

async function previewImage(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var preview = document.getElementById('f-img-preview');
  var urlField = document.getElementById('f-img-url');

  // Show local preview immediately
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.createElement('img');
    img.src = e.target.result;
    img.style.cssText = 'max-height:140px;border-radius:6px';
    preview.replaceChildren(img);
  };
  reader.readAsDataURL(file);

  // Upload to Supabase Storage
  try {
    var ext   = file.name.split('.').pop().toLowerCase() || 'jpg';
    var path  = 'library/' + currentType + '/' + Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
    var res   = await fetch(window.SUPA_URL + '/storage/v1/object/library-images/' + path, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + sess.access_token,
        'Content-Type': file.type || 'image/jpeg',
        'x-upsert': 'true'
      },
      body: file
    });
    if (res.ok) {
      var publicUrl = window.SUPA_URL + '/storage/v1/object/public/library-images/' + path;
      if (urlField) urlField.value = publicUrl;
      var img2 = document.createElement('img'); img2.src = publicUrl; img2.style.cssText = 'max-height:140px;border-radius:6px'; preview.replaceChildren(img2);
      var ok = document.createElement('div'); ok.style.cssText = 'font-size:11px;color:#6dc86d;margin-top:4px'; ok.textContent = '✓ Uploaded'; preview.after(ok);
    } else {
      // Fall back to URL field — user can paste one manually
      var errData = await res.json().catch(() => ({}));
      var err2 = document.createElement('div'); err2.style.cssText = 'font-size:11px;color:var(--danger);margin-top:4px'; err2.textContent = 'Upload failed — paste a URL below instead'; preview.after(err2);
    }
  } catch (e) { TcjErr.warn('library-submit.html:571', e); }
}

function showMsg(msg, type) {
  const el = document.getElementById('ls-msg');
  el.textContent = msg; el.className = 'ls-msg ' + type;
}

function val(id) { const el = document.getElementById(id); return el ? (el.type==='checkbox' ? el.checked : el.value.trim()) : null; }

async function submitProfile() {
  const name = val('f-name');
  if (!name) { showMsg('Name is required.', 'error'); return; }
  const imgUrl = val('f-img-url');
  if (!imgUrl) { showMsg('An image URL is required before saving.', 'error'); return; }

  const btn = document.getElementById('ls-submit-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  var miseUrl = val('f-mise-url');
  if (_libMiseEditor && _libMiseEditor.hasImage()) {
    btn.textContent = 'Baking mise photo…';
    var baked = await _libMiseEditor.bake();
    if (baked) {
      var uploaded = await uploadMiseImage(baked);
      if (uploaded) {
        miseUrl = uploaded;
        var miseField = document.getElementById('f-mise-url');
        if (miseField) miseField.value = uploaded;
      }
    }
    btn.textContent = 'Saving…';
  }

  const editId = params.get('id');
  const slug = window._lsEditSlug || (tcjLibSlugify(name) + '-' + Date.now());
  const payload = tcjLibBuildPayload(currentType, val, { slug });
  payload.mise_image_url = miseUrl || null;

  try {
    if (!window._lsIsAdmin) {
      payload.status = 'draft';
      payload.image_status = payload.mise_image_url ? 'draft' : 'missing';
      const res = await fetch(SUPA_URL + '/rest/v1/rpc/submit_library_profile_submission', {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + sess.access_token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ p_profile_type: currentType, p_slug: slug, p_payload: payload })
      });
      if (res.ok) {
        showMsg('Submitted for admin review. Thank you!', 'success');
        btn.textContent = '✓ Submitted';
        setTimeout(function () { window.location.href = 'library-directory.html?type=' + currentType; }, 2000);
        return;
      }
      const err = await res.json().catch(function () { return {}; });
      showMsg('Error: ' + (err.message || res.status) + ' — run fix-phase29-library-submissions.sql if RPC missing.', 'error');
      btn.disabled = false; btn.textContent = 'Submit for Review';
      return;
    }
    const res = await fetch(SUPA_URL + '/rest/v1/rpc/admin_upsert_library_profile', {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + sess.access_token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        p_type: currentType,
        p_id: editId || null,
        p_payload: payload
      })
    });
    if (res.ok) {
      showMsg('Profile saved successfully.', 'success');
      btn.textContent = '✓ Saved';
      setTimeout(() => window.location.href = `library-directory.html?type=${currentType}`, 1500);
    } else {
      const err = await res.json().catch(() => ({}));
      showMsg('Error: ' + (err.message || res.status), 'error');
      btn.disabled = false; btn.textContent = 'Save Profile';
    }
  } catch (e) { TcjErr.warn('library-submit.html:658', e); }
}

async function loadExisting(id) {
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/rpc/admin_get_library_profile', {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + sess.access_token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_type: currentType, p_id: id })
    });
    if (!res.ok) return;
    const p = await res.json();
    if (!p || !p.name) return;
    if (p.profile_type && p.profile_type !== currentType) {
      currentType = p.profile_type;
      buildTypeStrip();
      renderAllPanels();
      applyMemberUi();
    }
    window._lsEditSlug = p.slug || null;
    const setVal = function(fid, v) {
      const el = document.getElementById(fid);
      if (!el || v === null || v === undefined) return;
      if (el.type === 'checkbox') el.checked = !!v;
      else el.value = v;
    };
    tcjLibFillForm(p, setVal, currentType);
    applyTypeMeta();
    if (p.image_url) {
      var ei = document.createElement('img');
      ei.src = p.image_url;
      ei.style.cssText = 'max-height:140px;border-radius:6px';
      var prev = document.getElementById('f-img-preview');
      if (prev) prev.replaceChildren(ei);
    }
    if (p.mise_image_url) {
      initMiseEditor();
      showMiseEditor(true);
      if (_libMiseEditor) _libMiseEditor.loadFromUrl(p.mise_image_url);
    }
    applyTypeMeta();
  } catch (_) { TcjErr.warn('library-submit.html:706', _); }
}

function initPage() {
  var t = params.get('type');
  if (t && ['ingredient', 'spice', 'tool', 'cut', 'preservation'].indexOf(t) >= 0) {
    currentType = t;
  }
  buildTypeStrip();
  renderAllPanels();
  applyMemberUi();
  applyTypeMeta();
  var id = params.get('id');
  if (id) {
    loadExisting(id);
  } else {
    var prefillName = params.get('name');
    if (prefillName) {
      var nameEl = document.getElementById('f-name');
      if (nameEl) nameEl.value = prefillName;
    }
  }
}

</script>
<script src="lib/tcj-errors.js"></script>
<script src="nav-init.js"></script>
<script>initPage();</script>
</body>
