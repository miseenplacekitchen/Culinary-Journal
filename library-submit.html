<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library — Submit Profile — The Culinary Journal</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="theme-init.js"></script>
<script src="supabase-config.js"></script>
<script src="page-guard.js"></script>
<style>
*, *::before, *::after { box-sizing:border-box; }
body { background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text-high); margin:0; }
.ls-wrap { max-width:820px; margin:0 auto; padding:60px 24px 100px; }
.ls-back { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--text-mid); text-decoration:none; margin-bottom:32px; }
.ls-back:hover { color:var(--accent); }
.ls-title { font-family:'Cormorant Garamond',serif; font-size:2.2rem; font-weight:600; color:var(--text-high); margin-bottom:6px; }
.ls-subtitle { font-size:14px; color:var(--text-muted); margin-bottom:36px; }
.ls-type-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:36px; }
.ls-type-btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:none; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-mid); cursor:pointer; }
.ls-type-btn.active { background:var(--accent); border-color:var(--accent); color:#0C0702; font-weight:600; }
.ls-section { margin-bottom:28px; }
.ls-section-title { font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid rgba(196,151,59,.12); }
.ls-row { margin-bottom:16px; }
.ls-label { display:block; font-size:12px; color:var(--text-muted); margin-bottom:6px; }
.ls-label span { color:var(--accent); }
.ls-input, .ls-textarea, .ls-select { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-high); outline:none; transition:border-color .15s; }
.ls-input:focus, .ls-textarea:focus, .ls-select:focus { border-color:var(--accent); }
.ls-textarea { resize:vertical; min-height:100px; line-height:1.6; }
.ls-2col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.ls-img-box { border:1px dashed var(--border); border-radius:10px; padding:24px; text-align:center; cursor:pointer; transition:border-color .15s; }
.ls-img-box:hover { border-color:var(--accent); }
.ls-img-box img { max-height:160px; max-width:100%; border-radius:6px; margin-bottom:8px; }
.ls-img-text { font-size:12px; color:var(--text-muted); }
.ls-hidden { display:none; }
.ls-footer { display:flex; gap:12px; margin-top:36px; }
.ls-btn { padding:12px 28px; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .15s; border:none; }
.ls-btn-primary { background:var(--accent); color:#0C0702; }
.ls-btn-secondary { background:none; border:1px solid var(--border); color:var(--text-mid); }
.ls-btn:disabled { opacity:.5; cursor:default; }
.ls-msg { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:20px; display:none; }
.ls-msg.success { background:rgba(100,200,100,.1); border:1px solid rgba(100,200,100,.3); color:#6dc86d; display:block; }
.ls-msg.error { background:rgba(220,80,80,.1); border:1px solid rgba(220,80,80,.3); color:#dc5050; display:block; }
@media(max-width:640px){ .ls-2col { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="ls-wrap">
  <a href="library-directory.html" class="ls-back">← Library</a>
  <h1 class="ls-title">Submit a Profile</h1>
  <p class="ls-subtitle">Create a new library profile. All fields marked <span style="color:var(--accent)">*</span> are required. Images are required before publishing.</p>
  <div id="ls-msg" class="ls-msg"></div>

  <!-- Type selector -->
  <div class="ls-type-row" id="ls-types">
    <button class="ls-type-btn active" onclick="setType('ingredient',this)">🌿 Ingredient</button>
    <button class="ls-type-btn" onclick="setType('spice',this)">🌶 Spice</button>
    <button class="ls-type-btn" onclick="setType('tool',this)">🔪 Tool / Appliance</button>
    <button class="ls-type-btn" onclick="setType('cut',this)">🥩 Cut / Prep</button>
    <button class="ls-type-btn" onclick="setType('preservation',this)">🫙 Preservation</button>
  </div>

  <!-- Core fields (always shown) -->
  <div class="ls-section">
    <div class="ls-section-title">Identity</div>
    <div class="ls-2col">
      <div class="ls-row"><label class="ls-label">Name <span>*</span></label><input class="ls-input" id="f-name" type="text" placeholder="e.g. Ghee"></div>
      <div class="ls-row"><label class="ls-label">Also Known As</label><input class="ls-input" id="f-aka" type="text" placeholder="e.g. Clarified Butter"></div>
    </div>
    <div class="ls-row"><label class="ls-label">Local / Regional Names <small style="color:var(--text-muted)">(comma separated)</small></label><input class="ls-input" id="f-local" type="text" placeholder="e.g. Neyyi, Ghrita, Samneh"></div>
    <div class="ls-row">
      <label class="ls-label">Image <span>*</span></label>
      <div class="ls-img-box" onclick="document.getElementById('f-img-file').click()">
        <div id="f-img-preview"></div>
        <div class="ls-img-text">Click to upload image</div>
        <input type="file" id="f-img-file" accept="image/*" class="ls-hidden" onchange="previewImage(this)">
      </div>
      <input class="ls-input" id="f-img-url" type="text" placeholder="Or paste image URL" style="margin-top:8px">
    </div>
  </div>

  <!-- Type-specific fields rendered dynamically -->
  <div id="ls-type-fields"></div>

  <!-- Chef's note + did you know (always) -->
  <div class="ls-section">
    <div class="ls-section-title">Betty's Voice</div>
    <div class="ls-row"><label class="ls-label">Chef's Notes</label><textarea class="ls-textarea" id="f-chefs" placeholder="Betty's professional take on this — in her own voice"></textarea></div>
    <div class="ls-row"><label class="ls-label">Recommended Brand</label><input class="ls-input" id="f-brand" type="text" placeholder="e.g. Organic Valley"></div>
    <div class="ls-row"><label class="ls-label">Did You Know?</label><textarea class="ls-textarea" id="f-dyk" style="min-height:70px" placeholder="One surprising fact"></textarea></div>
  </div>

  <!-- Visibility -->
  <div class="ls-section">
    <div class="ls-section-title">Publishing</div>
    <div class="ls-2col">
      <div class="ls-row">
        <label class="ls-label">Status</label>
        <select class="ls-select" id="f-status"><option value="draft">Draft — not visible</option><option value="published">Published — visible</option></select>
      </div>
      <div class="ls-row">
        <label class="ls-label">Visibility</label>
        <select class="ls-select" id="f-visibility"><option value="public">Public — everyone</option><option value="members">Members only</option><option value="paid">Paid members only</option></select>
      </div>
    </div>
  </div>

  <div class="ls-footer">
    <button class="ls-btn ls-btn-primary" id="ls-submit-btn" onclick="submitProfile()">Save Profile</button>
    <button class="ls-btn ls-btn-secondary" onclick="window.location.href='library-directory.html'">Cancel</button>
  </div>
</div>

<script>
let currentType = 'ingredient';
const params = new URLSearchParams(window.location.search);
// type/id init moved to bottom — after TYPE_FIELDS declaration

// Auth guard — verify admin server-side, not just from localStorage
const sess = JSON.parse(localStorage.getItem('tcj_session')||'null');
if (!sess || !sess.access_token) {
  window.location.href = 'login.html'; throw new Error('not logged in');
}
(async function verifyAdmin() {
  try {
    const res = await fetch(window.SUPA_URL + '/rest/v1/rpc/is_admin', {
      method: 'POST',
      headers: { 'apikey': window.SUPA_KEY, 'Authorization': 'Bearer ' + sess.access_token, 'Content-Type': 'application/json' },
      body: '{}'
    });
    const isAdmin = await res.json();
    if (!isAdmin) { alert('Admin access required.'); window.location.href = 'index.html'; }
  } catch(e) { alert('Could not verify access.'); window.location.href = 'index.html'; }
})();

const TYPE_FIELDS = {
  ingredient: [
    { id:'f-category',   label:'Category',        type:'input', ph:'e.g. Oils & Fats' },
    { id:'f-subcategory',label:'Subcategory',      type:'input', ph:'e.g. Animal Fats' },
    { id:'f-allergen',   label:'Allergen Info',    type:'input', ph:'e.g. Dairy' },
    { id:'f-vegan',      label:'Vegan',            type:'checkbox' },
    { id:'f-vegetarian', label:'Vegetarian',       type:'checkbox' },
    { id:'f-origin',     label:'The Story — Origin & Heritage',   type:'textarea' },
    { id:'f-history',    label:'History',          type:'textarea' },
    { id:'f-cultural',   label:'Across Cultures',  type:'textarea' },
    { id:'f-flavour',    label:'Flavour Profile',  type:'textarea' },
    { id:'f-buy',        label:'How to Buy',       type:'textarea' },
    { id:'f-store',      label:'How to Store',     type:'textarea' },
    { id:'f-prep',       label:'How to Prep',      type:'textarea' },
    { id:'f-when',       label:'When to Add It',   type:'textarea' },
    { id:'f-mistakes',   label:'Common Mistakes',  type:'textarea' },
    { id:'f-science',    label:'The Science',      type:'textarea' },
    { id:'f-pairings',   label:'Flavour Pairings', type:'textarea' },
    { id:'f-preserv',    label:'Preservation Notes', type:'textarea' },
    { id:'f-baby',       label:'For Babies & Toddlers', type:'textarea' },
    { id:'f-subs',       label:'Substitutes',      type:'textarea' },
    { id:'f-nutrition',  label:'Nutrition & Health Notes', type:'textarea' },
    { id:'f-season',     label:'Seasonality',      type:'input', ph:'e.g. Best in autumn months' },
  ],
  spice: [
    { id:'f-origin',    label:'Origin Story',        type:'textarea' },
    { id:'f-history',   label:'History',             type:'textarea' },
    { id:'f-cultural',  label:'Across Cultures',     type:'textarea' },
    { id:'f-flavour',   label:'Flavour Wheel',       type:'textarea' },
    { id:'f-heat',      label:'Heat Level (0–5)',     type:'input', ph:'0' },
    { id:'f-wvg',       label:'Whole vs Ground',     type:'textarea' },
    { id:'f-toast',     label:'How to Toast & Bloom', type:'textarea' },
    { id:'f-blends',    label:'Blends It Belongs To', type:'textarea' },
    { id:'f-when',      label:'When to Add It',      type:'textarea' },
    { id:'f-science',   label:'The Science',         type:'textarea' },
    { id:'f-pairings',  label:'Flavour Pairings',    type:'textarea' },
    { id:'f-subs',      label:'Substitutes',         type:'textarea' },
  ],
  tool: [
    { id:'f-toolcat',   label:'Category',            type:'input', ph:'e.g. Knife / Pan / Appliance' },
    { id:'f-whatfor',   label:'What It Is For',      type:'textarea' },
    { id:'f-howtouse',  label:'How to Use It',       type:'textarea' },
    { id:'f-care',      label:'How to Care for It',  type:'textarea' },
    { id:'f-lookfor',   label:'What to Look For When Buying', type:'textarea' },
    { id:'f-mistakes',  label:'Common Mistakes',     type:'textarea' },
    { id:'f-price',     label:'Price Range',         type:'input', ph:'e.g. £20–£60' },
  ],
  cut: [
    { id:'f-protein',   label:'Protein Type',        type:'select', opts:['beef','lamb','pork','chicken','duck','fish','seafood','other'] },
    { id:'f-intlnames', label:'International Names', type:'input', ph:'e.g. Filet, Lomo, Fillet Steak' },
    { id:'f-location',  label:'Location on Animal',  type:'textarea' },
    { id:'f-chars',     label:'Characteristics',     type:'textarea' },
    { id:'f-clean',     label:'How to Clean It',     type:'textarea' },
    { id:'f-prep',      label:'How to Prep It',      type:'textarea' },
    { id:'f-methods',   label:'Best Cooking Methods', type:'textarea' },
  ],
  preservation: [
    { id:'f-techtype',  label:'Technique Type',      type:'select', opts:['canning','fermenting','pickling','drying','smoking','freezing','curing','other'] },
    { id:'f-whatitis',  label:'What It Is',          type:'textarea' },
    { id:'f-history',   label:'History',             type:'textarea' },
    { id:'f-bestfor',   label:'Best For',            type:'textarea' },
    { id:'f-equipment', label:'Equipment Needed',    type:'textarea' },
    { id:'f-steps',     label:'Step by Step (one step per line)', type:'textarea' },
    { id:'f-safety',    label:'Safety Notes',        type:'textarea' },
    { id:'f-shelf',     label:'Shelf Life',          type:'input', ph:'e.g. 12 months sealed, 3 months open' },
  ],
};

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.ls-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTypeFields();
}

function renderTypeFields() {
  var fields = TYPE_FIELDS[currentType] || [];
  var wrap = document.getElementById('ls-type-fields');
  wrap.replaceChildren();

  var section = document.createElement('div');
  section.className = 'ls-section';
  var title = document.createElement('div');
  title.className = 'ls-section-title';
  title.textContent = 'Profile Details';
  section.appendChild(title);

  fields.forEach(function(f) {
    var row = document.createElement('div');
    row.className = 'ls-row';

    if (f.type === 'checkbox') {
      row.style.cssText = 'display:flex;align-items:center;gap:10px';
      var cb = document.createElement('input');
      cb.type = 'checkbox'; cb.id = f.id;
      cb.style.cssText = 'width:16px;height:16px;accent-color:var(--accent)';
      var lbl = document.createElement('label');
      lbl.className = 'ls-label'; lbl.htmlFor = f.id;
      lbl.style.margin = '0'; lbl.textContent = f.label;
      row.appendChild(cb); row.appendChild(lbl);

    } else if (f.type === 'select') {
      var lbl2 = document.createElement('label');
      lbl2.className = 'ls-label'; lbl2.textContent = f.label;
      var sel = document.createElement('select');
      sel.className = 'ls-select'; sel.id = f.id;
      (f.opts || []).forEach(function(o) {
        var opt = document.createElement('option');
        opt.value = o; opt.textContent = o;
        sel.appendChild(opt);
      });
      row.appendChild(lbl2); row.appendChild(sel);

    } else if (f.type === 'textarea') {
      var lbl3 = document.createElement('label');
      lbl3.className = 'ls-label'; lbl3.textContent = f.label;
      var ta = document.createElement('textarea');
      ta.className = 'ls-textarea'; ta.id = f.id;
      row.appendChild(lbl3); row.appendChild(ta);

    } else {
      var lbl4 = document.createElement('label');
      lbl4.className = 'ls-label'; lbl4.textContent = f.label;
      var inp = document.createElement('input');
      inp.className = 'ls-input'; inp.id = f.id;
      inp.type = 'text'; inp.placeholder = f.ph || '';
      row.appendChild(lbl4); row.appendChild(inp);
    }

    section.appendChild(row);
  });

  wrap.appendChild(section);
}

async function previewImage(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var preview = document.getElementById('f-img-preview');
  var urlField = document.getElementById('f-img-url');

  // Show local preview immediately
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.createElement('img');
    img.src = e.target.result;
    img.style.cssText = 'max-height:140px;border-radius:6px';
    preview.replaceChildren(img);
  };
  reader.readAsDataURL(file);

  // Upload to Supabase Storage
  try {
    var ext   = file.name.split('.').pop().toLowerCase() || 'jpg';
    var path  = 'library/' + currentType + '/' + Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
    var res   = await fetch(window.SUPA_URL + '/storage/v1/object/library-images/' + path, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + sess.access_token,
        'Content-Type': file.type || 'image/jpeg',
        'x-upsert': 'true'
      },
      body: file
    });
    if (res.ok) {
      var publicUrl = window.SUPA_URL + '/storage/v1/object/public/library-images/' + path;
      if (urlField) urlField.value = publicUrl;
      var img2 = document.createElement('img'); img2.src = publicUrl; img2.style.cssText = 'max-height:140px;border-radius:6px'; preview.replaceChildren(img2);
      var ok = document.createElement('div'); ok.style.cssText = 'font-size:11px;color:#6dc86d;margin-top:4px'; ok.textContent = '✓ Uploaded'; preview.after(ok);
    } else {
      // Fall back to URL field — user can paste one manually
      var errData = await res.json().catch(() => ({}));
      var err2 = document.createElement('div'); err2.style.cssText = 'font-size:11px;color:#dc5050;margin-top:4px'; err2.textContent = 'Upload failed — paste a URL below instead'; preview.after(err2);
    }
  } catch(e) {
    var err2 = document.createElement('div'); err2.style.cssText = 'font-size:11px;color:#dc5050;margin-top:4px'; err2.textContent = 'Upload failed — paste a URL below instead'; preview.after(err2);
  }
}

function showMsg(msg, type) {
  const el = document.getElementById('ls-msg');
  el.textContent = msg; el.className = 'ls-msg ' + type;
}

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function val(id) { const el = document.getElementById(id); return el ? (el.type==='checkbox' ? el.checked : el.value.trim()) : null; }

async function submitProfile() {
  const name = val('f-name');
  if (!name) { showMsg('Name is required.', 'error'); return; }
  const imgUrl = val('f-img-url');
  if (!imgUrl) { showMsg('An image URL is required before saving.', 'error'); return; }

  const btn = document.getElementById('ls-submit-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const slug = slugify(name) + '-' + Date.now();
  const localNames = (val('f-local') || '').split(',').map(s => s.trim()).filter(Boolean);

  // Build payload based on type
  let payload = {
    slug, name,
    also_known_as:    val('f-aka') || null,
    local_names:      JSON.stringify(localNames),
    image_url:        imgUrl,
    chefs_notes:      val('f-chefs') || null,
    recommended_brand: val('f-brand') || null,
    did_you_know:     val('f-dyk') || null,
    status:           val('f-status'),
    visibility:       val('f-visibility'),
  };

  const fields = TYPE_FIELDS[currentType] || [];
  const fieldMap = {
    'f-category':'category','f-subcategory':'subcategory','f-allergen':'allergen',
    'f-vegan':'vegan','f-vegetarian':'vegetarian','f-origin':'origin_story',
    'f-history':'history','f-cultural':'cultural_use','f-flavour':'flavour_profile',
    'f-buy':'how_to_buy','f-store':'how_to_store','f-prep':'how_to_prep',
    'f-when':'when_to_add','f-mistakes':'common_mistakes','f-science':'science_notes',
    'f-pairings':'pairings','f-preserv':'preservation_notes','f-baby':'baby_notes',
    'f-subs':'substitutes','f-nutrition':'nutrition_notes','f-season':'seasonality',
    'f-heat':'heat_level','f-wvg':'whole_vs_ground','f-toast':'how_to_toast',
    'f-blends':'blends','f-toolcat':'tool_category','f-whatfor':'what_its_for',
    'f-howtouse':'how_to_use','f-care':'how_to_care','f-lookfor':'what_to_look_for',
    'f-price':'price_range','f-protein':'protein_type','f-intlnames':'international_names',
    'f-location':'location_on_animal','f-chars':'characteristics','f-clean':'how_to_clean',
    'f-methods':'best_cooking_methods','f-techtype':'technique_type','f-whatitis':'what_it_is',
    'f-bestfor':'best_for','f-equipment':'equipment_needed','f-steps':'step_by_step',
    'f-safety':'safety_notes','f-shelf':'shelf_life','f-flavour':'flavour_wheel',
  };
  fields.forEach(f => {
    const dbKey = fieldMap[f.id];
    if (!dbKey) return;
    let v = val(f.id);
    if (f.id === 'f-steps' && v) v = JSON.stringify(v.split('\n').map(s => s.trim()).filter(Boolean));
    if (f.id === 'f-intlnames' && v) v = JSON.stringify(v.split(',').map(s => s.trim()).filter(Boolean));
    if (f.id === 'f-heat') v = parseInt(v) || 0;
    payload[dbKey] = v || null;
  });

  try {
    const table = currentType + '_profiles';
    const editId = params.get('id');
    const method = editId ? 'PATCH' : 'POST';
    const url = editId
      ? `${SUPA_URL}/rest/v1/${table}?id=eq.${editId}`
      : `${SUPA_URL}/rest/v1/${table}`;

    const res = await fetch(url, {
      method,
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + sess.access_token,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    });
    if (res.ok || res.status === 201) {
      showMsg('Profile saved successfully.', 'success');
      btn.textContent = '✓ Saved';
      setTimeout(() => window.location.href = `library-directory.html?type=${currentType}`, 1500);
    } else {
      const err = await res.json().catch(() => ({}));
      showMsg('Error: ' + (err.message || res.status), 'error');
      btn.disabled = false; btn.textContent = 'Save Profile';
    }
  } catch(e) {
    showMsg('Could not save — please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Save Profile';
  }
}

async function loadExisting(id) {
  try {
    const table = currentType + '_profiles';
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}&select=*`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + sess.access_token }
    });
    const rows = await res.json();
    if (!rows.length) return;
    const p = rows[0];
    const setVal = (id, v) => { const el = document.getElementById(id); if (!el || v === null || v === undefined) return; if (el.type==='checkbox') el.checked=!!v; else el.value=v; };
    setVal('f-name', p.name); setVal('f-aka', p.also_known_as);
    setVal('f-local', Array.isArray(p.local_names) ? p.local_names.join(', ') : '');
    setVal('f-img-url', p.image_url);
    setVal('f-chefs', p.chefs_notes); setVal('f-brand', p.recommended_brand);
    setVal('f-dyk', p.did_you_know); setVal('f-status', p.status); setVal('f-visibility', p.visibility);
    if (p.image_url) { var ei = document.createElement('img'); ei.src = p.image_url; ei.style.maxHeight = '100px'; document.getElementById('f-img-preview').replaceChildren(ei); }
    document.querySelector('.ls-title').textContent = 'Edit Profile';
  } catch(_) {}
}

renderTypeFields();
// ── Page init — runs after all declarations ──────────────────────
(function initPage() {
  var t = params.get('type');
  if (t && t !== 'ingredient') {
    currentType = t;
    var activeBtn = document.querySelector('[data-type="' + t + '"]');
    if (!activeBtn) {
      document.querySelectorAll('.ls-type-btn').forEach(function(b) {
        if (b.getAttribute('onclick') && b.getAttribute('onclick').indexOf("'" + t + "'") > -1) {
          document.querySelectorAll('.ls-type-btn').forEach(function(x){ x.classList.remove('active'); });
          b.classList.add('active');
        }
      });
    }
  }
  renderTypeFields();
  var id = params.get('id');
  if (id) { loadExisting(id); }
})();

</script>
</body>
</html>
