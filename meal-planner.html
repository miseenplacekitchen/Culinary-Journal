<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

const MEALS = ['Breakfast','Lunch','Dinner','Snack'];
const DAYS  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const CAT_EMOJI = {'Rise & Shine':'🌅','The Evening Table':'☕','Garden & Earth':'🥬','Meat & Fire':'🍖','Ocean & River':'🌊','Slow & Soulful':'🥘','Grains & Comfort':'🍚','Breads & Bakes':'🫓','Sweet Serenades':'🍮','Sips & Stories':'🥂','Preserved & Cherished':'🫙','Feast Days':'🎉','Little Ones':'👶','Nourish & Heal':'💪'};

let currentWeekOffset = 0;
let pickerTarget = null; // {day, meal}
let pickerRecipes = [];
let pickerOffset = 0;
let pickerHasMore = false;
let pickerLoading = false;
let pickerSearchTimer = null;
const PICKER_PAGE_SIZE = 60;
let prepFilterMax = null;
let catFilter = '';
let subFilter = '';
let divFilter = '';
let groupFilter = '';

var MP_FAMILY_GROUPS = {
  adults: { label: 'Adults', rels: ['self', 'partner', 'elderly'] },
  kids: { label: 'Kids', rels: ['child', 'toddler', 'baby'] },
  guests: { label: 'Guests', rels: ['regular_guest', 'other'] }
};

function buildCategoryFilters() {
  var bar = document.getElementById('mp-cat-filters');
  if (!bar) return;
  var keys = Object.keys(CAT_EMOJI).sort();
  bar.innerHTML = '<span style="font-family:DM Sans,sans-serif;font-size:10px;font-weight:600;color:var(--text-mid);align-self:center">Category:</span>' +
    '<button type="button" class="mp-filter-chip active" data-cat="" onclick="setCatFilter(\'\',this)">All</button>' +
    keys.map(function (c) {
      return '<button type="button" class="mp-filter-chip" data-cat="' + esc(c) + '" onclick="setCatFilter(\'' + esc(c).replace(/'/g, "\\'") + '\',this)">' + esc(c) + '</button>';
    }).join('');
}

function setCatFilter(cat, btn) {
  catFilter = cat || '';
  subFilter = '';
  divFilter = '';
  document.querySelectorAll('#mp-cat-filters .mp-filter-chip').forEach(function (b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  buildHierarchyFilters();
  applyRecipeFilters();
}

async function buildHierarchyFilters() {
  var bar = document.getElementById('mp-hierarchy-filters');
  if (!bar) return;
  if (!catFilter) { bar.innerHTML = ''; return; }
  var subs = {}, divs = {};
  try {
    var res = await fetch(SUPA_URL + '/rest/v1/rpc/get_approved_recipes', {
      method: 'POST', headers: mpRecipeHeaders(),
      body: JSON.stringify({ p_category: catFilter, p_limit: 200, p_offset: 0 })
    });
    if (res.ok) {
      var rows = await res.json();
      (Array.isArray(rows) ? rows : []).forEach(function (r) {
        if (r.sub_category) subs[r.sub_category] = 1;
        if (r.division) divs[r.division] = 1;
      });
    }
  } catch (_) {}
  var subKeys = Object.keys(subs).sort();
  var divKeys = Object.keys(divs).sort();
  if (!subKeys.length && !divKeys.length) { bar.innerHTML = ''; return; }
  var html = '';
  if (subKeys.length) {
    html += '<span style="font-family:DM Sans,sans-serif;font-size:10px;font-weight:600;color:var(--text-mid);align-self:center">Sub:</span>';
    html += '<button type="button" class="mp-filter-chip' + (subFilter ? '' : ' active') + '" onclick="setSubFilter(\'\')">All</button>';
    subKeys.forEach(function (s) {
      html += '<button type="button" class="mp-filter-chip' + (subFilter === s ? ' active' : '') + '" onclick="setSubFilter(\'' + esc(s).replace(/'/g, "\\'") + '\')">' + esc(s) + '</button>';
    });
  }
  if (divKeys.length) {
    html += '<span style="font-family:DM Sans,sans-serif;font-size:10px;font-weight:600;color:var(--text-mid);align-self:center;margin-left:8px">Div:</span>';
    html += '<button type="button" class="mp-filter-chip' + (divFilter ? '' : ' active') + '" onclick="setDivFilter(\'\')">All</button>';
    divKeys.forEach(function (d) {
      html += '<button type="button" class="mp-filter-chip' + (divFilter === d ? ' active' : '') + '" onclick="setDivFilter(\'' + esc(d).replace(/'/g, "\\'") + '\')">' + esc(d) + '</button>';
    });
  }
  bar.innerHTML = html;
}

function setSubFilter(sub) {
  subFilter = sub || '';
  buildHierarchyFilters();
  applyRecipeFilters();
}

function setDivFilter(div) {
  divFilter = div || '';
  applyRecipeFilters();
}

function profilesInGroup(group) {
  if (!group || !MP_FAMILY_GROUPS[group]) return familyProfiles;
  var rels = MP_FAMILY_GROUPS[group].rels;
  return familyProfiles.filter(function (p) { return rels.indexOf(p.relationship || 'other') >= 0; });
}

function setGroupFilter(group, chip) {
  groupFilter = group || '';
  memberFilterId = null;
  document.querySelectorAll('#mp-group-filter .mp-filter-chip').forEach(function (b) {
    b.classList.toggle('active', chip ? b === chip : !b.dataset.group);
  });
  renderMemberFilterBar();
  renderCalendar();
}

function renderGroupFilterBar() {
  var bar = document.getElementById('mp-group-filter');
  if (!bar) return;
  if (!familyProfiles.length || currentMode === 'individual') {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';
  var html = '<span style="font-family:DM Sans,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-mid);margin-right:8px">Household group:</span>';
  html += '<button type="button" class="mp-filter-chip' + (groupFilter ? '' : ' active') + '" data-group="" onclick="setGroupFilter(null,this)">All</button>';
  Object.keys(MP_FAMILY_GROUPS).forEach(function (key) {
    var g = MP_FAMILY_GROUPS[key];
    html += '<button type="button" class="mp-filter-chip' + (groupFilter === key ? ' active' : '') + '" data-group="' + key + '" onclick="setGroupFilter(\'' + key + '\',this)">' + g.label + '</button>';
  });
  bar.innerHTML = html;
}

function recipeTotalMinutes(r) {
  var prep = parseInt(r.prep_time_minutes, 10) || 0;
  var cook = parseInt(r.cook_time_minutes, 10) || 0;
  return prep + cook;
}

function getWeekKeyForDate(date) {
  var d = new Date(date);
  var day = d.getDay();
  var monday = new Date(d);
  monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return 'tcj_meal_' + monday.toISOString().slice(0, 10);
}

function dayKeyForDateStr(dateStr) {
  var jsDay = new Date(dateStr + 'T00:00:00').getDay();
  return ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][jsDay];
}

function getPlanByKey(weekKey) {
  try { return JSON.parse(localStorage.getItem(weekKey) || '{}'); }
  catch (_) { return {}; }
}

function getWeekDates(offset) {
  const today = new Date();
  const day = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
  return DAYS.map(function(_, i) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function getWeekKey(offset) {
  const dates = getWeekDates(offset);
  return 'tcj_meal_' + dates[0].toISOString().slice(0, 10);
}

function getPlan() {
  try { return JSON.parse(localStorage.getItem(getWeekKey(currentWeekOffset)) || '{}'); }
  catch(_) { return {}; }
}

var _mpHouseholdShared = false;
var _mpSyncPoll = null;

function updateMealHouseholdBar(data) {
  var bar = document.getElementById('mp-household-bar');
  if (!bar) return;
  if (data && data.shared) {
    bar.style.display = 'flex';
    bar.innerHTML = '<span>🏠 <strong>' + esc(data.household_name || 'Household') + '</strong> — shared meal plan (syncs with your partner)</span>' +
      '<a href="household.html">Manage household →</a>';
    _mpHouseholdShared = true;
  } else {
    var sess = null;
    try { sess = JSON.parse(localStorage.getItem('tcj_session') || 'null'); } catch (_) {}
    bar.style.display = sess ? 'flex' : 'none';
    if (sess) {
      bar.innerHTML = '<span>Personal meal plan</span><a href="household.html">Link partner for shared planning →</a>';
    }
    _mpHouseholdShared = false;
  }
}

function savePlan(plan) {
  const key = getWeekKey(currentWeekOffset);
  localStorage.setItem(key, JSON.stringify(plan));
  localStorage.setItem('tcj_meal_ts_' + key, String(Date.now()));
  clearTimeout(window._mpSyncTimer);
  window._mpSyncTimer = setTimeout(async function() {
    try {
      const sess = JSON.parse(localStorage.getItem('tcj_session')||'null');
      if (!sess || !sess.access_token) return;
      var serverTs = window.SharedSyncUtils ? SharedSyncUtils.getServerTs('tcj_meal_server_ts_' + key) : null;
      var res = await fetch(SUPA_URL + '/rest/v1/rpc/save_my_meal_plan', {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + sess.access_token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ p_week_key: key, p_plan_data: plan, p_client_updated_at: serverTs })
      });
      var bodyText = await res.text();
      var parsed = window.SharedSyncUtils ? SharedSyncUtils.parseSaveResult(res, bodyText) : { ok: res.ok };
      if (parsed.conflict && window.SharedSyncUtils) {
        var choice = await SharedSyncUtils.showConflict({ householdName: parsed.data && parsed.data.household_name });
        if (choice === 'theirs' && parsed.data) {
          localStorage.setItem(key, JSON.stringify(parsed.data.plan_data || {}));
          if (parsed.data.updated_at) SharedSyncUtils.storeServerTs('tcj_meal_server_ts_' + key, parsed.data.updated_at);
          renderCalendar();
        } else if (choice === 'mine') {
          await fetch(SUPA_URL + '/rest/v1/rpc/save_my_meal_plan', {
            method: 'POST',
            headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + sess.access_token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ p_week_key: key, p_plan_data: plan, p_client_updated_at: null })
          });
        }
      } else if (parsed.ok && parsed.updated_at && window.SharedSyncUtils) {
        SharedSyncUtils.storeServerTs('tcj_meal_server_ts_' + key, parsed.updated_at);
      }
    } catch(_) {}
  }, 1200);
}

async function syncMealPlanFromCloud(force) {
  try {
    const sess = JSON.parse(localStorage.getItem('tcj_session')||'null');
    if (!sess || !sess.access_token) return;
    const key = getWeekKey(currentWeekOffset);
    const res = await fetch(SUPA_URL + '/rest/v1/rpc/get_my_meal_plan', {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + sess.access_token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_week_key: key })
    });
    if (!res.ok) return;
    const remote = await res.json();
    if (!remote || typeof remote !== 'object') return;
    updateMealHouseholdBar(remote);
    var plan = remote.plan_data || remote;
    if (remote.plan_data !== undefined) plan = remote.plan_data;
    var remoteTime = remote.updated_at ? new Date(remote.updated_at).getTime() : 0;
    var localTs = parseInt(localStorage.getItem('tcj_meal_ts_' + key) || '0', 10);
    if (force || remoteTime > localTs || (_mpHouseholdShared && remoteTime >= localTs)) {
      localStorage.setItem(key, JSON.stringify(plan || {}));
      if (remoteTime) localStorage.setItem('tcj_meal_ts_' + key, String(remoteTime));
      if (remote.updated_at && window.SharedSyncUtils) SharedSyncUtils.storeServerTs('tcj_meal_server_ts_' + key, remote.updated_at);
      renderCalendar();
    }
  } catch(_) {}
}

async function loadPlanFromSupabase() {
  await syncMealPlanFromCloud(true);
}

function skipRestOfWeek() {
  var dates = getWeekDates(currentWeekOffset);
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var plan = getPlan();
  var changed = 0;
  dates.forEach(function (date, i) {
    if (date < today) return;
    var day = DAYS[i];
    MEALS.forEach(function (meal) {
      var slot = plan[day] && plan[day][meal];
      if (!slot || !slot.id) return;
      if ((slot.status || 'planned') === 'planned') {
        if (!plan[day]) plan[day] = {};
        plan[day][meal] = Object.assign({}, slot, { status: 'skipped' });
        changed++;
      }
    });
  });
  if (!changed) { alert('No planned meals left to skip from today onward.'); return; }
  if (!confirm('Mark ' + changed + ' remaining meal(s) as skipped?')) return;
  savePlan(plan);
  renderCalendar();
}

function getSlot(day, meal) {
  const plan = getPlan();
  return plan[day] ? plan[day][meal] : null;
}

function normalizeSlot(raw, meal) {
  if (!raw) return null;
  var rid = raw.recipe_id || raw.id;
  return Object.assign({}, raw, {
    recipe_id: rid,
    id: rid,
    meal_type: raw.meal_type || meal,
    status: raw.status || 'planned',
    assignee: raw.assignee || null,
    servings_override: raw.servings_override != null ? raw.servings_override : (raw.servings != null ? raw.servings : null),
    note: raw.note || '',
    source_meal_id: raw.source_meal_id || null
  });
}

function setSlot(day, meal, recipe) {
  const plan = getPlan();
  if (!plan[day]) plan[day] = {};
  plan[day][meal] = normalizeSlot(recipe, meal);
  savePlan(plan);
}

var _slotModalTarget = null;

function openSlotSettings(day, meal, e) {
  if (e) e.stopPropagation();
  var slot = getSlot(day, meal);
  if (!slot) return;
  _slotModalTarget = { day: day, meal: meal };
  document.getElementById('mp-slot-modal-title').textContent = (slot.name || 'Meal') + ' · ' + day + ' ' + meal;
  document.getElementById('mp-slot-modal-sub').textContent = familyProfiles.length
    ? 'Profiles: ' + familyProfiles.map(function (p) { return p.name; }).join(', ')
    : 'Optional details for this planned meal';
  document.getElementById('mp-slot-serves').value = slot.servings_override != null ? String(slot.servings_override) : '';
  var assignSel = document.getElementById('mp-slot-assignee');
  assignSel.innerHTML = '<option value="">— Anyone / whole household —</option>';
  familyProfiles.forEach(function (p) {
    var o = document.createElement('option');
    o.value = p.name || '';
    o.textContent = p.name || 'Member';
    assignSel.appendChild(o);
  });
  assignSel.value = slot.assignee || '';
  document.getElementById('mp-slot-away').value = (slot.members_away || []).join(', ');
  document.getElementById('mp-slot-guests').value = slot.guest_count != null ? String(slot.guest_count) : '0';
  document.getElementById('mp-slot-note').value = slot.note || '';
  document.getElementById('mp-slot-modal').classList.add('open');
}

function closeSlotModal() {
  document.getElementById('mp-slot-modal').classList.remove('open');
  _slotModalTarget = null;
}

function saveSlotModal() {
  if (!_slotModalTarget) return;
  var slot = getSlot(_slotModalTarget.day, _slotModalTarget.meal);
  if (!slot) return;
  var serves = document.getElementById('mp-slot-serves').value.trim();
  var updated = Object.assign({}, slot, {
    servings_override: serves ? (parseFloat(serves) || serves) : null,
    assignee: document.getElementById('mp-slot-assignee').value.trim() || null,
    members_away: document.getElementById('mp-slot-away').value.trim()
      ? document.getElementById('mp-slot-away').value.split(',').map(function (s) { return s.trim(); }).filter(Boolean) : [],
    guest_count: parseInt(document.getElementById('mp-slot-guests').value, 10) || 0,
    note: document.getElementById('mp-slot-note').value.trim()
  });
  setSlot(_slotModalTarget.day, _slotModalTarget.meal, updated);
  closeSlotModal();
  renderCalendar();
}

function clearSlot(day, meal) {
  const plan = getPlan();
  if (plan[day]) { delete plan[day][meal]; if (!Object.keys(plan[day]).length) delete plan[day]; }
  savePlan(plan);
}

var _mpDragSource = null;

function moveSlot(fromDay, fromMeal, toDay, toMeal) {
  var recipe = getSlot(fromDay, fromMeal);
  if (!recipe) return;
  if (fromDay === toDay && fromMeal === toMeal) return;
  var target = getSlot(toDay, toMeal);
  if (target && !confirm('Replace “' + (target.name || 'meal') + '” with “' + (recipe.name || 'meal') + '”?')) return;
  clearSlot(fromDay, fromMeal);
  setSlot(toDay, toMeal, recipe);
  renderCalendar();
}

function bindSlotDrop(slot, day, meal) {
  slot.dataset.mpDay = day;
  slot.dataset.mpMeal = meal;
  slot.addEventListener('dragover', function (e) {
    if (!_mpDragSource) return;
    e.preventDefault();
    slot.classList.add('drag-over');
  });
  slot.addEventListener('dragleave', function () { slot.classList.remove('drag-over'); });
  slot.addEventListener('drop', function (e) {
    e.preventDefault();
    slot.classList.remove('drag-over');
    if (!_mpDragSource) return;
    moveSlot(_mpDragSource.day, _mpDragSource.meal, day, meal);
    _mpDragSource = null;
  });
}

function prevWeek() { currentWeekOffset--; renderCalendar(); }
function nextWeek() { currentWeekOffset++; renderCalendar(); }
function goThisWeek() { currentWeekOffset = 0; renderCalendar(); }

function goThisMonth() {
  var n = new Date();
  monthMon = n.getMonth(); monthYear = n.getFullYear();
  buildMonthView();
}

function jumpMonthYear() {
  var m = document.getElementById('mth-jump-month');
  var y = document.getElementById('mth-jump-year');
  if (!m || !y) return;
  monthMon = parseInt(m.value, 10); monthYear = parseInt(y.value, 10);
  buildMonthView();
}

function syncMonthJump() {
  var m = document.getElementById('mth-jump-month');
  var y = document.getElementById('mth-jump-year');
  if (!m || !y) return;
  if (!m.options.length) {
    var names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    names.forEach(function(n,i){ var o=document.createElement('option'); o.value=i; o.textContent=n; m.appendChild(o); });
    var thisYear = new Date().getFullYear();
    for (var yy = thisYear - 2; yy <= thisYear + 3; yy++) { var o=document.createElement('option'); o.value=yy; o.textContent=yy; y.appendChild(o); }
  }
  m.value = monthMon; y.value = monthYear;
}

function copyLastWeek() {
  var prev = getPlanByKey(getWeekKey(currentWeekOffset - 1));
  if (!Object.keys(prev).length) { alert('No meals in the previous week to copy.'); return; }
  if (!confirm('Copy all meals from last week into this week?\n\nExisting slots this week will be replaced.')) return;
  savePlan(JSON.parse(JSON.stringify(prev)));
  renderCalendar();
}

async function clearWeek() {
  if (!confirm('Clear ALL meal prep entries for this entire week?\n\nThis cannot be undone. Press OK to confirm, or Cancel to keep your entries.')) return;
  var key = getWeekKey(currentWeekOffset);
  localStorage.removeItem(key);
  clearTimeout(window._mpSyncTimer);
  try {
    var sess = JSON.parse(localStorage.getItem('tcj_session') || 'null');
    if (sess && sess.access_token) {
      await fetch(SUPA_URL + '/rest/v1/rpc/save_my_meal_plan', {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + sess.access_token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ p_week_key: key, p_plan_data: {} })
      });
    }
  } catch (_) {}
  renderCalendar();
}

function renderCalendar() {
  const dates = getWeekDates(currentWeekOffset);
  const today = new Date();
  today.setHours(0,0,0,0);

  // Week label
  const from = dates[0].toLocaleDateString('en-AU',{day:'numeric',month:'short'});
  const to   = dates[6].toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('week-label').textContent = from + ' – ' + to;

  const grid = document.getElementById('mp-grid');
  grid.innerHTML = '';

  // Header row: empty corner + day columns
  const corner = document.createElement('div');
  corner.className = 'mp-col-header';
  corner.style.cssText = 'background:var(--text-ghost);border-bottom:1px solid var(--border);border-right:1px solid var(--border)';
  grid.appendChild(corner);

  dates.forEach(function(date, i) {
    const isToday = date.getTime() === today.getTime();
    const hdr = document.createElement('div');
    hdr.className = 'mp-col-header' + (isToday ? ' today' : '');
    hdr.innerHTML = '<div class="mp-col-day">' + DAYS[i] + '</div><div class="mp-col-date">' + date.getDate() + ' ' + date.toLocaleDateString('en-AU',{month:'short'}) + '</div>';
    grid.appendChild(hdr);
  });

  // Meal rows
  MEALS.forEach(function(meal) {
    const rowLabel = document.createElement('div');
    rowLabel.className = 'mp-row-label';
    rowLabel.textContent = meal;
    grid.appendChild(rowLabel);

    dates.forEach(function(_, di) {
      const day = DAYS[di];
      const recipe = getSlot(day, meal);
      const slot = document.createElement('div');
      slot.className = 'mp-slot';
      bindSlotDrop(slot, day, meal);

      if (recipe) {
        if (groupFilter && !slotVisibleInGroupView(recipe)) {
          const hidden = document.createElement('div');
          hidden.className = 'mp-slot-empty';
          hidden.style.opacity = '0.35';
          hidden.style.cursor = 'default';
          hidden.title = 'Not for ' + (MP_FAMILY_GROUPS[groupFilter] ? MP_FAMILY_GROUPS[groupFilter].label : 'this group');
          hidden.innerHTML = '<span class="mp-slot-add" style="font-size:11px;color:var(--text-mid)">—</span>';
          slot.appendChild(hidden);
          grid.appendChild(slot);
          return;
        }
        var filterProfile = getMemberFilterProfile();
        if (filterProfile && !slotAppliesToMember(recipe, filterProfile)) {
          const hidden = document.createElement('div');
          hidden.className = 'mp-slot-empty';
          hidden.style.opacity = '0.35';
          hidden.style.cursor = 'default';
          hidden.title = 'Not scheduled for ' + (filterProfile.name || 'this member');
          hidden.innerHTML = '<span class="mp-slot-add" style="font-size:11px;color:var(--text-mid)">—</span>';
          slot.appendChild(hidden);
          grid.appendChild(slot);
          return;
        }
        const card = document.createElement('div');
        var st = recipe.status || 'planned';
        card.className = 'mp-recipe-card' + (st !== 'planned' ? ' ' + st : '');
        const emoji = CAT_EMOJI[recipe.category] || '🍽';
        var conflicts = checkRecipeConflicts(recipe);
        var statusLabel = {cooked:'✓ Cooked',skipped:'— Skipped','eating-out':'🍽 Out',leftovers:'🥡 Leftovers'}[st] || '';
        var serveNote = recipe.servings_override ? ' · ' + esc(String(recipe.servings_override)) + ' serves' : '';
        var assigneeNote = recipe.assignee ? '<div class="mp-status-label">👤 ' + esc(recipe.assignee) + '</div>' : '';
        var awayNote = (recipe.members_away && recipe.members_away.length) ? '<div class="mp-status-label">🚶 Away: ' + esc(recipe.members_away.join(', ')) + '</div>' : '';
        var guestNote = (recipe.guest_count > 0) ? '<div class="mp-status-label">➕ ' + recipe.guest_count + ' guest' + (recipe.guest_count === 1 ? '' : 's') + '</div>' : '';
        var mealNote = recipe.note ? '<div class="mp-status-label" style="font-style:italic">"' + esc(recipe.note) + '"</div>' : '';
        card.innerHTML = '<div class="mp-recipe-name">' + emoji + ' ' + esc(recipe.name||'') + serveNote + '</div>' +
          '<div class="mp-recipe-cat">' + esc(recipe.category||'') + '</div>' +
          assigneeNote + awayNote + guestNote + mealNote +
          (statusLabel ? '<div class="mp-status-label">' + statusLabel + '</div>' : '') +
          (conflicts.length ? '<div class="mp-allergy-strip" title="' + esc(conflicts.join(' · ')) + '">' + esc(conflicts[0]) + (conflicts.length > 1 ? ' +' + (conflicts.length - 1) : '') + '</div>' : '') +
          '<div class="mp-status-btns">' +
            (st !== 'cooked' ? '<button class="mp-status-btn" data-st="cooked" title="Cooked">✓</button>' : '') +
            (st !== 'skipped' ? '<button class="mp-status-btn" data-st="skipped">Skip</button>' : '') +
            (st !== 'eating-out' ? '<button class="mp-status-btn" data-st="eating-out">Out</button>' : '') +
            (st !== 'leftovers' ? '<button class="mp-status-btn" data-st="leftovers">Left</button>' : '') +
          '</div>' +
          '<button class="mp-slot-gear" title="Servings, assignee, note">⚙</button>' +
          '<button class="mp-recipe-remove" title="Remove">×</button>';
        var gearBtn = card.querySelector('.mp-slot-gear');
        if (gearBtn) gearBtn.addEventListener('click', function(ev) { openSlotSettings(day, meal, ev); });
        card.querySelector('.mp-recipe-remove').addEventListener('click', function(e) {
          e.stopPropagation(); clearSlot(day, meal); renderCalendar();
        });
        card.querySelectorAll('.mp-status-btn').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            setMealStatus(day, meal, btn.dataset.st, e);
          });
        });
        card.draggable = true;
        card.addEventListener('dragstart', function (e) {
          _mpDragSource = { day: day, meal: meal };
          e.dataTransfer.setData('text/plain', day + '|' + meal);
          e.dataTransfer.effectAllowed = 'move';
        });
        card.addEventListener('dragend', function () {
          _mpDragSource = null;
          document.querySelectorAll('.mp-slot.drag-over').forEach(function (el) { el.classList.remove('drag-over'); });
        });
        card.addEventListener('click', function(e) {
          if (e.target.closest('.mp-status-btn') || e.target.closest('.mp-recipe-remove')) return;
          openPicker(day, meal);
        });
        slot.appendChild(card);
      } else {
        const empty = document.createElement('div');
        empty.className = 'mp-slot-empty';
        empty.innerHTML = '<span class="mp-slot-add">+</span>';
        empty.addEventListener('click', function() { openPicker(day, meal); });
        slot.appendChild(empty);
      }
      grid.appendChild(slot);
    });
  });

  // Set column layout
  grid.style.gridTemplateColumns = '90px repeat(7,1fr)';

  renderSummary();
  renderTodayPanel();
  updateConflictSummary();
}

function renderTodayPanel() {
  var el = document.getElementById('mp-today');
  if (!el || currentView !== 'week') { if (el) el.style.display = 'none'; return; }
  var dates = getWeekDates(currentWeekOffset);
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var todayIdx = -1;
  dates.forEach(function(d, i) { if (d.getTime() === today.getTime()) todayIdx = i; });
  if (todayIdx < 0) { el.style.display = 'none'; return; }
  var day = DAYS[todayIdx];
  var plan = getPlan();
  var rows = [];
  MEALS.forEach(function(meal) {
    var slot = plan[day] && plan[day][meal];
    if (slot) rows.push({ meal: meal, slot: slot });
  });
  if (!rows.length) { el.style.display = 'none'; return; }
  var dateLabel = dates[todayIdx].toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'short' });
  var dinner = rows.find(function(r){ return r.meal === 'Dinner'; });
  el.style.display = 'block';
  var html = '<div class="mp-today-title">Today · ' + esc(dateLabel) + '</div>';
  if (dinner) {
    var dst = dinner.slot.status || 'planned';
    html += '<div class="mp-today-row dinner-focus"><div><strong>🍽 Tonight</strong> · ' + esc(dinner.slot.name || '') +
      ' <span style="color:var(--text-mid);font-size:11px">(' + esc({cooked:'Cooked',skipped:'Skipped','eating-out':'Out',leftovers:'Leftovers'}[dst] || 'Planned') + ')</span></div>' +
      '<div class="mp-today-actions" data-today-day="' + esc(day) + '" data-today-meal="Dinner">' +
      (dst !== 'cooked' ? '<button class="mp-status-btn" data-st="cooked">✓ Cooked</button>' : '') +
      (dst !== 'skipped' ? '<button class="mp-status-btn" data-st="skipped">Skip</button>' : '') +
      (dst !== 'eating-out' ? '<button class="mp-status-btn" data-st="eating-out">Out</button>' : '') +
      '</div></div>';
  }
  rows.filter(function(r){ return r.meal !== 'Dinner'; }).forEach(function(r) {
    var st = {cooked:'✓ Cooked',skipped:'Skipped','eating-out':'Out',leftovers:'Leftovers'}[r.slot.status] || 'Planned';
    html += '<div class="mp-today-row"><span><strong>' + esc(r.meal) + '</strong> · ' + esc(r.slot.name || '') +
      ' <span style="color:var(--text-mid);font-size:11px">(' + esc(st) + ')</span></span>' +
      '<div class="mp-today-actions" data-today-day="' + esc(day) + '" data-today-meal="' + esc(r.meal) + '">' +
      ((r.slot.status||'planned') !== 'cooked' ? '<button class="mp-status-btn" data-st="cooked">✓</button>' : '') +
      '</div></div>';
  });
  var tomorrowIdx = todayIdx + 1;
  if (tomorrowIdx < 7) {
    var tDay = DAYS[tomorrowIdx];
    var tPlan = plan[tDay] || {};
    var tDinner = tPlan.Dinner;
    if (tDinner) {
      html += '<div class="mp-today-preview"><strong>Tomorrow</strong> · Dinner: ' + esc(tDinner.name || '') + '</div>';
    }
  }
  el.innerHTML = html;
  el.querySelectorAll('.mp-today-actions .mp-status-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var wrap = btn.closest('.mp-today-actions');
      setMealStatus(wrap.dataset.todayDay, wrap.dataset.todayMeal, btn.dataset.st, e);
    });
  });
}

function renderSummary() {
  const plan = getPlan();
  let total = 0, cooked = 0, uniqueRecipes = {}, days = 0;
  DAYS.forEach(function(day) {
    let hasMeal = false;
    MEALS.forEach(function(meal) {
      const r = plan[day] && plan[day][meal];
      if (r) {
        total++;
        if (r.status === 'cooked') cooked++;
        uniqueRecipes[r.id||r.name] = true;
        hasMeal = true;
      }
    });
    if (hasMeal) days++;
  });
  const unique = Object.keys(uniqueRecipes).length;
  document.getElementById('mp-summary').innerHTML =
    '<div class="mp-summary-title">This Week at a Glance</div>' +
    '<div class="mp-summary-grid">' +
    '<div class="mp-summary-stat"><div class="mp-summary-num">' + total + '</div><div class="mp-summary-label">Meals Planned</div></div>' +
    '<div class="mp-summary-stat"><div class="mp-summary-num">' + cooked + '</div><div class="mp-summary-label">Cooked</div></div>' +
    '<div class="mp-summary-stat"><div class="mp-summary-num">' + unique + '</div><div class="mp-summary-label">Unique Recipes</div></div>' +
    '<div class="mp-summary-stat"><div class="mp-summary-num">' + days + '</div><div class="mp-summary-label">Days Covered</div></div>' +
    '</div>';
}


// ── MODES & FAMILY PROFILES ─────────────────────────────────────
let currentMode = 'individual';
let familyProfiles = [];
let memberFilterId = null;

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mp-mode-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  const familyPanel = document.getElementById('mp-family-flags');
  if (mode === 'family' || mode === 'couple' || mode === 'group') {
    renderFamilyFlags();
    familyPanel.style.display = 'block';
    renderGroupFilterBar();
    renderMemberFilterBar();
  } else {
    familyPanel.style.display = 'none';
    memberFilterId = null;
    groupFilter = '';
    var gf = document.getElementById('mp-group-filter');
    if (gf) gf.style.display = 'none';
    var mf = document.getElementById('mp-member-filter');
    if (mf) mf.style.display = 'none';
  }
  updateConflictSummary();
  renderCalendar();
}

function getMemberFilterProfile() {
  if (!memberFilterId) return null;
  return familyProfiles.find(function(p) { return p.id === memberFilterId; }) || null;
}

function slotAppliesToMember(slot, profile) {
  if (!profile || !slot) return true;
  if (groupFilter && !profilesInGroup(groupFilter).some(function (p) { return p.id === profile.id; })) return false;
  var name = (profile.name || '').toLowerCase();
  if (!name) return true;
  if (slot.assignee && slot.assignee.toLowerCase() !== name) return false;
  if (slot.members_away && slot.members_away.some(function(a) { return a.toLowerCase() === name; })) return false;
  return true;
}

function slotVisibleInGroupView(slot) {
  if (!groupFilter || !slot) return true;
  var groupProfiles = profilesInGroup(groupFilter);
  if (!slot.assignee) return true;
  return groupProfiles.some(function (p) {
    return (p.name || '').toLowerCase() === String(slot.assignee).toLowerCase();
  });
}

function setMemberFilter(id, chip) {
  memberFilterId = id || null;
  document.querySelectorAll('#mp-member-filter .mp-filter-chip').forEach(function(b) {
    b.classList.toggle('active', chip ? b === chip : !b.dataset.member);
  });
  renderCalendar();
}

function renderMemberFilterBar() {
  var bar = document.getElementById('mp-member-filter');
  if (!bar) return;
  if (!familyProfiles.length || currentMode === 'individual') {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';
  var visible = groupFilter ? profilesInGroup(groupFilter) : familyProfiles;
  var chips = '<button type="button" class="mp-filter-chip' + (memberFilterId ? '' : ' active') + '" data-member="" onclick="setMemberFilter(null,this)">All in group</button>';
  visible.forEach(function(p) {
    chips += '<button type="button" class="mp-filter-chip' + (memberFilterId === p.id ? ' active' : '') + '" data-member="' + esc(p.id) + '" onclick="setMemberFilter(\'' + p.id + '\',this)">' + esc(p.name || 'Member') + '</button>';
  });
  bar.innerHTML = '<span style="font-family:\'DM Sans\',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-mid);margin-right:8px">View meals for:</span>' + chips;
}

async function loadFamilyProfiles() {
  const session = JSON.parse(localStorage.getItem('tcj_session')||'null');
  if (!session) return;
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/rpc/get_my_family_profiles', {
      method:'POST', headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+session.access_token,'Content-Type':'application/json'},
      body:JSON.stringify({})
    });
    if (res.ok) familyProfiles = await res.json() || [];
    if (memberFilterId && !familyProfiles.some(function(p) { return p.id === memberFilterId; })) memberFilterId = null;
    renderGroupFilterBar();
    renderMemberFilterBar();
    updateConflictSummary();
  } catch(_) {}
}

function renderFamilyFlags() {
  const el = document.getElementById('mp-family-flags');
  if (!familyProfiles.length) {
    el.innerHTML = '<span style="color:var(--text-mid)">No family profiles set up yet. To add a family profile, go to <strong>Mise en Place → Family Profiles</strong> and complete the profile creation process there. <a href="family-profiles.html" style="color:var(--accent)">Add profiles →</a></span>';
    return;
  }
  const REL_EMOJI = {self:'👤',partner:'💑',child:'👦',toddler:'🧒',baby:'👶',elderly:'👴',regular_guest:'👤',other:'👤'};
  const SPICE_ICONS = {none:'🚫',mild:'😌',medium:'🌶',hot:'🌶🌶',very_hot:'🌶🌶🌶'};
  el.innerHTML = '<div style="font-family:DM Sans,sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px">Cooking for these people:</div>' +
    familyProfiles.map(function(p) {
      const emoji = REL_EMOJI[p.relationship]||'👤';
      const diets = (p.dietary_needs||[]).concat(p.allergies||[]).slice(0,3);
      const spiceIcon = SPICE_ICONS[p.spice_preference]||'🌶';
      return '<div style="display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 10px;margin:3px">' +
        '<span>'+emoji+'</span><span style="font-weight:500;color:var(--text-high)">'+esc(p.name||'')+'</span>' +
        (diets.length ? '<span style="color:var(--danger);font-size:10px">⚠ '+esc(diets.join(', '))+'</span>' : '') +
        '<span title="Spice preference">'+spiceIcon+'</span></div>';
    }).join('');
}

function checkRecipeConflicts(recipe) {
  if (typeof AllergyEngine === 'undefined') return [];
  return AllergyEngine.checkRecipe(recipe, familyProfiles, currentMode);
}

function updateConflictSummary() {
  const el = document.getElementById('mp-conflict-summary');
  if (!el) return;
  if (currentMode === 'individual' || !familyProfiles.length) { el.innerHTML = ''; return; }
  var warnCount = 0;
  var plan = getPlan();
  DAYS.forEach(function(day) {
    MEALS.forEach(function(meal) {
      var slot = plan[day] && plan[day][meal];
      if (slot) warnCount += checkRecipeConflicts(slot).length;
    });
  });
  el.innerHTML = '<span title="Allergies checked via family profiles + ingredient keywords (v1)">👪 ' + familyProfiles.length + ' profile' + (familyProfiles.length === 1 ? '' : 's') + '</span>' +
    (warnCount ? ' · <span class="mp-conflict-badge">' + warnCount + ' warning' + (warnCount === 1 ? '' : 's') + ' this week</span>' : '');
}

// ── PANTRY-AWARE GROCERY (override from recipe-page) ─────────────
function getPantryItems() {
  try { return JSON.parse(localStorage.getItem('tcj_pantry')||'[]'); }
  catch(_) { return []; }
}
function isInPantry(name) {
  var n = name.toLowerCase().trim();
  var item = getPantryItems().find(function(p){ return p.name && p.name.toLowerCase().trim() === n; });
  if (!item) return false;
  if (item.is_staple) return true;
  return (item.qty || 0) > 0;
}

function setMealStatus(day, meal, status, e) {
  if (e) e.stopPropagation();
  var slot = getSlot(day, meal);
  if (!slot) return;
  if (status === 'cooked') { markMealCooked(day, meal, e); return; }
  setSlot(day, meal, Object.assign({}, slot, { status: status }));
  if (status === 'leftovers') promptLeftoversToFridge(day, meal, slot);
  renderCalendar();
}

async function promptPantryUseUp(slot) {
  if (!slot || !slot.id) return;
  try {
    var sess = JSON.parse(localStorage.getItem('tcj_session') || 'null');
    var headers = { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' };
    if (sess && sess.access_token) headers.Authorization = 'Bearer ' + sess.access_token;
    var res = await fetch(SUPA_URL + '/rest/v1/rpc/get_public_recipe', {
      method: 'POST', headers: headers, body: JSON.stringify({ p_id: slot.id })
    });
    if (!res.ok) return;
    var recipe = await res.json();
    if (!recipe) return;
    var pantry = getPantryItems();
    var matched = [];
    (recipe.ingredients || []).forEach(function(sec) {
      (sec.items || []).forEach(function(ing) {
        var n = (ing.ingredient || ing.name || '').toLowerCase().trim();
        if (!n) return;
        var p = pantry.find(function(x) { return x.name && x.name.toLowerCase().trim() === n && (x.qty || 0) > 0; });
        if (p) matched.push(p);
      });
    });
    if (!matched.length) return;
    var names = matched.map(function(p) { return p.name; }).join(', ');
    if (!confirm('Use up pantry items for this meal?\n\n' + names)) return;
    matched.forEach(function(p) { p.qty = Math.max(0, (parseFloat(p.qty) || 0) - 1); });
    savePantryLocal(pantry);
  } catch(_) {}
}

async function promptLeftoversToFridge(day, meal, slot, options) {
  options = options || {};
  if (!options.skipConfirm && !confirm('Save leftovers from "' + (slot.name || 'this meal') + '" to your fridge?\n\nDefault expiry: 3 days.')) return;
  var pantry = getPantryItems();
  var exp = new Date();
  exp.setDate(exp.getDate() + 3);
  pantry.push({
    id: 'pt_' + Date.now(),
    name: (slot.name || 'Leftovers') + ' (' + day + ' ' + meal + ')',
    qty: 1,
    unit: 'portion',
    category: 'Other',
    location: 'fridge',
    expiry_date: exp.toISOString().slice(0, 10),
    is_staple: false,
    updated: new Date().toISOString()
  });
  savePantryLocal(pantry);
}

function savePantryLocal(list) {
  if (typeof PantryUtils !== 'undefined') PantryUtils.savePantry(list);
  else localStorage.setItem('tcj_pantry', JSON.stringify(list));
}

async function prefetchPantryFromCloud() {
  try {
    var sess = JSON.parse(localStorage.getItem('tcj_session') || 'null');
    if (!sess || !sess.access_token) return;
    var res = await fetch(SUPA_URL + '/rest/v1/rpc/get_my_pantry', {
      method: 'POST',
      headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + sess.access_token, 'Content-Type': 'application/json' },
      body: '{}'
    });
    if (!res.ok) return;
    var data = await res.json();
    var items = Array.isArray(data) ? data : (data.items || []);
    if (!Array.isArray(items)) return;
    localStorage.setItem('tcj_pantry', JSON.stringify(items));
    if (data.updated_at) localStorage.setItem('tcj_pantry_ts', String(new Date(data.updated_at).getTime()));
  } catch (_) {}
}

async function markMealCooked(day, meal, e) {
  if (e) e.stopPropagation();
  var slot = getSlot(day, meal);
  if (!slot) return;
  var dates = getWeekDates(currentWeekOffset);
  var dayIdx = DAYS.indexOf(day);
  var cookedDate = dates[dayIdx].toISOString().slice(0, 10);
  try {
    var sess = JSON.parse(localStorage.getItem('tcj_session') || 'null');
    if (sess && sess.access_token) {
      await fetch(SUPA_URL + '/rest/v1/rpc/log_cooking_event', {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + sess.access_token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          p_recipe_id: slot.id || null,
          p_recipe_name: slot.name || '',
          p_cooked_at: cookedDate,
          p_notes: 'Meal planner · ' + day + ' ' + meal,
          p_servings: slot.servings_override || slot.servings || 1,
          p_occasion: meal,
          p_rating: null
        })
      });
    }
  } catch(_) {}
  setSlot(day, meal, Object.assign({}, slot, { status: 'cooked', cooked_at: cookedDate }));
  await promptPantryUseUp(slot);
  if (confirm('Any leftovers to save to the fridge?')) {
    await promptLeftoversToFridge(day, meal, slot, { skipConfirm: true });
  }
  if (confirm('Add ingredients for this meal to your grocery list?')) {
    await exportMealsToGrocery([{ slot: slot, day: day, meal: meal, weekKey: getWeekKey(currentWeekOffset) }], '');
  }
  renderCalendar();
}

// ── RECIPE PICKER ────────────────────────────────────────────────
function mpRecipeHeaders() {
  var h = { apikey: SUPA_KEY, 'Content-Type': 'application/json' };
  try {
    var sess = JSON.parse(localStorage.getItem('tcj_session') || 'null');
    if (sess && sess.access_token) h.Authorization = 'Bearer ' + sess.access_token;
  } catch (_) {}
  return h;
}

function normalizePickerRecipe(r) {
  return Object.assign({}, r, { name: r.recipe_name || r.name || '' });
}

async function fetchPickerRecipes(reset) {
  if (pickerLoading) return;
  pickerLoading = true;
  var el = document.getElementById('mp-results');
  if (reset) {
    pickerOffset = 0;
    pickerRecipes = [];
    pickerHasMore = false;
    if (el) el.innerHTML = '<div class="mp-result-empty">Loading recipes…</div>';
  }
  var q = (document.getElementById('mp-search').value || '').trim();
  try {
    var res = await fetch(SUPA_URL + '/rest/v1/rpc/get_approved_recipes', {
      method: 'POST',
      headers: mpRecipeHeaders(),
      body: JSON.stringify({
        p_category: catFilter || null,
        p_sub_category: subFilter || null,
        p_division: divFilter || null,
        p_search: q || null,
        p_limit: PICKER_PAGE_SIZE,
        p_offset: pickerOffset
      })
    });
    if (!res.ok) throw new Error('fetch failed');
    var rows = (await res.json());
    rows = (Array.isArray(rows) ? rows : []).map(normalizePickerRecipe);
    if (reset) pickerRecipes = rows;
    else pickerRecipes = pickerRecipes.concat(rows);
    pickerHasMore = rows.length >= PICKER_PAGE_SIZE;
    pickerOffset += rows.length;
    renderPickerResults();
  } catch (_) {
    if (reset && el) {
      el.innerHTML = '<div class="mp-result-empty">Could not load recipes. Check your connection and try again.</div>';
    }
  }
  pickerLoading = false;
}

function loadMorePickerRecipes() {
  if (!pickerHasMore || pickerLoading) return;
  fetchPickerRecipes(false);
}

function openPicker(day, meal) {
  pickerTarget = {day, meal};
  document.getElementById('mp-modal-title').textContent = 'Choose ' + meal + ' for ' + day;
  document.getElementById('mp-search').value = '';
  catFilter = '';
  subFilter = '';
  divFilter = '';
  prepFilterMax = null;
  document.querySelectorAll('#mp-prep-filters .mp-filter-chip').forEach(function (b) {
    b.classList.toggle('active', b.dataset.prep === 'all');
  });
  buildCategoryFilters();
  buildHierarchyFilters();
  document.getElementById('mp-modal').classList.add('open');
  fetchPickerRecipes(true);
  setTimeout(function() { document.getElementById('mp-search').focus(); }, 100);
}

function closePicker() {
  document.getElementById('mp-modal').classList.remove('open');
  pickerTarget = null;
}

function setPrepFilter(max, btn) {
  prepFilterMax = max === 'all' ? null : parseInt(max, 10);
  document.querySelectorAll('#mp-prep-filters .mp-filter-chip').forEach(function (b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderPickerResults();
}

function applyRecipeFilters() {
  clearTimeout(pickerSearchTimer);
  pickerSearchTimer = setTimeout(function () { fetchPickerRecipes(true); }, 280);
}

function searchRecipes(q) { applyRecipeFilters(); }

function renderPickerResults() {
  var el = document.getElementById('mp-results');
  if (!el) return;
  var q = (document.getElementById('mp-search').value || '').trim();
  var filtered = pickerRecipes.filter(function (r) {
    if (prepFilterMax != null) {
      var total = recipeTotalMinutes(r);
      if (!total || total > prepFilterMax) return false;
    }
    if (hideUnsafeRecipes && typeof AllergyEngine !== 'undefined' && familyProfiles.length) {
      if (AllergyEngine.isRecipeUnsafe(r, familyProfiles) || checkRecipeConflicts(r).length) return false;
    }
    return true;
  });

  if (!filtered.length && !pickerLoading) {
    el.innerHTML = '<div class="mp-result-empty">' +
      (q ? 'No recipes match “' + esc(q) + '”. Try a shorter name or check spelling.' :
        'No recipes in this category. Try another filter or search by name.') +
      '</div>';
    return;
  }

  el.innerHTML = '';
  if (!q && !catFilter) {
    var hint = document.createElement('div');
    hint.style.cssText = 'font-family:DM Sans,sans-serif;font-size:11px;color:var(--text-mid);padding:4px 8px 10px;line-height:1.5';
    hint.textContent = 'Showing recent recipes. Type to search the full library — every approved recipe is searchable.';
    el.appendChild(hint);
  }

  filtered.forEach(function (r) {
    var item = document.createElement('div');
    item.className = 'mp-result-item';
    var emoji = CAT_EMOJI[r.category] || '🍽';
    var quickWarn = checkRecipeConflicts(r);
    var mins = recipeTotalMinutes(r);
    var timeNote = mins ? ' · ⏱ ' + mins + ' min' : '';
    var aka = r.also_known_as ? ' <span style="font-size:11px;color:var(--text-mid)">(' + esc(r.also_known_as) + ')</span>' : '';
    item.innerHTML = '<div class="mp-result-emoji">' + emoji + '</div><div style="flex:1"><div class="mp-result-name">' + esc(r.name || '') + aka + '</div><div class="mp-result-cat">' + esc(r.category || '') + (r.origin_country ? ' · ' + esc(r.origin_country) : '') + timeNote + '</div>' +
      (quickWarn.length ? '<div class="mp-result-warn">' + esc(quickWarn[0]) + '</div>' : '') + '</div>';
    item.addEventListener('click', function () { assignRecipeFromPicker(r); });
    el.appendChild(item);
  });

  if (pickerHasMore) {
    var more = document.createElement('button');
    more.type = 'button';
    more.className = 'mp-btn mp-btn-ghost';
    more.style.cssText = 'width:100%;margin-top:8px';
    more.textContent = pickerLoading ? 'Loading…' : 'Load more recipes';
    more.disabled = pickerLoading;
    more.addEventListener('click', loadMorePickerRecipes);
    el.appendChild(more);
  }
}

async function assignRecipeFromPicker(r) {
  if (!pickerTarget) return;
  var recipe = Object.assign({}, r, { name: r.name || r.recipe_name || '' });
  if (currentMode !== 'individual' && familyProfiles.length && r.id) {
    try {
      var sess = JSON.parse(localStorage.getItem('tcj_session') || 'null');
      var headers = { apikey: SUPA_KEY, 'Content-Type': 'application/json' };
      if (sess && sess.access_token) headers.Authorization = 'Bearer ' + sess.access_token;
      var res = await fetch(SUPA_URL + '/rest/v1/rpc/get_public_recipe', {
        method: 'POST', headers: headers, body: JSON.stringify({ p_id: r.id })
      });
      if (res.ok) {
        var full = await res.json();
        if (full) recipe = Object.assign({}, recipe, full, { name: full.recipe_name || recipe.name });
      }
    } catch(_) {}
    var warnings = checkRecipeConflicts(recipe);
    if (warnings.length && typeof AllergyEngine !== 'undefined') {
      if (!confirm('Allergy / dietary warning\n\n' + AllergyEngine.formatConfirmList(warnings, recipe, familyProfiles) + '\n\nAssign this meal anyway?')) return;
    }
  }
  setSlot(pickerTarget.day, pickerTarget.meal, {
    id: r.id, recipe_id: r.id, name: recipe.name, category: r.category,
    sub_category: r.sub_category || recipe.sub_category || null,
    division: r.division || recipe.division || null,
    image_url: r.image_url,
    dietary_tags: recipe.dietary_tags || r.dietary_tags,
    spice_level: recipe.spice_level || r.spice_level,
    meal_type: pickerTarget.meal, status: 'planned',
    planned_at: new Date().toISOString()
  });
  closePicker();
  renderCalendar();
}

// ── GROCERY EXPORT ───────────────────────────────────────────────
function toggleGroceryMenu(e) {
  if (e) e.stopPropagation();
  var drop = document.getElementById('mp-grocery-drop');
  if (drop) drop.classList.toggle('open');
}

function closeGroceryMenu() {
  var drop = document.getElementById('mp-grocery-drop');
  if (drop) drop.classList.remove('open');
}

function getEffectiveServes(slot, recipe) {
  var base = slot.servings_override || slot.servings || recipe.servings || 1;
  var away = (slot.members_away && slot.members_away.length) ? slot.members_away.length : 0;
  var guests = parseInt(slot.guest_count, 10) || 0;
  var recipeDefault = recipe.servings || 1;
  var adjusted = parseFloat(base);
  if (isNaN(adjusted)) adjusted = recipeDefault;
  if (away > 0) adjusted = Math.max(1, adjusted - away);
  if (guests > 0) adjusted = adjusted + guests;
  return adjusted;
}

async function addSlotToGroceryData(data, slot, day, meal, weekKey, stats) {
  if (!slot || !slot.id) return;
  var st = slot.status || 'planned';
  if (st === 'skipped' || st === 'eating-out' || st === 'cooked') return;
  var entryId = slot.id + '@' + day + '-' + meal;
  if (data.recipes.find(function (r) { return r.id === entryId; })) { stats.skippedDup++; return; }
  try {
    var res = await fetch(SUPA_URL + '/rest/v1/rpc/get_public_recipe', {
      method: 'POST', headers: stats.headers,
      body: JSON.stringify({ p_id: slot.id })
    });
    if (!res.ok) return;
    var recipe = await res.json();
    if (!recipe) return;
    var serves = getEffectiveServes(slot, recipe);
    var baseServes = recipe.servings || 1;
    var scale = baseServes ? serves / baseServes : 1;
    var ingredients = [];
    var label = day + ' · ' + meal;
    (recipe.ingredients || []).forEach(function (sec) {
      var sectionName = sec.section || sec.section_name || sec.title || '';
      (sec.items || []).forEach(function (ing) {
        var name = ing.ingredient || ing.name || '';
        if (!name) return;
        if (isInPantry(name)) { stats.skipped++; return; }
        var qty = ing.qty;
        if (scale !== 1 && qty != null && qty !== '') {
          var n = parseFloat(String(qty).replace(/[^\d./]/g, ''));
          if (!isNaN(n)) qty = String(Math.round(n * scale * 100) / 100);
        }
        ingredients.push(GroceryUtils.enrichIngredient({
          name: name, qty: qty, unit: ing.unit || '', section: sectionName,
          category: ing.category || 'Other',
          source: 'meal-plan', source_ref: weekKey + ':' + day + ':' + meal,
          source_label: label
        }, { source: 'meal-plan', source_ref: entryId, source_label: label }));
      });
    });
    data.recipes.push({
      id: entryId,
      name: (recipe.recipe_name || slot.name) + ' (' + day + ' ' + meal + ')',
      servings: serves,
      source: 'meal-plan',
      ingredients: ingredients
    });
    stats.added++;
  } catch (_) {}
}

async function exportMealsToGrocery(slots, emptyMsg) {
  if (!slots.length) { alert(emptyMsg || 'No recipes planned for that range.'); return; }
  await prefetchPantryFromCloud();
  var data = GroceryUtils.loadGrocery();
  var stats = { added: 0, skipped: 0, skippedDup: 0, headers: { apikey: SUPA_KEY, 'Content-Type': 'application/json' } };
  var sess = JSON.parse(localStorage.getItem('tcj_session') || 'null');
  if (sess && sess.access_token) stats.headers.Authorization = 'Bearer ' + sess.access_token;
  for (var i = 0; i < slots.length; i++) {
    var s = slots[i];
    await addSlotToGroceryData(data, s.slot, s.day, s.meal, s.weekKey, stats);
  }
  GroceryUtils.saveGrocery(data);
  if (stats.added > 0) {
    alert(stats.added + ' meal(s) added to your grocery list!' +
      (stats.skipped ? ' ' + stats.skipped + ' ingredient(s) skipped (pantry/staples).' : '') +
      (stats.skippedDup ? ' ' + stats.skippedDup + ' already on list.' : ''));
    window.location.href = 'grocery.html';
  } else {
    alert(stats.skippedDup ? 'All planned meals are already on your grocery list.' : 'Could not load recipe data for planned meals.');
  }
}

async function addToGrocery() {
  var plan = getPlan();
  var weekKey = getWeekKey(currentWeekOffset);
  var slots = [];
  DAYS.forEach(function (day) {
    MEALS.forEach(function (meal) {
      var slot = plan[day] && plan[day][meal];
      if (slot && slot.id) slots.push({ slot: slot, day: day, meal: meal, weekKey: weekKey });
    });
  });
  await exportMealsToGrocery(slots, 'No recipes planned this week.');
}

async function addToGroceryRange() {
  var dates = getWeekDates(currentWeekOffset);
  var defaultStart = dates[0].toISOString().slice(0, 10);
  var defaultEnd = dates[6].toISOString().slice(0, 10);
  var start = prompt('Grocery list start date (YYYY-MM-DD)', defaultStart);
  if (start === null) return;
  var end = prompt('Grocery list end date (YYYY-MM-DD)', defaultEnd);
  if (end === null) return;
  start = start.trim(); end = end.trim();
  if (!/^\d{4}-\d{2}-\d{2}$/.test(start) || !/^\d{4}-\d{2}-\d{2}$/.test(end)) {
    alert('Please use YYYY-MM-DD format.'); return;
  }
  if (start > end) { alert('Start date must be on or before end date.'); return; }
  var slots = [];
  var cur = new Date(start + 'T00:00:00');
  var endD = new Date(end + 'T00:00:00');
  while (cur <= endD) {
    var ds = cur.toISOString().slice(0, 10);
    var plan = getPlanByKey(getWeekKeyForDate(cur));
    var day = dayKeyForDateStr(ds);
    MEALS.forEach(function (meal) {
      var slot = plan[day] && plan[day][meal];
      if (slot && slot.id) slots.push({ slot: slot, day: day, meal: meal, weekKey: getWeekKeyForDate(cur) });
    });
    cur.setDate(cur.getDate() + 1);
  }
  await exportMealsToGrocery(slots, 'No recipes planned between ' + start + ' and ' + end + '.');
}

function printWeek() {
  var dates = getWeekDates(currentWeekOffset);
  var from = dates[0].toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
  var to = dates[6].toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  var plan = getPlan();
  var html = '<div class="mp-print-title">Meal Plan</div>' +
    '<div class="mp-print-sub">' + esc(from) + ' – ' + esc(to) + '</div>' +
    '<table class="mp-print-table"><thead><tr><th>Meal</th>';
  dates.forEach(function (d, i) {
    html += '<th>' + esc(DAYS[i]) + '<br><span style="font-weight:400">' + d.getDate() + ' ' + d.toLocaleDateString('en-AU', { month: 'short' }) + '</span></th>';
  });
  html += '</tr></thead><tbody>';
  MEALS.forEach(function (meal) {
    html += '<tr><th>' + esc(meal) + '</th>';
    DAYS.forEach(function (day) {
      var slot = plan[day] && plan[day][meal];
      if (!slot) {
        html += '<td>—</td>';
      } else {
        var st = { cooked: 'Cooked', skipped: 'Skipped', 'eating-out': 'Eating out', leftovers: 'Leftovers' }[slot.status] || '';
        var warns = checkRecipeConflicts(slot);
        html += '<td class="mp-print-slot"><strong>' + esc(slot.name || '') + '</strong>';
        if (slot.assignee) html += '<br>👤 ' + esc(slot.assignee);
        if (slot.servings_override) html += '<br>' + esc(String(slot.servings_override)) + ' serves';
        if (slot.note) html += '<br><em>' + esc(slot.note) + '</em>';
        if (st) html += '<br><span class="mp-print-status">' + esc(st) + '</span>';
        if (warns.length) html += '<br><span class="mp-print-warn">' + esc(warns[0]) + '</span>';
        html += '</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  var out = document.getElementById('mp-print-output');
  if (out) out.innerHTML = html;
  window.print();
}

function initPickerFilters() {
  buildCategoryFilters();
  buildHierarchyFilters();
}

var hideUnsafeRecipes = false;

async function loadAllergySettings() {
  hideUnsafeRecipes = false;
  try {
    if (typeof AllergyEngine !== 'undefined') await AllergyEngine.loadSubstitutionsFromDB(SUPA_URL, SUPA_KEY);
    var sess = JSON.parse(localStorage.getItem('tcj_session') || 'null');
    if (!sess || !sess.access_token) return;
    var res = await fetch(SUPA_URL + '/rest/v1/rpc/get_my_allergy_settings', {
      method: 'POST',
      headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + sess.access_token, 'Content-Type': 'application/json' },
      body: '{}'
    });
    if (res.ok) {
      var data = await res.json();
      hideUnsafeRecipes = !!(data && data.hide_unsafe_recipes);
    }
  } catch (_) {}
}

// ── MONTH VIEW ────────────────────────────────────────────────────
var currentView = 'week';
var monthYear, monthMon;

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.mp-view-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var weekEl  = document.getElementById('mp-grid');
  var modeBar = document.querySelector('.mp-mode-bar');
  var summary = document.getElementById('mp-summary');
  var weekNav = document.querySelector('.mp-week-nav');
  var monthEl = document.getElementById('mp-month-view');
  if (v === 'month') {
    if (weekEl)  weekEl.style.display  = 'none';
    if (modeBar) modeBar.style.display = 'none';
    if (summary) summary.style.display = 'none';
    if (weekNav) weekNav.style.display = 'none';
    if (monthEl) monthEl.style.display = 'block';
    var monthNav = document.getElementById('mp-month-nav');
    if (monthNav) monthNav.style.display = 'flex';
    buildMonthView();
  } else {
    if (weekEl)  weekEl.style.display  = '';
    if (modeBar) modeBar.style.display = '';
    if (summary) summary.style.display = '';
    if (weekNav) weekNav.style.display = '';
    if (monthEl) monthEl.style.display = 'none';
    var monthNav = document.getElementById('mp-month-nav');
    if (monthNav) monthNav.style.display = 'none';
    renderCalendar();
  }
}

function changeMonthView(dir) {
  monthMon += dir;
  if (monthMon < 0)  { monthMon = 11; monthYear--; }
  if (monthMon > 11) { monthMon = 0;  monthYear++; }
  buildMonthView();
}

function getMonthWeekKey(ds) {
  return getWeekKeyForDate(new Date(ds + 'T00:00:00'));
}

function buildMonthView() {
  var n = new Date();
  if (monthYear === undefined) { monthYear = n.getFullYear(); monthMon = n.getMonth(); }
  syncMonthJump();
  var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var labelEl = document.getElementById('mth-label');
  if (labelEl) labelEl.textContent = new Date(monthYear, monthMon, 1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});

  var dowEl = document.getElementById('mth-dow');
  if (dowEl && !dowEl.children.length)
    dowEl.innerHTML = DAYS.map(function(d){ return '<div class="mth-dow">' + d + '</div>'; }).join('');

  var body = document.getElementById('mth-body');
  if (!body) return;
  body.innerHTML = '';

  var first = new Date(monthYear, monthMon, 1).getDay();
  var days  = new Date(monthYear, monthMon + 1, 0).getDate();
  var today = new Date().toISOString().slice(0,10);
  for (var i = 0; i < first; i++) {
    var pd = new Date(monthYear, monthMon, 1 - first + i);
    var cell = document.createElement('div');
    cell.className = 'mth-cell other';
    cell.innerHTML = '<div class="mth-day-num">' + pd.getDate() + '</div>';
    body.appendChild(cell);
  }

  for (var d = 1; d <= days; d++) {
    var yr  = String(monthYear);
    var mo  = String(monthMon + 1).padStart(2, '0');
    var dy  = String(d).padStart(2, '0');
    var ds  = yr + '-' + mo + '-' + dy;
    var dow = new Date(ds + 'T00:00:00').getDay();
    var wk  = getMonthWeekKey(ds);
    var saved = getPlanByKey(wk);
    var dayKey = dayKeyForDateStr(ds);
    var meals = [];
    MEALS.forEach(function(meal){
      var slot = saved[dayKey] && saved[dayKey][meal];
      if (slot && slot.name) meals.push(slot.name);
    });

    var cell = document.createElement('div');
    cell.className = 'mth-cell' + (ds === today ? ' today' : '');
    cell.innerHTML = '<div class="mth-day-num">' + d + '</div>';
    meals.slice(0,2).forEach(function(m){
      var dot = document.createElement('div');
      dot.className = 'mth-meal-dot';
      dot.textContent = m;
      cell.appendChild(dot);
    });
    if (meals.length > 2) {
      var more = document.createElement('div');
      more.className = 'mth-more';
      more.textContent = '+' + (meals.length - 2) + ' more';
      cell.appendChild(more);
    }
    (function(dateStr, weekKey){
      cell.addEventListener('click', function(){ jumpToDay(dateStr, weekKey); });
    })(ds, wk);
    body.appendChild(cell);
  }

  var remaining = 7 - ((first + days) % 7 || 7);
  for (var i = 1; i <= remaining && remaining < 7; i++) {
    var cell2 = document.createElement('div');
    cell2.className = 'mth-cell other';
    cell2.innerHTML = '<div class="mth-day-num">' + i + '</div>';
    body.appendChild(cell2);
  }
}

function jumpToDay(ds, wk) {
  // Compute the week offset for the clicked day relative to the current week,
  // then open the Week view on it — meals are added there (interim until MP-04).
  var target = new Date(ds + 'T00:00:00');
  var tDay = target.getDay();
  var targetMon = new Date(target); targetMon.setDate(target.getDate() - tDay + (tDay === 0 ? -6 : 1));
  var thisMon = getWeekDates(0)[0];
  currentWeekOffset = Math.round((targetMon - thisMon) / (7 * 86400000));
  setView('week', document.getElementById('view-week-btn'));
  renderCalendar();
}
