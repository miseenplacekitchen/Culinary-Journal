<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Plan weekly meals, assign recipes to days, and coordinate cooking for your household.">
  <link rel="canonical" href="https://theculinaryjournal.site/meal-planner.html">
  <title>Meal Planner — The Culinary Journal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
<script src="supabase-config.js"></script>
  <style>
    .page-bg { min-height:100vh; background:var(--bg); }
    .mp-wrap { max-width:1200px; margin:0 auto; padding:24px 16px 80px; }

    /* Header */
    .mp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
    .mp-title  { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:700; color:var(--text-high); }
    .mp-week-nav { display:flex; align-items:center; gap:12px; }
    .mp-week-btn { padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--text-mid); font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; }
    .mp-week-btn:hover { border-color:var(--accent); color:var(--accent); }
    .mp-week-label { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--text-high); min-width:160px; text-align:center; }
    .mp-actions { display:flex; gap:8px; }
    .mp-btn { padding:9px 18px; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; border:none; }
    .mp-btn-primary { background:var(--accent); color:#fff; }
    .mp-btn-ghost   { background:none; border:1px solid var(--border); color:var(--text-mid); }
    .mp-btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

    /* Calendar grid */
    .mp-grid { display:grid; grid-template-columns: 90px repeat(7,1fr); gap:0; border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .mp-col-header { text-align:center; padding:12px 6px; background:var(--text-ghost); border-bottom:1px solid var(--border); border-right:1px solid var(--border); }
    .mp-col-header:last-child { border-right:none; }
    .mp-col-day  { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; color:var(--text-high); }
    .mp-col-date { font-family:'DM Sans',sans-serif; font-size:10px; color:var(--text-mid); margin-top:2px; }
    .mp-col-header.today { background:rgb(from var(--accent) r g b / 0.1); }
    .mp-col-header.today .mp-col-day { color:var(--accent); }
    .mp-row-label { display:flex; align-items:center; justify-content:center; padding:8px 6px; background:var(--text-ghost); border-right:1px solid var(--border); border-bottom:1px solid rgba(from var(--border) r g b / 0.4); font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-mid); writing-mode:horizontal-tb; text-align:center; min-height:90px; }
    .mp-row-label:last-child { border-bottom:none; }
    .mp-slot { border-right:1px solid rgba(from var(--border) r g b / 0.4); border-bottom:1px solid rgba(from var(--border) r g b / 0.4); min-height:90px; padding:6px; position:relative; }
    .mp-slot.drag-over { background:rgb(from var(--accent) r g b / 0.08); outline:2px dashed var(--accent); outline-offset:-2px; }
    .mp-recipe-card[draggable="true"] { cursor:grab; }
    .mp-recipe-card[draggable="true"]:active { cursor:grabbing; }
    .mp-slot:last-child { border-right:none; }

    /* When row is last */
    .mp-grid-row:last-child .mp-slot,
    .mp-grid-row:last-child .mp-row-label { border-bottom:none; }


    .mp-mode-bar { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
    .mp-mode-btn { padding:8px 16px; border-radius:20px; border:1px solid var(--border); background:none; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:var(--text-mid); cursor:pointer; }
    .mp-mode-btn:hover { border-color:var(--accent); color:var(--accent); }
    .mp-mode-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .mp-conflict-badge { display:inline-block; background: var(--danger-bg); border:1px solid rgb(from var(--danger) r g b / 0.3); border-radius:4px; font-family:'DM Sans',sans-serif; font-size:10px; color: var(--danger); padding:1px 6px; margin-left:4px; }
    .mp-allergy-strip { font-family:'DM Sans',sans-serif; font-size:9px; color:var(--danger); background:var(--danger-bg); border-radius:4px; padding:2px 5px; margin-top:4px; line-height:1.35; }
    .mp-result-warn { font-family:'DM Sans',sans-serif; font-size:10px; color:var(--danger); margin-top:2px; }
    .mp-member-flags { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; }
    .mp-member-flag { font-size:10px; padding:1px 7px; border-radius:4px; background:rgba(240,168,48,0.1); color: var(--warn); font-family:'DM Sans',sans-serif; }
    .mp-member-flag.ok { background: var(--success-bg); color:#4caf76; }
    .mp-member-flag.warn { background: var(--danger-bg); color: var(--danger); }
    .mp-slot-empty { width:100%; height:100%; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:8px; border:1px dashed rgba(from var(--border) r g b / 0.4); min-height:78px; transition:all 0.15s; }
    .mp-slot-empty:hover { border-color:var(--accent); background:rgb(from var(--accent) r g b / 0.06); }
    .mp-slot-add { font-size:18px; color:var(--text-mid); }
    .mp-slot-empty:hover .mp-slot-add { color:var(--accent); }

    .mp-recipe-card { background:rgb(from var(--accent) r g b / 0.08); border:1px solid rgb(from var(--accent) r g b / 0.2); border-radius:8px; padding:7px 8px; cursor:pointer; position:relative; min-height:78px; }
    .mp-recipe-card:hover { background:rgb(from var(--accent) r g b / 0.14); }
    .mp-recipe-name { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; color:var(--text-high); line-height:1.3; margin-bottom:3px; }
    .mp-recipe-cat  { font-family:'DM Sans',sans-serif; font-size:10px; color:var(--text-mid); }
    .mp-recipe-remove { position:absolute; top:4px; right:4px; background:none; border:none; color:var(--text-mid); cursor:pointer; font-size:14px; padding:0 2px; line-height:1; }
    .mp-recipe-remove:hover { color: var(--danger); }
    .mp-recipe-card.cooked { border-color:rgb(from #4caf76 r g b / 0.5); background:rgb(from #4caf76 r g b / 0.1); }
    .mp-cooked-btn { position:absolute; bottom:4px; right:4px; background:none; border:1px solid rgb(from #4caf76 r g b / 0.4); border-radius:4px; color:#4caf76; cursor:pointer; font-size:10px; padding:1px 5px; font-family:'DM Sans',sans-serif; }
    .mp-cooked-btn:hover { background:rgb(from #4caf76 r g b / 0.15); }
    .mp-cooked-label { font-family:'DM Sans',sans-serif; font-size:9px; color:#4caf76; margin-top:4px; }
    .mp-recipe-card.skipped { opacity:0.45; border-style:dashed; }
    .mp-recipe-card.eating-out { border-color:rgb(from var(--warn) r g b / 0.45); background:rgb(from var(--warn) r g b / 0.08); }
    .mp-recipe-card.leftovers { border-color:rgb(from #5b8fd4 r g b / 0.45); background:rgb(from #5b8fd4 r g b / 0.08); }
    .mp-status-label { font-family:'DM Sans',sans-serif; font-size:9px; margin-top:4px; color:var(--text-mid); }
    .mp-status-btns { display:flex; gap:2px; margin-top:5px; flex-wrap:wrap; }
    .mp-status-btn { font-family:'DM Sans',sans-serif; font-size:8px; padding:1px 4px; border-radius:3px; border:1px solid var(--border); background:none; color:var(--text-mid); cursor:pointer; }
    .mp-status-btn:hover { border-color:var(--accent); color:var(--accent); }
    .mp-today { margin-bottom:18px; padding:14px 16px; background:var(--text-ghost); border:1px solid var(--border); border-radius:12px; }
    .mp-today-title { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-mid); margin-bottom:10px; }
    .mp-today-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 0; border-bottom:1px solid rgba(from var(--border) r g b / 0.35); font-family:'DM Sans',sans-serif; font-size:12px; }
    .mp-today-row:last-child { border-bottom:none; }
    .mp-today-row.dinner-focus { background:rgb(from var(--accent) r g b / 0.08); margin:0 -8px; padding:10px 8px; border-radius:8px; border-bottom:none; }
    .mp-today-actions { display:flex; gap:4px; flex-wrap:wrap; }
    .mp-today-preview { margin-top:12px; padding-top:10px; border-top:1px dashed rgba(from var(--border) r g b / 0.5); font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); }
    .mp-slot-gear { position:absolute; bottom:4px; left:4px; background:none; border:none; color:var(--text-mid); cursor:pointer; font-size:11px; padding:0 2px; }
    .mp-slot-gear:hover { color:var(--accent); }

    /* Weekly summary */
    .mp-summary { margin-top:20px; background:var(--text-ghost); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
    .mp-summary-title { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-mid); margin-bottom:12px; }
    .mp-summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    @media(max-width:640px){ .mp-summary-grid { grid-template-columns:repeat(2,1fr); } }
    .mp-summary-stat { text-align:center; }
    .mp-summary-num { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:700; color:var(--accent); }
    .mp-summary-label { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); }

    /* Recipe search modal */
    .mp-modal { display:none; position:fixed; inset:0; background: var(--scrim); z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
    .mp-modal.open { display:flex; }
    .mp-modal-box { background:var(--bg); border:1px solid var(--border); border-radius:16px; width:100%; max-width:520px; overflow:hidden; }
    .mp-modal-head { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .mp-modal-title { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:600; color:var(--text-high); }
    .mp-modal-close { background:none; border:none; color:var(--text-mid); cursor:pointer; font-size:20px; }
    .mp-modal-search { padding:14px 20px; border-bottom:1px solid var(--border); }
    .mp-modal-search input { width:100%; box-sizing:border-box; font-family:'DM Sans',sans-serif; font-size:13px; padding:9px 14px; border:1px solid var(--border); border-radius:9px; background: var(--input-bg); color:var(--text-high); outline:none; }
    .mp-modal-search input:focus { border-color:var(--accent); }
    .mp-modal-results { max-height:340px; overflow-y:auto; padding:10px; }
    .mp-result-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:9px; cursor:pointer; }
    .mp-result-item:hover { background:var(--text-ghost); }
    .mp-result-emoji { font-size:24px; flex-shrink:0; }
    .mp-result-name { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--text-high); }
    .mp-result-cat  { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); }
    .mp-result-empty { text-align:center; padding:30px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-mid); }
  
    .mp-view-btn { padding:5px 18px; border-radius:8px; border:none; background:none; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:var(--text-mid); cursor:pointer; transition:all .15s; }
    .mp-view-btn.active { background:var(--accent); color:#fff; }
    /* ── Month view ── */
    #mp-month-view { display:none; }
    .mth-cal { border:1px solid var(--border); border-radius:14px; overflow:hidden; background:var(--text-ghost); }
    .mth-cal-head { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid var(--border); }
    .mth-dow { padding:10px 6px; font-family:'DM Sans',sans-serif; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; text-align:center; color:var(--text-mid); }
    .mth-body { display:grid; grid-template-columns:repeat(7,1fr); }
    .mth-cell { border-right:1px solid var(--border); border-bottom:1px solid var(--border); min-height:90px; padding:6px; cursor:pointer; transition:background .15s; }
    .mth-cell:hover { background:rgb(from var(--accent) r g b / .05); }
    .mth-cell:nth-child(7n) { border-right:none; }
    .mth-cell.other { opacity:.3; cursor:default; }
    .mth-cell.other:hover { background:none; }
    .mth-cell.today .mth-day-num { color:var(--accent); font-weight:700; }
    .mth-day-num { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); margin-bottom:4px; }
    .mth-meal-dot { font-family:'DM Sans',sans-serif; font-size:10px; color:var(--text-high); padding:2px 5px; border-radius:4px; margin-bottom:2px; background:rgb(from var(--accent) r g b / .1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.4; }
    .mth-more { font-family:'DM Sans',sans-serif; font-size:10px; color:var(--accent); }
    @media(max-width:600px){ .mth-cell { min-height:60px; } .mth-meal-dot { display:none; } }
    .mp-filter-bar { display:flex; gap:6px; flex-wrap:wrap; padding:10px 20px; border-bottom:1px solid var(--border); }
    .mp-filter-chip { padding:4px 10px; border-radius:14px; border:1px solid var(--border); background:none; font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); cursor:pointer; }
    .mp-filter-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .mp-grocery-menu { position:relative; display:inline-block; }
    .mp-grocery-drop { display:none; position:absolute; right:0; top:100%; margin-top:4px; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:6px; min-width:180px; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,0.12); }
    .mp-grocery-drop.open { display:block; }
    .mp-grocery-drop button { display:block; width:100%; text-align:left; padding:8px 12px; border:none; background:none; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-high); cursor:pointer; border-radius:6px; }
    .mp-grocery-drop button:hover { background:var(--text-ghost); }
    .mp-household-bar { display:none; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:10px 14px; margin-bottom:16px; background:var(--text-ghost); border:1px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); }
    .mp-household-bar a { color:var(--accent); text-decoration:none; font-weight:500; }
    @media print {
      .nav,.tab-nav,.mp-header,.mp-mode-bar,#mp-today,.mp-summary,#mp-month-view,.mp-modal,button { display:none !important; }
      #mp-print-output { display:block !important; }
      .page-bg { background:#fff; }
    }
    #mp-print-output { display:none; padding:20px; font-family:'DM Sans',sans-serif; color:#111; }
    .mp-print-title { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:700; margin-bottom:4px; }
    .mp-print-sub { font-size:12px; color:#666; margin-bottom:18px; }
    .mp-print-table { width:100%; border-collapse:collapse; font-size:12px; }
    .mp-print-table th,.mp-print-table td { border:1px solid #ccc; padding:8px 10px; text-align:left; vertical-align:top; }
    .mp-print-table th { background:#f5f5f5; font-size:10px; text-transform:uppercase; letter-spacing:0.06em; }
    .mp-print-slot { line-height:1.4; }
    .mp-print-warn { color:#b33; font-size:10px; }
    .mp-print-status { color:#666; font-size:10px; }
  </style>
  <script src="page-guard.js"></script>
</head>
<body class="page-bg cj-body">
<nav class="nav">
  <a class="nav-logo" href="index.html">
    <span>🍽</span>
    <span class="nav-logo-text">The Culinary Journal</span>
    <span class="nav-logo-badge">Est. 2025</span>
  </a>
  <div class="nav-btns" id="nav-btns"></div>
</nav>
<div class="tab-nav"></div>

<div class="mp-wrap">
  <div id="mp-household-bar" class="mp-household-bar"></div>
  <div class="mp-header">
    <div>
      <h1 class="mp-title">🗓 Meal Planner</h1>
      <div style="display:flex;gap:4px;background:var(--text-ghost);border:1px solid var(--border);border-radius:10px;padding:3px;margin-top:10px;width:fit-content">
        <button id="view-week-btn" class="mp-view-btn active" onclick="setView('week',this)">Week</button>
        <button id="view-month-btn" class="mp-view-btn" onclick="setView('month',this)">Month</button>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <div class="mp-week-nav">
        <button class="mp-week-btn" onclick="prevWeek()">← Prev</button>
        <div class="mp-week-label" id="week-label"></div>
        <button class="mp-week-btn" onclick="nextWeek()">Next →</button>
        <button class="mp-week-btn" onclick="goThisWeek()" title="Jump to the current week">This Week</button>
      </div>
      <div id="mp-month-nav" style="display:none;align-items:center;gap:8px">
        <button class="mp-week-btn" onclick="changeMonthView(-1)">← Prev</button>
        <div id="mth-label" style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text-high);min-width:130px;text-align:center"></div>
        <button class="mp-week-btn" onclick="changeMonthView(1)">Next →</button>
        <button class="mp-week-btn" onclick="goThisMonth()" title="Jump to the current month">This Month</button>
        <select id="mth-jump-month" onchange="jumpMonthYear()" style="padding:6px 8px;font-size:12px"></select>
        <select id="mth-jump-year" onchange="jumpMonthYear()" style="padding:6px 8px;font-size:12px"></select>
      </div>
      <div class="mp-actions">
        <button class="mp-btn mp-btn-ghost" onclick="copyLastWeek()" title="Copy previous week's meals">📋 Copy last week</button>
        <button class="mp-btn mp-btn-ghost" onclick="printWeek()" title="Print this week's meal plan">🖨 Print Week</button>
        <button class="mp-btn mp-btn-ghost" onclick="skipRestOfWeek()" title="Mark remaining days this week as skipped">⏭ Skip rest of week</button>
        <button class="mp-btn mp-btn-ghost" onclick="clearWeek()">Clear Week</button>
        <a href="diary.html" class="mp-btn mp-btn-ghost" style="text-decoration:none;display:inline-flex;align-items:center">📔 Diary</a>
        <div class="mp-grocery-menu">
          <button class="mp-btn mp-btn-primary" onclick="toggleGroceryMenu(event)">🛒 Grocery ▾</button>
          <div class="mp-grocery-drop" id="mp-grocery-drop">
            <button type="button" onclick="addToGrocery(); closeGroceryMenu()">This week</button>
            <button type="button" onclick="addToGroceryRange(); closeGroceryMenu()">Custom date range…</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="mp-today" class="mp-today" style="display:none"></div>

  <!-- Mode & Family panel -->
  <div class="mp-mode-bar">
    <span style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-mid)">Cooking for:</span>
    <button class="mp-mode-btn active" data-mode="individual" onclick="setMode('individual',this)">👤 Individual</button>
    <button class="mp-mode-btn" data-mode="couple" onclick="setMode('couple',this)">💑 Couple</button>
    <button class="mp-mode-btn" data-mode="family" onclick="setMode('family',this)" title="Set up allergies and dietary needs in Mise en Place → Family Profiles first. Warnings appear when planning meals — they never block you.">👨‍👩‍👧‍👦 Family</button>
    <button class="mp-mode-btn" data-mode="group" onclick="setMode('group',this)">🎉 Group</button>
    <span id="mp-conflict-summary" style="font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-mid)"></span>
  </div>
  <div id="mp-family-flags" style="display:none;background:var(--text-ghost);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-family:'DM Sans',sans-serif;font-size:12px"></div>
  <div id="mp-group-filter" class="mp-filter-bar" style="display:none;margin-bottom:8px;padding:10px 14px;background:var(--text-ghost);border:1px solid var(--border);border-radius:10px;align-items:center;flex-wrap:wrap"></div>
  <div id="mp-member-filter" class="mp-filter-bar" style="display:none;margin-bottom:16px;padding:12px 14px;background:var(--text-ghost);border:1px solid var(--border);border-radius:10px;align-items:center;flex-wrap:wrap">
    <span style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-mid);margin-right:8px">View meals for:</span>
  </div>

  <div class="mp-grid" id="mp-grid"></div>

  <div id="mp-month-view">
  <div style="font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-mid);margin-bottom:10px">💡 Click any day to open that week and add or edit meals.</div>
  <div class="mth-cal">
    <div class="mth-cal-head" id="mth-dow"></div>
    <div class="mth-body" id="mth-body"></div>
  </div>
</div>

<div class="mp-summary" id="mp-summary"></div>
<div id="mp-print-output"></div>
</div>

<!-- Recipe picker modal -->
<div class="mp-modal" id="mp-modal">
  <div class="mp-modal-box">
    <div class="mp-modal-head">
      <div class="mp-modal-title" id="mp-modal-title">Choose a Recipe</div>
      <button class="mp-modal-close" onclick="closePicker()">&#215;</button>
    </div>
    <div class="mp-modal-search">
      <input type="text" id="mp-search" placeholder="Search all recipes by name, native title, or also known as…" oninput="applyRecipeFilters()" autocomplete="off">
    </div>
    <div class="mp-filter-bar" id="mp-cat-filters" style="margin-bottom:8px"></div>
    <div class="mp-filter-bar" id="mp-hierarchy-filters" style="margin-bottom:8px;flex-wrap:wrap"></div>
    <div class="mp-filter-bar" id="mp-prep-filters">
      <span style="font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;color:var(--text-mid);align-self:center">Prep:</span>
      <button type="button" class="mp-filter-chip active" data-prep="all" onclick="setPrepFilter('all',this)">All</button>
      <button type="button" class="mp-filter-chip" data-prep="30" onclick="setPrepFilter('30',this)">≤30 min</button>
      <button type="button" class="mp-filter-chip" data-prep="60" onclick="setPrepFilter('60',this)">≤60 min</button>
      <button type="button" class="mp-filter-chip" data-prep="120" onclick="setPrepFilter('120',this)">≤2 hr</button>
    </div>
    <div class="mp-modal-results" id="mp-results">
      <div class="mp-result-empty">Loading recipes...</div>
    </div>
  </div>
</div>

<div class="mp-modal" id="mp-slot-modal" style="display:none">
  <div class="mp-modal-box" style="max-width:420px">
    <div class="mp-modal-head">
      <div class="mp-modal-title" id="mp-slot-modal-title">Meal details</div>
      <button class="mp-modal-close" onclick="closeSlotModal()">&#215;</button>
    </div>
    <div style="padding:0 4px 8px;font-family:DM Sans,sans-serif;font-size:12px;color:var(--text-mid)" id="mp-slot-modal-sub"></div>
    <div class="mp-field" style="margin-bottom:10px"><label style="font-size:11px;color:var(--text-mid)">Servings override</label><input type="text" id="mp-slot-serves" class="mp-style" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text-high)"></div>
    <div class="mp-field" style="margin-bottom:10px"><label style="font-size:11px;color:var(--text-mid)">Assignee (family member)</label><select id="mp-slot-assignee" class="mp-style" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text-high)"><option value="">— Anyone / whole household —</option></select></div>
    <div class="mp-field" style="margin-bottom:10px"><label style="font-size:11px;color:var(--text-mid)">Away (comma-separated)</label><input type="text" id="mp-slot-away" class="mp-style" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text-high)"></div>
    <div class="mp-field" style="margin-bottom:10px"><label style="font-size:11px;color:var(--text-mid)">Extra guests</label><input type="number" id="mp-slot-guests" min="0" class="mp-style" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text-high)"></div>
    <div class="mp-field" style="margin-bottom:14px"><label style="font-size:11px;color:var(--text-mid)">Note</label><input type="text" id="mp-slot-note" class="mp-style" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text-high)"></div>
    <button class="mp-btn mp-btn-primary" onclick="saveSlotModal()" style="width:100%">Save</button>
  </div>
</div>
