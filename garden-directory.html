<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browse published plant profiles — grow, harvest, and link to your kitchen.">
<link rel="canonical" href="https://theculinaryjournal.site/garden-directory.html">
<title>Garden Directory — The Culinary Journal</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="lib/garden-public.css">
<script src="theme-init.js"></script>
<script>if (new URLSearchParams(location.search).get('embed') === '1') document.documentElement.classList.add('gd-embed');</script>
<style>html.gd-embed .nav, html.gd-embed .tab-nav, html.gd-embed .gj-dir-stats { display:none !important; }</style>
<script src="supabase-config.js"></script>
<script src="page-guard.js"></script>
<script src="library-mise.js"></script>
<script src="lib/garden-chrome.js"></script>
<script src="lib/garden-api.js?v=20260717"></script>
<script src="lib/garden-ui.js?v=20260717"></script>
<script src="nav-init.js"></script>
</head>
<body class="lib-page cj-body">
<nav class="nav">
  <a class="nav-logo" href="index.html"><span class="nav-logo-text">The Culinary Journal</span></a>
  <div class="nav-btns" id="nav-btns"></div>
</nav>
<div class="tab-nav"></div>
<div id="garden-chrome"></div>
<div class="gj-dir-stats" id="gd-stats" style="display:none"></div>
<div class="lib-grid lib-grid-mise" id="gd-grid">
  <div class="lib-loading"><div class="lib-spinner"></div></div>
</div>

<script>
var searchTimer = null;
var allPlants = [];

GardenChrome.render({ root: 'garden-chrome', active: 'directory', showSearch: true, searchId: 'gd-search' });
document.getElementById('gd-search').addEventListener('input', function (e) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function () { loadPlants(e.target.value); }, 350);
});

function renderList(items) {
  var grid = document.getElementById('gd-grid');
  var stats = document.getElementById('gd-stats');
  if (!items || !items.length) {
    stats.style.display = 'none';
    grid.innerHTML = '<div class="lib-empty" style="grid-column:1/-1">No published plants yet. After Garden SQL is applied you should see species profiles here — starting with Tomato.</div>';
    return;
  }
  stats.style.display = 'flex';
  stats.innerHTML =
    '<div class="gj-dir-stat"><strong>' + items.length + '</strong> species published</div>' +
    '<div class="gj-dir-stat">Cultivars per climate</div>' +
    '<div class="gj-dir-stat">Species + variety → kitchen links</div>';
  grid.innerHTML = items.map(function (p) { return GardenUI.renderDirectoryCard(p); }).join('');
}

async function loadPlants(q) {
  var grid = document.getElementById('gd-grid');
  grid.innerHTML = '<div class="lib-loading" style="grid-column:1/-1"><div class="lib-spinner"></div></div>';
  try {
    var items = await GardenApi.listPlants(q, 50, 0);
    allPlants = Array.isArray(items) ? items : [];
    renderList(allPlants);
  } catch (e) {
    console.warn('garden-directory load failed', e);
    grid.innerHTML = '<div class="lib-empty" style="grid-column:1/-1">Could not load plants — run RUN-GARDEN-V3-POLISH.sql on Supabase, then hard-refresh.</div>';
  }
}

loadPlants('');
</script>
</body>
</html>
