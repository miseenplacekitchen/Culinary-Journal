<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browse published plant profiles — grow, harvest, and link to your kitchen.">
<link rel="canonical" href="https://theculinaryjournal.site/garden-directory.html">
<title>Garden Directory — The Culinary Journal</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="theme-init.js"></script>
<script src="supabase-config.js"></script>
<script src="lib/garden-api.js"></script>
<script src="nav-init.js"></script>
<style>
.gd-hero { max-width:900px; margin:32px auto 24px; padding:0 24px; }
.gd-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,4vw,2.8rem); font-weight:700; margin-bottom:8px; }
.gd-sub { font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-mid); margin-bottom:20px; }
.gd-search { width:100%; max-width:420px; padding:10px 14px; border:1px solid var(--border); border-radius:24px; background:var(--surface); color:var(--text-high); font-family:'DM Sans',sans-serif; }
.gd-grid { max-width:900px; margin:0 auto 60px; padding:0 24px; display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
.gd-card { display:block; text-decoration:none; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; transition:border-color .15s; }
.gd-card:hover { border-color:var(--accent); }
.gd-name { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600; color:var(--text-high); margin-bottom:4px; }
.gd-botanical { font-size:12px; font-style:italic; color:var(--accent); margin-bottom:10px; }
.gd-summary { font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-mid); line-height:1.6; }
.gd-meta { font-size:11px; color:var(--text-muted); margin-top:10px; }
.gd-empty, .gd-loading { text-align:center; padding:60px 24px; font-family:'DM Sans',sans-serif; color:var(--text-muted); }
.gd-links { display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; }
.gd-links a { font-size:12px; color:var(--accent); text-decoration:none; }
</style>
</head>
<body class="cj-body">
<nav class="nav">
  <a class="nav-logo" href="index.html"><span>🍽</span><span class="nav-logo-text">The Culinary Journal</span><span class="nav-logo-badge">Est. 2025</span></a>
  <div class="nav-btns" id="nav-btns"></div>
</nav>
<div class="tab-nav"></div>

<div class="gd-hero">
  <div class="gd-title">🌱 The Garden</div>
  <p class="gd-sub">Plant profiles that connect your patch to the kitchen — seasonal timing, care, and ingredient links.</p>
  <input type="search" id="gd-search" class="gd-search" placeholder="Search plants…" aria-label="Search plants">
  <div class="gd-links">
    <a href="my-garden.html">My Garden →</a>
    <a href="library-directory.html?type=ingredient">Ingredient Library →</a>
  </div>
</div>

<div id="gd-grid" class="gd-grid"><div class="gd-loading">Loading plants…</div></div>

<script>
var searchTimer = null;

function renderList(items) {
  var grid = document.getElementById('gd-grid');
  if (!items || !items.length) {
    grid.innerHTML = '<div class="gd-empty">No published plants yet. Check back after the Garden wave is live.</div>';
    return;
  }
  grid.innerHTML = items.map(function (p) {
    return '<a class="gd-card" href="garden-plant.html?slug=' + encodeURIComponent(p.slug || '') + '">' +
      '<div class="gd-name">' + GardenApi.esc(p.common_name) + '</div>' +
      (p.botanical_name ? '<div class="gd-botanical">' + GardenApi.esc(p.botanical_name) + '</div>' : '') +
      '<div class="gd-summary">' + GardenApi.esc(p.care_summary || '') + '</div>' +
      (p.ease_rating ? '<div class="gd-meta">Ease: ' + GardenApi.esc(p.ease_rating) + '</div>' : '') +
      '</a>';
  }).join('');
}

async function loadPlants(q) {
  var grid = document.getElementById('gd-grid');
  grid.innerHTML = '<div class="gd-loading">Loading plants…</div>';
  try {
    var items = await GardenApi.listPlants(q, 50, 0);
    renderList(Array.isArray(items) ? items : []);
  } catch (e) {
    console.warn('garden-directory load failed', e);
    grid.innerHTML = '<div class="gd-empty">Could not load plants — please try again.</div>';
  }
}

document.getElementById('gd-search').addEventListener('input', function (e) {
  clearTimeout(searchTimer);
  var v = e.target.value;
  searchTimer = setTimeout(function () { loadPlants(v); }, 350);
});

loadPlants('');
</script>
</body>
</html>
