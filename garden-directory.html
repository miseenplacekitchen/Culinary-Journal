<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browse published plant profiles — grow, harvest, and link to your kitchen.">
<link rel="canonical" href="https://theculinaryjournal.site/garden-directory.html">
<title>Garden Directory — The Culinary Journal</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="theme-init.js"></script>
<script>if (new URLSearchParams(location.search).get('embed') === '1') document.documentElement.classList.add('gd-embed');</script>
<style>html.gd-embed .nav, html.gd-embed .tab-nav { display:none !important; }</style>
<script src="supabase-config.js"></script>
<script src="page-guard.js"></script>
<script src="library-mise.js"></script>
<script src="lib/garden-chrome.js"></script>
<script src="lib/garden-api.js"></script>
<script src="nav-init.js"></script>
</head>
<body class="lib-page cj-body">
<nav class="nav">
  <a class="nav-logo" href="index.html"><span class="nav-logo-text">The Culinary Journal</span></a>
  <div class="nav-btns" id="nav-btns"></div>
</nav>
<div class="tab-nav"></div>
<div id="garden-chrome"></div>
<div class="lib-grid lib-grid-mise" id="gd-grid">
  <div class="lib-loading"><div class="lib-spinner"></div></div>
</div>

<script>
var searchTimer = null;

GardenChrome.render({ root: 'garden-chrome', active: 'directory', showSearch: true, searchId: 'gd-search' });
document.getElementById('gd-search').addEventListener('input', function (e) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function () { loadPlants(e.target.value); }, 350);
});

function renderList(items) {
  var grid = document.getElementById('gd-grid');
  if (!items || !items.length) {
    grid.innerHTML = '<div class="lib-empty">No published plants yet. After SQL is applied you should see Tomato here.</div>';
    return;
  }
  grid.innerHTML = items.map(function (p) {
    return '<a class="lib-card lib-card-mise" href="garden-plant.html?slug=' + encodeURIComponent(p.slug || '') + '">' +
      '<div class="lib-card-body"><div class="lib-card-name">' + GardenApi.esc(p.common_name) + '</div>' +
      (p.botanical_name ? '<div class="lib-card-aka">' + GardenApi.esc(p.botanical_name) + '</div>' : '') +
      '<div class="lib-card-desc">' + GardenApi.esc(p.care_summary || '') + '</div>' +
      (p.ease_rating ? '<div class="lib-card-tag">Ease: ' + GardenApi.esc(p.ease_rating) + '</div>' : '') +
      '</div></a>';
  }).join('');
}

async function loadPlants(q) {
  var grid = document.getElementById('gd-grid');
  grid.innerHTML = '<div class="lib-loading"><div class="lib-spinner"></div></div>';
  try {
    var items = await GardenApi.listPlants(q, 50, 0);
    renderList(Array.isArray(items) ? items : []);
  } catch (e) {
    console.warn('garden-directory load failed', e);
    grid.innerHTML = '<div class="lib-empty">Could not load plants — run RUN-GARDEN-V3-POLISH.sql on Supabase, then hard-refresh.</div>';
  }
}

loadPlants('');
</script>
</body>
</html>
