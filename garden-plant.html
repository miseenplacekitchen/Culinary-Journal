<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Plant profile — grow, harvest, and kitchen links.">
<link rel="canonical" href="https://theculinaryjournal.site/garden-plant.html">
<title>Plant Profile — The Culinary Journal</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="lib/garden-public.css">
<script src="theme-init.js"></script>
<script>if (new URLSearchParams(location.search).get('embed') === '1') document.documentElement.classList.add('gd-embed');</script>
<style>html.gd-embed .nav, html.gd-embed .tab-nav { display:none !important; }</style>
<script src="supabase-config.js"></script>
<script src="page-guard.js"></script>
<script src="library-mise.js"></script>
<script src="lib/garden-chrome.js"></script>
<script src="lib/garden-api.js?v=20260717"></script>
<script src="lib/garden-ui.js?v=20260720"></script>
<script src="nav-init.js"></script>
</head>
<body class="lib-page cj-body">
<nav class="nav">
  <a class="nav-logo" href="index.html"><span class="nav-logo-text">The Culinary Journal</span></a>
  <div class="nav-btns" id="nav-btns"></div>
</nav>
<div class="tab-nav"></div>
<div id="garden-chrome"></div>
<div id="gp-root"><div class="gj-wrap gj-empty"><div class="lib-spinner"></div></div></div>

<script>
var params = new URLSearchParams(window.location.search);
var slug = params.get('slug') || '';
var varietySlug = params.get('variety') || '';
var _plantData = null;
var _climateSlug = GardenApi.loadClimatePref();

GardenChrome.render({ root: 'garden-chrome', active: 'directory', showSearch: false });

function findVarietyId(data, vSlug) {
  if (!data || !vSlug || !data.varieties) return null;
  for (var i = 0; i < data.varieties.length; i++) {
    if (data.varieties[i].slug === vSlug) return data.varieties[i].id;
  }
  return null;
}

function wireAddButton(data, vSlug) {
  var btn = document.getElementById('gp-add');
  if (!btn || !data || !data.plant) return;
  var varietyId = findVarietyId(data, vSlug);
  btn.addEventListener('click', async function () {
    if (!getSession()) {
      window.location.href = 'login.html?redirect=' + encodeURIComponent(location.href);
      return;
    }
    try {
      await GardenApi.addToGarden(data.plant.id, 'planned', null, varietyId);
      btn.textContent = 'Added to My Garden ✓';
      btn.disabled = true;
    } catch (e) {
      console.warn('add to garden failed', e);
      alert('Could not add — sign in and try again.');
    }
  });
}

async function buildClimateBar(climates, saved) {
  if (!climates.length) return '';
  var opts = climates.map(function (c) {
    var sel = (saved && c.slug === saved) || (!saved && c.slug === 'humid-subtropical') ? ' selected' : '';
    return '<option value="' + GardenApi.esc(c.slug) + '"' + sel + '>' + GardenApi.esc(c.name) + '</option>';
  }).join('');
  return '<div class="gj-wrap gj-climate-pick"><div class="gj-climate-bar"><label>' +
    '<span style="font-weight:500;color:var(--text-high)">Growing climate</span>' +
    '<select id="gp-climate" aria-label="Growing climate">' + opts + '</select></label>' +
    '<p style="margin:10px 0 0;font-size:12px;color:var(--text-muted)">Care, calendar, and cultivars filter to your climate — not your city name.</p></div></div>';
}

async function renderPage() {
  if (!slug) {
    document.getElementById('gp-root').innerHTML = '<div class="gj-wrap gj-error">No plant specified.</div>';
    return;
  }
  var climates = [];
  try { climates = await GardenApi.listClimateZones(); } catch (_) {}

  if (getSession()) {
    try {
      var saved = await GardenApi.getMyRegion();
      if (saved && saved.climate_slug) _climateSlug = saved.climate_slug;
    } catch (_) {}
  }
  if (!_climateSlug && climates.length) {
    _climateSlug = climates[0].slug;
  }

  try {
    var data = await GardenApi.getPlant(slug, _climateSlug);
    _plantData = data;
    if (!data || !data.plant) {
      document.getElementById('gp-root').innerHTML = '<div class="gj-wrap gj-error">Plant not found or not published.</div>';
      return;
    }
    document.title = (data.plant.common_name || 'Plant') + ' — The Garden';
    var climateName = '';
    climates.forEach(function (c) { if (c.slug === _climateSlug) climateName = c.name; });

    document.getElementById('gp-root').innerHTML =
      await buildClimateBar(climates, _climateSlug) +
      GardenUI.renderPlantProfile(data, {
        climateName: climateName,
        selectedVarietySlug: varietySlug
      });

    var sel = document.getElementById('gp-climate');
    if (sel) {
      sel.addEventListener('change', async function (e) {
        _climateSlug = e.target.value;
        GardenApi.saveClimatePref(_climateSlug);
        if (getSession()) {
          var cz = climates.find(function (c) { return c.slug === _climateSlug; });
          if (cz) try { await GardenApi.setClimate(cz.id); } catch (err) { console.warn(err); }
        }
        varietySlug = '';
        var url = new URL(location.href);
        url.searchParams.delete('variety');
        history.replaceState(null, '', url.pathname + url.search);
        await renderPage();
      });
    }
    wireAddButton(data, varietySlug);
  } catch (e) {
    console.warn('garden-plant load failed', e);
    document.getElementById('gp-root').innerHTML = '<div class="gj-wrap gj-error">Could not load plant — run RUN-GARDEN-V4.sql on Supabase, then hard-refresh.</div>';
  }
}

renderPage();
</script>
</body>
</html>
