name: Recipe import tests

on:
  push:
    paths:
      - 'lib/**'
      - 'api/fetch-recipe-url.js'
      - 'tests/**'
      - 'package.json'
      - 'submit-recipe.html'
      - 'dashboard-recipes.js'
  pull_request:
    paths:
      - 'lib/**'
      - 'api/fetch-recipe-url.js'
      - 'tests/**'
      - 'package.json'
      - 'submit-recipe.html'
      - 'dashboard-recipes.js'

jobs:
  import-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run test:import
