<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track pantry and fridge inventory, expiry dates, and low-stock items in your kitchen.">
  <link rel="canonical" href="https://theculinaryjournal.site/pantry.html">
  <title>Pantry & Fridge — The Culinary Journal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
<script src="supabase-config.js"></script>
  <style>
    .page-bg { min-height:100vh; background:var(--bg); }
    .pt-wrap  { max-width:960px; margin:0 auto; padding:24px 16px 80px; }
    .pt-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
    .pt-household-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:18px; padding:12px 16px; background:rgba(91,143,212,0.08); border:1px solid rgba(91,143,212,0.25); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); }
    .pt-household-bar a { color:var(--accent); text-decoration:none; font-weight:600; }
    .pt-title  { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:700; color:var(--text-high); }
    .pt-btn { padding:9px 18px; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; border:none; }
    .pt-btn-primary { background:var(--accent); color:#fff; }
    .pt-btn-ghost   { background:none; border:1px solid var(--border); color:var(--text-mid); }
    .pt-btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

    /* Filters */
    .pt-filters { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .pt-filter  { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:none; font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); cursor:pointer; }
    .pt-filter:hover { border-color:var(--accent); color:var(--accent); }
    .pt-filter.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500; }
    .pt-search { flex:1; min-width:200px; max-width:300px; font-family:'DM Sans',sans-serif; font-size:13px; padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:var(--text-ghost); color:var(--text-high); outline:none; }
    .pt-search:focus { border-color:var(--accent); }

    /* Stats */
    .pt-stats { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:16px; }
    @media(max-width:700px){ .pt-stats { grid-template-columns:repeat(2,1fr); } }
    .pt-loc-filters { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    .pt-loc-badge { font-family:'DM Sans',sans-serif; font-size:10px; color:var(--text-mid); margin-top:2px; }
    .pt-staple-badge { font-size:10px; color:var(--accent); margin-left:6px; }
    .pt-stat { background:var(--text-ghost); border:1px solid var(--border); border-radius:11px; padding:14px 16px; }
    .pt-stat-num { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:700; color:var(--accent); }
    .pt-stat-label { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); text-transform:uppercase; letter-spacing:0.08em; }

    /* Items */
    .pt-list { display:flex; flex-direction:column; gap:8px; }
    .pt-item { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--text-ghost); border:1px solid var(--border); border-radius:11px; transition:border-color 0.15s; }
    .pt-item:hover { border-color:var(--accent-border); }
    .pt-item.low  { border-left:3px solid var(--warn); }
    .pt-item.out  { border-left:3px solid var(--danger); opacity:0.65; }
    .pt-item-name { flex:1; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; color:var(--text-high); }
    .pt-item-cat  { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); }
    .pt-item-qty  { display:flex; align-items:center; gap:6px; }
    .pt-qty-btn   { width:24px; height:24px; border-radius:5px; border:1px solid var(--border); background:none; color:var(--text-mid); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
    .pt-qty-btn:hover { border-color:var(--accent); color:var(--accent); }
    .pt-qty-val   { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:var(--text-high); min-width:44px; text-align:center; }
    .pt-status { padding:3px 9px; border-radius:20px; font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }
    .pt-status.ok  { background: var(--success-bg); color:#4caf76; }
    .pt-status.low { background: var(--warn-bg); color: var(--warn); }
    .pt-status.out { background:rgb(from var(--danger) r g b / 0.12); color: var(--danger); }
    .pt-del-btn { background:none; border:none; color:var(--text-mid); cursor:pointer; padding:4px 6px; border-radius:5px; font-size:14px; }
    .pt-del-btn:hover { color: var(--danger); background: var(--danger-bg); }
    .pt-empty { text-align:center; padding:60px 20px; }
    .pt-empty-icon { font-size:48px; margin-bottom:12px; }
    .pt-empty-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--text-high); margin-bottom:6px; }
    .pt-empty-sub { font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-mid); }

    /* Add item modal */
    .pt-modal { display:none; position:fixed; inset:0; background: var(--scrim); z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
    .pt-modal.open { display:flex; }
    .pt-modal-box { background:var(--bg); border:1px solid var(--border); border-radius:16px; width:100%; max-width:440px; padding:24px; }
    .pt-modal-title { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:600; color:var(--text-high); margin-bottom:20px; }
    .pt-field { margin-bottom:14px; }
    .pt-label { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-mid); margin-bottom:5px; }
    .pt-input { width:100%; box-sizing:border-box; font-family:'DM Sans',sans-serif; font-size:13px; padding:9px 12px; border:1px solid var(--border); border-radius:8px; background: var(--input-bg); color:var(--text-high); outline:none; }
    .pt-input:focus { border-color:var(--accent); }
    .pt-row { display:flex; gap:10px; }
    .pt-modal-foot { display:flex; gap:10px; margin-top:18px; }
    .pt-unknown-link { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--accent); cursor:pointer; text-decoration:underline; background:none; border:none; padding:0; }
    .pt-useitup { margin-bottom:24px; background:var(--text-ghost); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
    .pt-useitup-title { font-family:'Cormorant Garamond',serif; font-size:1.15rem; font-weight:600; color:var(--text-high); margin-bottom:6px; }
    .pt-useitup-sub { font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-mid); margin-bottom:14px; line-height:1.5; }
    .pt-useitup-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
    .pt-useitup-card { display:block; padding:12px 14px; border:1px solid var(--border); border-radius:10px; text-decoration:none; color:inherit; transition:border-color .15s; }
    .pt-useitup-card:hover { border-color:var(--accent); }
    .pt-useitup-name { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:var(--text-high); }
    .pt-useitup-meta { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-mid); margin-top:4px; }
    .pt-expiry-alert { margin-bottom:16px; padding:12px 16px; background:var(--warn-bg); border:1px solid rgb(from var(--warn) r g b / 0.35); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text-high); }
    .pt-expiry-alert strong { color:var(--warn); }
  </style>
</head>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

let activeFilter = 'all';
let activeLocationFilter = 'all';
let pantryIngIndex = {};
const PT_STANDARD_UNITS = ['g','kg','ml','l','cup','cups','tbsp','tsp','piece','pieces','can','cans','bottle','bottles','bunch','clove','sprig','pinch','slice','packet','whole','oz','lb'];

const PT_LOC_LABEL = { pantry:'🫙 Pantry', fridge:'🧊 Fridge', freezer:'❄️ Freezer' };

function normalizePantryItem(item) {
  if (!item.location) item.location = 'pantry';
  if (item.is_staple === undefined) item.is_staple = false;
  return item;
}

function getPantry() {
  try { return JSON.parse(localStorage.getItem('tcj_pantry') || '[]'); }
  catch(_) { return []; }
}

function savePantry(list) {
  localStorage.setItem('tcj_pantry', JSON.stringify(list));
  localStorage.setItem('tcj_pantry_ts', String(Date.now()));
  clearTimeout(window._pantrySyncTimer);
  window._pantrySyncTimer = setTimeout(async function() {
    try {
      const sess = JSON.parse(localStorage.getItem('tcj_session')||'null');
      if (!sess || !sess.access_token) return;
      var serverTs = window.SharedSyncUtils ? SharedSyncUtils.getServerTs('tcj_pantry_server_ts') : null;
      var res = await fetch(SUPA_URL + '/rest/v1/rpc/save_my_pantry', {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + sess.access_token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ p_items: list, p_client_updated_at: serverTs })
      });
      var bodyText = await res.text();
      var parsed = window.SharedSyncUtils ? SharedSyncUtils.parseSaveResult(res, bodyText) : { ok: res.ok };
      if (parsed.conflict && window.SharedSyncUtils) {
        var choice = await SharedSyncUtils.showConflict({ householdName: parsed.data && parsed.data.household_name });
        if (choice === 'theirs' && parsed.data && Array.isArray(parsed.data.items)) {
          localStorage.setItem('tcj_pantry', JSON.stringify(parsed.data.items));
          if (parsed.data.updated_at) SharedSyncUtils.storeServerTs('tcj_pantry_server_ts', parsed.data.updated_at);
          renderStats(); renderList('');
        } else if (choice === 'mine') {
          await fetch(SUPA_URL + '/rest/v1/rpc/save_my_pantry', {
            method: 'POST',
            headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + sess.access_token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ p_items: list, p_client_updated_at: null })
          });
        }
      } else if (parsed.ok && parsed.updated_at && window.SharedSyncUtils) {
        SharedSyncUtils.storeServerTs('tcj_pantry_server_ts', parsed.updated_at);
      }
    } catch(_) {}
  }, 1500);
}

var _ptHouseholdShared = false;

function updatePantryHouseholdBar(data) {
  var bar = document.getElementById('pt-household-bar');
  if (!bar) return;
  if (data && data.shared) {
    bar.style.display = 'flex';
    bar.innerHTML = '<span>🏠 <strong>'+esc(data.household_name||'Household')+'</strong> — shared pantry (syncs with your partner)</span><a href="household.html">Manage →</a>';
    _ptHouseholdShared = true;
  } else {
    try {
      var sess = JSON.parse(localStorage.getItem('tcj_session')||'null');
      bar.style.display = sess && sess.access_token ? 'flex' : 'none';
      if (sess && sess.access_token) bar.innerHTML = '<span>Personal pantry</span><a href="household.html">Link partner →</a>';
    } catch(_) { bar.style.display = 'none'; }
    _ptHouseholdShared = false;
  }
}

async function loadPantryFromSupabase(force) {
  try {
    const sess = JSON.parse(localStorage.getItem('tcj_session')||'null');
    if (!sess || !sess.access_token) return;
    const res = await fetch(SUPA_URL + '/rest/v1/rpc/get_my_pantry', {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + sess.access_token, 'Content-Type': 'application/json' },
      body: '{}'
    });
    if (!res.ok) return;
    const data = await res.json();
    updatePantryHouseholdBar(Array.isArray(data) ? null : data);
    const remote = Array.isArray(data) ? data : (data.items || []);
    const remoteTime = (data && data.updated_at) ? new Date(data.updated_at).getTime() : 0;
    const localTime = parseInt(localStorage.getItem('tcj_pantry_ts') || '0', 10);
    if (force || remoteTime > localTime || (data && data.shared && remoteTime >= localTime)) {
      if (Array.isArray(remote)) {
        localStorage.setItem('tcj_pantry', JSON.stringify(remote));
        if (remoteTime) localStorage.setItem('tcj_pantry_ts', String(remoteTime));
        if (data && data.updated_at && window.SharedSyncUtils) SharedSyncUtils.storeServerTs('tcj_pantry_server_ts', data.updated_at);
        renderStats();
        renderList('');
      }
    }
    if (window.RegionalHints) RegionalHints.refreshBanner('pt-regional-bar', getPantry());
  } catch(_) {}
}

function getStatus(item) {
  if (!item.qty || item.qty <= 0) return 'out';
  if (item.min_qty && item.qty <= item.min_qty) return 'low';
  return 'ok';
}

function getExpiryStatus(item) {
  if (!item.expiry_date) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const exp   = new Date(item.expiry_date); exp.setHours(0,0,0,0);
  const days  = Math.round((exp - today) / 86400000);
  if (days < 0)  return {status:'expired', days, label:'Expired ' + Math.abs(days) + 'd ago'};
  if (days <= 7) return {status:'expiring', days, label:'Expires in ' + days + 'd'};
  return {status:'ok', days, label:'Best before: ' + exp.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})};
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('#pt-status-filters .pt-filter').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderList(document.getElementById('pt-search').value);
}

function setLocationFilter(loc, btn) {
  activeLocationFilter = loc;
  document.querySelectorAll('#pt-location-filters .pt-filter').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderList(document.getElementById('pt-search').value);
}

function renderExpiryAlert() {
  var el = document.getElementById('pt-expiry-alert');
  if (!el) return;
  var urgent = getPantry().map(normalizePantryItem).filter(function(item) {
    var exp = getExpiryStatus(item);
    return exp && (exp.status === 'expiring' || exp.status === 'expired');
  });
  if (!urgent.length) { el.style.display = 'none'; return; }
  el.className = 'pt-expiry-alert';
  el.style.display = 'block';
  el.innerHTML = '<strong>⏰ Use soon:</strong> ' + urgent.slice(0, 6).map(function(i) {
    var exp = getExpiryStatus(i);
    return esc(i.name) + ' (' + esc(exp.label) + ')';
  }).join(' · ') + (urgent.length > 6 ? ' · +' + (urgent.length - 6) + ' more' : '') +
    ' — <a href="#" style="color:var(--accent)" onclick="setFilter(\'expiring\',document.querySelector(\'#pt-status-filters .pt-filter:nth-child(6)\'));return false;">Show all</a>';
}

function renderStats() {
  const items = getPantry().map(normalizePantryItem);
  const ok  = items.filter(function(i) { return getStatus(i)==='ok'; }).length;
  const low = items.filter(function(i) { return getStatus(i)==='low'; }).length;
  const out = items.filter(function(i) { return getStatus(i)==='out'; }).length;
  const staples = items.filter(function(i) { return i.is_staple; }).length;
  document.getElementById('pt-stats').innerHTML =
    '<div class="pt-stat"><div class="pt-stat-num">' + items.length + '</div><div class="pt-stat-label">Total Items</div></div>' +
    '<div class="pt-stat"><div class="pt-stat-num" style="color:#4caf76">' + ok + '</div><div class="pt-stat-label">Well Stocked</div></div>' +
    '<div class="pt-stat"><div class="pt-stat-num" style="color:var(--warn)">' + low + '</div><div class="pt-stat-label">Running Low</div></div>' +
    '<div class="pt-stat"><div class="pt-stat-num" style="color:var(--danger)">' + out + '</div><div class="pt-stat-label">Out of Stock</div></div>' +
    '<div class="pt-stat"><div class="pt-stat-num" style="color:var(--accent)">' + staples + '</div><div class="pt-stat-label">Staples</div></div>';
}

function renderList(search) {
  const items = getPantry();
  const q = (search||'').toLowerCase();
  const filtered = items.map(normalizePantryItem).filter(function(item) {
    if (q && !item.name.toLowerCase().includes(q)) return false;
    if (activeLocationFilter === 'staples') {
      if (!item.is_staple) return false;
    } else if (activeLocationFilter !== 'all') {
      if ((item.location || 'pantry') !== activeLocationFilter) return false;
    }
    const status = getStatus(item);
    if (activeFilter === 'expiring') {
      const exp = getExpiryStatus(item);
      if (!exp || (exp.status !== 'expiring' && exp.status !== 'expired')) return false;
    } else if (activeFilter !== 'all' && status !== activeFilter) return false;
    return true;
  });
  const el = document.getElementById('pt-list');
  if (!filtered.length) {
    el.innerHTML = '<div class="pt-empty"><div class="pt-empty-icon">🫙</div><div class="pt-empty-title">Nothing here yet</div><div class="pt-empty-sub">Click + Add Item to start tracking your pantry.</div></div>';
    return;
  }
  el.innerHTML = '';
  filtered.sort(function(a,b) {
    const so = {out:0,low:1,ok:2};
    return (so[getStatus(a)]||0) - (so[getStatus(b)]||0) || a.name.localeCompare(b.name);
  }).forEach(function(item) {
    const status = getStatus(item);
    const row = document.createElement('div');
    row.className = 'pt-item ' + status;
    const expInfo = getExpiryStatus(item);
    const expBadge = expInfo && expInfo.status !== 'ok'
      ? '<div style="font-family:\'DM Sans\',sans-serif;font-size:10px;margin-top:3px;color:' +
        (expInfo.status === 'expired' ? 'var(--danger)' : 'var(--warn)') + '">' + esc(expInfo.label) + '</div>' : '';
    const locLabel = PT_LOC_LABEL[item.location || 'pantry'] || item.location;
    row.innerHTML =
      '<div style="flex:1"><div class="pt-item-name">' + esc(item.name||'') +
        (item.is_staple ? '<span class="pt-staple-badge">⭐ staple</span>' : '') + '</div>' +
      '<div class="pt-loc-badge">' + locLabel + (item.category ? ' · ' + esc(item.category) : '') + '</div>' +
      expBadge + '</div>' +
      '<div class="pt-item-qty">' +
        '<button class="pt-qty-btn" data-item-id="' + esc(String(item.id)) + '" data-delta="-1">−</button>' +
        '<div class="pt-qty-val">' + (item.qty||0) + ' <span style="font-size:10px;color:var(--text-mid)">' + esc(item.unit||'') + '</span></div>' +
        '<button class="pt-qty-btn" data-item-id="' + esc(String(item.id)) + '" data-delta="1">+</button>' +
      '</div>' +
      '<span class="pt-status ' + status + '">' + (status==='ok'?'Good':status==='low'?'Low':'Out') + '</span>' +
      (item.is_staple ? '' : '<button class="pt-btn pt-btn-ghost" style="font-size:10px;padding:4px 8px" data-action="low" data-item-id="' + esc(String(item.id)) + '" title="Mark running low">Low</button>') +
      '<button class="pt-btn pt-btn-ghost" style="font-size:10px;padding:4px 8px" data-action="restock" data-item-id="' + esc(String(item.id)) + '" title="Mark restocked">✓</button>' +
      (item.is_staple ? '' : '<button class="pt-btn pt-btn-ghost" style="font-size:10px;padding:4px 8px" data-action="grocery" data-item-id="' + esc(String(item.id)) + '" title="Add to grocery">🛒</button>') +
      '<button class="pt-btn pt-btn-ghost" style="font-size:11px;padding:5px 10px" data-action="edit" data-item-id="' + esc(String(item.id)) + '">Edit</button>' +
      '<button class="pt-del-btn" data-action="delete" data-item-id="' + esc(String(item.id)) + '" title="Delete">🗑</button>';
    el.appendChild(row);
  });
  renderStats();
  renderExpiryAlert();
}

function adjustQty(id, delta) {
  const list = getPantry();
  const item = list.find(function(i) { return i.id === id; });
  if (!item) return;
  item.qty = Math.max(0, (parseFloat(item.qty)||0) + delta);
  savePantry(list);
  renderList(document.getElementById('pt-search').value);
}

function deleteItem(id) {
  if (!confirm('Remove this item from your pantry?')) return;
  savePantry(getPantry().filter(function(i) { return i.id !== id; }));
  renderList(document.getElementById('pt-search').value);
}

function openAddModal() {
  document.getElementById('pt-modal-title').textContent = 'Add Pantry Item';
  document.getElementById('pt-edit-id').value = '';
  ['pt-name','pt-qty','pt-unit','pt-min','pt-expiry'].forEach(function(id) { document.getElementById(id).value = ''; });
  document.getElementById('pt-category').value = '';
  document.getElementById('pt-ingredient-id').value = '';
  document.getElementById('pt-location').value = 'pantry';
  document.getElementById('pt-staple').checked = false;
  var hint = document.getElementById('pt-ing-hint'); if (hint) hint.style.display = 'none';
  var ua = document.getElementById('pt-unknown-actions'); if (ua) ua.style.display = 'none';
  var uu = document.getElementById('pt-unit-unknown'); if (uu) uu.style.display = 'none';
  document.getElementById('pt-modal').classList.add('open');
  setTimeout(function() { document.getElementById('pt-name').focus(); }, 50);
}

function editItem(id) {
  const item = getPantry().find(function(i) { return i.id===id; });
  if (!item) return;
  document.getElementById('pt-modal-title').textContent = 'Edit Item';
  document.getElementById('pt-edit-id').value = id;
  document.getElementById('pt-name').value = item.name||'';
  document.getElementById('pt-qty').value  = item.qty||'';
  document.getElementById('pt-unit').value = item.unit||'';
  document.getElementById('pt-category').value = item.category||'';
  document.getElementById('pt-ingredient-id').value = item.ingredient_id || '';
  document.getElementById('pt-min').value  = item.min_qty||'';
  document.getElementById('pt-expiry').value = item.expiry_date||'';
  document.getElementById('pt-location').value = item.location || 'pantry';
  document.getElementById('pt-staple').checked = !!item.is_staple;
  onPantryNameInput();
  document.getElementById('pt-modal').classList.add('open');
}

function closeModal() { document.getElementById('pt-modal').classList.remove('open'); }

function saveItem() {
  const name = document.getElementById('pt-name').value.trim();
  if (!name) { alert('Please enter an item name.'); return; }
  const list = getPantry();
  const editId = document.getElementById('pt-edit-id').value;
  const ingId = document.getElementById('pt-ingredient-id').value;
  const item = {
    id: editId || 'pt_' + Date.now(),
    name,
    ingredient_id: ingId ? parseInt(ingId, 10) : null,
    qty: parseFloat(document.getElementById('pt-qty').value)||0,
    unit: document.getElementById('pt-unit').value.trim(),
    category: document.getElementById('pt-category').value,
    min_qty: parseFloat(document.getElementById('pt-min').value)||null,
    expiry_date: document.getElementById('pt-expiry').value||null,
    location: document.getElementById('pt-location').value || 'pantry',
    is_staple: !!document.getElementById('pt-staple').checked,
    updated: new Date().toISOString()
  };
  if (editId) {
    const idx = list.findIndex(function(i){ return i.id===editId; });
    if (idx > -1) list[idx] = item; else list.push(item);
  } else { list.push(item); }
  savePantry(list);
  closeModal();
  renderList(document.getElementById('pt-search').value);
  loadUseItUpSuggestions();
}

function markItemLow(id) {
  const list = getPantry();
  const item = list.find(function(i) { return i.id === id; });
  if (!item || item.is_staple) return;
  item.qty = 0;
  savePantry(list);
  renderList(document.getElementById('pt-search').value);
}

function markItemRestocked(id) {
  const list = getPantry();
  const item = list.find(function(i) { return i.id === id; });
  if (!item) return;
  const target = Math.max((parseFloat(item.min_qty) || 1) + 1, 1);
  item.qty = target;
  savePantry(list);
  renderList(document.getElementById('pt-search').value);
}

function addItemToGrocery(id) {
  const item = getPantry().find(function(i) { return i.id === id; });
  if (!item || item.is_staple) return;
  const data = GroceryUtils.loadGrocery();
  let entry = data.recipes.find(function(r) { return r.id === 'pantry-restock'; });
  if (!entry) { entry = { id:'pantry-restock', name:'Pantry Restock', servings:1, ingredients:[], source:'pantry-low' }; data.recipes.push(entry); }
  if (!entry.ingredients.find(function(i) { return i.name === item.name; })) {
    entry.ingredients.push(GroceryUtils.enrichIngredient({
      name: item.name, qty: item.min_qty || 1, unit: item.unit || '',
      section: 'Restock', category: item.category || 'Pantry',
      ingredient_id: item.ingredient_id || null,
      source: 'pantry-low', source_label: 'Restock'
    }, { source: 'pantry-low', source_ref: 'pantry-restock' }));
    GroceryUtils.saveGrocery(data);
  }
  window.location.href = 'grocery.html';
}

function addToGroceryLow() {
  const items = getPantry().filter(function(i) { return !i.is_staple && getStatus(i) !== 'ok'; });
  if (!items.length) { alert('All non-staple items are well stocked!'); return; }
  const data = GroceryUtils.loadGrocery();
  let entry = data.recipes.find(function(r){ return r.id==='pantry-restock'; });
  if (!entry) { entry = {id:'pantry-restock',name:'Pantry Restock',servings:1,ingredients:[],source:'pantry-low'}; data.recipes.push(entry); }
  let added = 0;
  items.forEach(function(item) {
    if (!entry.ingredients.find(function(i){return i.name===item.name;})) {
      entry.ingredients.push(GroceryUtils.enrichIngredient({
        name: item.name, qty: item.min_qty || 1, unit: item.unit || '',
        section: 'Restock', category: item.category || 'Pantry',
        source: 'pantry-low', source_label: 'Low stock'
      }, { source: 'pantry-low', source_ref: 'pantry-restock' }));
      added++;
    }
  });
  GroceryUtils.saveGrocery(data);
  alert(added + ' item(s) added to grocery list. Going to Grocery List...');
  window.location.href = 'grocery.html';
}

function mapPantryCategory(dbCat) {
  if (!dbCat) return '';
  var sel = document.getElementById('pt-category');
  if (!sel) return dbCat;
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value && sel.options[i].value.toLowerCase() === String(dbCat).toLowerCase()) return sel.options[i].value;
  }
  return dbCat;
}

function onPantryNameInput() {
  var name = (document.getElementById('pt-name').value || '').trim();
  var hint = document.getElementById('pt-ing-hint');
  var unknownActions = document.getElementById('pt-unknown-actions');
  var match = pantryIngIndex[name.toLowerCase()];
  if (!match) {
    document.getElementById('pt-ingredient-id').value = '';
    var catEl = document.getElementById('pt-category');
    var unitEl = document.getElementById('pt-unit');
    if (catEl) catEl.disabled = false;
    if (unitEl) unitEl.readOnly = false;
    if (name.length >= 2) {
      if (hint) {
        hint.textContent = '⚠ Not in governed database — you can still save locally, or submit for admin review.';
        hint.style.display = 'block';
        hint.style.color = 'var(--warn)';
      }
      if (unknownActions) unknownActions.style.display = 'block';
    } else {
      if (hint) hint.style.display = 'none';
      if (unknownActions) unknownActions.style.display = 'none';
    }
    onPantryUnitInput();
    return;
  }
  if (unknownActions) unknownActions.style.display = 'none';
  document.getElementById('pt-ingredient-id').value = match.id;
  var cat = mapPantryCategory(match.category);
  var catEl = document.getElementById('pt-category');
  if (cat && catEl) { catEl.value = cat; catEl.disabled = true; }
  var unitEl = document.getElementById('pt-unit');
  if (unitEl) {
    if (!unitEl.value && match.unit) unitEl.value = match.unit;
    unitEl.readOnly = true;
  }
  if (hint) {
    hint.textContent = '✓ Linked to governed ingredient #' + match.id + (match.category ? ' · ' + match.category : '');
    hint.style.display = 'block';
    hint.style.color = '#4caf76';
  }
  onPantryUnitInput();
}

function onPantryUnitInput() {
  var unit = (document.getElementById('pt-unit').value || '').trim().toLowerCase();
  var el = document.getElementById('pt-unit-unknown');
  if (!el) return;
  if (!unit || PT_STANDARD_UNITS.indexOf(unit) >= 0) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
}

async function callPantryRPC(fn, params) {
  var sess = JSON.parse(localStorage.getItem('tcj_session') || 'null');
  if (!sess || !sess.access_token) {
    alert('Please sign in to submit for review.');
    window.location.href = 'login.html';
    return null;
  }
  var res = await fetch(SUPA_URL + '/rest/v1/rpc/' + fn, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + sess.access_token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(params || {})
  });
  if (!res.ok) {
    var err = await res.text();
    if (err.indexOf('already_pending') >= 0) throw new Error('Already submitted — awaiting admin review.');
    throw new Error(err || res.statusText);
  }
  var text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function submitUnknownIngredient() {
  var name = (document.getElementById('pt-name').value || '').trim();
  if (!name) { alert('Enter an ingredient name first.'); return; }
  var notes = prompt('Optional note for the admin (e.g. brand, variety):', '') || '';
  try {
    await callPantryRPC('submit_pending_ingredient', {
      p_name: name,
      p_type: 'ingredient',
      p_category: document.getElementById('pt-category').value || null,
      p_unit: document.getElementById('pt-unit').value.trim() || null,
      p_notes: notes || null
    });
    alert('Submitted for review. You will be notified when it is added to the database.');
    document.getElementById('pt-unknown-actions').style.display = 'none';
  } catch (e) {
    alert(e.message || 'Submission failed.');
  }
}

async function submitUnknownUnit() {
  var unit = (document.getElementById('pt-unit').value || '').trim();
  if (!unit) { alert('Enter a unit first.'); return; }
  try {
    await callPantryRPC('submit_pending_ingredient', {
      p_name: unit,
      p_type: 'unit',
      p_category: null,
      p_unit: unit,
      p_notes: 'Submitted from pantry add-item form'
    });
    alert('Unit submitted for review.');
    document.getElementById('pt-unit-unknown').style.display = 'none';
  } catch (e) {
    alert(e.message || 'Submission failed.');
  }
}

function pantryNamesForUseItUp() {
  return getPantry().map(normalizePantryItem).filter(function(item) {
    if (item.is_staple) return false;
    if (!item.name || (item.qty || 0) <= 0) return false;
    var st = getStatus(item);
    var exp = getExpiryStatus(item);
    return st === 'low' || st === 'out' || (exp && (exp.status === 'expiring' || exp.status === 'expired'));
  }).map(function(i) { return i.name; }).slice(0, 12);
}

async function loadUseItUpSuggestions() {
  var panel = document.getElementById('pt-useitup');
  var grid = document.getElementById('pt-useitup-grid');
  if (!panel || !grid) return;
  var names = pantryNamesForUseItUp();
  if (!names.length) {
    panel.style.display = 'none';
    return;
  }
  try {
    var sess = JSON.parse(localStorage.getItem('tcj_session') || 'null');
    var headers = { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' };
    if (sess && sess.access_token) headers.Authorization = 'Bearer ' + sess.access_token;
    var res = await fetch(SUPA_URL + '/rest/v1/rpc/search_recipes_by_pantry_names', {
      method: 'POST', headers: headers,
      body: JSON.stringify({ p_names: names, p_limit: 12 })
    });
    if (!res.ok) { panel.style.display = 'none'; return; }
    var recipes = await res.json();
    if (!recipes || !recipes.length) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    grid.innerHTML = recipes.map(function(r) {
      var matched = Array.isArray(r.matched_items) ? r.matched_items.join(', ') : '';
      return '<a class="pt-useitup-card" href="recipe-page.html?id=' + encodeURIComponent(r.id) + '">' +
        '<div class="pt-useitup-name">' + esc(r.recipe_name || 'Recipe') + '</div>' +
        '<div class="pt-useitup-meta">' + esc(r.category || '') +
        (matched ? ' · uses ' + esc(matched) : '') + '</div></a>';
    }).join('');
  } catch (_) {
    panel.style.display = 'none';
  }
}

// Load governed ingredients for autocomplete (PF-01)
async function loadIngredientNames() {
  try {
    if (typeof TcjIngredientLookup === 'undefined') return;
    const index = await TcjIngredientLookup.fetchIndex();
    const rows = index.rows || [];
    const dl = document.getElementById('pt-ingredients-list');
    pantryIngIndex = index.byName || {};
    if (dl && rows.length) {
      dl.innerHTML = rows.map(function(r) {
        var n = r.name || r['Ingredient Name'] || '';
        return '<option value="' + n.replace(/"/g,'&quot;') + '">';
      }).join('');
    }
  } catch(_) {}
}

document.addEventListener('DOMContentLoaded', function() {
  // Button delegation — no inline onclick, no XSS
  document.getElementById('pt-list').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-item-id]');
    if (!btn) return;
    var id = btn.dataset.itemId;
    if (btn.dataset.action === 'edit')    { editItem(id); return; }
    if (btn.dataset.action === 'delete')  { deleteItem(id); return; }
    if (btn.dataset.action === 'low')     { markItemLow(id); return; }
    if (btn.dataset.action === 'restock') { markItemRestocked(id); return; }
    if (btn.dataset.action === 'grocery') { addItemToGrocery(id); return; }
    if (btn.dataset.delta !== undefined)  { adjustQty(id, parseInt(btn.dataset.delta||0)); }
  });

  renderStats();
  renderExpiryAlert();
  renderList('');
  loadIngredientNames();
  loadPantryFromSupabase().then(loadUseItUpSuggestions);
  loadUseItUpSuggestions();
  setInterval(function(){ if(_ptHouseholdShared) loadPantryFromSupabase(false); }, 20000);
  document.getElementById('pt-modal').addEventListener('click', function(e) {
    if (e.target===this) closeModal();
  });
});
</script>
